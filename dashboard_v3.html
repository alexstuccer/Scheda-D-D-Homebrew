 creatura triplica.","desc":"","descEn":"You touch a creature. The creature's jump distance is tripled until the spell ends.","higherEn":"","userName":"Salto"},{"id":"knock","srd":true,"name":"Bussare","nameEn":"Knock","level":2,"school":"Trasmutazione","castTime":"1 Azione","range":"18 m","duration":"Istantanea","components":"V","material":null,"concentration":false,"ritual":false,"attack":null,"damage":null,"dc":null,"classes":["Bard","Sorcerer","Wizard"],"classesHb":["Bardo","Mago","Stregone"],"effects":"Apre serrature/porte sigillate (temporaneamente); nessun danno.","desc":"","descEn":"Choose an object that you can see within range. The object can be a door, a box, a chest, a set of manacles, a padlock, or another object that contains a mundane or magical means that prevents access. A target that is held shut by a mundane lock or that is stuck or barred becomes unlocked, unstuck, or unbarred. If the object has multiple locks, only one of them is unlocked. If you choose a target that is held shut with arcane lock, that spell is suppressed for 10 minutes, during which time the target can be opened and shut normally. When you cast the spell, a loud knock, audible from as far away as 300 feet, emanates from the target object.","higherEn":"","userName":"Bussare"},{"id":"legend-lore","srd":true,"name":"Sapienza Leggendaria","nameEn":"Legend Lore","level":5,"school":"Divinazione","castTime":"10 Minuti","range":"Personale","duration":"Istantanea","components":"V, S, M","material":"Incense worth at least 250 gp, which the spell consumes, and four ivory strips worth at least 50 gp each.","concentration":false,"ritual":false,"attack":null,"damage":null,"dc":null,"classes":["Bard","Cleric","Wizard"],"classesHb":["Bardo","Chierico","Mago"],"effects":"","desc":"","descEn":"Name or describe a person, place, or object. The spell brings to your mind a brief summary of the significant lore about the thing you named. The lore might consist of current tales, forgotten stories, or even secret lore that has never been widely known. If the thing you named isn't of legendary importance, you gain no information. The more information you already have about the thing, the more precise and detailed the information you receive is. The information you learn is accurate but might be couched in figurative language. For example, if you have a mysterious magic axe on hand the spell might yield this information: \"Woe to the evildoer whose hand touches the axe, for even the haft slices the hand of the evil ones. Only a true Child of Stone, lover and beloved of Moradin, may awaken the true powers of the axe, and only with the sacred word *Rudnogg* on the lips.\"","higherEn":""},{"id":"lesser-restoration","srd":true,"name":"Ristorare Inferiore","nameEn":"Lesser Restoration","level":2,"school":"Abiurazione","castTime":"1 Azione","range":"Contatto","duration":"Istantanea","components":"V, S","material":null,"concentration":false,"ritual":false,"attack":null,"damage":null,"dc":null,"classes":["Bard","Cleric","Druid","Paladin","Ranger"],"classesHb":["Bardo","Chierico","Druido","Paladino","Ranger"],"effects":"Cura condizioni specifiche (cecità, sordità, paralisi, avvelenamento).","desc":"","descEn":"You touch a creature and can end either one disease or one condition afflicting it. The condition can be blinded, deafened, paralyzed, or poisoned.","higherEn":"","userName":"Ristorare Inferiore"},{"id":"levitate","srd":true,"name":"Levitazione","nameEn":"Levitate","level":2,"school":"Trasmutazione","castTime":"1 Azione","range":"18 m","duration":"Concentrazione, fino a 10 minuti","components":"V, S, M","material":"Either a small leather loop or a piece of golden wire bent into a cup shape with a long shank on one end.","concentration":true,"ritual":false,"attack":null,"damage":null,"dc":null,"classes":["Sorcerer","Wizard"],"classesHb":["Mago","Stregone"],"effects":"Solleva verticalmente creatura/oggetto; nessun danno.","desc":"","descEn":"One creature or object of your choice that you can see within range rises vertically, up to 20 feet, and remains suspended there for the duration. The spell can levitate a target that weighs up to 500 pounds. An unwilling creature that succeeds on a constitution saving throw is unaffected. The target can move only by pushing or pulling against a fixed object or surface within reach (such as a wall or a ceiling), which allows it to move as if it were climbing. You can change the target's altitude by up to 20 feet in either direction on your turn. If you are the target, you can move up or down as part of your move. Otherwise, you can use your action to move the target, which must remain within the spell's range. When the spell ends, the target floats gently to the ground if it is still aloft.","higherEn":"","userName":"Levitare"},{"id":"light","srd":true,"name":"Luce","nameEn":"Light","level":0,"school":"Invocazione","castTime":"1 Azione","range":"Contatto","duration":"1 ora","components":"V, M","material":"A firefly or phosphorescent moss.","concentration":false,"ritual":false,"attack":null,"damage":null,"dc":{"ability":"Destrezza","success":"none"},"classes":["Bard","Cleric","Sorcerer","Wizard"],"classesHb":["Bardo","Chierico","Mago","Stregone"],"effects":"L’oggetto toccato emette luce intensa in un raggio di 6 m (luce fioca per altri 6 m). Può essere oscurato con un’azione.","desc":"Tocchi un oggetto non più grande di 3 m in ogni dimensione. Fino al termine dell'incantesimo, l'oggetto emette luce intensa in un raggio di 6 m e luce fioca per altri 6 m. La luce può avere il colore che preferisci. Coprire completamente l'oggetto con qualcosa di opaco blocca la luce. L'incantesimo termina se lo lanci di nuovo o lo congedi come azione. Se prendi di mira un oggetto indossato o trasportato da una creatura ostile, quella creatura deve superare un tiro salvezza su Destrezza per evitare l'incantesimo.","descEn":"You touch one object that is no larger than 10 feet in any dimension. Until the spell ends, the object sheds bright light in a 20-foot radius and dim light for an additional 20 feet. The light can be colored as you like. Completely covering the object with something opaque blocks the light. The spell ends if you cast it again or dismiss it as an action. If you target an object held or worn by a hostile creature, that creature must succeed on a dexterity saving throw to avoid the spell.","higherEn":"","userName":"Luce"},{"id":"lightning-bolt","srd":true,"name":"Fulmine","nameEn":"Lightning Bolt","level":3,"school":"Invocazione","castTime":"1 Azione","range":"Personale","duration":"Istantanea","components":"V, S, M","material":"A bit of fur and a rod of amber, crystal, or glass.","concentration":false,"ritual":false,"attack":null,"damage":{"type":"Lightning","scale":"slot","table":{"3":"8d6","4":"9d6","5":"10d6","6":"11d6","7":"12d6","8":"13d6","9":"14d6"}},"dc":{"ability":"Destrezza","success":"half"},"classes":["Sorcerer","Wizard"],"classesHb":["Mago","Stregone"],"effects":"","desc":"","descEn":"A stroke of lightning forming a line 100 feet long and 5 feet wide blasts out from you in a direction you choose. Each creature in the line must make a dexterity saving throw. A creature takes 8d6 lightning damage on a failed save, or half as much damage on a successful one. The lightning ignites flammable objects in the area that aren't being worn or carried.","higherEn":"When you cast this spell using a spell slot of 4th level or higher, the damage increases by 1d6 for each slot level above 3rd."},{"id":"locate-animals-or-plants","srd":true,"name":"Localizzare Animali o Piante","nameEn":"Locate Animals or Plants","level":2,"school":"Divinazione","castTime":"1 Azione (Rituale)","range":"Personale","duration":"Istantanea","components":"V, S, M","material":"A bit of fur from a bloodhound.","concentration":false,"ritual":true,"attack":null,"damage":null,"dc":null,"classes":["Bard","Druid","Ranger"],"classesHb":["Bardo","Druido","Ranger"],"effects":"","desc":"","descEn":"Describe or name a specific kind of beast or plant. Concentrating on the voice of nature in your surroundings, you learn the direction and distance to the closest creature or plant of that kind within 5 miles, if any are present.","higherEn":""},{"id":"locate-creature","srd":true,"name":"Localizzare Creatura","nameEn":"Locate Creature","level":4,"school":"Divinazione","castTime":"1 Azione","range":"Personale","duration":"Concentrazione, fino a 1 ora","components":"V, S, M","material":"A bit of fur from a bloodhound.","concentration":true,"ritual":false,"attack":null,"damage":null,"dc":null,"classes":["Bard","Cleric","Druid","Paladin","Ranger","Wizard"],"classesHb":["Bardo","Chierico","Druido","Mago","Paladino","Ranger"],"effects":"","desc":"","descEn":"Describe or name a creature that is familiar to you. You sense the direction to the creature's location, as long as that creature is within 1,000 feet of you. If the creature is moving, you know the direction of its movement. The spell can locate a specific creature known to you, or the nearest creature of a specific kind (such as a human or a unicorn), so long as you have seen such a creature up close--within 30 feet--at least once. If the creature you described or named is in a different form, such as being under the effects of a polymorph spell, this spell doesn't locate the creature. This spell can't locate a creature if running water at least 10 feet wide blocks a direct path between you and the creature.","higherEn":""},{"id":"locate-object","srd":true,"name":"Localizzare Oggetto","nameEn":"Locate Object","level":2,"school":"Divinazione","castTime":"1 Azione","range":"Personale","duration":"Concentrazione, fino a 10 minuti","components":"V, S, M","material":"A forked twig.","concentration":true,"ritual":false,"attack":null,"damage":null,"dc":null,"classes":["Bard","Cleric","Druid","Paladin","Ranger","Wizard"],"classesHb":["Bardo","Chierico","Druido","Mago","Paladino","Ranger"],"effects":"Indica direzione di un oggetto noto entro 300 m; nessun danno.","desc":"","descEn":"Describe or name an object that is familiar to you. You sense the direction to the object's location, as long as that object is within 1,000 feet of you. If the object is in motion, you know the direction of its movement. The spell can locate a specific object known to you, as long as you have seen it up close--within 30 feet--at least once. Alternatively, the spell can locate the nearest object of a particular kind, such as a certain kind of apparel, jewelry, furniture, tool, or weapon. This spell can't locate an object if any thickness of lead, even a thin sheet, blocks a direct path between you and the object.","higherEn":"","userName":"Localizzare Oggetto"},{"id":"longstrider","srd":true,"name":"Passo Lungo","nameEn":"Longstrider","level":1,"school":"Trasmutazione","castTime":"1 Azione","range":"Contatto","duration":"1 ora","components":"V, S, M","material":"A pinch of dirt.","concentration":false,"ritual":false,"attack":null,"damage":null,"dc":null,"classes":["Bard","Druid","Ranger","Wizard"],"classesHb":["Bardo","Druido","Mago","Ranger"],"effects":"La velocità di movimento della creatura aumenta di 3 m.","desc":"","descEn":"You touch a creature. The target's speed increases by 10 feet until the spell ends.","higherEn":"When you cast this spell using a spell slot of 2nd level or higher, you can target one additional creature for each spell slot above 1st.","userName":"Passo Lungo"},{"id":"mage-armor","srd":true,"name":"Armatura Magica","nameEn":"Mage Armor","level":1,"school":"Abiurazione","castTime":"1 Azione","range":"Contatto","duration":"8 ore","components":"V, S, M","material":"A piece of cured leather.","concentration":false,"ritual":false,"attack":null,"damage":null,"dc":null,"classes":["Sorcerer","Wizard"],"classesHb":["Mago","Stregone"],"effects":"","desc":"","descEn":"You touch a willing creature who isn't wearing armor, and a protective magical force surrounds it until the spell ends. The target's base AC becomes 13 + its Dexterity modifier. The spell ends if the target dons armor or if you dismiss the spell as an action.","higherEn":""},{"id":"mage-hand","srd":true,"name":"Mano Magica","nameEn":"Mage Hand","level":0,"school":"Evocazione","castTime":"1 Azione","range":"9 m","duration":"1 minuto","components":"V, S","material":null,"concentration":false,"ritual":false,"attack":null,"damage":null,"dc":null,"classes":["Bard","Sorcerer","Warlock","Wizard"],"classesHb":["Bardo","Invocatore","Mago","Stregone"],"effects":"Crea una mano spettrale che può manipolare oggetti (max 4,5 kg), aprire porte, versare liquidi, ecc.","desc":"Una mano spettrale e fluttuante appare in un punto a tua scelta entro gittata. Dura per la durata dell'incantesimo o finché non la congedi come azione. Svanisce se si allontana più di 9 m da te o se lanci di nuovo l'incantesimo. Puoi usare la tua azione per controllarla: manipolare un oggetto, aprire una porta o un contenitore non chiusi a chiave, riporre o recuperare un oggetto da un contenitore aperto, versare il contenuto di una fiala. Puoi muoverla fino a 9 m a ogni utilizzo. Non può attaccare, attivare oggetti magici o trasportare più di 4,5 kg.","descEn":"A spectral, floating hand appears at a point you choose within range. The hand lasts for the duration or until you dismiss it as an action. The hand vanishes if it is ever more than 30 feet away from you or if you cast this spell again. You can use your action to control the hand. You can use the hand to manipulate an object, open an unlocked door or container, stow or retrieve an item from an open container, or pour the contents out of a vial. You can move the hand up to 30 feet each time you use it. The hand can't attack, activate magic items, or carry more than 10 pounds.","higherEn":"","userName":"Mano Magica"},{"id":"magic-circle","srd":true,"name":"Cerchio Magico","nameEn":"Magic Circle","level":3,"school":"Abiurazione","castTime":"1 Minuto","range":"3 m","duration":"1 ora","components":"V, S, M","material":"Holy water or powdered silver and iron worth at least 100 gp, which the spell consumes.","concentration":false,"ritual":false,"attack":null,"damage":null,"dc":{"ability":"Carisma","success":"other"},"classes":["Cleric","Paladin","Warlock","Wizard"],"classesHb":["Chierico","Invocatore","Mago","Paladino"],"effects":"Crea una barriera che impedisce l'accesso a creature specifiche e la loro interazione.","desc":"","descEn":"You create a 10-foot radius, 20-foot-tall cylinder of magical energy centered on a point on the ground that you can see within range. Glowing runes appear whenever the cylinder intersects with the floor or other surface. Choose one or more of the following types of creatures: celestials, elementals, fey, fiends, or undead. The circle affects a creature of the chosen type in the following ways: - The creature can't willingly enter the cylinder by nonmagical means. If the creature tries to use teleportation or interplanar travel to do so, it must first succeed on a charisma saving throw. - The creature has disadvantage on attack rolls against targets within the cylinder. - Targets within the cylinder can't be charmed, frightened, or possessed by the creature. When you cast this spell, you can elect to cause its magic to operate in the reverse direction, preventing a creature of the specified type from leaving the cylinder and protecting targets outside it.","higherEn":"When you cast this spell using a spell slot of 4th level or higher, the duration increases by 1 hour for each slot level above 3rd.","userName":"Cerchio Magico"},{"id":"magic-jar","srd":true,"name":"Vaso Magico","nameEn":"Magic Jar","level":6,"school":"Necromanzia","castTime":"1 Minuto","range":"Personale","duration":"Finché non dissolto","components":"V, S, M","material":"A gem, crystal, reliquary, or some other ornamental container worth at least 500 gp.","concentration":false,"ritual":false,"attack":null,"damage":null,"dc":{"ability":"Carisma","success":"other"},"classes":["Wizard"],"classesHb":["Mago"],"effects":"","desc":"","descEn":"Your body falls into a catatonic state as your soul leaves it and enters the container you used for the spell's material component. While your soul inhabits the container, you are aware of your surroundings as if you were in the container's space. You can't move or use reactions. The only action you can take is to project your soul up to 100 feet out of the container, either returning to your living body (and ending the spell) or attempting to possess a humanoids body. You can attempt to possess any humanoid within 100 feet of you that you can see (creatures warded by a protection from evil and good or magic circle spell can't be possessed). The target must make a charisma saving throw. On a failure, your soul moves into the target's body, and the target's soul becomes trapped in the container. On a success, the target resists your efforts to possess it, and you can't attempt to possess it again for 24 hours. Once you possess a creature's body, you control it. Your game statistics are replaced by the statistics of the creature, though you retain your alignment and your Intelligence, Wisdom, and Charisma scores. You retain the benefit of your own class features. If the target has any class levels, you can't use any of its class features. Meanwhile, the possessed creature's soul can perceive from the container using its own senses, but it can't move or take actions at all. While possessing a body, you can use your action to return from the host body to the container if it is within 100 feet of you, returning the host creature's soul to its body. If the host body dies while you're in it, the creature dies, and you must make a charisma saving throw against your own spellcasting DC. On a success, you return to the container if it is within 100 feet of you. Otherwise, you die. If the container is destroyed or the spell ends, your soul immediately returns to your body. If your body is more than 100 feet away from you or if your body is dead when you attempt to return to it, you die. If another creature's soul is in the container when it is destroyed, the creature's soul returns to its body if the body is alive and within 100 feet. Otherwise, that creature dies. When the spell ends, the container is destroyed.","higherEn":""},{"id":"magic-missile","srd":true,"name":"Dardo Incantato","nameEn":"Magic Missile","level":1,"school":"Invocazione","castTime":"1 Azione","range":"36 m","duration":"Istantanea","components":"V, S","material":null,"concentration":false,"ritual":false,"attack":null,"damage":{"type":"Force","scale":"slot","table":{"1":"3d4 + 3","2":"4d4 + 4","3":"5d4 + 5","4":"6d4 + 6","5":"7d4 + 7","6":"8d4 + 8","7":"9d4 + 9","8":"10d4 + 10","9":"11d4 + 11"}},"dc":null,"classes":["Sorcerer","Wizard"],"classesHb":["Mago","Stregone"],"effects":"Crea tre dardi magici che infliggono ciascuno 1d4+1 danni da forza.","desc":"","descEn":"You create three glowing darts of magical force. Each dart hits a creature of your choice that you can see within range. A dart deals 1d4 + 1 force damage to its target. The darts all strike simultaneously, and you can direct them to hit one creature or several.","higherEn":"When you cast this spell using a spell slot of 2nd level or higher, the spell creates one more dart for each slot level above 1st.","userName":"Dardo Incantato"},{"id":"magic-mouth","srd":true,"name":"Bocca Magica","nameEn":"Magic Mouth","level":2,"school":"Illusione","castTime":"1 Minuto (Rituale)","range":"9 m","duration":"Finché non dissolto","components":"V, S, M","material":"A honeycomb and jade dust of at least 10 inches, the spell consumes.","concentration":false,"ritual":true,"attack":null,"damage":null,"dc":null,"classes":["Bard","Wizard"],"classesHb":["Bardo","Mago"],"effects":"Incanta un messaggio condizionale; nessun danno.","desc":"","descEn":"You plant a message to an object in the range of the spell. The message is verbalized when the trigger conditions are met. Choose an object that you see, and that is not worn or carried by another creature. Then say the message, which should not exceed 25 words but listening can take up to 10 minutes. Finally, establish the circumstances that trigger the spell to deliver your message. When these conditions are satisfied, a magical mouth appears on the object and it articulates the message imitating your voice, the same tone used during implantation of the message. If the selected object has a mouth or something that approaches such as the mouth of a statue, the magic mouth come alive at this point, giving the illusion that the words come from the mouth of the object. When you cast this spell, you may decide that the spell ends when the message is delivered or it can persist and repeat the message whenever circumstances occur. The triggering circumstance can be as general or as detailed as you like, though it must be based on visual or audible conditions that occur within 30 feet of the object. For example, you could instruct the mouth to speak when any creature moves within 30 feet of the object or when a silver bell rings within 30 feet of it.","higherEn":"","userName":"Bocca Magica"},{"id":"magic-weapon","srd":true,"name":"Arma Magica","nameEn":"Magic Weapon","level":2,"school":"Trasmutazione","castTime":"1 Azione Bonus","range":"Contatto","duration":"Concentrazione, fino a 1 ora","components":"V, S","material":null,"concentration":true,"ritual":false,"attack":null,"damage":null,"dc":null,"classes":["Paladin","Wizard"],"classesHb":["Mago","Paladino"],"effects":"Un’arma diventa magica (+1); nessun danno diretto.","desc":"","descEn":"You touch a nonmagical weapon. Until the spell ends, that weapon becomes a magic weapon with a +1 bonus to attack rolls and damage rolls.","higherEn":"When you cast this spell using a spell slot of 4th level or higher, the bonus increases to +2. When you use a spell slot of 6th level or higher, the bonus increases to +3.","userName":"Arma Magica"},{"id":"magnificent-mansion","srd":true,"name":"Magione Magnifica","nameEn":"Magnificent Mansion","level":7,"school":"Evocazione","castTime":"1 Minuto","range":"90 m","duration":"24 ore","components":"V, S, M","material":"A miniature portal carved from ivory, a small piece of polished marble, and a tiny silver spoon, each item worth at least 5 gp.","concentration":false,"ritual":false,"attack":null,"damage":null,"dc":null,"classes":["Bard","Wizard"],"classesHb":["Bardo","Mago"],"effects":"","desc":"","descEn":"You conjure an extradimensional dwelling in range that lasts for the duration. You choose where its one entrance is located. The entrance shimmers faintly and is 5 feet wide and 10 feet tall. You and any creature you designate when you cast the spell can enter the extradimensional dwelling as long as the portal remains open. You can open or close the portal if you are within 30 feet of it. While closed, the portal is invisible. Beyond the portal is a magnificent foyer with numerous chambers beyond. The atmosphere is clean, fresh, and warm. You can create any floor plan you like, but the space can't exceed 50 cubes, each cube being 10 feet on each side. The place is furnished and decorated as you choose. It contains sufficient food to serve a nine course banquet for up to 100 people. A staff of 100 near-transparent servants attends all who enter. You decide the visual appearance of these servants and their attire. They are completely obedient to your orders. Each servant can perform any task a normal human servant could perform, but they can't attack or take any action that would directly harm another creature. Thus the servants can fetch things, clean, mend, fold clothes, light fires, serve food, pour wine, and so on. The servants can go anywhere in the mansion but can't leave it. Furnishings and other objects created by this spell dissipate into smoke if removed from the mansion. When the spell ends, any creatures inside the extradimensional space are expelled into the open spaces nearest to the entrance.","higherEn":""},{"id":"major-image","srd":true,"name":"Immagine Superiore","nameEn":"Major Image","level":3,"school":"Illusione","castTime":"1 Azione","range":"36 m","duration":"Concentrazione, fino a 10 minuti","components":"V, S, M","material":"A bit of fleece.","concentration":true,"ritual":false,"attack":null,"damage":null,"dc":null,"classes":["Bard","Sorcerer","Warlock","Wizard"],"classesHb":["Bardo","Invocatore","Mago","Stregone"],"effects":"","desc":"","descEn":"You create the image of an object, a creature, or some other visible phenomenon that is no larger than a 20-foot cube. The image appears at a spot that you can see within range and lasts for the duration. It seems completely real, including sounds, smells, and temperature appropriate to the thing depicted. You can't create sufficient heat or cold to cause damage, a sound loud enough to deal thunder damage or deafen a creature, or a smell that might sicken a creature (like a troglodyte's stench). As long as you are within range of the illusion, you can use your action to cause the image to move to any other spot within range. As the image changes location, you can alter its appearance so that its movements appear natural for the image. For example, if you create an image of a creature and move it, you can alter the image so that it appears to be walking. Similarly, you can cause the illusion to make different sounds at different times, even making it carry on a conversation, for example. Physical interaction with the image reveals it to be an illusion, because things can pass through it. A creature that uses its action to examine the image can determine that it is an illusion with a successful Intelligence (Investigation) check against your spell save DC. If a creature discerns the illusion for what it is, the creature can see through the image, and its other sensory qualities become faint to the creature.","higherEn":"When you cast this spell using a spell slot of 6th level or higher, the spell lasts until dispelled, without requiring your concentration."},{"id":"mass-cure-wounds","srd":true,"name":"Cura Ferite di Massa","nameEn":"Mass Cure Wounds","level":5,"school":"Evocazione","castTime":"1 Azione","range":"18 m","duration":"Istantanea","components":"V, S","material":null,"concentration":false,"ritual":false,"attack":null,"damage":null,"dc":null,"classes":["Bard","Cleric","Druid"],"classesHb":["Bardo","Chierico","Druido"],"effects":"","desc":"","descEn":"A wave of healing energy washes out from a point of your choice within range. Choose up to six creatures in a 30-foot-radius sphere centered on that point. Each target regains hit points equal to 3d8 + your spellcasting ability modifier. This spell has no effect on undead or constructs.","higherEn":"When you cast this spell using a spell slot of 6th level or higher, the healing increases by 1d8 for each slot level above 5th."},{"id":"mass-heal","srd":true,"name":"Guarigione di Massa","nameEn":"Mass Heal","level":9,"school":"Evocazione","castTime":"1 Azione","range":"18 m","duration":"Istantanea","components":"V, S","material":null,"concentration":false,"ritual":false,"attack":null,"damage":null,"dc":null,"classes":["Cleric"],"classesHb":["Chierico"],"effects":"","desc":"","descEn":"A flood of healing energy flows from you into injured creatures around you. You restore up to 700 hit points, divided as you choose among any number of creatures that you can see within range. Creatures healed by this spell are also cured of all diseases and any effect making them blinded or deafened. This spell has no effect on undead or constructs.","higherEn":""},{"id":"mass-healing-word","srd":true,"name":"Parola Guaritrice di Massa","nameEn":"Mass Healing Word","level":3,"school":"Invocazione","castTime":"1 Azione Bonus","range":"18 m","duration":"Istantanea","components":"V","material":null,"concentration":false,"ritual":false,"attack":null,"damage":null,"dc":null,"classes":["Cleric"],"classesHb":["Chierico"],"effects":"","desc":"","descEn":"As you call out words of restoration, up to six creatures of your choice that you can see within range regain hit points equal to 1d4 + your spellcasting ability modifier. This spell has no effect on undead or constructs.","higherEn":"When you cast this spell using a spell slot of 4th level or higher, the healing increases by 1d4 for each slot level above 3rd."},{"id":"mass-suggestion","srd":true,"name":"Suggestione di Massa","nameEn":"Mass Suggestion","level":6,"school":"Ammaliamento","castTime":"1 Azione","range":"18 m","duration":"24 ore","components":"V, M","material":"A snake's tongue and either a bit of honeycomb or a drop of sweet oil.","concentration":false,"ritual":false,"attack":null,"damage":null,"dc":{"ability":"Saggezza","success":"none"},"classes":["Bard","Sorcerer","Warlock","Wizard"],"classesHb":["Bardo","Invocatore","Mago","Stregone"],"effects":"","desc":"","descEn":"You suggest a course of activity (limited to a sentence or two) and magically influence up to twelve creatures of your choice that you can see within range and that can hear and understand you. Creatures that can't be charmed are immune to this effect. The suggestion must be worded in such a manner as to make the course of action sound reasonable. Asking the creature to stab itself, throw itself onto a spear, immolate itself, or do some other obviously harmful act automatically negates the effect of the spell. Each target must make a wisdom saving throw. On a failed save, it pursues the course of action you described to the best of its ability. The suggested course of action can continue for the entire duration. If the suggested activity can be completed in a shorter time, the spell ends when the subject finishes what it was asked to do. You can also specify conditions that will trigger a special activity during the duration. For example, you might suggest that a group of soldiers give all their money to the first beggar they meet. If the condition isn't met before the spell ends, the activity isn't performed. If you or any of your companions damage a creature affected by this spell, the spell ends for that creature.","higherEn":"When you cast this spell using a 7th-level spell slot, the duration is 10 days. When you use an 8th-level spell slot, the duration is 30 days. When you use a 9th-level spell slot, the duration is a year and a day."},{"id":"maze","srd":true,"name":"Labirinto","nameEn":"Maze","level":8,"school":"Evocazione","castTime":"1 Azione","range":"18 m","duration":"Concentrazione, fino a 10 minuti","components":"V, S","material":null,"concentration":true,"ritual":false,"attack":null,"damage":null,"dc":null,"classes":["Wizard"],"classesHb":["Mago"],"effects":"","desc":"","descEn":"You banish a creature that you can see within range into a labyrinthine demiplane. The target remains there for the duration or until it escapes the maze. The target can use its action to attempt to escape. When it does so, it makes a DC 20 Intelligence check. If it succeeds, it escapes, and the spell ends (a minotaur or goristro demon automatically succeeds). When the spell ends, the target reappears in the space it left or, if that space is occupied, in the nearest unoccupied space.","higherEn":""},{"id":"meld-into-stone","srd":true,"name":"Fondersi con la Pietra","nameEn":"Meld Into Stone","level":3,"school":"Trasmutazione","castTime":"1 Azione (Rituale)","range":"Contatto","duration":"8 ore","components":"V, S","material":null,"concentration":false,"ritual":true,"attack":null,"damage":null,"dc":null,"classes":["Cleric"],"classesHb":["Chierico"],"effects":"Entri in una pietra e diventi invisibile e impercettibile per la durata.","desc":"","descEn":"You step into a stone object or surface large enough to fully contain your body, melding yourself and all the equipment you carry with the stone for the duration. Using your movement, you step into the stone at a point you can touch. Nothing of your presence remains visible or otherwise detectable by nonmagical senses. While merged with the stone, you can't see what occurs outside it, and any Wisdom (Perception) checks you make to hear sounds outside it are made with disadvantage. You remain aware of the passage of time and can cast spells on yourself while merged in the stone. You can use your movement to leave the stone where you entered it, which ends the spell. You otherwise can't move. Minor physical damage to the stone doesn't harm you, but its partial destruction or a change in its shape (to the extent that you no longer fit within it) expels you and deals 6d6 bludgeoning damage to you. The stone's complete destruction (or transmutation into a different substance) expels you and deals 50 bludgeoning damage to you. If expelled, you fall prone in an unoccupied space closest to where you first entered.","higherEn":"","userName":"Fondersi nella Pietra"},{"id":"mending","srd":true,"name":"Riparare","nameEn":"Mending","level":0,"school":"Trasmutazione","castTime":"1 Minuto","range":"Contatto","duration":"Istantanea","components":"V, S, M","material":"Two lodestones.","concentration":false,"ritual":false,"attack":null,"damage":null,"dc":null,"classes":["Cleric","Bard","Druid","Sorcerer","Wizard"],"classesHb":["Bardo","Chierico","Druido","Mago","Stregone"],"effects":"Riunisci o ripari una rottura lunga fino a 30 cm su un oggetto (catena, anima di legno, stoffa strappata, ecc.).","desc":"Ripari una singola rottura o lacerazione in un oggetto che tocchi (una chiave spezzata, un mantello strappato, un otre che perde). Purché la rottura non superi i 30 cm in ogni dimensione, la ripari senza lasciare traccia del danno. L'incantesimo può riparare fisicamente un oggetto magico o un costrutto, ma non può ripristinarne la magia.","descEn":"This spell repairs a single break or tear in an object you touch, such as a broken key, a torn cloak, or a leaking wineskin. As long as the break or tear is no longer than 1 foot in any dimension, you mend it, leaving no trace of the former damage. This spell can physically repair a magic item or construct, but the spell can't restore magic to such an object.","higherEn":"","userName":"Riparare"},{"id":"message","srd":true,"name":"Messaggio","nameEn":"Message","level":0,"school":"Trasmutazione","castTime":"1 Azione","range":"36 m","duration":"1 round","components":"V, S, M","material":"A short piece of copper wire.","concentration":false,"ritual":false,"attack":null,"damage":null,"dc":null,"classes":["Bard","Sorcerer","Wizard"],"classesHb":["Bardo","Mago","Stregone"],"effects":"Sussurri un messaggio udibile solo dal bersaglio, che può rispondere con un sussurro che solo tu senti.","desc":"Punti il dito verso una creatura entro gittata e sussurri un messaggio. Il bersaglio (e solo lui) lo sente e può rispondere con un sussurro udibile solo da te. Puoi lanciarlo attraverso oggetti solidi se conosci il bersaglio e sai che si trova oltre la barriera. Lo bloccano: silenzio magico, 30 cm di pietra, 2,5 cm di metallo comune, una sottile lamina di piombo o 90 cm di legno. Il messaggio non deve seguire una linea retta e può aggirare angoli o passare per aperture.","descEn":"You point your finger toward a creature within range and whisper a message. The target (and only the target) hears the message and can reply in a whisper that only you can hear. You can cast this spell through solid objects if you are familiar with the target and know it is beyond the barrier. Magical silence, 1 foot of stone, 1 inch of common metal, a thin sheet of lead, or 3 feet of wood blocks the spell. The spell doesn't have to follow a straight line and can travel freely around corners or through openings.","higherEn":"","userName":"Messaggio"},{"id":"meteor-swarm","srd":true,"name":"Sciame di Meteore","nameEn":"Meteor Swarm","level":9,"school":"Invocazione","castTime":"1 Azione","range":"1.6 km","duration":"Istantanea","components":"V, S","material":null,"concentration":false,"ritual":false,"attack":null,"damage":{"type":"Fire","scale":"slot","table":{"9":"20d6 + 20d6"}},"dc":{"ability":"Destrezza","success":"half"},"classes":["Sorcerer","Wizard"],"classesHb":["Mago","Stregone"],"effects":"","desc":"","descEn":"Blazing orbs of fire plummet to the ground at four different points you can see within range. Each creature in a 40-foot-radius sphere centered on each point you choose must make a dexterity saving throw. The sphere spreads around corners. A creature takes 20d6 fire damage and 20d6 bludgeoning damage on a failed save, or half as much damage on a successful one. A creature in the area of more than one fiery burst is affected only once. The spell damages objects in the area and ignites flammable objects that aren't being worn or carried.","higherEn":""},{"id":"mind-blank","srd":true,"name":"Mente Vuota","nameEn":"Mind Blank","level":8,"school":"Abiurazione","castTime":"1 Azione","range":"Contatto","duration":"24 ore","components":"V, S","material":null,"concentration":false,"ritual":false,"attack":null,"damage":null,"dc":null,"classes":["Bard","Wizard"],"classesHb":["Bardo","Mago"],"effects":"","desc":"","descEn":"Until the spell ends, one willing creature you touch is immune to psychic damage, any effect that would sense its emotions or read its thoughts, divination spells, and the charmed condition. The spell even foils wish spells and spells or effects of similar power used to affect the target's mind or to gain information about the target.","higherEn":""},{"id":"minor-illusion","srd":true,"name":"Illusione Minore","nameEn":"Minor Illusion","level":0,"school":"Illusione","castTime":"1 Azione","range":"9 m","duration":"1 minuto","components":"S, M","material":"A bit of fleece.","concentration":false,"ritual":false,"attack":null,"damage":null,"dc":null,"classes":["Bard","Sorcerer","Warlock","Wizard"],"classesHb":["Bardo","Invocatore","Mago","Stregone"],"effects":"Crei un suono o un’immagine statica entro 1,5 m³. L’esame con Azione indaga (TS Int) la rivela come illusione.","desc":"Crei un suono o l'immagine di un oggetto entro gittata, che dura per la durata dell'incantesimo. L'illusione termina anche se la congedi come azione o lanci di nuovo l'incantesimo. Se crei un suono, il volume può andare da un sussurro a un urlo (la tua voce, quella di un altro, il ruggito di un leone, tamburi, ecc.). Se crei l'immagine di un oggetto (una sedia, impronte fangose, un piccolo scrigno), non può superare un cubo di 1,5 m di lato. L'immagine non può produrre suoni, luce, odore o altri effetti sensoriali. L'esame fisico rivela l'illusione, poiché gli oggetti la attraversano. Una creatura che usa la propria azione per esaminarla può capire che è un'illusione con una prova di Intelligenza (Indagare) contro la tua CD.","descEn":"You create a sound or an image of an object within range that lasts for the duration. The illusion also ends if you dismiss it as an action or cast this spell again. If you create a sound, its volume can range from a whisper to a scream. It can be your voice, someone else's voice, a lion's roar, a beating of drums, or any other sound you choose. The sound continues unabated throughout the duration, or you can make discrete sounds at different times before the spell ends. If you create an image of an object--such as a chair, muddy footprints, or a small chest--it must be no larger than a 5-foot cube. The image can't create sound, light, smell, or any other sensory effect. Physical interaction with the image reveals it to be an illusion, because things can pass through it. If a creature uses its action to examine the sound or image, the creature can determine that it is an illusion with a successful Intelligence (Investigation) check against your spell save DC. If a creature discerns the illusion for what it is, the illusion becomes faint to the creature.","higherEn":"","userName":"Illusione Minore"},{"id":"mirage-arcane","srd":true,"name":"Miraggio Arcano","nameEn":"Mirage Arcane","level":7,"school":"Illusione","castTime":"10 Minuti","range":"Vista","duration":"10 giorni","components":"V, S","material":null,"concentration":false,"ritual":false,"attack":null,"damage":null,"dc":null,"classes":["Bard","Druid","Wizard"],"classesHb":["Bardo","Druido","Mago"],"effects":"","desc":"","descEn":"You make terrain in an area up to 1 mile square look, sound, smell, and even feel like some other sort of terrain. The terrain's general shape remains the same, however. Open fields or a road could be made to resemble a swamp, hill, crevasse, or some other difficult or impassable terrain. A pond can be made to seem like a grassy meadow, a precipice like a gentle slope, or a rock-strewn gully like a wide and smooth road. Similarly, you can alter the appearance of structures, or add them where none are present. The spell doesn't disguise, conceal, or add creatures. The illusion includes audible, visual, tactile, and olfactory elements, so it can turn clear ground into difficult terrain (or vice versa) or otherwise impede movement through the area. Any piece of the illusory terrain (such as a rock or stick) that is removed from the spell's area disappears immediately. Creatures with truesight can see through the illusion to the terrain's true form; however, all other elements of the illusion remain, so while the creature is aware of the illusion's presence, the creature can still physically interact with the illusion.","higherEn":""},{"id":"mirror-image","srd":true,"name":"Immagine Speculare","nameEn":"Mirror Image","level":2,"school":"Illusione","castTime":"1 Azione","range":"Personale","duration":"1 minuto","components":"V, S","material":null,"concentration":false,"ritual":false,"attack":null,"damage":null,"dc":null,"classes":["Sorcerer","Warlock","Wizard"],"classesHb":["Invocatore","Mago","Stregone"],"effects":"Crea duplicati illusori per deviare attacchi; nessun danno.","desc":"","descEn":"Three illusory duplicates of yourself appear in your space. Until the spell ends, the duplicates move with you and mimic your actions, shifting position so it's impossible to track which image is real. You can use your action to dismiss the illusory duplicates. Each time a creature targets you with an attack during the spell's duration, roll a d20 to determine whether the attack instead targets one of your duplicates. If you have three duplicates, you must roll a 6 or higher to change the attack's target to a duplicate. With two duplicates, you must roll an 8 or higher. With one duplicate, you must roll an 11 or higher. A duplicate's AC equals 10 + your Dexterity modifier. If an attack hits a duplicate, the duplicate is destroyed. A duplicate can be destroyed only by an attack that hits it. It ignores all other damage and effects. The spell ends when all three duplicates are destroyed. A creature is unaffected by this spell if it can't see, if it relies on senses other than sight, such as blindsight, or if it can perceive illusions as false, as with truesight.","higherEn":"","userName":"Immagine Speculare"},{"id":"mislead","srd":true,"name":"Sviare","nameEn":"Mislead","level":5,"school":"Illusione","castTime":"1 Azione","range":"Personale","duration":"Concentrazione, fino a 1 ora","components":"S","material":null,"concentration":true,"ritual":false,"attack":null,"damage":null,"dc":null,"classes":["Bard","Wizard"],"classesHb":["Bardo","Mago"],"effects":"","desc":"","descEn":"You become invisible at the same time that an illusory double of you appears where you are standing. The double lasts for the duration, but the invisibility ends if you attack or cast a spell. You can use your action to move your illusory double up to twice your speed and make it gesture, speak, and behave in whatever way you choose. You can see through its eyes and hear through its ears as if you were located where it is. On each of your turns as a bonus action, you can switch from using its senses to using your own, or back again. While you are using its senses, you are blinded and deafened in regard to your own surroundings.","higherEn":""},{"id":"misty-step","srd":true,"name":"Passo Velato","nameEn":"Misty Step","level":2,"school":"Evocazione","castTime":"1 Azione Bonus","range":"Personale","duration":"Istantanea","components":"V","material":null,"concentration":false,"ritual":false,"attack":null,"damage":null,"dc":null,"classes":["Sorcerer","Warlock","Wizard"],"classesHb":["Invocatore","Mago","Stregone"],"effects":"Teletrasporto di 9 m a vista. Nessun danno.","desc":"","descEn":"Briefly surrounded by silvery mist, you teleport up to 30 feet to an unoccupied space that you can see.","higherEn":"","userName":"Passo Velato"},{"id":"modify-memory","srd":true,"name":"Modificare Memoria","nameEn":"Modify Memory","level":5,"school":"Ammaliamento","castTime":"1 Azione","range":"9 m","duration":"Concentrazione, fino a 1 minuto","components":"V, S","material":null,"concentration":true,"ritual":false,"attack":null,"damage":null,"dc":{"ability":"Saggezza","success":"none"},"classes":["Bard","Wizard"],"classesHb":["Bardo","Mago"],"effects":"","desc":"","descEn":"You attempt to reshape another creature's memories. One creature that you can see must make a wisdom saving throw. If you are fighting the creature, it has advantage on the saving throw. On a failed save, the target becomes charmed by you for the duration. The charmed target is incapacitated and unaware of its surroundings, though it can still hear you. If it takes any damage or is targeted by another spell, this spell ends, and none of the target's memories are modified. While this charm lasts, you can affect the target's memory of an event that it experienced within the last 24 hours and that lasted no more than 10 minutes. You can permanently eliminate all memory of the event, allow the target to recall the event with perfect clarity and exacting detail, change its memory of the details of the event, or create a memory of some other event. You must speak to the target to describe how its memories are affected, and it must be able to understand your language for the modified memories to take root. Its mind fills in any gaps in the details of your description. If the spell ends before you have finished describing the modified memories, the creature's memory isn't altered. Otherwise, the modified memories take hold when the spell ends. A modified memory doesn't necessarily affect how a creature behaves, particularly if the memory contradicts the creature's natural inclinations, alignment, or beliefs. An illogical modified memory, such as implanting a memory of how much the creature enjoyed dousing itself in acid, is dismissed, perhaps as a bad dream. The GM might deem a modified memory too nonsensical to affect a creature in a significant manner. A remove curse or greater restoration spell cast on the target restores the creature's true memory.","higherEn":"If you cast this spell using a spell slot of 6th level or higher, you can alter the target's memories of an event that took place up to 7 days ago (6th level), 30 days ago (7th level), 1 year ago (8th level), or any time in the creature's past (9th level)."},{"id":"moonbeam","srd":true,"name":"Raggio Lunare","nameEn":"Moonbeam","level":2,"school":"Invocazione","castTime":"1 Azione","range":"36 m","duration":"Concentrazione, fino a 1 minuto","components":"V, S, M","material":"Several seeds of any moonseed plant and a piece of opalescent feldspar.","concentration":true,"ritual":false,"attack":null,"damage":{"type":"Radiant","scale":"slot","table":{"2":"2d10","3":"3d10","4":"4d10","5":"5d10","6":"6d10","7":"7d10","8":"8d10","9":"9d10"}},"dc":{"ability":"Costituzione","success":"half"},"classes":["Druid"],"classesHb":["Druido"],"effects":"","desc":"","descEn":"A silvery beam of pale light shines down in a 5-foot radius, 40-foot-high cylinder centered on a point within range. Until the spell ends, dim light fills the cylinder. When a creature enters the spell's area for the first time on a turn or starts its turn there, it is engulfed in ghostly flames that cause searing pain, and it must make a constitution saving throw. It takes 2d10 radiant damage on a failed save, or half as much damage on a successful one. A shapechanger makes its saving throw with disadvantage. If it fails, it also instantly reverts to its original form and can't assume a different form until it leaves the spell's light. On each of your turns after you cast this spell, you can use an action to move the beam 60 feet in any direction.","higherEn":"When you cast this spell using a spell slot of 3rd level or higher, the damage increases by 1dl0 for each slot level above 2nd."},{"id":"move-earth","srd":true,"name":"Spostare la Terra","nameEn":"Move Earth","level":6,"school":"Trasmutazione","castTime":"1 Azione","range":"36 m","duration":"Concentrazione, fino a 2 ore","components":"V, S, M","material":"An iron blade and a small bag containing a mixture of soils--clay, loam, and sand.","concentration":true,"ritual":false,"attack":null,"damage":null,"dc":null,"classes":["Druid","Sorcerer","Wizard"],"classesHb":["Druido","Mago","Stregone"],"effects":"","desc":"","descEn":"Choose an area of terrain no larger than 40 feet on a side within range. You can reshape dirt, sand, or clay in the area in any manner you choose for the duration. You can raise or lower the area's elevation, create or fill in a trench, erect or flatten a wall, or form a pillar. The extent of any such changes can't exceed half the area's largest dimension. So, if you affect a 40-foot square, you can create a pillar up to 20 feet high, raise or lower the square's elevation by up to 20 feet, dig a trench up to 20 feet deep, and so on. It takes 10 minutes for these changes to complete. At the end of every 10 minutes you spend concentrating on the spell, you can choose a new area of terrain to affect. Because the terrain's transformation occurs slowly, creatures in the area can't usually be trapped or injured by the ground's movement. This spell can't manipulate natural stone or stone construction. Rocks and structures shift to accommodate the new terrain. If the way you shape the terrain would make a structure unstable, it might collapse. Similarly, this spell doesn't directly affect plant growth. The moved earth carries any plants along with it.","higherEn":""},{"id":"nondetection","srd":true,"name":"Antiindividuazione","nameEn":"Nondetection","level":3,"school":"Abiurazione","castTime":"1 Azione","range":"Contatto","duration":"8 ore","components":"V, S, M","material":"A pinch of diamond dust worth 25 gp sprinkled over the target, which the spell consumes.","concentration":false,"ritual":false,"attack":null,"damage":null,"dc":null,"classes":["Bard","Ranger","Wizard"],"classesHb":["Bardo","Mago","Ranger"],"effects":"","desc":"","descEn":"For the duration, you hide a target that you touch from divination magic. The target can be a willing creature or a place or an object no larger than 10 feet in any dimension. The target can't be targeted by any divination magic or perceived through magical scrying sensors.","higherEn":""},{"id":"pass-without-trace","srd":true,"name":"Passo Senza Tracce","nameEn":"Pass Without Trace","level":2,"school":"Abiurazione","castTime":"1 Azione","range":"Personale","duration":"Concentrazione, fino a 1 ora","components":"V, S, M","material":"Ashes from a burned leaf of mistletoe and a sprig of spruce.","concentration":true,"ritual":false,"attack":null,"damage":null,"dc":null,"classes":["Druid","Ranger"],"classesHb":["Druido","Ranger"],"effects":"","desc":"","descEn":"A veil of shadows and silence radiates from you, masking you and your companions from detection. For the duration, each creature you choose within 30 feet of you (including you) has a +10 bonus to Dexterity (Stealth) checks and can't be tracked except by magical means. A creature that receives this bonus leaves behind no tracks or other traces of its passage.","higherEn":""},{"id":"passwall","srd":true,"name":"Passa-muro","nameEn":"Passwall","level":5,"school":"Trasmutazione","castTime":"1 Azione","range":"9 m","duration":"1 ora","components":"V, S, M","material":"A pinch of sesame seeds.","concentration":false,"ritual":false,"attack":null,"damage":null,"dc":null,"classes":["Wizard"],"classesHb":["Mago"],"effects":"","desc":"","descEn":"A passage appears at a point of your choice that you can see on a wooden, plaster, or stone surface (such as a wall, a ceiling, or a floor) within range, and lasts for the duration. You choose the opening's dimensions: up to 5 feet wide, 8 feet tall, and 20 feet deep. The passage creates no instability in a structure surrounding it. When the opening disappears, any creatures or objects still in the passage created by the spell are safely ejected to an unoccupied space nearest to the surface on which you cast the spell.","higherEn":""},{"id":"phantasmal-killer","srd":true,"name":"Assassino Fantasmatico","nameEn":"Phantasmal Killer","level":4,"school":"Illusione","castTime":"1 Azione","range":"36 m","duration":"Concentrazione, fino a 1 minuto","components":"V, S","material":null,"concentration":true,"ritual":false,"attack":null,"damage":{"type":"Psychic","scale":"slot","table":{"4":"4d10"}},"dc":{"ability":"Saggezza","success":"none"},"classes":["Wizard"],"classesHb":["Mago"],"effects":"","desc":"","descEn":"You tap into the nightmares of a creature you can see within range and create an illusory manifestation of its deepest fears, visible only to that creature. The target must make a wisdom saving throw. On a failed save, the target becomes frightened for the duration. At the start of each of the target's turns before the spell ends, the target must succeed on a wisdom saving throw or take 4d10 psychic damage. On a successful save, the spell ends.","higherEn":"When you cast this spell using a spell slot of 5th level or higher, the damage increases by 1d10 for each slot level above 4th."},{"id":"phantom-steed","srd":true,"name":"Destriero Fantasma","nameEn":"Phantom Steed","level":3,"school":"Illusione","castTime":"1 Minuto (Rituale)","range":"9 m","duration":"1 ora","components":"V, S","material":null,"concentration":false,"ritual":true,"attack":null,"damage":null,"dc":null,"classes":["Wizard"],"classesHb":["Mago"],"effects":"","desc":"","descEn":"A Large quasi-real, horselike creature appears on the ground in an unoccupied space of your choice within range. You decide the creature's appearance, but it is equipped with a saddle, bit, and bridle. Any of the equipment created by the spell vanishes in a puff of smoke if it is carried more than 10 feet away from the steed. For the duration, you or a creature you choose can ride the steed. The creature uses the statistics for a riding horse, except it has a speed of 100 feet and can travel 10 miles in an hour, or 13 miles at a fast pace. When the spell ends, the steed gradually fades, giving the rider 1 minute to dismount. The spell ends if you use an action to dismiss it or if the steed takes any damage.","higherEn":""},{"id":"planar-ally","srd":true,"name":"Alleato Planare","nameEn":"Planar Ally","level":6,"school":"Evocazione","castTime":"10 Minuti","range":"18 m","duration":"Istantanea","components":"V, S","material":null,"concentration":false,"ritual":false,"attack":null,"damage":null,"dc":null,"classes":["Cleric"],"classesHb":["Chierico"],"effects":"","desc":"","descEn":"You beseech an otherworldly entity for aid. The being must be known to you: a god, a primordial, a demon prince, or some other being of cosmic power. That entity sends a celestial, an elemental, or a fiend loyal to it to aid you, making the creature appear in an unoccupied space within range. If you know a specific creature's name, you can speak that name when you cast this spell to request that creature, though you might get a different creature anyway (GM's choice). When the creature appears, it is under no compulsion to behave in any particular way. You can ask the creature to perform a service in exchange for payment, but it isn't obliged to do so. The requested task could range from simple (fly us across the chasm, or help us fight a battle) to complex (spy on our enemies, or protect us during our foray into the dungeon). You must be able to communicate with the creature to bargain for its services. Payment can take a variety of forms. A celestial might require a sizable donation of gold or magic items to an allied temple, while a fiend might demand a living sacrifice or a gift of treasure. Some creatures might exchange their service for a quest undertaken by you. As a rule of thumb, a task that can be measured in minutes requires a payment worth 100 gp per minute. A task measured in hours requires 1,000 gp per hour. And a task measured in days (up to 10 days) requires 10,000 gp per day. The GM can adjust these payments based on the circumstances under which you cast the spell. If the task is aligned with the creature's ethos, the payment might be halved or even waived. Nonhazardous tasks typically require only half the suggested payment, while especially dangerous tasks might require a greater gift. Creatures rarely accept tasks that seem suicidal. After the creature completes the task, or when the agreed-upon duration of service expires, the creature returns to its home plane after reporting back to you, if appropriate to the task and if possible. If you are unable to agree on a price for the creature's service, the creature immediately returns to its home plane. A creature enlisted to join your group counts as a member of it, receiving a full share of experience points awarded.","higherEn":""},{"id":"planar-binding","srd":true,"name":"Legame Planare","nameEn":"Planar Binding","level":5,"school":"Abiurazione","castTime":"1 Ora","range":"18 m","duration":"24 ore","components":"V, S, M","material":"A jewel worth at least 1,000 gp, which the spell consumes.","concentration":false,"ritual":false,"attack":null,"damage":null,"dc":{"ability":"Carisma","success":"none"},"classes":["Bard","Cleric","Druid","Wizard"],"classesHb":["Bardo","Chierico","Druido","Mago"],"effects":"","desc":"","descEn":"With this spell, you attempt to bind a celestial, an elemental, a fey, or a fiend to your service. The creature must be within range for the entire casting of the spell. (Typically, the creature is first summoned into the center of an inverted magic circle in order to keep it trapped while this spell is cast.) At the completion of the casting, the target must make a charisma saving throw. On a failed save, it is bound to serve you for the duration. If the creature was summoned or created by another spell, that spell's duration is extended to match the duration of this spell. A bound creature must follow your instructions to the best of its ability. You might command the creature to accompany you on an adventure, to guard a location, or to deliver a message. The creature obeys the letter of your instructions, but if the creature is hostile to you, it strives to twist your words to achieve its own objectives. If the creature carries out your instructions completely before the spell ends, it travels to you to report this fact if you are on the same plane of existence. If you are on a different plane of existence, it returns to the place where you bound it and remains there until the spell ends.","higherEn":"When you cast this spell using a spell slot of a higher level, the duration increases to 10 days with a 6th-level slot, to 30 days with a 7th-level slot, to 180 days with an 8th-level slot, and to a year and a day with a 9th-level spell slot."},{"id":"plane-shift","srd":true,"name":"Spostamento Planare","nameEn":"Plane Shift","level":7,"school":"Evocazione","castTime":"1 Azione","range":"Contatto","duration":"Istantanea","components":"V, S, M","material":"A forked, metal rod worth at least 250 gp, attuned to a particular plane of existence.","concentration":false,"ritual":false,"attack":"melee","damage":null,"dc":{"ability":"Carisma","success":"none"},"classes":["Cleric","Druid","Sorcerer","Warlock","Wizard"],"classesHb":["Chierico","Druido","Invocatore","Mago","Stregone"],"effects":"","desc":"","descEn":"You and up to eight willing creatures who link hands in a circle are transported to a different plane of existence. You can specify a target destination in general terms, such as the City of Brass on the Elemental Plane of Fire or the palace of Dispater on the second level of the Nine Hells, and you appear in or near that destination. If you are trying to reach the City of Brass, for example, you might arrive in its Street of Steel, before its Gate of Ashes, or looking at the city from across the Sea of Fire, at the GM's discretion. Alternatively, if you know the sigil sequence of a teleportation circle on another plane of existence, this spell can take you to that circle. If the teleportation circle is too small to hold all the creatures you transported, they appear in the closest unoccupied spaces next to the circle. You can use this spell to banish an unwilling creature to another plane. Choose a creature within your reach and make a melee spell attack against it. On a hit, the creature must make a charisma saving throw. If the creature fails this save, it is transported to a random location on the plane of existence you specify. A creature so transported must find its own way back to your current plane of existence.","higherEn":""},{"id":"plant-growth","srd":true,"name":"Crescita Vegetale","nameEn":"Plant Growth","level":3,"school":"Trasmutazione","castTime":"1 Azione","range":"45 m","duration":"Istantanea","components":"V, S","material":null,"concentration":false,"ritual":false,"attack":null,"damage":null,"dc":null,"classes":["Bard","Druid","Ranger"],"classesHb":["Bardo","Druido","Ranger"],"effects":"","desc":"","descEn":"This spell channels vitality into plants within a specific area. There are two possible uses for the spell, granting either immediate or long-term benefits. If you cast this spell using 1 action, choose a point within range. All normal plants in a 100-foot radius centered on that point become thick and overgrown. A creature moving through the area must spend 4 feet of movement for every 1 foot it moves. You can exclude one or more areas of any size within the spell's area from being affected. If you cast this spell over 8 hours, you enrich the land. All plants in a half-mile radius centered on a point within range become enriched for 1 year. The plants yield twice the normal amount of food when harvested.","higherEn":""},{"id":"poison-spray","srd":true,"name":"Spruzzo Velenoso","nameEn":"Poison Spray","level":0,"school":"Evocazione","castTime":"1 Azione","range":"3 m","duration":"Istantanea","components":"V, S","material":null,"concentration":false,"ritual":false,"attack":null,"damage":{"type":"Poison","scale":"char","table":{"1":"1d12","5":"2d12","11":"3d12","17":"4d12"}},"dc":{"ability":"Costituzione","success":"none"},"classes":["Sorcerer","Warlock","Wizard","Druid"],"classesHb":["Druido","Invocatore","Mago","Stregone"],"effects":"Infligge 1d12 danni da veleno a una creatura che fallisce un TS Costituzione.","desc":"Tendi la mano verso una creatura visibile entro gittata e proietti dal palmo uno sbuffo di gas nocivo. La creatura deve superare un tiro salvezza su Costituzione o subire 1d12 danni da veleno. I danni aumentano di 1d12 al 5° livello (2d12), all'11° (3d12) e al 17° (4d12).","descEn":"You extend your hand toward a creature you can see within range and project a puff of noxious gas from your palm. The creature must succeed on a constitution saving throw or take 1d12 poison damage. This spell's damage increases by 1d12 when you reach 5th level (2d12), 11th level (3d12), and 17th level (4d12).","higherEn":"","userName":"Spruzzo Velenoso"},{"id":"polymorph","srd":true,"name":"Metamorfosi","nameEn":"Polymorph","level":4,"school":"Trasmutazione","castTime":"1 Azione","range":"18 m","duration":"Concentrazione, fino a 1 ora","components":"V, S, M","material":"A caterpillar cocoon.","concentration":true,"ritual":false,"attack":null,"damage":null,"dc":{"ability":"Saggezza","success":"none"},"classes":["Bard","Druid","Sorcerer","Wizard"],"classesHb":["Bardo","Druido","Mago","Stregone"],"effects":"","desc":"","descEn":"This spell transforms a creature that you can see within range into a new form. An unwilling creature must make a wisdom saving throw to avoid the effect. A shapechanger automatically succeeds on this saving throw. The transformation lasts for the duration, or until the target drops to 0 hit points or dies. The new form can be any beast whose challenge rating is equal to or less than the target's (or the target's level, if it doesn't have a challenge rating). The target's game statistics, including mental ability scores, are replaced by the statistics of the chosen beast. It retains its alignment and personality. The target assumes the hit points of its new form. When it reverts to its normal form, the creature returns to the number of hit points it had before it transformed. If it reverts as a result of dropping to 0 hit points, any excess damage carries over to its normal form. As long as the excess damage doesn't reduce the creature's normal form to 0 hit points, it isn't knocked unconscious. The creature is limited in the actions it can perform by the nature of its new form, and it can't speak, cast spells, or take any other action that requires hands or speech. The target's gear melds into the new form. The creature can't activate, use, wield, or otherwise benefit from any of its equipment.","higherEn":""},{"id":"power-word-kill","srd":true,"name":"Parola del Potere: Uccidere","nameEn":"Power Word Kill","level":9,"school":"Ammaliamento","castTime":"1 Azione","range":"18 m","duration":"Istantanea","components":"V","material":null,"concentration":false,"ritual":false,"attack":null,"damage":null,"dc":null,"classes":["Bard","Sorcerer","Warlock","Wizard"],"classesHb":["Bardo","Invocatore","Mago","Stregone"],"effects":"","desc":"","descEn":"You utter a word of power that can compel one creature you can see within range to die instantly. If the creature you choose has 100 hit points or fewer, it dies. Otherwise, the spell has no effect.","higherEn":""},{"id":"power-word-stun","srd":true,"name":"Parola del Potere: Stordire","nameEn":"Power Word Stun","level":8,"school":"Ammaliamento","castTime":"1 Azione","range":"18 m","duration":"Istantanea","components":"V","material":null,"concentration":false,"ritual":false,"attack":null,"damage":null,"dc":null,"classes":["Bard","Sorcerer","Warlock","Wizard"],"classesHb":["Bardo","Invocatore","Mago","Stregone"],"effects":"","desc":"","descEn":"You speak a word of power that can overwhelm the mind of one creature you can see within range, leaving it dumbfounded. If the target has 150 hit points or fewer, it is stunned. Otherwise, the spell has no effect. The stunned target must make a constitution saving throw at the end of each of its turns. On a successful save, this stunning effect ends.","higherEn":""},{"id":"prayer-of-healing","srd":true,"name":"Preghiera di Guarigione","nameEn":"Prayer of Healing","level":2,"school":"Invocazione","castTime":"10 Minuti","range":"9 m","duration":"Istantanea","components":"V","material":null,"concentration":false,"ritual":false,"attack":null,"damage":null,"dc":null,"classes":["Cleric"],"classesHb":["Chierico"],"effects":"Cura fino a 6 creature di 2d8 + modificatore Saggezza del lanciatore.","desc":"","descEn":"Up to six creatures of your choice that you can see within range each regain hit points equal to 2d8 + your spellcasting ability modifier. This spell has no effect on undead or constructs.","higherEn":"When you cast this spell using a spell slot of 3rd level or higher, the healing increases by 1d8 for each slot level above 2nd.","userName":"Preghiera di Guarigione"},{"id":"prestidigitation","srd":true,"name":"Prestidigitazione","nameEn":"Prestidigitation","level":0,"school":"Trasmutazione","castTime":"1 Azione","range":"3 m","duration":"1 ora","components":"V, S","material":null,"concentration":false,"ritual":false,"attack":null,"damage":null,"dc":null,"classes":["Bard","Sorcerer","Warlock","Wizard"],"classesHb":["Bardo","Invocatore","Mago","Stregone"],"effects":"Effetti minori: accendi/spegni candele, pulisci/sporchi oggetti, insaporisci cibi, crei piccoli simboli o suoni, ecc.","desc":"Un piccolo trucco magico usato dagli incantatori novizi per esercitarsi. Crei uno dei seguenti effetti entro gittata: un effetto sensoriale istantaneo e innocuo (scintille, una folata di vento, deboli note musicali, un odore strano); accendi o spegni una candela, una torcia o un piccolo falò; pulisci o sporchi istantaneamente un oggetto non più grande di un cubo di 30 cm; raffreddi, scaldi o aromatizzi fino a un cubo di 30 cm di materiale non vivente per 1 ora; fai apparire un colore, un piccolo segno o un simbolo su un oggetto o una superficie per 1 ora; crei un ninnolo non magico o un'immagine illusoria che sta nella tua mano e dura fino alla fine del tuo prossimo turno. Puoi avere attivi al massimo tre effetti non istantanei alla volta.","descEn":"This spell is a minor magical trick that novice spellcasters use for practice. You create one of the following magical effects within 'range': You create an instantaneous, harmless sensory effect, such as a shower of sparks, a puff of wind, faint musical notes, or an odd odor. You instantaneously light or snuff out a candle, a torch, or a small campfire. You instantaneously clean or soil an object no larger than 1 cubic foot. You chill, warm, or flavor up to 1 cubic foot of nonliving material for 1 hour. You make a color, a small mark, or a symbol appear on an object or a surface for 1 hour. You create a nonmagical trinket or an illusory image that can fit in your hand and that lasts until the end of your next turn. If you cast this spell multiple times, you can have up to three of its non-instantaneous effects active at a time, and you can dismiss such an effect as an action.","higherEn":"","userName":"Prestidigitazione"},{"id":"prismatic-spray","srd":true,"name":"Spruzzo Prismatico","nameEn":"Prismatic Spray","level":7,"school":"Invocazione","castTime":"1 Azione","range":"Personale","duration":"Istantanea","components":"V, S","material":null,"concentration":false,"ritual":false,"attack":null,"damage":{"type":null,"scale":"slot","table":{"7":"10d6"}},"dc":{"ability":"Destrezza","success":"other"},"classes":["Sorcerer","Wizard"],"classesHb":["Mago","Stregone"],"effects":"","desc":"","descEn":"Eight multicolored rays of light flash from your hand. Each ray is a different color and has a different power and purpose. Each creature in a 60-foot cone must make a dexterity saving throw. For each target, roll a d8 to determine which color ray affects it. ***1. Red.*** The target takes 10d6 fire damage on a failed save, or half as much damage on a successful one. ***2. Orange.*** The target takes 10d6 acid damage on a failed save, or half as much damage on a successful one. ***3. Yellow.*** The target takes 10d6 lightning damage on a failed save, or half as much damage on a successful one. ***4. Green.*** The target takes 10d6 poison damage on a failed save, or half as much damage on a successful one. ***5. Blue.*** The target takes 10d6 cold damage on a failed save, or half as much damage on a successful one. ***6. Indigo.*** On a failed save, the target is restrained. It must then make a constitution saving throw at the end of each of its turns. If it successfully saves three times, the spell ends. If it fails its save three times, it permanently turns to stone and is subjected to the petrified condition. The successes and failures don't need to be consecutive; keep track of both until the target collects three of a kind. ***7. Violet.*** On a failed save, the target is blinded. It must then make a wisdom saving throw at the start of your next turn. A successful save ends the blindness. If it fails that save, the creature is transported to another plane of existence of the GM's choosing and is no longer blinded. (Typically, a creature that is on a plane that isn't its home plane is banished home, while other creatures are usually cast into the Astral or Ethereal planes.) ***8. Special.*** The target is struck by two rays. Roll twice more, rerolling any 8.","higherEn":""},{"id":"prismatic-wall","srd":true,"name":"Muro Prismatico","nameEn":"Prismatic Wall","level":9,"school":"Abiurazione","castTime":"1 Azione","range":"18 m","duration":"10 minuti","components":"V, S","material":null,"concentration":false,"ritual":false,"attack":null,"damage":null,"dc":null,"classes":["Wizard"],"classesHb":["Mago"],"effects":"","desc":"","descEn":"A shimmering, multicolored plane of light forms a vertical opaque wall--up to 90 feet long, 30 feet high, and 1 inch thick--centered on a point you can see within range. Alternatively, you can shape the wall into a sphere up to 30 feet in diameter centered on a point you choose within range. The wall remains in place for the duration. If you position the wall so that it passes through a space occupied by a creature, the spell fails, and your action and the spell slot are wasted. The wall sheds bright light out to a range of 100 feet and dim light for an additional 100 feet. You and creatures you designate at the time you cast the spell can pass through and remain near the wall without harm. If another creature that can see the wall moves to within 20 feet of it or starts its turn there, the creature must succeed on a constitution saving throw or become blinded for 1 minute. The wall consists of seven layers, each with a different color. When a creature attempts to reach into or pass through the wall, it does so one layer at a time through all the wall's layers. As it passes or reaches through each layer, the creature must make a dexterity saving throw or be affected by that layer's properties as described below. The wall can be destroyed, also one layer at a time, in order from red to violet, by means specific to each layer. Once a layer is destroyed, it remains so for the duration of the spell. A rod of cancellation destroys a prismatic wall, but an antimagic field has no effect on it. ***1. Red.*** The creature takes 10d6 fire damage on a failed save, or half as much damage on a successful one. While this layer is in place, nonmagical ranged attacks can't pass through the wall. The layer can be destroyed by dealing at least 25 cold damage to it. ***2. Orange.*** The creature takes 10d6 acid damage on a failed save, or half as much damage on a successful one. While this layer is in place, magical ranged attacks can't pass through the wall. The layer is destroyed by a strong wind. ***3. Yellow.*** The creature takes 10d6 lightning damage on a failed save, or half as much damage on a successful one. This layer can be destroyed by dealing at least 60 force damage to it. ***4. Green.*** The creature takes 10d6 poison damage on a failed save, or half as much damage on a successful one. A passwall spell, or another spell of equal or greater level that can open a portal on a solid surface, destroys this layer. ***5. Blue.*** The creature takes 10d6 cold damage on a failed save, or half as much damage on a successful one. This layer can be destroyed by dealing at least 25 fire damage to it. ***6. Indigo.*** On a failed save, the creature is restrained. It must then make a constitution saving throw at the end of each of its turns. If it successfully saves three times, the spell ends. If it fails its save three times, it permanently turns to stone and is subjected to the petrified condition. The successes and failures don't need to be consecutive; keep track of both until the creature collects three of a kind. While this layer is in place, spells can't be cast through the wall. The layer is destroyed by bright light shed by a daylight spell or a similar spell of equal or higher level. ***7. Violet.*** On a failed save, the creature is blinded. It must then make a wisdom saving throw at the start of your next turn. A successful save ends the blindness. If it fails that save, the creature is transported to another plane of the GM's choosing and is no longer blinded. (Typically, a creature that is on a plane that isn't its home plane is banished home, while other creatures are usually cast into the Astral or Ethereal planes.) This layer is destroyed by a dispel magic spell or a similar spell of equal or higher level that can end spells and magical effects.","higherEn":""},{"id":"private-sanctum","srd":true,"name":"Rifugio Privato","nameEn":"Private Sanctum","level":4,"school":"Abiurazione","castTime":"10 Minuti","range":"36 m","duration":"24 ore","components":"V, S, M","material":"A thin sheet of lead, a piece of opaque glass, a wad of cotton or cloth, and powdered chrysolite.","concentration":false,"ritual":false,"attack":null,"damage":null,"dc":null,"classes":["Wizard"],"classesHb":["Mago"],"effects":"","desc":"","descEn":"You make an area within range magically secure. The area is a cube that can be as small as 5 feet to as large as 100 feet on each side. The spell lasts for the duration or until you use an action to dismiss it. When you cast the spell, you decide what sort of security the spell provides, choosing any or all of the following properties: - Sound can't pass through the barrier at the edge of the warded area. - The barrier of the warded area appears dark and foggy, preventing vision (including darkvision) through it. - Sensors created by divination spells can't appear inside the protected area or pass through the barrier at its perimeter. - Creatures in the area can't be targeted by divination spells. - Nothing can teleport into or out of the warded area. - Planar travel is blocked within the warded area. Casting this spell on the same spot every day for a year makes this effect permanent.","higherEn":"When you cast this spell using a spell slot of 5th level or higher, you can increase the size of the cube by 100 feet for each slot level beyond 4th. Thus you could protect a cube that can be up to 200 feet on one side by using a spell slot of 5th level."},{"id":"produce-flame","srd":true,"name":"Produrre Fiamma","nameEn":"Produce Flame","level":0,"school":"Evocazione","castTime":"1 Azione","range":"Personale","duration":"10 minuti","components":"V, S","material":null,"concentration":false,"ritual":false,"attack":"ranged","damage":{"type":"Fire","scale":"char","table":{"1":"1d8","5":"2d8","11":"3d8","17":"4d8"}},"dc":null,"classes":["Druid"],"classesHb":["Druido"],"effects":"Una fiamma tremolante nel palmo: luce per 3+3 m, innocua per te. Puoi scagliarla contro una creatura entro 9 m (attacco magico a distanza, 1d8 fuoco). Scaling +1d8 ai livelli 5/11/17.","desc":"Una fiamma tremolante appare nella tua mano e vi resta per la durata, senza ferire te né il tuo equipaggiamento. Emette luce intensa in un raggio di 3 m e luce fioca per altri 3 m. L'incantesimo termina se lo congedi come azione o lo lanci di nuovo. Puoi anche attaccare con la fiamma, ma così facendo l'incantesimo termina: quando lo lanci, o come azione in un turno successivo, puoi scagliare la fiamma contro una creatura entro 9 m. Effettua un attacco magico a distanza: a segno, il bersaglio subisce 1d8 danni da fuoco. I danni aumentano di 1d8 al 5° livello, all'11° e al 17°.","descEn":"A flickering flame appears in your hand. The flame remains there for the duration and harms neither you nor your equipment. The flame sheds bright light in a 10-foot radius and dim light for an additional 10 feet. The spell ends if you dismiss it as an action or if you cast it again. You can also attack with the flame, although doing so ends the spell. When you cast this spell, or as an action on a later turn, you can hurl the flame at a creature within 30 feet of you. Make
