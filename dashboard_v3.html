yal steed, creating a long-lasting bond with it. Appearing in an unoccupied space within range, the steed takes on a form that you choose, such as a warhorse, a pony, a camel, an elk, or a mastiff. (Your GM might allow other animals to be summoned as steeds.) The steed has the statistics of the chosen form, though it is a celestial, fey, or fiend (your choice) instead of its normal type. Additionally, if your steed has an Intelligence of 5 or less, its Intelligence becomes 6, and it gains the ability to understand one language of your choice that you speak. Your steed serves you as a mount, both in combat and out, and you have an instinctive bond with it that allows you to fight as a seamless unit. While mounted on your steed, you can make any spell you cast that targets only you also target your steed. When the steed drops to 0 hit points, it disappears, leaving behind no physical form. You can also dismiss your steed at any time as an action, causing it to disappear. In either case, casting this spell again summons the same steed, restored to its hit point maximum. While your steed is within 1 mile of you, you can communicate with it telepathically. You can't have more than one steed bonded by this spell at a time. As an action, you can release the steed from its bond at any time, causing it to disappear.","higherEn":""},{"id":"find-traps","srd":true,"name":"Trovare Trappole","nameEn":"Find Traps","level":2,"school":"Divinazione","castTime":"1 Azione","range":"36 m","duration":"Istantanea","components":"V, S","material":null,"concentration":false,"ritual":false,"attack":null,"damage":null,"dc":null,"classes":["Cleric","Druid","Ranger"],"classesHb":["Chierico","Druido","Ranger"],"effects":"Rivela presenza di trappole entro la portata.","desc":"","descEn":"You sense the presence of any trap within range that is within line of sight. A trap, for the purpose of this spell, includes anything that would inflict a sudden or unexpected effect you consider harmful or undesirable, which was specifically intended as such by its creator. Thus, the spell would sense an area affected by the alarm spell, a glyph of warding, or a mechanical pit trap, but it would not reveal a natural weakness in the floor, an unstable ceiling, or a hidden sinkhole. This spell merely reveals that a trap is present. You don't learn the location of each trap, but you do learn the general nature of the danger posed by a trap you sense.","higherEn":"","userName":"Individuare Trappole"},{"id":"find-the-path","srd":true,"name":"Trovare il Sentiero","nameEn":"Find the Path","level":6,"school":"Divinazione","castTime":"1 Minuto","range":"Personale","duration":"Concentrazione, fino a 24 ore","components":"V, S, M","material":"A set of divinatory tools--such as bones, ivory sticks, cards, teeth, or carved runes--worth 100gp and an object from the location you wish to find.","concentration":true,"ritual":false,"attack":null,"damage":null,"dc":null,"classes":["Bard","Cleric","Druid"],"classesHb":["Bardo","Chierico","Druido"],"effects":"","desc":"","descEn":"This spell allows you to find the shortest, most direct physical route to a specific fixed location that you are familiar with on the same plane of existence. If you name a destination on another plane of existence, a destination that moves (such as a mobile fortress), or a destination that isn't specific (such as \"a green dragon's lair\"), the spell fails. For the duration, as long as you are on the same plane of existence as the destination, you know how far it is and in what direction it lies. While you are traveling there, whenever you are presented with a choice of paths along the way, you automatically determine which path is the shortest and most direct route (but not necessarily the safest route) to the destination.","higherEn":""},{"id":"finger-of-death","srd":true,"name":"Dito della Morte","nameEn":"Finger of Death","level":7,"school":"Necromanzia","castTime":"1 Azione","range":"18 m","duration":"Istantanea","components":"V, S","material":null,"concentration":false,"ritual":false,"attack":null,"damage":{"type":"Necrotic","scale":"slot","table":{"7":"7d8 + 30"}},"dc":{"ability":"Costituzione","success":"half"},"classes":["Sorcerer","Warlock","Wizard"],"classesHb":["Invocatore","Mago","Stregone"],"effects":"","desc":"","descEn":"You send negative energy coursing through a creature that you can see within range, causing it searing pain. The target must make a constitution saving throw. It takes 7d8 + 30 necrotic damage on a failed save, or half as much damage on a successful one. A humanoid killed by this spell rises at the start of your next turn as a zombie that is permanently under your command, following your verbal orders to the best of its ability.","higherEn":""},{"id":"fire-bolt","srd":true,"name":"Dardo di Fuoco","nameEn":"Fire Bolt","level":0,"school":"Invocazione","castTime":"1 Azione","range":"36 m","duration":"Istantanea","components":"V, S","material":null,"concentration":false,"ritual":false,"attack":"ranged","damage":{"type":"Fire","scale":"char","table":{"1":"1d10","5":"2d10","11":"3d10","17":"4d10"}},"dc":null,"classes":["Sorcerer","Wizard"],"classesHb":["Mago","Stregone"],"effects":"Infligge 1d10 danni da fuoco a un bersaglio.","desc":"Scagli una scheggia di fuoco contro una creatura o un oggetto entro gittata. Effettua un attacco magico a distanza: a segno, il bersaglio subisce 1d10 danni da fuoco. Un oggetto infiammabile colpito prende fuoco, se non è indossato o trasportato. I danni aumentano di 1d10 al 5° livello (2d10), all'11° (3d10) e al 17° (4d10).","descEn":"You hurl a mote of fire at a creature or object within range. Make a ranged spell attack against the target. On a hit, the target takes 1d10 fire damage. A flammable object hit by this spell ignites if it isn't being worn or carried. This spell's damage increases by 1d10 when you reach 5th level (2d10), 11th level (3d10), and 17th level (4d10).","higherEn":"","userName":"Dardo di Fuoco"},{"id":"fire-shield","srd":true,"name":"Scudo di Fuoco","nameEn":"Fire Shield","level":4,"school":"Invocazione","castTime":"1 Azione","range":"Personale","duration":"10 minuti","components":"V, S, M","material":"A little phosphorus or a firefly.","concentration":false,"ritual":false,"attack":null,"damage":{"type":"Fire","scale":"slot","table":{"4":"2d8"}},"dc":null,"classes":["Wizard"],"classesHb":["Mago"],"effects":"","desc":"","descEn":"Thin and vaporous flame surround your body for the duration of the spell, radiating a bright light bright light in a 10-foot radius and dim light for an additional 10 feet. You can end the spell using an action to make it disappear. The flames are around you a heat shield or cold, your choice. The heat shield gives you cold damage resistance and the cold resistance to fire damage. In addition, whenever a creature within 5 feet of you hits you with a melee attack, flames spring from the shield. The attacker then suffers 2d8 points of fire damage or cold, depending on the model.","higherEn":""},{"id":"fire-storm","srd":true,"name":"Tempesta di Fuoco","nameEn":"Fire Storm","level":7,"school":"Invocazione","castTime":"1 Azione","range":"45 m","duration":"Istantanea","components":"V, S","material":null,"concentration":false,"ritual":false,"attack":null,"damage":{"type":"Fire","scale":"slot","table":{"7":"7d10"}},"dc":{"ability":"Destrezza","success":"half"},"classes":["Cleric","Druid","Sorcerer"],"classesHb":["Chierico","Druido","Stregone"],"effects":"","desc":"","descEn":"A storm made up of sheets of roaring flame appears in a location you choose within range. The area of the storm consists of up to ten 10-foot cubes, which you can arrange as you wish. Each cube must have at least one face adjacent to the face of another cube. Each creature in the area must make a dexterity saving throw. It takes 7d10 fire damage on a failed save, or half as much damage on a successful one. The fire damages objects in the area and ignites flammable objects that aren't being worn or carried. If you choose, plant life in the area is unaffected by this spell.","higherEn":""},{"id":"fireball","srd":true,"name":"Palla di Fuoco","nameEn":"Fireball","level":3,"school":"Invocazione","castTime":"1 Azione","range":"45 m","duration":"Istantanea","components":"V, S, M","material":"A tiny ball of bat guano and sulfur.","concentration":false,"ritual":false,"attack":null,"damage":{"type":"Fire","scale":"slot","table":{"3":"8d6","4":"9d6","5":"10d6","6":"11d6","7":"12d6","8":"13d6","9":"14d6"}},"dc":{"ability":"Destrezza","success":"half"},"classes":["Sorcerer","Wizard"],"classesHb":["Mago","Stregone"],"effects":"","desc":"","descEn":"A bright streak flashes from your pointing finger to a point you choose within range and then blossoms with a low roar into an explosion of flame. Each creature in a 20-foot-radius sphere centered on that point must make a dexterity saving throw. A target takes 8d6 fire damage on a failed save, or half as much damage on a successful one. The fire spreads around corners. It ignites flammable objects in the area that aren't being worn or carried.","higherEn":"When you cast this spell using a spell slot of 4th level or higher, the damage increases by 1d6 for each slot level above 3rd."},{"id":"flame-blade","srd":true,"name":"Lama di Fuoco","nameEn":"Flame Blade","level":2,"school":"Invocazione","castTime":"1 Azione Bonus","range":"Personale","duration":"Concentrazione, fino a 10 minuti","components":"V, S, M","material":"Leaf of sumac.","concentration":true,"ritual":false,"attack":null,"damage":{"type":"Fire","scale":"slot","table":{"2":"3d6","4":"4d6","6":"5d6","8":"6d6"}},"dc":null,"classes":["Druid"],"classesHb":["Druido"],"effects":"","desc":"","descEn":"You evoke a fiery blade in your free hand. The blade is similar in size and shape to a scimitar, and it lasts for the duration. If you let go of the blade, it disappears, but you can evoke the blade again as a bonus action. You can use your action to make a melee spell attack with the fiery blade. On a hit, the target takes 3d6 fire damage. The flaming blade sheds bright light in a 10-foot radius and dim light for an additional 10 feet.","higherEn":"When you cast this spell using a spell slot of 4th level or higher, the damage increases by 1d6 for every two slot levels above 2nd."},{"id":"flame-strike","srd":true,"name":"Colpo Infuocato","nameEn":"Flame Strike","level":5,"school":"Invocazione","castTime":"1 Azione","range":"18 m","duration":"Istantanea","components":"V, S, M","material":"Pinch of sulfur.","concentration":false,"ritual":false,"attack":null,"damage":{"type":"Fire","scale":"slot","table":{"5":"4d6 + 4d6","6":"4d6 + 5d6","7":"4d6 + 6d6","8":"4d6 + 7d6","9":"4d6 + 8d6"}},"dc":{"ability":"Destrezza","success":"half"},"classes":["Cleric"],"classesHb":["Chierico"],"effects":"","desc":"","descEn":"A vertical column of divine fire roars down from the heavens in a location you specify. Each creature in a 10-foot-radius, 40-foot-high cylinder centered on a point within range must make a dexterity saving throw. A creature takes 4d6 fire damage and 4d6 radiant damage on a failed save, or half as much damage on a successful one.","higherEn":"When you cast this spell using a spell slot of 6th level or higher, the fire damage or the radiant damage (your choice) increases by 1d6 for each slot level above 5th."},{"id":"flaming-sphere","srd":true,"name":"Sfera Infuocata","nameEn":"Flaming Sphere","level":2,"school":"Evocazione","castTime":"1 Azione","range":"18 m","duration":"Concentrazione, fino a 1 minuto","components":"V, S, M","material":"A bit of tallow, a pinch of brimstone, and a dusting of powdered iron.","concentration":true,"ritual":false,"attack":null,"damage":{"type":"Fire","scale":"slot","table":{"2":"2d6","3":"3d6","4":"4d6","5":"5d6","6":"6d6","7":"7d6","8":"8d6","9":"9d6"}},"dc":null,"classes":["Druid","Wizard"],"classesHb":["Druido","Mago"],"effects":"Sfera di fuoco mobile: 2d6 danni da fuoco a contatto/fine turno (TS Des dimezza).","desc":"","descEn":"A 5-foot-diameter sphere of fire appears in an unoccupied space of your choice within range and lasts for the duration. Any creature that ends its turn within 5 feet of the sphere must make a dexterity saving throw. The creature takes 2d6 fire damage on a failed save, or half as much damage on a successful one. As a bonus action, you can move the sphere up to 30 feet. If you ram the sphere into a creature, that creature must make the saving throw against the sphere's damage, and the sphere stops moving this turn. When you move the sphere, you can direct it over barriers up to 5 feet tall and jump it across pits up to 10 feet wide. The sphere ignites flammable objects not being worn or carried, and it sheds bright light in a 20-foot radius and dim light for an additional 20 feet.","higherEn":"When you cast this spell using a spell slot of 3rd level or higher, the damage increases by 1d6 for each slot level above 2nd.","userName":"Sfera Infuocata"},{"id":"flesh-to-stone","srd":true,"name":"Pietrificare","nameEn":"Flesh to Stone","level":6,"school":"Trasmutazione","castTime":"1 Azione","range":"18 m","duration":"Concentrazione, fino a 1 minuto","components":"V, S, M","material":"A pinch of lime, water, and earth.","concentration":true,"ritual":false,"attack":null,"damage":null,"dc":{"ability":"Costituzione","success":"none"},"classes":["Warlock","Wizard"],"classesHb":["Invocatore","Mago"],"effects":"","desc":"","descEn":"You attempt to turn one creature that you can see within range into stone. If the target's body is made of flesh, the creature must make a constitution saving throw. On a failed save, it is restrained as its flesh begins to harden. On a successful save, the creature isn't affected. A creature restrained by this spell must make another constitution saving throw at the end of each of its turns. If it successfully saves against this spell three times, the spell ends. If it fails its saves three times, it is turned to stone and subjected to the petrified condition for the duration. The successes and failures don't need to be consecutive; keep track of both until the target collects three of a kind. If the creature is physically broken while petrified, it suffers from similar deformities if it reverts to its original state. If you maintain your concentration on this spell for the entire possible duration, the creature is turned to stone until the effect is removed.","higherEn":""},{"id":"floating-disk","srd":true,"name":"Disco Fluttuante","nameEn":"Floating Disk","level":1,"school":"Evocazione","castTime":"1 Azione (Rituale)","range":"9 m","duration":"1 ora","components":"V, S, M","material":"A drop of mercury.","concentration":false,"ritual":true,"attack":null,"damage":null,"dc":null,"classes":["Wizard"],"classesHb":["Mago"],"effects":"","desc":"","descEn":"This spell creates a circular, horizontal plane of force, 3 feet in diameter and 1 inch thick, that floats 3 feet above the ground in an unoccupied space of your choice that you can see within range. The disk remains for the duration, and can hold up to 500 pounds. If more weight is placed on it, the spell ends, and everything on the disk falls to the ground. The disk is immobile while you are within 20 feet of it. If you move more than 20 feet away from it, the disk follows you so that it remains within 20 feet of you. If can move across uneven terrain, up or down stairs, slopes and the like, but it can't cross an elevation change of 10 feet or more. For example, the disk can't move across a 10-foot-deep pit, nor could it leave such a pit if it was created at the bottom. If you move more than 100 feet away from the disk (typically because it can't move around an obstacle to follow you), the spell ends.","higherEn":""},{"id":"fly","srd":true,"name":"Volare","nameEn":"Fly","level":3,"school":"Trasmutazione","castTime":"1 Azione","range":"Contatto","duration":"Concentrazione, fino a 10 minuti","components":"V, S, M","material":"A wing feather from any bird.","concentration":true,"ritual":false,"attack":null,"damage":null,"dc":null,"classes":["Sorcerer","Warlock","Wizard"],"classesHb":["Invocatore","Mago","Stregone"],"effects":"","desc":"","descEn":"You touch a willing creature. The target gains a flying speed of 60 feet for the duration. When the spell ends, the target falls if it is still aloft, unless it can stop the fall.","higherEn":"When you cast this spell using a spell slot of 4th level or higher, you can target one additional creature for each slot level above 3rd."},{"id":"fog-cloud","srd":true,"name":"Nube di Nebbia","nameEn":"Fog Cloud","level":1,"school":"Evocazione","castTime":"1 Azione","range":"36 m","duration":"Concentrazione, fino a 1 ora","components":"V, S","material":null,"concentration":true,"ritual":false,"attack":null,"damage":null,"dc":null,"classes":["Druid","Ranger","Sorcerer","Wizard"],"classesHb":["Druido","Mago","Ranger","Stregone"],"effects":"Crea una sfera di nebbia che oscura la visuale in un raggio di 6 metri.","desc":"","descEn":"You create a 20-foot-radius sphere of fog centered on a point within range. The sphere spreads around corners, and its area is heavily obscured. It lasts for the duration or until a wind of moderate or greater speed (at least 10 miles per hour) disperses it.","higherEn":"When you cast this spell using a spell slot of 2nd level or higher, the radius of the fog increases by 20 feet for each slot level above 1st.","userName":"Nube di Nebbia"},{"id":"forbiddance","srd":true,"name":"Proibizione","nameEn":"Forbiddance","level":6,"school":"Abiurazione","castTime":"10 Minuti (Rituale)","range":"Contatto","duration":"24 ore","components":"V, S, M","material":"A sprinkling of holy water, rare incense, and powdered ruby worth at least 1,000 gp.","concentration":false,"ritual":true,"attack":null,"damage":null,"dc":null,"classes":["Cleric"],"classesHb":["Chierico"],"effects":"","desc":"","descEn":"You create a ward against magical travel that protects up to 40,000 square feet of floor space to a height of 30 feet above the floor. For the duration, creatures can't teleport into the area or use portals, such as those created by the gate spell, to enter the area. The spell proofs the area against planar travel, and therefore prevents creatures from accessing the area by way of the Astral Plane, Ethereal Plane, Feywild, Shadowfell, or the plane shift spell. In addition, the spell damages types of creatures that you choose when you cast it. Choose one or more of the following: celestials, elementals, fey, fiends, and undead. When a chosen creature enters the spell's area for the first time on a turn or starts its turn there, the creature takes 5d10 radiant or necrotic damage (your choice when you cast this spell). When you cast this spell, you can designate a password. A creature that speaks the password as it enters the area takes no damage from the spell. The spell's area can't overlap with the area of another forbiddance spell. If you cast forbiddance every day for 30 days in the same location, the spell lasts until it is dispelled, and the material components are consumed on the last casting.","higherEn":""},{"id":"forcecage","srd":true,"name":"Gabbia di Forza","nameEn":"Forcecage","level":7,"school":"Invocazione","castTime":"1 Azione","range":"30 m","duration":"1 ora","components":"V, S, M","material":"Ruby dust worth 1,500 gp.","concentration":false,"ritual":false,"attack":null,"damage":null,"dc":null,"classes":["Bard","Warlock","Wizard"],"classesHb":["Bardo","Invocatore","Mago"],"effects":"","desc":"","descEn":"An immobile, invisible, cube-shaped prison composed of magical force springs into existence around an area you choose within range. The prison can be a cage or a solid box, as you choose. A prison in the shape of a cage can be up to 20 feet on a side and is made from 1/2-inch diameter bars spaced 1/2 inch apart. A prison in the shape of a box can be up to 10 feet on a side, creating a solid barrier that prevents any matter from passing through it and blocking any spells cast into or out from the area. When you cast the spell, any creature that is completely inside the cage's area is trapped. Creatures only partially within the area, or those too large to fit inside the area, are pushed away from the center of the area until they are completely outside the area. A creature inside the cage can't leave it by nonmagical means. If the creature tries to use teleportation or interplanar travel to leave the cage, it must first make a charisma saving throw. On a success, the creature can use that magic to exit the cage. On a failure, the creature can't exit the cage and wastes the use of the spell or effect. The cage also extends into the Ethereal Plane, blocking ethereal travel. This spell can't be dispelled by dispel magic.","higherEn":""},{"id":"foresight","srd":true,"name":"Preveggenza Suprema","nameEn":"Foresight","level":9,"school":"Divinazione","castTime":"1 Minuto","range":"Contatto","duration":"8 ore","components":"V, S, M","material":"A hummingbird feather.","concentration":false,"ritual":false,"attack":null,"damage":null,"dc":null,"classes":["Bard","Druid","Warlock","Wizard"],"classesHb":["Bardo","Druido","Invocatore","Mago"],"effects":"","desc":"","descEn":"You touch a willing creature and bestow a limited ability to see into the immediate future. For the duration, the target can't be surprised and has advantage on attack rolls, ability checks, and saving throws. Additionally, other creatures have disadvantage on attack rolls against the target for the duration. This spell immediately ends if you cast it again before its duration ends.","higherEn":""},{"id":"freedom-of-movement","srd":true,"name":"Libertà di Movimento","nameEn":"Freedom of Movement","level":4,"school":"Abiurazione","castTime":"1 Azione","range":"Contatto","duration":"1 ora","components":"V, S, M","material":"A leather strap, bound around the arm or a similar appendage.","concentration":false,"ritual":false,"attack":null,"damage":null,"dc":null,"classes":["Bard","Cleric","Druid","Ranger"],"classesHb":["Bardo","Chierico","Druido","Ranger"],"effects":"","desc":"","descEn":"You touch a willing creature. For the duration, the target's movement is unaffected by difficult terrain, and spells and other magical effects can neither reduce the target's speed nor cause the target to be paralyzed or restrained. The target can also spend 5 feet of movement to automatically escape from nonmagical restraints, such as manacles or a creature that has it grappled. Finally, being underwater imposes no penalties on the target's movement or attacks.","higherEn":""},{"id":"freezing-sphere","srd":true,"name":"Sfera Congelante","nameEn":"Freezing Sphere","level":6,"school":"Invocazione","castTime":"1 Azione","range":"90 m","duration":"Istantanea","components":"V, S, M","material":"A small crystal sphere.","concentration":false,"ritual":false,"attack":null,"damage":{"type":"Cold","scale":"slot","table":{"6":"10d6"}},"dc":{"ability":"Costituzione","success":"half"},"classes":["Wizard"],"classesHb":["Mago"],"effects":"","desc":"","descEn":"A frigid globe of cold energy streaks from your fingertips to a point of your choice within range, where it explodes in a 60-foot-radius sphere. Each creature within the area must make a constitution saving throw. On a failed save, a creature takes 10d6 cold damage. On a successful save, it takes half as much damage. If the globe strikes a body of water or a liquid that is principally water (not including water-based creatures), it freezes the liquid to a depth of 6 inches over an area 30 feet square. This ice lasts for 1 minute. Creatures that were swimming on the surface of frozen water are trapped in the ice. A trapped creature can use an action to make a Strength check against your spell save DC to break free. You can refrain from firing the globe after completing the spell, if you wish. A small globe about the size of a sling stone, cool to the touch, appears in your hand. At any time, you or a creature you give the globe to can throw the globe (to a range of 40 feet) or hurl it with a sling (to the sling's normal range). It shatters on impact, with the same effect as the normal casting of the spell. You can also set the globe down without shattering it. After 1 minute, if the globe hasn't already shattered, it explodes.","higherEn":"When you cast this spell using a spell slot of 7th level or higher, the damage increases by 1d6 for each slot level above 6th."},{"id":"gaseous-form","srd":true,"name":"Forma Gassosa","nameEn":"Gaseous Form","level":3,"school":"Trasmutazione","castTime":"1 Azione","range":"Contatto","duration":"Concentrazione, fino a 1 ora","components":"V, S, M","material":"A bit of gauze and a wisp of smoke.","concentration":true,"ritual":false,"attack":null,"damage":null,"dc":null,"classes":["Sorcerer","Warlock","Wizard"],"classesHb":["Invocatore","Mago","Stregone"],"effects":"","desc":"","descEn":"You transform a willing creature you touch, along with everything it's wearing and carrying, into a misty cloud for the duration. The spell ends if the creature drops to 0 hit points. An incorporeal creature isn't affected. While in this form, the target's only method of movement is a flying speed of 10 feet. The target can enter and occupy the space of another creature. The target has resistance to nonmagical damage, and it has advantage on Strength, Dexterity, and constitution saving throws. The target can pass through small holes, narrow openings, and even mere cracks, though it treats liquids as though they were solid surfaces. The target can't fall and remains hovering in the air even when stunned or otherwise incapacitated. While in the form of a misty cloud, the target can't talk or manipulate objects, and any objects it was carrying or holding can't be dropped, used, or otherwise interacted with. The target can't attack or cast spells.","higherEn":""},{"id":"gate","srd":true,"name":"Portale","nameEn":"Gate","level":9,"school":"Evocazione","castTime":"1 Azione","range":"18 m","duration":"Concentrazione, fino a 1 minuto","components":"V, S, M","material":"A diamond worth at least 5,000gp.","concentration":true,"ritual":false,"attack":null,"damage":null,"dc":null,"classes":["Cleric","Sorcerer","Wizard"],"classesHb":["Chierico","Mago","Stregone"],"effects":"","desc":"","descEn":"You conjure a portal linking an unoccupied space you can see within range to a precise location on a different plane of existence. The portal is a circular opening, which you can make 5 to 20 feet in diameter. You can orient the portal in any direction you choose. The portal lasts for the duration. The portal has a front and a back on each plane where it appears. Travel through the portal is possible only by moving through its front. Anything that does so is instantly transported to the other plane, appearing in the unoccupied space nearest to the portal. Deities and other planar rulers can prevent portals created by this spell from opening in their presence or anywhere within their domains. When you cast this spell, you can speak the name of a specific creature (a pseudonym, title, or nickname doesn't work). If that creature is on a plane other than the one you are on, the portal opens in the named creature's immediate vicinity and draws the creature through it to the nearest unoccupied space on your side of the portal. You gain no special power over the creature, and it is free to act as the GM deems appropriate. It might leave, attack you, or help you.","higherEn":""},{"id":"geas","srd":true,"name":"Veto","nameEn":"Geas","level":5,"school":"Ammaliamento","castTime":"1 Minuto","range":"18 m","duration":"30 giorni","components":"V","material":null,"concentration":false,"ritual":false,"attack":null,"damage":null,"dc":{"ability":"Saggezza","success":"none"},"classes":["Bard","Cleric","Druid","Paladin","Wizard"],"classesHb":["Bardo","Chierico","Druido","Mago","Paladino"],"effects":"","desc":"","descEn":"You place a magical command on a creature that you can see within range, forcing it to carry out some service or refrain from some action or course of activity as you decide. If the creature can understand you, it must succeed on a wisdom saving throw or become charmed by you for the duration. While the creature is charmed by you, it takes 5d10 psychic damage each time it acts in a manner directly counter to your instructions, but no more than once each day. A creature that can't understand you is unaffected by the spell. You can issue any command you choose, short of an activity that would result in certain death. Should you issue a suicidal command, the spell ends. You can end the spell early by using an action to dismiss it. A remove curse, greater restoration, or wish spell also ends it.","higherEn":"When you cast this spell using a spell slot of 7th or 8th level, the duration is 1 year. When you cast this spell using a spell slot of 9th level, the spell lasts until it is ended by one of the spells mentioned above."},{"id":"gentle-repose","srd":true,"name":"Riposo Tranquillo","nameEn":"Gentle Repose","level":2,"school":"Necromanzia","castTime":"1 Azione (Rituale)","range":"Contatto","duration":"10 giorni","components":"V, S, M","material":"A pinch of salt and one copper piece placed on each of the corpse's eyes, which must remain there for the duration.","concentration":false,"ritual":true,"attack":null,"damage":null,"dc":null,"classes":["Cleric","Wizard"],"classesHb":["Chierico","Mago"],"effects":"Preserva un cadavere, rallenta decomposizione; nessun danno.","desc":"","descEn":"You touch a corpse or other remains. For the duration, the target is protected from decay and can't become undead. The spell also effectively extends the time limit on raising the target from the dead, since days spent under the influence of this spell don't count against the time limit of spells such as raise dead.","higherEn":"","userName":"Riposo Gentile"},{"id":"giant-insect","srd":true,"name":"Insetto Gigante","nameEn":"Giant Insect","level":4,"school":"Trasmutazione","castTime":"1 Azione","range":"9 m","duration":"Concentrazione, fino a 10 minuti","components":"V, S","material":null,"concentration":true,"ritual":false,"attack":null,"damage":null,"dc":null,"classes":["Druid"],"classesHb":["Druido"],"effects":"","desc":"","descEn":"You transform up to ten centipedes, three spiders, five wasps, or one scorpion within range into giant versions of their natural forms for the duration. A centipede becomes a giant centipede, a spider becomes a giant spider, a wasp becomes a giant wasp, and a scorpion becomes a giant scorpion. Each creature obeys your verbal commands, and in combat, they act on your turn each round. The GM has the statistics for these creatures and resolves their actions and movement. A creature remains in its giant size for the duration, until it drops to 0 hit points, or until you use an action to dismiss the effect on it. The GM might allow you to choose different targets. For example, if you transform a bee, its giant version might have the same statistics as a giant wasp.","higherEn":""},{"id":"glibness","srd":true,"name":"Eloquenza","nameEn":"Glibness","level":8,"school":"Trasmutazione","castTime":"1 Azione","range":"Personale","duration":"1 ora","components":"V","material":null,"concentration":false,"ritual":false,"attack":null,"damage":null,"dc":null,"classes":["Bard","Warlock"],"classesHb":["Bardo","Invocatore"],"effects":"","desc":"","descEn":"Until the spell ends, when you make a Charisma check, you can replace the number you roll with a 15. Additionally, no matter what you say, magic that would determine if you are telling the truth indicates that you are being truthful.","higherEn":""},{"id":"globe-of-invulnerability","srd":true,"name":"Globo di Invulnerabilità","nameEn":"Globe of Invulnerability","level":6,"school":"Abiurazione","castTime":"1 Azione","range":"Personale","duration":"Concentrazione, fino a 1 minuto","components":"V, S, M","material":"A glass or crystal bead that shatters when the spell ends.","concentration":true,"ritual":false,"attack":null,"damage":null,"dc":null,"classes":["Sorcerer","Wizard"],"classesHb":["Mago","Stregone"],"effects":"","desc":"","descEn":"An immobile, faintly shimmering barrier springs into existence in a 10-foot radius around you and remains for the duration. Any spell of 5th level or lower cast from outside the barrier can't affect creatures or objects within it, even if the spell is cast using a higher level spell slot. Such a spell can target creatures and objects within the barrier, but the spell has no effect on them. Similarly, the area within the barrier is excluded from the areas affected by such spells.","higherEn":"When you cast this spell using a spell slot of 7th level or higher, the barrier blocks spells of one level higher for each slot level above 6th."},{"id":"glyph-of-warding","srd":true,"name":"Glifo di Interdizione","nameEn":"Glyph of Warding","level":3,"school":"Abiurazione","castTime":"1 Ora","range":"Contatto","duration":"Finché non dissolto","components":"V, S, M","material":"Incense and powdered diamond worth at least 200 gp, which the spell consumes.","concentration":false,"ritual":false,"attack":null,"damage":null,"dc":null,"classes":["Bard","Cleric","Wizard"],"classesHb":["Bardo","Chierico","Mago"],"effects":"","desc":"","descEn":"When you cast this spell, you inscribe a glyph that harms other creatures, either upon a surface (such as a table or a section of floor or wall) or within an object that can be closed (such as a book, a scroll, or a treasure chest) to conceal the glyph. If you choose a surface, the glyph can cover an area of the surface no larger than 10 feet in diameter. If you choose an object, that object must remain in its place; if the object is moved more than 10 feet from where you cast this spell, the glyph is broken, and the spell ends without being triggered. The glyph is nearly invisible and requires a successful Intelligence (Investigation) check against your spell save DC to be found. You decide what triggers the glyph when you cast the spell. For glyphs inscribed on a surface, the most typical triggers include touching or standing on the glyph, removing another object covering the glyph, approaching within a certain distance of the glyph, or manipulating the object on which the glyph is inscribed. For glyphs inscribed within an object, the most common triggers include opening that object, approaching within a certain distance of the object, or seeing or reading the glyph. Once a glyph is triggered, this spell ends. You can further refine the trigger so the spell activates only under certain circumstances or according to physical characteristics (such as height or weight), creature kind (for example, the ward could be set to affect aberrations or drow), or alignment. You can also set conditions for creatures that don't trigger the glyph, such as those who say a certain password. When you inscribe the glyph, choose *explosive runes* or a *spell glyph*. ***Explosive Runes.*** When triggered, the glyph erupts with magical energy in a 20-foot-radius sphere centered on the glyph. The sphere spreads around corners. Each creature in the area must make a Dexterity saving throw. A creature takes 5d8 acid, cold, fire, lightning, or thunder damage on a failed saving throw (your choice when you create the glyph), or half as much damage on a successful one. ***Spell Glyph.*** You can store a prepared spell of 3rd level or lower in the glyph by casting it as part of creating the glyph. The spell must target a single creature or an area. The spell being stored has no immediate effect when cast in this way. When the glyph is triggered, the stored spell is cast. If the spell has a target, it targets the creature that triggered the glyph. If the spell affects an area, the area is centered on that creature. If the spell summons hostile creatures or creates harmful objects or traps, they appear as close as possible to the intruder and attack it. If the spell requires concentration, it lasts until the end of its full duration.","higherEn":"When you cast this spell using a spell slot of 4th level or higher, the damage of an explosive runes glyph increases by 1d8 for each slot level above 3rd. If you create a spell glyph, you can store any spell of up to the same level as the slot you use for the glyph of warding."},{"id":"goodberry","srd":true,"name":"Bacca Benefica","nameEn":"Goodberry","level":1,"school":"Trasmutazione","castTime":"1 Azione","range":"Contatto","duration":"Istantanea","components":"V, S, M","material":"A sprig of mistletoe.","concentration":false,"ritual":false,"attack":null,"damage":null,"dc":null,"classes":["Druid","Ranger"],"classesHb":["Druido","Ranger"],"effects":"Crei fino a 10 bacche; ciascuna guarisce 1 PF e fornisce nutrimento per un giorno.","desc":"","descEn":"Up to ten berries appear in your hand and are infused with magic for the duration. A creature can use its action to eat one berry. Eating a berry restores 1 hit point, and the berry provides enough nourishment to sustain a creature for a day. The berries lose their potency if they have not been consumed within 24 hours of the casting of this spell.","higherEn":"","userName":"Bacca Benefica"},{"id":"grease","srd":true,"name":"Grasso","nameEn":"Grease","level":1,"school":"Evocazione","castTime":"1 Azione","range":"18 m","duration":"1 minuto","components":"V, S, M","material":"A bit of pork rind or butter.","concentration":false,"ritual":false,"attack":null,"damage":null,"dc":{"ability":"Destrezza","success":"none"},"classes":["Wizard"],"classesHb":["Mago"],"effects":"Crea un’area scivolosa di 3 m di raggio che può far cadere proni.","desc":"","descEn":"Slick grease covers the ground in a 10-foot square centered on a point within range and turns it into difficult terrain for the duration. When the grease appears, each creature standing in its area must succeed on a dexterity saving throw or fall prone. A creature that enters the area or ends its turn there must also succeed on a dexterity saving throw or fall prone.","higherEn":"","userName":"Grasso"},{"id":"greater-invisibility","srd":true,"name":"Invisibilità Superiore","nameEn":"Greater Invisibility","level":4,"school":"Illusione","castTime":"1 Azione","range":"Contatto","duration":"Concentrazione, fino a 1 minuto","components":"V, S","material":null,"concentration":true,"ritual":false,"attack":null,"damage":null,"dc":null,"classes":["Bard","Sorcerer","Wizard"],"classesHb":["Bardo","Mago","Stregone"],"effects":"","desc":"","descEn":"You or a creature you touch becomes invisible until the spell ends. Anything the target is wearing or carrying is invisible as long as it is on the target's person.","higherEn":""},{"id":"greater-restoration","srd":true,"name":"Ristorare Superiore","nameEn":"Greater Restoration","level":5,"school":"Abiurazione","castTime":"1 Azione","range":"Contatto","duration":"Istantanea","components":"V, S, M","material":"Diamond dust worth at least 100gp, which the spell consumes.","concentration":false,"ritual":false,"attack":null,"damage":null,"dc":null,"classes":["Bard","Cleric","Druid"],"classesHb":["Bardo","Chierico","Druido"],"effects":"","desc":"","descEn":"You imbue a creature you touch with positive energy to undo a debilitating effect. You can reduce the target's exhaustion level by one, or end one of the following effects on the target: - One effect that charmed or petrified the target - One curse, including the target's attunement to a cursed magic item - Any reduction to one of the target's ability scores - One effect reducing the target's hit point maximum","higherEn":""},{"id":"guardian-of-faith","srd":true,"name":"Guardiano della Fede","nameEn":"Guardian of Faith","level":4,"school":"Evocazione","castTime":"1 Azione","range":"9 m","duration":"8 ore","components":"V","material":null,"concentration":false,"ritual":false,"attack":null,"damage":{"type":"Radiant","scale":"slot","table":{"4":"20"}},"dc":{"ability":"Destrezza","success":"half"},"classes":["Cleric"],"classesHb":["Chierico"],"effects":"","desc":"","descEn":"A Large spectral guardian appears and hovers for the duration in an unoccupied space of your choice that you can see within range. The guardian occupies that space and is indistinct except for a gleaming sword and shield emblazoned with the symbol of your deity. Any creature hostile to you that moves to a space within 10 feet of the guardian for the first time on a turn must succeed on a dexterity saving throw. The creature takes 20 radiant damage on a failed save, or half as much damage on a successful one. The guardian vanishes when it has dealt a total of 60 damage.","higherEn":""},{"id":"guards-and-wards","srd":true,"name":"Guardie e Protezioni","nameEn":"Guards and Wards","level":6,"school":"Abiurazione","castTime":"10 Minuti","range":"Contatto","duration":"24 ore","components":"V, S, M","material":"Burning incense, a small measure of brimstone and oil, a knotted string, a small amount of umber hulk blood, and a small silver rod worth at least 10 gp.","concentration":false,"ritual":false,"attack":null,"damage":null,"dc":null,"classes":["Bard","Wizard"],"classesHb":["Bardo","Mago"],"effects":"","desc":"","descEn":"You create a ward that protects up to 2,500 square feet of floor space (an area 50 feet square, or one hundred 5-foot squares or twenty-five 10-foot squares). The warded area can be up to 20 feet tall, and shaped as you desire. You can ward several stories of a stronghold by dividing the area among them, as long as you can walk into each contiguous area while you are casting the spell. When you cast this spell, you can specify individuals that are unaffected by any or all of the effects that you choose. You can also specify a password that, when spoken aloud, makes the speaker immune to these effects. Guards and wards creates the following effects within the warded area. ***Corridors.*** Fog fills all the warded corridors, making them heavily obscured. In addition, at each intersection or branching passage offering a choice of direction, there is a 50 percent chance that a creature other than you will believe it is going in the opposite direction from the one it chooses. ***Doors.*** All doors in the warded area are magically locked, as if sealed by an arcane lock spell. In addition, you can cover up to ten doors with an illusion (equivalent to the illusory object function of the minor illusion spell) to make them appear as plain sections of wall. ***Stairs.*** Webs fill all stairs in the warded area from top to bottom, as the web spell. These strands regrow in 10 minutes if they are burned or torn away while guards and wards lasts. ***Other Spell Effect.*** You can place your choice of one of the following magical effects within the warded area of the stronghold. - Place dancing lights in four corridors. You can designate a simple program that the lights repeat as long as guards and wards lasts. - Place magic mouth in two locations. - Place stinking cloud in two locations. The vapors appear in the places you designate; they return within 10 minutes if dispersed by wind while guards and wards lasts. - Place a constant gust of wind in one corridor or room. - Place a suggestion in one location. You select an area of up to 5 feet square, and any creature that enters or passes through the area receives the suggestion mentally. The whole warded area radiates magic. A dispel magic cast on a specific effect, if successful, removes only that effect. You can create a permanently guarded and warded structure by casting this spell there every day for one year.","higherEn":""},{"id":"guidance","srd":true,"name":"Guida","nameEn":"Guidance","level":0,"school":"Divinazione","castTime":"1 Azione","range":"Contatto","duration":"Concentrazione, fino a 1 minuto","components":"V, S","material":null,"concentration":true,"ritual":false,"attack":null,"damage":null,"dc":null,"classes":["Cleric","Druid"],"classesHb":["Chierico","Druido"],"effects":"Conferisce 1d4 aggiuntivo a una prova di abilità scelta dal bersaglio.","desc":"Tocchi una creatura consenziente. Una volta prima che l'incantesimo termini, il bersaglio può tirare 1d4 e aggiungere il risultato a una prova di caratteristica a sua scelta. Può tirare il dado prima o dopo la prova. Poi l'incantesimo termina.","descEn":"You touch one willing creature. Once before the spell ends, the target can roll a d4 and add the number rolled to one ability check of its choice. It can roll the die before or after making the ability check. The spell then ends.","higherEn":"","userName":"Guida"},{"id":"guiding-bolt","srd":true,"name":"Dardo Guida","nameEn":"Guiding Bolt","level":1,"school":"Invocazione","castTime":"1 Azione","range":"36 m","duration":"1 round","components":"V, S","material":null,"concentration":false,"ritual":false,"attack":"ranged","damage":{"type":"Radiant","scale":"slot","table":{"1":"4d6","2":"5d6","3":"6d6","4":"7d6","5":"8d6","6":"9d6","7":"10d6","8":"11d6","9":"12d6"}},"dc":null,"classes":["Cleric"],"classesHb":["Chierico"],"effects":"","desc":"","descEn":"A flash of light streaks toward a creature of your choice within range. Make a ranged spell attack against the target. On a hit, the target takes 4d6 radiant damage, and the next attack roll made against this target before the end of your next turn has advantage, thanks to the mystical dim light glittering on the target until then.","higherEn":"When you cast this spell using a spell slot of 2nd level or higher, the damage increases by 1d6 for each slot level above 1st."},{"id":"gust-of-wind","srd":true,"name":"Folata di Vento","nameEn":"Gust of Wind","level":2,"school":"Invocazione","castTime":"1 Azione","range":"Personale","duration":"Concentrazione, fino a 1 minuto","components":"V, S, M","material":"A legume seed.","concentration":true,"ritual":false,"attack":null,"damage":null,"dc":{"ability":"Forza","success":"none"},"classes":["Druid","Sorcerer","Wizard"],"classesHb":["Druido","Mago","Stregone"],"effects":"","desc":"","descEn":"A line of strong wind 60 feet long and 10 feet wide blasts from you in a direction you choose for the spell's duration. Each creature that starts its turn in the line must succeed on a strength saving throw or be pushed 15 feet away from you in a direction following the line. Any creature in the line must spend 2 feet of movement for every 1 foot it moves when moving closer to you. The gust disperses gas or vapor, and it extinguishes candles, torches, and similar unprotected flames in the area. It causes protected flames, such as those of lanterns, to dance wildly and has a 50 percent chance to extinguish them. As a bonus action on each of your turns before the spell ends, you can change the direction in which the line blasts from you.","higherEn":""},{"id":"hallow","srd":true,"name":"Consacrare","nameEn":"Hallow","level":5,"school":"Invocazione","castTime":"24 Ore","range":"Contatto","duration":"Finché non dissolto","components":"V, S, M","material":"Herbs, oils, and incense worth at least 1,000 gp, which the spell consumes.","concentration":false,"ritual":false,"attack":null,"damage":null,"dc":{"ability":"Carisma","success":"none"},"classes":["Cleric"],"classesHb":["Chierico"],"effects":"","desc":"","descEn":"You touch a point and infuse an area around it with holy (or unholy) power. The area can have a radius up to 60 feet, and the spell fails if the radius includes an area already under the effect a hallow spell. The affected area is subject to the following effects. First, celestials, elementals, fey, fiends, and undead can't enter the area, nor can such creatures charm, frighten, or possess creatures within it. Any creature charmed, frightened, or possessed by such a creature is no longer charmed, frightened, or possessed upon entering the area. You can exclude one or more of those types of creatures from this effect. Second, you can bind an extra effect to the area. Choose the effect from the following list, or choose an effect offered by the GM. Some of these effects apply to creatures in the area; you can designate whether the effect applies to all creatures, creatures that follow a specific deity or leader, or creatures of a specific sort, such as ores or trolls. When a creature that would be affected enters the spell's area for the first time on a turn or starts its turn there, it can make a charisma saving throw. On a success, the creature ignores the extra effect until it leaves the area. ***Courage.*** Affected creatures can't be frightened while in the area. ***Darkness.*** Darkness fills the area. Normal light, as well as magical light created by spells of a lower level than the slot you used to cast this spell, can't illuminate the area. ***Daylight.*** Bright light fills the area. Magical darkness created by spells of a lower level than the slot you used to cast this spell can't extinguish the light. ***Energy Protection.*** Affected creatures in the area have resistance to one damage type of your choice, except for bludgeoning, piercing, or slashing. ***Energy Vulnerability.*** Affected creatures in the area have vulnerability to one damage type of your choice, except for bludgeoning, piercing, or slashing. ***Everlasting Rest.*** Dead bodies interred in the area can't be turned into undead. ***Extradimensional Interference.*** Affected creatures can't move or travel using teleportation or by extradimensional or interplanar means. ***Fear.*** Affected creatures are frightened while in the area. ***Silence.*** No sound can emanate from within the area, and no sound can reach into it. ***Tongues.*** Affected creatures can communicate with any other creature in the area, even if they don't share a common language.","higherEn":""},{"id":"hallucinatory-terrain","srd":true,"name":"Terreno Allucinatorio","nameEn":"Hallucinatory Terrain","level":4,"school":"Illusione","castTime":"10 Minuti","range":"90 m","duration":"24 ore","components":"V, S, M","material":"A stone, a twig, and a bit of green plant.","concentration":false,"ritual":false,"attack":null,"damage":null,"dc":null,"classes":["Bard","Druid","Warlock","Wizard"],"classesHb":["Bardo","Druido","Invocatore","Mago"],"effects":"","desc":"","descEn":"You make natural terrain in a 150-foot cube in range look, sound, and smell like some other sort of natural terrain. Thus, open fields or a road can be made to resemble a swamp, hill, crevasse, or some other difficult or impassable terrain. A pond can be made to seem like a grassy meadow, a precipice like a gentle slope, or a rock-strewn gully like a wide and smooth road. Manufactured structures, equipment, and creatures within the area aren't changed in appearance. The tactile characteristics of the terrain are unchanged, so creatures entering the area are likely to see through the illusion. If the difference isn't obvious by touch, a creature carefully examining the illusion can attempt an Intelligence (Investigation) check against your spell save DC to disbelieve it. A creature who discerns the illusion for what it is, sees it as a vague image superimposed on the terrain.","higherEn":""},{"id":"harm","srd":true,"name":"Danno","nameEn":"Harm","level":6,"school":"Necromanzia","castTime":"1 Azione","range":"18 m","duration":"Istantanea","components":"V, S","material":null,"concentration":false,"ritual":false,"attack":null,"damage":{"type":"Necrotic","scale":"slot","table":{"6":"14d6"}},"dc":{"ability":"Costituzione","success":"half"},"classes":["Cleric"],"classesHb":["Chierico"],"effects":"","desc":"","descEn":"You unleash a virulent disease on a creature that you can see within range. The target must make a constitution saving throw. On a failed save, it takes 14d6 necrotic damage, or half as much damage on a successful save. The damage can't reduce the target's hit points below 1. If the target fails the saving throw, its hit point maximum is reduced for 1 hour by an amount equal to the necrotic damage it took. Any effect that removes a disease allows a creature's hit point maximum to return to normal before that time passes.","higherEn":""},{"id":"haste","srd":true,"name":"Velocità","nameEn":"Haste","level":3,"school":"Trasmutazione","castTime":"1 Azione","range":"9 m","duration":"Concentrazione, fino a 1 minuto","components":"V, S, M","material":"A shaving of licorice root.","concentration":true,"ritual":false,"attack":null,"damage":null,"dc":null,"classes":["Sorcerer","Wizard"],"classesHb":["Mago","Stregone"],"effects":"","desc":"","descEn":"Choose a willing creature that you can see within range. Until the spell ends, the target's speed is doubled, it gains a +2 bonus to AC, it has advantage on dexterity saving throws, and it gains an additional action on each of its turns. That action can be used only to take the Attack (one weapon attack only), Dash, Disengage, Hide, or Use an Object action. When the spell ends, the target can't move or take actions until after its next turn, as a wave of lethargy sweeps over it.","higherEn":""},{"id":"heal","srd":true,"name":"Guarigione","nameEn":"Heal","level":6,"school":"Invocazione","castTime":"1 Azione","range":"18 m","duration":"Istantanea","components":"V, S","material":null,"concentration":false,"ritual":false,"attack":null,"damage":null,"dc":null,"classes":["Cleric","Druid"],"classesHb":["Chierico","Druido"],"effects":"","desc":"","descEn":"Choose a creature that you can see within range. A surge of positive energy washes through the creature, causing it to regain 70 hit points. This spell also ends blindness, deafness, and any diseases affecting the target. This spell has no effect on constructs or undead.","higherEn":"When you cast this spell using a spell slot of 7th level or higher, the amount of healing increases by 10 for each slot level above 6th."},{"id":"healing-word","srd":true,"name":"Parola Guaritrice","nameEn":"Healing Word","level":1,"school":"Invocazione","castTime":"1 Azione Bonus","range":"18 m","duration":"Istantanea","components":"V","material":null,"concentration":false,"ritual":false,"attack":null,"damage":null,"dc":null,"classes":["Bard","Cleric","Druid"],"classesHb":["Bardo","Chierico","Druido"],"effects":"Cura 1d4 + mod Inc. PF (slot sup.+1d4); lancio a distanza.","desc":"","descEn":"A creature of your choice that you can see within range regains hit points equal to 1d4 + your spellcasting ability modifier. This spell has no effect on undead or constructs.","higherEn":"When you cast this spell using a spell slot of 2nd level or higher, the healing increases by 1d4 for each slot level above 1st.","userName":"Parola Guaritrice"},{"id":"heat-metal","srd":true,"name":"Arroventare Metallo","nameEn":"Heat Metal","level":2,"school":"Trasmutazione","castTime":"1 Azione","range":"18 m","duration":"Concentrazione, fino a 1 minuto","components":"V, S, M","material":"A piece of iron and a flame.","concentration":true,"ritual":false,"attack":null,"damage":{"type":"Fire","scale":"slot","table":{"2":"2d8","3":"3d8","4":"4d8","5":"5d8","6":"6d8","7":"7d8","8":"8d8","9":"9d8"}},"dc":{"ability":"Costituzione","success":"other"},"classes":["Bard","Druid"],"classesHb":["Bardo","Druido"],"effects":"","desc":"","descEn":"Choose a manufactured metal object, such as a metal weapon or a suit of heavy or medium metal armor, that you can see within range. You cause the object to glow red-hot. Any creature in physical contact with the object takes 2d8 fire damage when you cast the spell. Until the spell ends, you can use a bonus action on each of your subsequent turns to cause this damage again. If a creature is holding or wearing the object and takes the damage from it, the creature must succeed on a constitution saving throw or drop the object if it can. If it doesn't drop the object, it has disadvantage on attack rolls and ability checks until the start of your next turn.","higherEn":"When you cast this spell using a spell slot of 3rd level or higher, the damage increases by 1d8 for each slot level above 2nd."},{"id":"hellish-rebuke","srd":true,"name":"Rappresaglia Infernale","nameEn":"Hellish Rebuke","level":1,"school":"Invocazione","castTime":"1 Reazione","range":"18 m","duration":"Istantanea","components":"V, S","material":null,"concentration":false,"ritual":false,"attack":null,"damage":{"type":"Fire","scale":"slot","table":{"1":"2d10","2":"3d10","3":"4d10","4":"5d10","5":"6d10","6":"7d10","7":"8d10","8":"9d10","9":"10d10"}},"dc":{"ability":"Destrezza","success":"half"},"classes":["Warlock"],"classesHb":["Invocatore"],"effects":"","desc":"","descEn":"You point your finger, and the creature that damaged you is momentarily surrounded by hellish flames. The creature must make a dexterity saving throw. It takes 2d10 fire damage on a failed save, or half as much damage on a successful one.","higherEn":"When you cast this spell using a spell slot of 2nd level or higher, the damage increases by 1d10 for each slot level above 1st."},{"id":"heroes-feast","srd":true,"name":"Banchetto degli Eroi","nameEn":"Heroes' Feast","level":6,"school":"Evocazione","castTime":"10 Minuti","range":"9 m","duration":"Istantanea","components":"V, S, M","material":"A gem-encrusted bowl worth at least 1,000gp, which the spell consumes.","concentration":false,"ritual":false,"attack":null,"damage":null,"dc":null,"classes":["Cleric","Druid"],"classesHb":["Chierico","Druido"],"effects":"","desc":"","descEn":"You bring forth a great feast, including magnificent food and drink. The feast takes 1 hour to consume and disappears at the end of that time, and the beneficial effects don't set in until this hour is over. Up to twelve other creatures can partake of the feast. A creature that partakes of the feast gains several benefits. The creature is cured of all diseases and poison, becomes immune to poison and being frightened, and makes all wisdom saving throws with advantage. Its hit point maximum also increases by 2d10, and it gains the same number of hit points. These benefits last for 24 hours.","higherEn":""},{"id":"heroism","srd":true,"name":"Eroismo","nameEn":"Heroism","level":1,"school":"Ammaliamento","castTime":"1 Azione","range":"Contatto","duration":"Concentrazione, fino a 1 minuto","components":"V, S","material":null,"concentration":true,"ritual":false,"attack":null,"damage":null,"dc":null,"classes":["Bard","Paladin"],"classesHb":["Bardo","Paladino"],"effects":"La creatura toccata diventa immune al \"terrore\" (condizione spaventato) e ottiene PF temporanei all’inizio di ogni suo turno.","desc":"","descEn":"A willing creature you touch is imbued with bravery. Until the spell ends, the creature is immune to being frightened and gains temporary hit points equal to your spellcasting ability modifier at the start of each of its turns. When the spell ends, the target loses any remaining temporary hit points from this spell.","higherEn":"","userName":"Eroismo"},{"id":"hideous-laughter","srd":true,"name":"Risata Atroce","nameEn":"Hideous Laughter","level":1,"school":"Ammaliamento","castTime":"1 Azione","range":"9 m","duration":"Concentrazione, fino a 1 minuto","components":"V, S, M","material":"Tiny tarts and a feather that is waved in the air.","concentration":true,"ritual":false,"attack":null,"damage":null,"dc":{"ability":"Saggezza","success":"none"},"classes":["Bard","Wizard"],"classesHb":["Bardo","Mago"],"effects":"Creatura prono e incapacitato (TS Sag). Ripete TS se subisce danno o fin turni.","desc":"","descEn":"A creature of your choice that you can see within range perceives everything as hilariously funny and falls into fits of laughter if this spell affects it. The target must succeed on a wisdom saving throw or fall prone, becoming incapacitated and unable to stand up for the duration. A creature with an Intelligence score of 4 or less isn't affected. At the end of each of its turns, and each time it takes damage, the target can make another wisdom saving throw. The target had advantage on the saving throw if it's triggered by damage. On a success, the spell ends.","higherEn":"","userName":"Risata Incontenibile di Tasha"},{"id":"hold-monster","srd":true,"name":"Blocca Mostri","nameEn":"Hold Monster","level":5,"school":"Ammaliamento","castTime":"1 Azione","range":"27 m","duration":"Concentrazione, fino a 1 minuto","components":"V, S, M","material":"A small piece of iron.","concentration":true,"ritual":false,"attack":null,"damage":null,"dc":{"ability":"Saggezza","success":"none"},"classes":["Bard","Sorcerer","Warlock","Wizard"],"classesHb":["Bardo","Invocatore","Mago","Stregone"],"effects":"","desc":"","descEn":"Choose a creature you can see and reach. The target must make a saving throw of Wisdom or be paralyzed for the duration of the spell. This spell has no effect against the undead. At the end of each round, the target can make a new saving throw of Wisdom. If successful, the spell ends for the creature.","higherEn":"When you cast this spell using a level 6 or higher location, you can target an additional creature for each level of location beyond the fifth. The creatures must be within 30 feet o f each other when you target them."},{"id":"hold-person","srd":true,"name":"Blocca Persone","nameEn":"Hold Person","level":2,"school":"Ammaliamento","castTime":"1 Azione","range":"18 m","duration":"Concentrazione, fino a 1 minuto","components":"V, S, M","material":"A small, straight piece of iron.","concentration":true,"ritual":false,"attack":null,"damage":null,"dc":{"ability":"Saggezza","success":"none"},"classes":["Bard","Cleric","Druid","Sorcerer","Warlock","Wizard"],"classesHb":["Bardo","Chierico","Druido","Invocatore","Mago","Stregone"],"effects":"Paralizza una creatura umanoide se fallisce tiro salvezza Saggezza.","desc":"","descEn":"Choose a humanoid that you can see within range. The target must succeed on a wisdom saving throw or be paralyzed for the duration. At the end of each of its turns, the target can make another wisdom saving throw. On a success, the spell ends on the target.","higherEn":"When you cast this spell using a spell slot of 3rd level or higher, you can target one additional humanoid for each slot level above 2nd. The humanoids must be within 30 feet of each other when you target them.","userName":"Blocca Persone"},{"id":"holy-aura","srd":true,"name":"Aura Sacra","nameEn":"Holy Aura","level":8,"school":"Abiurazione","castTime":"1 Azione","range":"Personale","duration":"Concentrazione, fino a 1 minuto","components":"V, S, M","material":"A tiny reliquary worth at least 1,000gp containing a sacred relic, such as a scrap of cloth from a saint's robe or a piece of parchment from a religious text.","concentration":true,"ritual":false,"attack":null,"damage":null,"dc":null,"classes":["Cleric"],"classesHb":["Chierico"],"effects":"","desc":"","descEn":"Divine light washes out from you and coalesces in a soft radiance in a 30-foot radius around you. Creatures of your choice in that radius when you cast this spell shed dim light in a 5-foot radius and have advantage on all saving throws, and other creatures have disadvantage on attack rolls against them until the spell ends. In addition, when a fiend or an undead hits an affected creature with a melee attack, the aura flashes with brilliant light. The attacker must succeed on a constitution saving throw or be blinded until the spell ends.","higherEn":""},{"id":"hunters-mark","srd":true,"name":"Marchio del Cacciatore","nameEn":"Hunter's Mark","level":1,"school":"Divinazione","castTime":"1 Azione Bonus","range":"27 m","duration":"Concentrazione, fino a 1 ora","components":"V","material":null,"concentration":true,"ritual":false,"attack":null,"damage":null,"dc":null,"classes":["Ranger"],"classesHb":["Ranger"],"effects":"Designi una creatura: infliggi +1d6 danni ogni volta che la colpisci e hai vantaggio nel seguirne le tracce.","desc":"","descEn":"You choose a creature you can see within range and mystically mark it as your quarry. Until the spell ends, you deal an extra 1d6 damage to the target whenever you hit it with a weapon attack, and you have advantage on any Wisdom (Perception) or Wisdom (Survival) check you make to find it. If the target drops to 0 hit points before this spell ends, you can use a bonus action on a subsequent turn of yours to mark a new creature.","higherEn":"When you cast this spell using a spell slot of 3rd or 4th level, you can maintain your concentration on the spell for up to 8 hours. When you use a spell slot of 5th level or higher, you can maintain your concentration on the spell for up to 24 hours.","userName":"Marchio del Cacciatore"},{"id":"hypnotic-pattern","srd":true,"name":"Schema Ipnotico","nameEn":"Hypnotic Pattern","level":3,"school":"Illusione","castTime":"1 Azione","range":"36 m","duration":"Concentrazione, fino a 1 minuto","components":"S, M","material":"A glowing stick of incense or a crystal vial filled with phosphorescent material.","concentration":true,"ritual":false,"attack":null,"damage":null,"dc":{"ability":"Saggezza","success":"none"},"classes":["Bard","Sorcerer","Warlock","Wizard"],"classesHb":["Bardo","Invocatore","Mago","Stregone"],"effects":"","desc":"","descEn":"You create a twisting pattern of colors that weaves through the air inside a 30-foot cube within range. The pattern appears for a moment and vanishes. Each creature in the area who sees the pattern must make a wisdom saving throw. On a failed save, the creature becomes charmed for the duration. While charmed by this spell, the creature is incapacitated and has a speed of 0. The spell ends for an affected creature if it takes any damage or if someone else uses an action to shake the creature out of its stupor.","higherEn":""},{"id":"ice-storm","srd":true,"name":"Tempesta di Ghiaccio","nameEn":"Ice Storm","level":4,"school":"Invocazione","castTime":"1 Azione","range":"90 m","duration":"Istantanea","components":"V, S, M","material":"A pinch of dust and a few drops of water.","concentration":false,"ritual":false,"attack":null,"damage":{"type":"Bludgeoning","scale":"slot","table":{"4":"2d8 + 4d6","5":"3d8 + 4d6","6":"4d8 + 4d6","7":"5d8 + 4d6","8":"6d8 + 4d6","9":"7d8 + 4d6"}},"dc":{"ability":"Destrezza","success":"half"},"classes":["Druid","Sorcerer","Wizard"],"classesHb":["Druido","Mago","Stregone"],"effects":"","desc":"","descEn":"A hail of rock-hard ice pounds to the ground in a 20-foot-radius, 40-foot-high cylinder centered on a point within range. Each creature in the cylinder must make a dexterity saving throw. A creature takes 2d8 bludgeoning damage and 4d6 cold damage on a failed save, or half as much damage on a successful one. Hailstones turn the storm's area of effect into difficult terrain until the end of your next turn.","higherEn":"When you cast this spell using a spell slot of 5th level or higher, the bludgeoning damage increases by 1d8 for each slot level above 4th."},{"id":"identify","srd":true,"name":"Identificare","nameEn":"Identify","level":1,"school":"Divinazione","castTime":"1 Minuto (Rituale)","range":"Contatto","duration":"Istantanea","components":"V, S, M","material":"A pearl worth at least 100gp and an owl feather.","concentration":false,"ritual":true,"attack":null,"damage":null,"dc":null,"classes":["Bard","Wizard"],"classesHb":["Bardo","Mago"],"effects":"Rivela proprietà magiche di oggetto o incantesimo su creatura.","desc":"","descEn":"You choose one object that you must touch throughout the casting of the spell. If it is a magic item or some other magic-imbued object, you learn its properties and how to use them, whether it requires attunement to use, and how many charges it has, if any. You learn whether any spells are affecting the item and what they are. If the item was created by a spell, you learn which spell created it. If you instead touch a creature throughout the casting, you learn what spells, if any, are currently affecting it.","higherEn":"","userName":"Identificare"},{"id":"illusory-script","srd":true,"name":"Scritto Illusorio","nameEn":"Illusory Script","level":1,"school":"Illusione","castTime":"1 Minuto (Rituale)","range":"Contatto","duration":"10 giorni","components":"S, M","material":"A lead-based ink worth at least 10gp, which this spell consumes.","concentration":false,"ritual":true,"attack":null,"damage":null,"dc":null,"classes":["Bard","Warlock","Wizard"],"classesHb":["Bardo","Invocatore","Mago"],"effects":"Testo leggibile solo da chi decidi; altri vedono altro messaggio.","desc":"","descEn":"You write on parchment, paper, or some other suitable writing material and imbue it with a potent illusion that lasts for the duration. To you and any creatures you designate when you cast the spell, the writing appears normal, written in your hand, and conveys whatever meaning you intended when you wrote the text. To all others, the writing appears as if it were written in an unknown or magical script that is unintelligible. Alternatively, you can cause the writing to appear to be an entirely different message, written in a different hand and language, though the language must be one you know. Should the spell be dispelled, the original script and the illusion both disappear. A creature with truesight can read the hidden message.","higherEn":"","userName":"Scrittura Illusoria"},{"id":"imprisonment","srd":true,"name":"Imprigionamento","nameEn":"Imprisonment","level":9,"school":"Abiurazione","castTime":"1 Minuto","range":"9 m","duration":"Finché non dissolto","components":"V, S, M","material":"A vellum depiction or a carved statuette in the likeness of the target, and a special component that varies according to the version of the spell you choose, worth at least 500gp per Hit Die of the target.","concentration":false,"ritual":false,"attack":null,"damage":null,"dc":{"ability":"Saggezza","success":"none"},"classes":["Warlock","Wizard"],"classesHb":["Invocatore","Mago"],"effects":"","desc":"","descEn":"You create a magical restraint to hold a creature that you can see within range. The target must succeed on a wisdom saving throw or be bound by the spell; if it succeeds, it is immune to this spell if you cast it again. While affected by this spell, the creature doesn't need to breathe, eat, or drink, and it doesn't age. Divination spells can't locate or perceive the target. When you cast the spell, you choose one of the following forms of imprisonment. ***Burial.*** The target is entombed far beneath the earth in a sphere of magical force that is just large enough to contain the target. Nothing can pass through the sphere, nor can any creature teleport or use planar travel to get into or out of it. The special component for this version of the spell is a small mithral orb. ***Chaining.*** Heavy chains, firmly rooted in the ground, hold the target in place. The target is restrained until the spell ends, and it can't move or be moved by any means until then. The special component for this version of the spell is a fine chain of precious metal. ***Hedged Prison.*** The spell transports the target into a tiny demiplane that is warded against teleportation and planar travel. The demiplane can be a labyrinth, a cage, a tower, or any similar confined structure or area of your choice. The special component for this version of the spell is a miniature representation of the prison made from jade. ***Minimus Containment.*** The target shrinks to a height of 1 inch and is imprisoned inside a gemstone or similar object. Light can pass through the gemstone normally (allowing the target to see out and other creatures to see in), but nothing else can pass through, even by means of teleportation or planar travel. The gemstone can't be cut or broken while the spell remains in effect. The special component for this version of the spell is a large, transparent gemstone, such as a corundum, diamond, or ruby. ***Slumber.*** The target falls asleep and can't be awoken. The special component for this version of the spell consists of rare soporific herbs. ***Ending the Spell.*** During the casting of the spell, in any of its versions, you can specify a condition that will cause the spell to end and release the target. The condition can be as specific or as elaborate as you choose, but the GM must agree that the condition is reasonable and has a likelihood of coming to pass. The conditions can be based on a creature's name, identity, or deity but otherwise must be based on observable actions or qualities and not based on intangibles such as level, class, or hit points. A dispel magic spell can end the spell only if it is cast as a 9th-level spell, targeting either the prison or the special component used to create it. You can use a particular special component to create only one prison at a time. If you cast the spell again using the same component, the target of the first casting is immediately freed from its binding.","higherEn":""},{"id":"incendiary-cloud","srd":true,"name":"Nube Incendiaria","nameEn":"Incendiary Cloud","level":8,"school":"Evocazione","castTime":"1 Azione","range":"45 m","duration":"Concentrazione, fino a 1 minuto","components":"V, S","material":null,"concentration":true,"ritual":false,"attack":null,"damage":{"type":"Fire","scale":"slot","table":{"8":"10d8"}},"dc":{"ability":"Destrezza","success":"half"},"classes":["Sorcerer","Wizard"],"classesHb":["Mago","Stregone"],"effects":"","desc":"","descEn":"A swirling cloud of smoke shot through with white-hot embers appears in a 20-foot-radius sphere centered on a point within range. The cloud spreads around corners and is heavily obscured. It lasts for the duration or until a wind of moderate or greater speed (at least 10 miles per hour) disperses it. When the cloud appears, each creature in it must make a dexterity saving throw. A creature takes 10d8 fire damage on a failed save, or half as much damage on a successful one. A creature must also make this saving throw when it enters the spell's area for the first time on a turn or ends its turn there. The cloud moves 10 feet directly away from you in a direction that you choose at the start of each of your turns.","higherEn":""},{"id":"inflict-wounds","srd":true,"name":"Infliggere Ferite","nameEn":"Inflict Wounds","level":1,"school":"Necromanzia","castTime":"1 Azione","range":"Contatto","duration":"Istantanea","components":"V, S","material":null,"concentration":false,"ritual":false,"attack":"melee","damage":{"type":"Necrotic","scale":"slot","table":{"1":"3d10","2":"4d10","3":"5d10","4":"6d10","5":"7d10","6":"8d10","7":"9d10","8":"10d10","9":"11d10"}},"dc":null,"classes":["Cleric"],"classesHb":["Chierico"],"effects":"Infligge 3d10 danni necrotici a contatto.","desc":"","descEn":"Make a melee spell attack against a creature you can reach. On a hit, the target takes 3d10 necrotic damage.","higherEn":"When you cast this spell using a spell slot of 2nd level or higher, the damage increases by 1d10 for each slot level above 1st.","userName":"Infliggi Ferite"},{"id":"insect-plague","srd":true,"name":"Flagello d'Insetti","nameEn":"Insect Plague","level":5,"school":"Evocazione","castTime":"1 Azione","range":"90 m","duration":"Concentrazione, fino a 10 minuti","components":"V, S, M","material":"A few grains of sugar, some kernels of grain, and a smear of fat.","concentration":true,"ritual":false,"attack":null,"damage":{"type":"Piercing","scale":"slot","table":{"5":"4d10","6":"5d10","7":"6d10","8":"7d10","9":"8d10"}},"dc":{"ability":"Costituzione","success":"half"},"classes":["Cleric","Druid","Sorcerer"],"classesHb":["Chierico","Druido","Stregone"],"effects":"","desc":"","descEn":"Swarming, biting locusts fill a 20-foot-radius sphere centered on a point you choose within range. The sphere spreads around corners. The sphere remains for the duration, and its area is lightly obscured. The sphere's area is difficult terrain. When the area appears, each creature in it must make a constitution saving throw. A creature takes 4d10 piercing damage on a failed save, or half as much damage on a successful one. A creature must also make this saving throw when it enters the spell's area for the first time on a turn or ends its turn there.","higherEn":"When you cast this spell using a spell slot of 6th level or higher, the damage increases by 1d10 for each slot level above 5th."},{"id":"instant-summons","srd":true,"name":"Convocazione Istantanea","nameEn":"Instant Summons","level":6,"school":"Evocazione","castTime":"1 Minuto (Rituale)","range":"Contatto","duration":"Finché non dissolto","components":"V, S, M","material":"A sapphire worth 1,000 gp.","concentration":false,"ritual":true,"attack":null,"damage":null,"dc":null,"classes":["Wizard"],"classesHb":["Mago"],"effects":"","desc":"","descEn":"You touch an object weighing 10 pounds or less whose longest dimension is 6 feet or less. The spell leaves an invisible mark on its surface and invisibly inscribes the name of the item on the sapphire you use as the material component. Each time you cast this spell, you must use a different sapphire. At any time thereafter, you can use your action to speak the item's name and crush the sapphire. The item instantly appears in your hand regardless of physical or planar distances, and the spell ends. If another creature is holding or carrying the item, crushing the sapphire doesn't transport the item to you, but instead you learn who the creature possessing the object is and roughly where that creature is located at that moment. Dispel magic or a similar effect successfully applied to the sapphire ends this spell's effect.","higherEn":""},{"id":"invisibility","srd":true,"name":"Invisibilità","nameEn":"Invisibility","level":2,"school":"Illusione","castTime":"1 Azione","range":"Contatto","duration":"Concentrazione, fino a 1 ora","components":"V, S, M","material":"An eyelash encased in gum arabic.","concentration":true,"ritual":false,"attack":null,"damage":null,"dc":null,"classes":["Bard","Sorcerer","Warlock","Wizard"],"classesHb":["Bardo","Invocatore","Mago","Stregone"],"effects":"Rende invisibile una creatura; termina se attacca/lancia.","desc":"","descEn":"A creature you touch becomes invisible until the spell ends. Anything the target is wearing or carrying is invisible as long as it is on the target's person. The spell ends for a target that attacks or casts a spell.","higherEn":"When you cast this spell using a spell slot of 3rd level or higher, you can target one additional creature for each slot level above 2nd.","userName":"Invisibilità"},{"id":"irresistible-dance","srd":true,"name":"Danza Irresistibile","nameEn":"Irresistible Dance","level":6,"school":"Ammaliamento","castTime":"1 Azione","range":"9 m","duration":"Concentrazione, fino a 1 minuto","components":"V","material":null,"concentration":true,"ritual":false,"attack":null,"damage":null,"dc":null,"classes":["Bard","Wizard"],"classesHb":["Bardo","Mago"],"effects":"","desc":"","descEn":"Choose one creature that you can see within range. The target begins a comic dance in place: shuffling, tapping its feet, and capering for the duration. Creatures that can't be charmed are immune to this spell. A dancing creature must use all its movement to dance without leaving its space and has disadvantage on dexterity saving throws and attack rolls. While the target is affected by this spell, other creatures have advantage on attack rolls against it. As an action, a dancing creature makes a wisdom saving throw to regain control of itself. On a successful save, the spell ends.","higherEn":""},{"id":"jump","srd":true,"name":"Salto","nameEn":"Jump","level":1,"school":"Trasmutazione","castTime":"1 Azione","range":"Contatto","duration":"1 minuto","components":"V, S, M","material":"A grasshopper's hind leg.","concentration":false,"ritual":false,"attack":null,"damage":null,"dc":null,"classes":["Druid","Ranger","Sorcerer","Wizard"],"classesHb":["Druido","Mago","Ranger","Stregone"],"effects":"La distanza dei salti della
