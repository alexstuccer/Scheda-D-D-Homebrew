<script id="spells-db" type="application/json">[{"id":"acid-arrow","srd":true,"name":"Freccia Acida","nameEn":"Acid Arrow","level":2,"school":"Invocazione","castTime":"1 Azione","range":"27 m","duration":"Istantanea","components":"V, S, M","material":"Powdered rhubarb leaf and an adder's stomach.","concentration":false,"ritual":false,"attack":"ranged","damage":{"type":"Acid","scale":"slot","table":{"2":"4d4","3":"5d4","4":"6d4","5":"7d4","6":"8d4","7":"9d4","8":"10d4","9":"11d4"}},"dc":null,"classes":["Wizard"],"classesHb":["Mago"],"effects":"Colpo diretto: 4d4 acido + 2d4 a fine turno successivo; mancato: 2d4 a fine turno successivo.","desc":"","descEn":"A shimmering green arrow streaks toward a target within range and bursts in a spray of acid. Make a ranged spell attack against the target. On a hit, the target takes 4d4 acid damage immediately and 2d4 acid damage at the end of its next turn. On a miss, the arrow splashes the target with acid for half as much of the initial damage and no damage at the end of its next turn.","higherEn":"When you cast this spell using a spell slot of 3rd level or higher, the damage (both initial and later) increases by 1d4 for each slot level above 2nd.","userName":"Freccia Acida di Melf"},{"id":"acid-splash","srd":true,"name":"Schizzo Acido","nameEn":"Acid Splash","level":0,"school":"Evocazione","castTime":"1 Azione","range":"18 m","duration":"Istantanea","components":"V, S","material":null,"concentration":false,"ritual":false,"attack":null,"damage":{"type":"Acid","scale":"char","table":{"1":"1d6","5":"2d6","11":"3d6","17":"4d6"}},"dc":{"ability":"Destrezza","success":"none"},"classes":["Sorcerer","Wizard"],"classesHb":["Mago","Stregone"],"effects":"Lancia una sfera d'acido che infligge 1d6 danni da acido a un bersaglio.","desc":"Scagli una bolla di acido. Scegli una creatura entro gittata, oppure due creature entro gittata che si trovino entro 1,5 m l'una dall'altra. Ogni bersaglio deve superare un tiro salvezza su Destrezza o subire 1d6 danni da acido. I danni aumentano di 1d6 al 5° livello (2d6), all'11° (3d6) e al 17° (4d6).","descEn":"You hurl a bubble of acid. Choose one creature within range, or choose two creatures within range that are within 5 feet of each other. A target must succeed on a dexterity saving throw or take 1d6 acid damage. This spell's damage increases by 1d6 when you reach 5th level (2d6), 11th level (3d6), and 17th level (4d6).","higherEn":"","userName":"Schizzo Acido"},{"id":"aid","srd":true,"name":"Aiuto","nameEn":"Aid","level":2,"school":"Abiurazione","castTime":"1 Azione","range":"9 m","duration":"8 ore","components":"V, S, M","material":"A tiny strip of white cloth.","concentration":false,"ritual":false,"attack":null,"damage":null,"dc":null,"classes":["Cleric","Paladin"],"classesHb":["Chierico","Paladino"],"effects":"Incrementa di 5 i PF massimi e attuali di fino a tre creature.","desc":"","descEn":"Your spell bolsters your allies with toughness and resolve. Choose up to three creatures within range. Each target's hit point maximum and current hit points increase by 5 for the duration.","higherEn":"When you cast this spell using a spell slot of 3rd level or higher, a target's hit points increase by an additional 5 for each slot level above 2nd.","userName":"Aiuto"},{"id":"alarm","srd":true,"name":"Allarme","nameEn":"Alarm","level":1,"school":"Abiurazione","castTime":"1 Minuto (Rituale)","range":"9 m","duration":"8 ore","components":"V, S, M","material":"A tiny bell and a piece of fine silver wire.","concentration":false,"ritual":true,"attack":null,"damage":null,"dc":null,"classes":["Ranger","Wizard"],"classesHb":["Mago","Ranger"],"effects":"Imposti un allarme magico invisibile su un’area o apertura; quando una creatura entra, vieni avvisato con un segnale mentale o sonoro.","desc":"","descEn":"You set an alarm against unwanted intrusion. Choose a door, a window, or an area within range that is no larger than a 20-foot cube. Until the spell ends, an alarm alerts you whenever a Tiny or larger creature touches or enters the warded area. When you cast the spell, you can designate creatures that won't set off the alarm. You also choose whether the alarm is mental or audible. A mental alarm alerts you with a ping in your mind if you are within 1 mile of the warded area. This ping awakens you if you are sleeping. An audible alarm produces the sound of a hand bell for 10 seconds within 60 feet.","higherEn":"","userName":"Allarme"},{"id":"alter-self","srd":true,"name":"Alterare Sé Stesso","nameEn":"Alter Self","level":2,"school":"Trasmutazione","castTime":"1 Azione","range":"Personale","duration":"Concentrazione, fino a 1 ora","components":"V, S","material":null,"concentration":true,"ritual":false,"attack":null,"damage":null,"dc":null,"classes":["Sorcerer","Wizard"],"classesHb":["Mago","Stregone"],"effects":"Cambi forma/branchie/armatura naturale; nessun danno diretto.","desc":"","descEn":"You assume a different form. When you cast the spell, choose one of the following options, the effects of which last for the duration of the spell. While the spell lasts, you can end one option as an action to gain the benefits of a different one. ***Aquatic Adaptation.*** You adapt your body to an aquatic environment, sprouting gills and growing webbing between your fingers. You can breathe underwater and gain a swimming speed equal to your walking speed. ***Change Appearance.*** You transform your appearance. You decide what you look like, including your height, weight, facial features, sound of your voice, hair length, coloration, and distinguishing characteristics, if any. You can make yourself appear as a member of another race, though none of your statistics change. You also can't appear as a creature of a different size than you, and your basic shape stays the same; if you're bipedal, you can't use this spell to become quadrupedal, for instance. At any time for the duration of the spell, you can use your action to change your appearance in this way again. ***Natural Weapons.*** You grow claws, fangs, spines, horns, or a different natural weapon of your choice. Your unarmed strikes deal 1d6 bludgeoning, piercing, or slashing damage, as appropriate to the natural weapon you chose, and you are proficient with your unarmed strikes. Finally, the natural weapon is magic and you have a +1 bonus to the attack and damage rolls you make using it.","higherEn":"","userName":"Alterare Sé Stesso"},{"id":"animal-friendship","srd":true,"name":"Amicizia Animale","nameEn":"Animal Friendship","level":1,"school":"Ammaliamento","castTime":"1 Azione","range":"9 m","duration":"24 ore","components":"V, S, M","material":"A morsel of food.","concentration":false,"ritual":false,"attack":null,"damage":null,"dc":{"ability":"Saggezza","success":"none"},"classes":["Bard","Druid","Ranger"],"classesHb":["Bardo","Druido","Ranger"],"effects":"Una bestia con Int ≤ 4 che fallisce il TS Saggezza ti considera amica per la durata.","desc":"","descEn":"This spell lets you convince a beast that you mean it no harm. Choose a beast that you can see within range. It must see and hear you. If the beast's Intelligence is 4 or higher, the spell fails. Otherwise, the beast must succeed on a wisdom saving throw or be charmed by you for the spell's duration. If you or one of your companions harms the target, the spells ends.","higherEn":"","userName":"Amicizia Animale"},{"id":"animal-messenger","srd":true,"name":"Messaggero Animale","nameEn":"Animal Messenger","level":2,"school":"Ammaliamento","castTime":"1 Azione (Rituale)","range":"9 m","duration":"24 ore","components":"V, S, M","material":"A morsel of food.","concentration":false,"ritual":true,"attack":null,"damage":null,"dc":null,"classes":["Bard","Druid","Ranger"],"classesHb":["Bardo","Druido","Ranger"],"effects":"","desc":"","descEn":"By means of this spell, you use an animal to deliver a message. Choose a Tiny beast you can see within range, such as a squirrel, a blue jay, or a bat. You specify a location, which you must have visited, and a recipient who matches a general description, such as \"a man or woman dressed in the uniform of the town guard\" or \"a red-haired dwarf wearing a pointed hat.\" You also speak a message of up to twenty-five words. The target beast travels for the duration of the spell toward the specified location, covering about 50 miles per 24 hours for a flying messenger, or 25 miles for other animals. When the messenger arrives, it delivers your message to the creature that you described, replicating the sound of your voice. The messenger speaks only to a creature matching the description you gave. If the messenger doesn't reach its destination before the spell ends, the message is lost, and the beast makes its way back to where you cast this spell.","higherEn":"If you cast this spell using a spell slot of 3nd level or higher, the duration of the spell increases by 48 hours for each slot level above 2nd."},{"id":"animal-shapes","srd":true,"name":"Forme Animali","nameEn":"Animal Shapes","level":8,"school":"Trasmutazione","castTime":"1 Azione","range":"9 m","duration":"Concentrazione, fino a 24 ore","components":"V, S","material":null,"concentration":true,"ritual":false,"attack":null,"damage":null,"dc":null,"classes":["Druid"],"classesHb":["Druido"],"effects":"","desc":"","descEn":"Your magic turns others into beasts. Choose any number of willing creatures that you can see within range. You transform each target into the form of a Large or smaller beast with a challenge rating of 4 or lower. On subsequent turns, you can use your action to transform affected creatures into new forms. The transformation lasts for the duration for each target, or until the target drops to 0 hit points or dies. You can choose a different form for each target. A target's game statistics are replaced by the statistics of the chosen beast, though the target retains its alignment and Intelligence, Wisdom, and Charisma scores. The target assumes the hit points of its new form, and when it reverts to its normal form, it returns to the number of hit points it had before it transformed. If it reverts as a result of dropping to 0 hit points, any excess damage carries over to its normal form. As long as the excess damage doesn't reduce the creature's normal form to 0 hit points, it isn't knocked unconscious. The creature is limited in the actions it can perform by the nature of its new form, and it can't speak or cast spells. The target's gear melds into the new form. The target can't activate, wield, or otherwise benefit from any of its equipment.","higherEn":""},{"id":"animate-dead","srd":true,"name":"Animare Morti","nameEn":"Animate Dead","level":3,"school":"Necromanzia","castTime":"1 Minuto","range":"3 m","duration":"Istantanea","components":"V, S, M","material":"A drop of blood, a piece of flesh, and a pinch of bone dust.","concentration":false,"ritual":false,"attack":null,"damage":null,"dc":null,"classes":["Cleric","Wizard"],"classesHb":["Chierico","Mago"],"effects":"Crea scheletri o zombie sotto il tuo controllo da cadaveri entro la portata.","desc":"","descEn":"This spell creates an undead servant. Choose a pile of bones or a corpse of a Medium or Small humanoid within range. Your spell imbues the target with a foul mimicry of life, raising it as an undead creature. The target becomes a skeleton if you chose bones or a zombie if you chose a corpse (the GM has the creature's game statistics). On each of your turns, you can use a bonus action to mentally command any creature you made with this spell if the creature is within 60 feet of you (if you control multiple creatures, you can command any or all of them at the same time, issuing the same command to each one). You decide what action the creature will take and where it will move during its next turn, or you can issue a general command, such as to guard a particular chamber or corridor. If you issue no commands, the creature only defends itself against hostile creatures. Once given an order, the creature continues to follow it until its task is complete. The creature is under your control for 24 hours, after which it stops obeying any command you've given it. To maintain control of the creature for another 24 hours, you must cast this spell on the creature again before the current 24-hour period ends. This use of the spell reasserts your control over up to four creatures you have animated with this spell, rather than animating a new one.","higherEn":"When you cast this spell using a spell slot of 4th level or higher, you animate or reassert control over two additional undead creatures for each slot level above 3rd. Each of the creatures must come from a different corpse or pile of bones.","userName":"Animare Morti"},{"id":"animate-objects","srd":true,"name":"Animare Oggetti","nameEn":"Animate Objects","level":5,"school":"Trasmutazione","castTime":"1 Azione","range":"36 m","duration":"Concentrazione, fino a 1 minuto","components":"V, S","material":null,"concentration":true,"ritual":false,"attack":null,"damage":null,"dc":null,"classes":["Bard","Sorcerer","Wizard"],"classesHb":["Bardo","Mago","Stregone"],"effects":"","desc":"","descEn":"Objects come to life at your command. Choose up to ten nonmagical objects within range that are not being worn or carried. Medium targets count as two objects, Large targets count as four objects, Huge targets count as eight objects. You can't animate any object larger than Huge. Each target animates and becomes a creature under your control until the spell ends or until reduced to 0 hit points. As a bonus action, you can mentally command any creature you made with this spell if the creature is within 500 feet of you (if you control multiple creatures, you can command any or all of them at the same time, issuing the same command to each one). You decide what action the creature will take and where it will move during its next turn, or you can issue a general command, such as to guard a particular chamber or corridor. If you issue no commands, the creature only defends itself against hostile creatures. Once given an order, the creature continues to follow it until its task is complete. ##### Animated Object Statistics | Size | HP | AC | Attack | Str | Dex | |---|---|---|---|---|---| | Tiny | 20 | 18 | +8 to hit, 1d4 + 4 damage | 4 | 18 | | Small | 25 | 16 | +6 to hit, 1d8 + 2 damage | 6 | 14 | | Medium | 40 | 13 | +5 to hit, 2d6 + 1 damage | 10 | 12 | | Large | 50 | 10 | +6 to hit, 2d10 + 2 damage | 14 | 10 | | Huge | 80 | 10 | +8 to hit, 2d12 + 4 damage | 18 | 6 | An animated object is a construct with AC, hit points, attacks, Strength, and Dexterity determined by its size. Its Constitution is 10 and its Intelligence and Wisdom are 3, and its Charisma is 1. Its speed is 30 feet; if the object lacks legs or other appendages it can use for locomotion, it instead has a flying speed of 30 feet and can hover. If the object is securely attached to a surface or a larger object, such as a chain bolted to a wall, its speed is 0. It has blindsight with a radius of 30 feet and is blind beyond that distance. When the animated object drops to 0 hit points, it reverts to its original object form, and any remaining damage carries over to its original object form. If you command an object to attack, it can make a single melee attack against a creature within 5 feet of it. It makes a slam attack with an attack bonus and bludgeoning damage determined by its size. The GM might rule that a specific object inflicts slashing or piercing damage based on its form.","higherEn":"If you cast this spell using a spell slot of 6th level or higher, you can animate two additional objects for each slot level above 5th."},{"id":"antilife-shell","srd":true,"name":"Scudo Antivita","nameEn":"Antilife Shell","level":5,"school":"Abiurazione","castTime":"1 Azione","range":"Personale","duration":"Concentrazione, fino a 1 ora","components":"V, S","material":null,"concentration":true,"ritual":false,"attack":null,"damage":null,"dc":null,"classes":["Druid"],"classesHb":["Druido"],"effects":"","desc":"","descEn":"A shimmering barrier extends out from you in a 10-foot radius and moves with you, remaining centered on you and hedging out creatures other than undead and constructs. The barrier lasts for the duration. The barrier prevents an affected creature from passing or reaching through. An affected creature can cast spells or make attacks with ranged or reach weapons through the barrier. If you move so that an affected creature is forced to pass through the barrier, the spell ends.","higherEn":""},{"id":"antimagic-field","srd":true,"name":"Campo Antimagia","nameEn":"Antimagic Field","level":8,"school":"Abiurazione","castTime":"1 Azione","range":"Personale","duration":"Concentrazione, fino a 1 ora","components":"V, S, M","material":"A pinch of powdered iron or iron filings.","concentration":true,"ritual":false,"attack":null,"damage":null,"dc":null,"classes":["Cleric","Wizard"],"classesHb":["Chierico","Mago"],"effects":"","desc":"","descEn":"A 10-foot-radius invisible sphere of antimagic surrounds you. This area is divorced from the magical energy that suffuses the multiverse. Within the sphere, spells can't be cast, summoned creatures disappear, and even magic items become mundane. Until the spell ends, the sphere moves with you, centered on you. Spells and other magical effects, except those created by an artifact or a deity, are suppressed in the sphere and can't protrude into it. A slot expended to cast a suppressed spell is consumed. While an effect is suppressed, it doesn't function, but the time it spends suppressed counts against its duration. ***Targeted Effects.*** Spells and other magical effects, such as magic missile and charm person, that target a creature or an object in the sphere have no effect on that target. ***Areas of Magic.*** The area of another spell or magical effect, such as fireball, can't extend into the sphere. If the sphere overlaps an area of magic, the part of the area that is covered by the sphere is suppressed. For example, the flames created by a wall of fire are suppressed within the sphere, creating a gap in the wall if the overlap is large enough. ***Spells.*** Any active spell or other magical effect on a creature or an object in the sphere is suppressed while the creature or object is in it. ***Magic Items.*** The properties and powers of magic items are suppressed in the sphere. For example, a +1 longsword in the sphere functions as a nonmagical longsword. A magic weapon's properties and powers are suppressed if it is used against a target in the sphere or wielded by an attacker in the sphere. If a magic weapon or a piece of magic ammunition fully leaves the sphere (for example, if you fire a magic arrow or throw a magic spear at a target outside the sphere), the magic of the item ceases to be suppressed as soon as it exits. ***Magical Travel.*** Teleportation and planar travel fail to work in the sphere, whether the sphere is the destination or the departure point for such magical travel. A portal to another location, world, or plane of existence, as well as an opening to an extradimensional space such as that created by the rope trick spell, temporarily closes while in the sphere. ***Creatures and Objects.*** A creature or object summoned or created by magic temporarily winks out of existence in the sphere. Such a creature instantly reappears once the space the creature occupied is no longer within the sphere. ***Dispel Magic.*** Spells and magical effects such as dispel magic have no effect on the sphere. Likewise, the spheres created by different antimagic field spells don't nullify each other.","higherEn":""},{"id":"antipathy-sympathy","srd":true,"name":"Antipatia/Simpatia","nameEn":"Antipathy/Sympathy","level":8,"school":"Ammaliamento","castTime":"1 Ora","range":"18 m","duration":"10 giorni","components":"V, S, M","material":"Either a lump of alum soaked in vinegar for the antipathy effect or a drop of honey for the sympathy effect.","concentration":false,"ritual":false,"attack":null,"damage":null,"dc":null,"classes":["Druid","Wizard"],"classesHb":["Druido","Mago"],"effects":"","desc":"","descEn":"This spell attracts or repels creatures of your choice. You target something within range, either a Huge or smaller object or creature or an area that is no larger than a 200-foot cube. Then specify a kind of intelligent creature, such as red dragons, goblins, or vampires. You invest the target with an aura that either attracts or repels the specified creatures for the duration. Choose antipathy or sympathy as the aura's effect. ***Antipathy.*** The enchantment causes creatures of the kind you designated to feel an intense urge to leave the area and avoid the target. When such a creature can see the target or comes within 60 feet of it, the creature must succeed on a wisdom saving throw or become frightened. The creature remains frightened while it can see the target or is within 60 feet of it. While frightened by the target, the creature must use its movement to move to the nearest safe spot from which it can't see the target. If the creature moves more than 60 feet from the target and can't see it, the creature is no longer frightened, but the creature becomes frightened again if it regains sight of the target or moves within 60 feet of it. ***Sympathy.*** The enchantment causes the specified creatures to feel an intense urge to approach the target while within 60 feet of it or able to see it. When such a creature can see the target or comes within 60 feet of it, the creature must succeed on a wisdom saving throw or use its movement on each of its turns to enter the area or move within reach of the target. When the creature has done so, it can't willingly move away from the target. If the target damages or otherwise harms an affected creature, the affected creature can make a wisdom saving throw to end the effect, as described below. ***Ending the Effect.*** If an affected creature ends its turn while not within 60 feet of the target or able to see it, the creature makes a wisdom saving throw. On a successful save, the creature is no longer affected by the target and recognizes the feeling of repugnance or attraction as magical. In addition, a creature affected by the spell is allowed another wisdom saving throw every 24 hours while the spell persists. A creature that successfully saves against this effect is immune to it for 1 minute, after which time it can be affected again.","higherEn":""},{"id":"arcane-eye","srd":true,"name":"Occhio Arcano","nameEn":"Arcane Eye","level":4,"school":"Divinazione","castTime":"1 Azione","range":"9 m","duration":"Concentrazione, fino a 1 ora","components":"V, S, M","material":"A bit of bat fur.","concentration":true,"ritual":false,"attack":null,"damage":null,"dc":null,"classes":["Cleric","Wizard"],"classesHb":["Chierico","Mago"],"effects":"","desc":"","descEn":"You create an invisible, magical eye within range that hovers in the air for the duration. You mentally receive visual information from the eye, which has normal vision and darkvision out to 30 feet. The eye can look in every direction. As an action, you can move the eye up to 30 feet in any direction. There is no limit to how far away from you the eye can move, but it can't enter another plane of existence. A solid barrier blocks the eye's movement, but the eye can pass through an opening as small as 1 inch in diameter.","higherEn":""},{"id":"arcane-hand","srd":true,"name":"Mano Arcana","nameEn":"Arcane Hand","level":5,"school":"Invocazione","castTime":"1 Azione","range":"36 m","duration":"Concentrazione, fino a 1 minuto","components":"V, S, M","material":"An eggshell and a snakeskin glove.","concentration":true,"ritual":false,"attack":null,"damage":null,"dc":null,"classes":["Wizard"],"classesHb":["Mago"],"effects":"","desc":"","descEn":"You create a Large hand of shimmering, translucent force in an unoccupied space that you can see within range. The hand lasts for the spell's duration, and it moves at your command, mimicking the movements of your own hand. The hand is an object that has AC 20 and hit points equal to your hit point maximum. If it drops to 0 hit points, the spell ends. It has a Strength of 26 (+8) and a Dexterity of 10 (+0). The hand doesn't fill its space. When you cast the spell and as a bonus action on your subsequent turns, you can move the hand up to 60 feet and then cause one of the following effects with it. ***Clenched Fist.*** The hand strikes one creature or object within 5 feet of it. Make a melee spell attack for the hand using your game statistics. On a hit, the target takes 4d8 force damage. ***Forceful Hand.*** The hand attempts to push a creature within 5 feet of it in a direction you choose. Make a check with the hand's Strength contested by the Strength (Athletics) check of the target. If the target is Medium or smaller, you have advantage on the check. If you succeed, the hand pushes the target up to 5 feet plus a number of feet equal to five times your spellcasting ability modifier. The hand moves with the target to remain within 5 feet of it. ***Grasping Hand.*** The hand attempts to grapple a Huge or smaller creature within 5 feet of it. You use the hand's Strength score to resolve the grapple. If the target is Medium or smaller, you have advantage on the check. While the hand is grappling the target, you can use a bonus action to have the hand crush it. When you do so, the target takes bludgeoning damage equal to 2d6 + your spellcasting ability modifier. ***Interposing Hand.*** The hand interposes itself between you and a creature you choose until you give the hand a different command. The hand moves to stay between you and the target, providing you with half cover against the target. The target can't move through the hand's space if its Strength score is less than or equal to the hand's Strength score. If its Strength score is higher than the hand's Strength score, the target can move toward you through the hand's space, but that space is difficult terrain for the target.","higherEn":"When you cast this spell using a spell slot of 6th level or higher, the damage from the clenched fist option increases by 2d8 and the damage from the grasping hand increases by 2d6 for each slot level above 5th."},{"id":"arcane-lock","srd":true,"name":"Chiusura Arcana","nameEn":"Arcane Lock","level":2,"school":"Abiurazione","castTime":"1 Azione","range":"Contatto","duration":"Finché non dissolto","components":"V, S, M","material":"Gold dust worth at least 25gp, which the spell consumes.","concentration":false,"ritual":false,"attack":null,"damage":null,"dc":null,"classes":["Wizard"],"classesHb":["Mago"],"effects":"","desc":"","descEn":"You touch a closed door, window, gate, chest, or other entryway, and it becomes locked for the duration. You and the creatures you designate when you cast this spell can open the object normally. You can also set a password that, when spoken within 5 feet of the object, suppresses this spell for 1 minute. Otherwise, it is impassable until it is broken or the spell is dispelled or suppressed. Casting knock on the object suppresses arcane lock for 10 minutes. While affected by this spell, the object is more difficult to break or force open; the DC to break it or pick any locks on it increases by 10.","higherEn":""},{"id":"arcane-sword","srd":true,"name":"Spada Arcana","nameEn":"Arcane Sword","level":7,"school":"Invocazione","castTime":"1 Azione","range":"18 m","duration":"Concentrazione, fino a 1 minuto","components":"V, S, M","material":"A miniature platinum sword with a grip and pommel of copper and zinc, worth 250 gp.","concentration":true,"ritual":false,"attack":"melee","damage":{"type":"Force","scale":"slot","table":{"7":"3d10"}},"dc":null,"classes":["Bard","Wizard"],"classesHb":["Bardo","Mago"],"effects":"","desc":"","descEn":"You create a sword-shaped plane of force that hovers within range. It lasts for the duration. When the sword appears, you make a melee spell attack against a target of your choice within 5 feet of the sword. On a hit, the target takes 3d10 force damage. Until the spell ends, you can use a bonus action on each of your turns to move the sword up to 20 feet to a spot you can see and repeat this attack against the same target or a different one.","higherEn":""},{"id":"arcanists-magic-aura","srd":true,"name":"Aura Magica dell'Arcanista","nameEn":"Arcanist's Magic Aura","level":2,"school":"Illusione","castTime":"1 Azione","range":"Contatto","duration":"24 ore","components":"V, S, M","material":"A small square of silk.","concentration":false,"ritual":false,"attack":null,"damage":null,"dc":null,"classes":["Wizard"],"classesHb":["Mago"],"effects":"","desc":"","descEn":"You place an illusion on a creature or an object you touch so that divination spells reveal false information about it. The target can be a willing creature or an object that isn't being carried or worn by another creature. When you cast the spell, choose one or both of the following effects. The effect lasts for the duration. If you cast this spell on the same creature or object every day for 30 days, placing the same effect on it each time, the illusion lasts until it is dispelled. ***False Aura.*** You change the way the target appears to spells and magical effects, such as detect magic, that detect magical auras. You can make a nonmagical object appear magical, a magical object appear nonmagical, or change the object's magical aura so that it appears to belong to a specific school of magic that you choose. When you use this effect on an object, you can make the false magic apparent to any creature that handles the item. ***Mask.*** You change the way the target appears to spells and magical effects that detect creature types, such as a paladin's Divine Sense or the trigger of a symbol spell. You choose a creature type and other spells and magical effects treat the target as if it were a creature of that type or of that alignment.","higherEn":""},{"id":"astral-projection","srd":true,"name":"Proiezione Astrale","nameEn":"Astral Projection","level":9,"school":"Necromanzia","castTime":"1 Ora","range":"3 m","duration":"Speciale","components":"V, S, M","material":"For each creature you affect with this spell, you must provide one jacinth worth at least 1,000gp and one ornately carved bar of silver worth at least 100gp, all of which the spell consumes.","concentration":false,"ritual":false,"attack":null,"damage":null,"dc":null,"classes":["Cleric","Warlock","Wizard"],"classesHb":["Chierico","Invocatore","Mago"],"effects":"","desc":"","descEn":"You and up to eight willing creatures within range project your astral bodies into the Astral Plane (the spell fails and the casting is wasted if you are already on that plane). The material body you leave behind is unconscious and in a state of suspended animation; it doesn't need food or air and doesn't age. Your astral body resembles your mortal form in almost every way, replicating your game statistics and possessions. The principal difference is the addition of a silvery cord that extends from between your shoulder blades and trails behind you, fading to invisibility after 1 foot. This cord is your tether to your material body. As long as the tether remains intact, you can find your way home. If the cord is cut--something that can happen only when an effect specifically states that it does--your soul and body are separated, killing you instantly. Your astral form can freely travel through the Astral Plane and can pass through portals there leading to any other plane. If you enter a new plane or return to the plane you were on when casting this spell, your body and possessions are transported along the silver cord, allowing you to re-enter your body as you enter the new plane. Your astral form is a separate incarnation. Any damage or other effects that apply to it have no effect on your physical body, nor do they persist when you return to it. The spell ends for you and your companions when you use your action to dismiss it. When the spell ends, the affected creature returns to its physical body, and it awakens. The spell might also end early for you or one of your companions. A successful dispel magic spell used against an astral or physical body ends the spell for that creature. If a creature's original body or its astral form drops to 0 hit points, the spell ends for that creature. If the spell ends and the silver cord is intact, the cord pulls the creature's astral form back to its body, ending its state of suspended animation. If you are returned to your body prematurely, your companions remain in their astral forms and must find their own way back to their bodies, usually by dropping to 0 hit points.","higherEn":""},{"id":"augury","srd":true,"name":"Auspicio","nameEn":"Augury","level":2,"school":"Divinazione","castTime":"1 Minuto (Rituale)","range":"Personale","duration":"Istantanea","components":"V, S, M","material":"Specially marked sticks, bones, or similar tokens worth at least 25gp.","concentration":false,"ritual":true,"attack":null,"damage":null,"dc":null,"classes":["Cleric"],"classesHb":["Chierico"],"effects":"Ricevi un presagio generico (positivo, negativo o neutro) riguardo un'azione futura immediata.","desc":"","descEn":"By casting gem-inlaid sticks, rolling dragon bones, laying out ornate cards, or employing some other divining tool, you receive an omen from an otherworldly entity about the results of a specific course of action that you plan to take within the next 30 minutes. The GM chooses from the following possible omens: - Weal, for good results - Woe, for bad results - Weal and woe, for both good and bad results - Nothing, for results that aren't especially good or bad The spell doesn't take into account any possible circumstances that might change the outcome, such as the casting of additional spells or the loss or gain of a companion. If you cast the spell two or more times before completing your next long rest, there is a cumulative 25 percent chance for each casting after the first that you get a random reading. The GM makes this roll in secret.","higherEn":"","userName":"Auspicio"},{"id":"awaken","srd":true,"name":"Risvegliare","nameEn":"Awaken","level":5,"school":"Trasmutazione","castTime":"8 Ore","range":"Contatto","duration":"Istantanea","components":"V, S, M","material":"An agate worth at least 1,000 gp, which the spell consumes.","concentration":false,"ritual":false,"attack":null,"damage":null,"dc":null,"classes":["Bard","Druid"],"classesHb":["Bardo","Druido"],"effects":"","desc":"","descEn":"After spending the casting time tracing magical pathways within a precious gemstone, you touch a Huge or smaller beast or plant. The target must have either no Intelligence score or an Intelligence of 3 or less. The target gains an Intelligence of 10. The target also gains the ability to speak one language you know. If the target is a plant, it gains the ability to move its limbs, roots, vines, creepers, and so forth, and it gains senses similar to a human's. Your GM chooses statistics appropriate for the awakened plant, such as the statistics for the awakened shrub or the awakened tree. The awakened beast or plant is charmed by you for 30 days or until you or your companions do anything harmful to it. When the charmed condition ends, the awakened creature chooses whether to remain friendly to you, based on how you treated it while it was charmed.","higherEn":""},{"id":"bane","srd":true,"name":"Anatema","nameEn":"Bane","level":1,"school":"Ammaliamento","castTime":"1 Azione","range":"9 m","duration":"Concentrazione, fino a 1 minuto","components":"V, S, M","material":"A drop of blood.","concentration":true,"ritual":false,"attack":null,"damage":null,"dc":{"ability":"Carisma","success":"none"},"classes":["Bard","Cleric"],"classesHb":["Bardo","Chierico"],"effects":"Fino a 3 creature: –1d4 a tiri per colpire e TS finché dura.","desc":"","descEn":"Up to three creatures of your choice that you can see within range must make charisma saving throws. Whenever a target that fails this saving throw makes an attack roll or a saving throw before the spell ends, the target must roll a d4 and subtract the number rolled from the attack roll or saving throw.","higherEn":"When you cast this spell using a spell slot of 2nd level or higher, you can target one additional creature for each slot level above 1st.","userName":"Sventura"},{"id":"banishment","srd":true,"name":"Bandire","nameEn":"Banishment","level":4,"school":"Abiurazione","castTime":"1 Azione","range":"18 m","duration":"Concentrazione, fino a 1 minuto","components":"V, S, M","material":"An item distasteful to the target.","concentration":true,"ritual":false,"attack":null,"damage":null,"dc":{"ability":"Carisma","success":"none"},"classes":["Cleric","Paladin","Sorcerer","Warlock","Wizard"],"classesHb":["Chierico","Invocatore","Mago","Paladino","Stregone"],"effects":"","desc":"","descEn":"You attempt to send one creature that you can see within range to another plane of existence. The target must succeed on a charisma saving throw or be banished. If the target is native to the plane of existence you're on, you banish the target to a harmless demiplane. While there, the target is incapacitated. The target remains there until the spell ends, at which point the target reappears in the space it left or in the nearest unoccupied space if that space is occupied. If the target is native to a different plane of existence than the one you're on, the target is banished with a faint popping noise, returning to its home plane. If the spell ends before 1 minute has passed, the target reappears in the space it left or in the nearest unoccupied space if that space is occupied. Otherwise, the target doesn't return.","higherEn":"When you cast this spell using a spell slot of 5th level or higher, you can target one additional creature for each slot level above 4th."},{"id":"barkskin","srd":true,"name":"Pelle di Corteccia","nameEn":"Barkskin","level":2,"school":"Trasmutazione","castTime":"1 Azione","range":"Contatto","duration":"Concentrazione, fino a 1 ora","components":"V, S, M","material":"A handful of oak bark.","concentration":true,"ritual":false,"attack":null,"damage":null,"dc":null,"classes":["Druid","Ranger"],"classesHb":["Druido","Ranger"],"effects":"","desc":"","descEn":"You touch a willing creature. Until the spell ends, the target's skin has a rough, bark-like appearance, and the target's AC can't be less than 16, regardless of what kind of armor it is wearing.","higherEn":""},{"id":"beacon-of-hope","srd":true,"name":"Faro di Speranza","nameEn":"Beacon of Hope","level":3,"school":"Abiurazione","castTime":"1 Azione","range":"9 m","duration":"Concentrazione, fino a 1 minuto","components":"V, S","material":null,"concentration":true,"ritual":false,"attack":null,"damage":null,"dc":null,"classes":["Cleric"],"classesHb":["Chierico"],"effects":"Fino a 3 creature hanno vantaggio su tiri salvezza e massimi effetti dalle cure.","desc":"","descEn":"This spell bestows hope and vitality. Choose any number of creatures within range. For the duration, each target has advantage on wisdom saving throws and death saving throws, and regains the maximum number of hit points possible from any healing.","higherEn":"","userName":"Faro di Speranza"},{"id":"bestow-curse","srd":true,"name":"Infliggere Maledizione","nameEn":"Bestow Curse","level":3,"school":"Necromanzia","castTime":"1 Azione","range":"Contatto","duration":"Concentrazione, fino a 1 minuto","components":"V, S","material":null,"concentration":true,"ritual":false,"attack":null,"damage":null,"dc":{"ability":"Saggezza","success":"none"},"classes":["Bard","Cleric","Wizard"],"classesHb":["Bardo","Chierico","Mago"],"effects":"","desc":"","descEn":"You touch a creature, and that creature must succeed on a wisdom saving throw or become cursed for the duration of the spell. When you cast this spell, choose the nature of the curse from the following options: - Choose one ability score. While cursed, the target has disadvantage on ability checks and saving throws made with that ability score. - While cursed, the target has disadvantage on attack rolls against you. - While cursed, the target must make a wisdom saving throw at the start of each of its turns. If it fails, it wastes its action that turn doing nothing. - While the target is cursed, your attacks and spells deal an extra 1d8 necrotic damage to the target. A remove curse spell ends this effect. At the GM's option, you may choose an alternative curse effect, but it should be no more powerful than those described above. The GM has final say on such a curse's effect.","higherEn":"If you cast this spell using a spell slot of 4th level or higher, the duration is concentration, up to 10 minutes. If you use a spell slot of 5th level or higher, the duration is 8 hours. If you use a spell slot of 7th level or higher, the duration is 24 hours. If you use a 9th level spell slot, the spell lasts until it is dispelled. Using a spell slot of 5th level or higher grants a duration that doesn't require concentration."},{"id":"black-tentacles","srd":true,"name":"Tentacoli Neri","nameEn":"Black Tentacles","level":4,"school":"Evocazione","castTime":"1 Azione","range":"27 m","duration":"Concentrazione, fino a 1 minuto","components":"V, S, M","material":"A piece of tentacle from a giant octopus or a giant squid","concentration":true,"ritual":false,"attack":null,"damage":{"type":"Bludgeoning","scale":"slot","table":{"4":"3d6"}},"dc":{"ability":"Destrezza","success":"none"},"classes":["Wizard"],"classesHb":["Mago"],"effects":"","desc":"","descEn":"Squirming, ebony tentacles fill a 20-foot square on ground that you can see within range. For the duration, these tentacles turn the ground in the area into difficult terrain. When a creature enters the affected area for the first time on a turn or starts its turn there, the creature must succeed on a Dexterity saving throw or take 3d6 bludgeoning damage and be restrained by the tentacles until the spell ends. A creature that starts its turn in the area and is already restrained by the tentacles takes 3d6 bludgeoning damage. A creature restrained by the tentacles can use its action to make a Strength or Dexterity check (its choice) against your spell save DC. On a success, it frees itself.","higherEn":""},{"id":"blade-barrier","srd":true,"name":"Barriera di Lame","nameEn":"Blade Barrier","level":6,"school":"Invocazione","castTime":"1 Azione","range":"27 m","duration":"Concentrazione, fino a 10 minuti","components":"V, S","material":null,"concentration":true,"ritual":false,"attack":null,"damage":{"type":"Slashing","scale":"slot","table":{"6":"6d10"}},"dc":{"ability":"Destrezza","success":"half"},"classes":["Cleric"],"classesHb":["Chierico"],"effects":"","desc":"","descEn":"You create a vertical wall of whirling, razor-sharp blades made of magical energy. The wall appears within range and lasts for the duration. You can make a straight wall up to 100 feet long, 20 feet high, and 5 feet thick, or a ringed wall up to 60 feet in diameter, 20 feet high, and 5 feet thick. The wall provides three-quarters cover to creatures behind it, and its space is difficult terrain. When a creature enters the wall's area for the first time on a turn or starts its turn there, the creature must make a dexterity saving throw. On a failed save, the creature takes 6d10 slashing damage. On a successful save, the creature takes half as much damage.","higherEn":""},{"id":"bless","srd":true,"name":"Benedizione","nameEn":"Bless","level":1,"school":"Ammaliamento","castTime":"1 Azione","range":"9 m","duration":"Concentrazione, fino a 1 minuto","components":"V, S, M","material":"A sprinkling of holy water.","concentration":true,"ritual":false,"attack":null,"damage":null,"dc":null,"classes":["Cleric","Paladin"],"classesHb":["Chierico","Paladino"],"effects":"Fino a tre creature a tua scelta entro 9 m. Ricevono +1d4 ai tiri per colpire e ai tiri salvezza finché mantieni la concentrazione.","desc":"","descEn":"You bless up to three creatures of your choice within range. Whenever a target makes an attack roll or a saving throw before the spell ends, the target can roll a d4 and add the number rolled to the attack roll or saving throw.","higherEn":"When you cast this spell using a spell slot of 2nd level or higher, you can target one additional creature for each slot level above 1st.","userName":"Benedizione"},{"id":"blight","srd":true,"name":"Calamità","nameEn":"Blight","level":4,"school":"Necromanzia","castTime":"1 Azione","range":"9 m","duration":"Istantanea","components":"V, S","material":null,"concentration":false,"ritual":false,"attack":null,"damage":{"type":"Necrotic","scale":"slot","table":{"4":"8d8","5":"9d8","6":"10d8","7":"11d8","8":"12d8","9":"13d8"}},"dc":{"ability":"Costituzione","success":"half"},"classes":["Druid","Sorcerer","Warlock","Wizard"],"classesHb":["Druido","Invocatore","Mago","Stregone"],"effects":"","desc":"","descEn":"Necromantic energy washes over a creature of your choice that you can see within range, draining moisture and vitality from it. The target must make a constitution saving throw. The target takes 8d8 necrotic damage on a failed save, or half as much damage on a successful one. The spell has no effect on undead or constructs. If you target a plant creature or a magical plant, it makes the saving throw with disadvantage, and the spell deals maximum damage to it. If you target a nonmagical plant that isn't a creature, such as a tree or shrub, it doesn't make a saving throw; it simply withers and dies.","higherEn":"When you cast this spell using a spell slot of 5th level of higher, the damage increases by 1d8 for each slot level above 4th."},{"id":"blindness-deafness","srd":true,"name":"Cecità/Sordità","nameEn":"Blindness/Deafness","level":2,"school":"Necromanzia","castTime":"1 Azione","range":"9 m","duration":"1 minuto","components":"V","material":null,"concentration":false,"ritual":false,"attack":null,"damage":null,"dc":{"ability":"Costituzione","success":"none"},"classes":["Bard","Cleric","Sorcerer","Wizard"],"classesHb":["Bardo","Chierico","Mago","Stregone"],"effects":"Rende una creatura cieca o sorda se fallisce tiro salvezza Costituzione.","desc":"","descEn":"You can blind or deafen a foe. Choose one creature that you can see within range to make a constitution saving throw. If it fails, the target is either blinded or deafened (your choice) for the duration. At the end of each of its turns, the target can make a constitution saving throw. On a success, the spell ends.","higherEn":"When you cast this spell using a spell slot of 3rd level or higher, you can target one additional creature for each slot level above 2nd.","userName":"Cecità/Sordità"},{"id":"blink","srd":true,"name":"Velocità Folgorante","nameEn":"Blink","level":3,"school":"Trasmutazione","castTime":"1 Azione","range":"Personale","duration":"1 minuto","components":"V, S","material":null,"concentration":false,"ritual":false,"attack":null,"damage":null,"dc":null,"classes":["Sorcerer","Wizard"],"classesHb":["Mago","Stregone"],"effects":"","desc":"","descEn":"Roll a d20 at the end of each of your turns for the duration of the spell. On a roll of 11 or higher, you vanish from your current plane of existence and appear in the Ethereal Plane (the spell fails and the casting is wasted if you were already on that plane). At the start of your next turn, and when the spell ends if you are on the Ethereal Plane, you return to an unoccupied space of your choice that you can see within 10 feet of the space you vanished from. If no unoccupied space is available within that range, you appear in the nearest unoccupied space (chosen at random if more than one space is equally near). You can dismiss this spell as an action. While on the Ethereal Plane, you can see and hear the plane you originated from, which is cast in shades of gray, and you can't see anything there more than 60 feet away. You can only affect and be affected by other creatures on the Ethereal Plane. Creatures that aren't there can't perceive you or interact with you, unless they have the ability to do so.","higherEn":""},{"id":"blur","srd":true,"name":"Confusione Visiva","nameEn":"Blur","level":2,"school":"Illusione","castTime":"1 Azione","range":"Personale","duration":"Concentrazione, fino a 1 minuto","components":"V","material":null,"concentration":true,"ritual":false,"attack":null,"damage":null,"dc":null,"classes":["Sorcerer","Wizard"],"classesHb":["Mago","Stregone"],"effects":"","desc":"","descEn":"Your body becomes blurred, shifting and wavering to all who can see you. For the duration, any creature has disadvantage on attack rolls against you. An attacker is immune to this effect if it doesn't rely on sight, as with blindsight, or can see through illusions, as with truesight.","higherEn":""},{"id":"branding-smite","srd":true,"name":"Colpo Marchiante","nameEn":"Branding Smite","level":2,"school":"Invocazione","castTime":"1 Azione Bonus","range":"Personale","duration":"Concentrazione, fino a 1 minuto","components":"V","material":null,"concentration":true,"ritual":false,"attack":null,"damage":{"type":"Radiant","scale":"slot","table":{"2":"2d6","3":"3d6","4":"4d6","5":"5d6","6":"6d6","7":"7d6","8":"8d6","9":"9d6"}},"dc":null,"classes":["Paladin"],"classesHb":["Paladino"],"effects":"","desc":"","descEn":"The next time you hit a creature with a weapon attack before this spell ends, the weapon gleams with astral radiance as you strike. The attack deals an extra 2d6 radiant damage to the target, which becomes visible if it's invisible, and the target sheds dim light in a 5-foot radius and can't become invisible until the spell ends.","higherEn":"When you cast this spell using a spell slot of 3rd level or higher, the extra damage increases by 1d6 for each slot level above 2nd."},{"id":"burning-hands","srd":true,"name":"Mani Brucianti","nameEn":"Burning Hands","level":1,"school":"Invocazione","castTime":"1 Azione","range":"Personale","duration":"Istantanea","components":"V, S","material":null,"concentration":false,"ritual":false,"attack":null,"damage":{"type":"Fire","scale":"slot","table":{"1":"3d6","2":"4d6","3":"5d6","4":"6d6","5":"7d6","6":"8d6","7":"9d6","8":"10d6","9":"11d6"}},"dc":{"ability":"Destrezza","success":"half"},"classes":["Sorcerer","Wizard"],"classesHb":["Mago","Stregone"],"effects":"Infligge 3d6 danni da fuoco in un cono di 4,5 metri. TS Des per dimezzare.","desc":"","descEn":"As you hold your hands with thumbs touching and fingers spread, a thin sheet of flames shoots forth from your outstretched fingertips. Each creature in a 15-foot cone must make a dexterity saving throw. A creature takes 3d6 fire damage on a failed save, or half as much damage on a successful one. The fire ignites any flammable objects in the area that aren't being worn or carried.","higherEn":"When you cast this spell using a spell slot of 2nd level or higher, the damage increases by 1d6 for each slot level above 1st.","userName":"Mani Brucianti"},{"id":"call-lightning","srd":true,"name":"Richiamo del Fulmine","nameEn":"Call Lightning","level":3,"school":"Evocazione","castTime":"1 Azione","range":"36 m","duration":"Concentrazione, fino a 10 minuti","components":"V, S","material":null,"concentration":true,"ritual":false,"attack":null,"damage":{"type":"Lightning","scale":"slot","table":{"3":"3d10","4":"4d10","5":"5d10","6":"6d10","7":"7d10","8":"8d10","9":"9d10"}},"dc":null,"classes":["Druid"],"classesHb":["Druido"],"effects":"","desc":"","descEn":"A storm cloud appears in the shape of a cylinder that is 10 feet tall with a 60-foot radius, centered on a point you can see 100 feet directly above you. The spell fails if you can't see a point in the air where the storm cloud could appear (for example, if you are in a room that can't accommodate the cloud). When you cast the spell, choose a point you can see within range. A bolt of lightning flashes down from the cloud to that point. Each creature within 5 feet of that point must make a dexterity saving throw. A creature takes 3d10 lightning damage on a failed save, or half as much damage on a successful one. On each of your turns until the spell ends, you can use your action to call down lightning in this way again, targeting the same point or a different one. If you are outdoors in stormy conditions when you cast this spell, the spell gives you control over the existing storm instead of creating a new one. Under such conditions, the spell's damage increases by 1d10.","higherEn":"When you cast this spell using a spell slot of 4th or higher level, the damage increases by 1d10 for each slot level above 3rd."},{"id":"calm-emotions","srd":true,"name":"Calmare Emozioni","nameEn":"Calm Emotions","level":2,"school":"Ammaliamento","castTime":"1 Azione","range":"18 m","duration":"Concentrazione, fino a 1 minuto","components":"V, S","material":null,"concentration":true,"ritual":false,"attack":null,"damage":null,"dc":{"ability":"Carisma","success":"none"},"classes":["Bard","Cleric"],"classesHb":["Bardo","Chierico"],"effects":"Sopprime effetti di paura e charme, o riduce ostilità in una zona.","desc":"","descEn":"You attempt to suppress strong emotions in a group of people. Each humanoid in a 20-foot-radius sphere centered on a point you choose within range must make a charisma saving throw; a creature can choose to fail this saving throw if it wishes. If a creature fails its saving throw, choose one of the following two effects. You can suppress any effect causing a target to be charmed or frightened. When this spell ends, any suppressed effect resumes, provided that its duration has not expired in the meantime. Alternatively, you can make a target indifferent about creatures of your choice that it is hostile toward. This indifference ends if the target is attacked or harmed by a spell or if it witnesses any of its friends being harmed. When the spell ends, the creature becomes hostile again, unless the GM rules otherwise.","higherEn":"","userName":"Calmare Emozioni"},{"id":"chain-lightning","srd":true,"name":"Catena di Fulmini","nameEn":"Chain Lightning","level":6,"school":"Invocazione","castTime":"1 Azione","range":"45 m","duration":"Istantanea","components":"V, S, M","material":"A bit of fur; a piece of amber, glass, or a crystal rod; and three silver pins.","concentration":false,"ritual":false,"attack":null,"damage":{"type":"Lightning","scale":"slot","table":{"6":"10d8"}},"dc":{"ability":"Destrezza","success":"half"},"classes":["Sorcerer","Wizard"],"classesHb":["Mago","Stregone"],"effects":"","desc":"","descEn":"You create a bolt of lightning that arcs toward a target of your choice that you can see within range. Three bolts then leap from that target to as many as three other targets, each of which must be within 30 feet of the first target. A target can be a creature or an object and can be targeted by only one of the bolts. A target must make a dexterity saving throw. The target takes 10d8 lightning damage on a failed save, or half as much damage on a successful one.","higherEn":"When you cast this spell using a spell slot of 7th level or higher, one additional bolt leaps from the first target to another target for each slot level above 6th."},{"id":"charm-person","srd":true,"name":"Ammaliare Persone","nameEn":"Charm Person","level":1,"school":"Ammaliamento","castTime":"1 Azione","range":"9 m","duration":"1 ora","components":"V, S","material":null,"concentration":false,"ritual":false,"attack":null,"damage":null,"dc":{"ability":"Saggezza","success":"none"},"classes":["Bard","Druid","Sorcerer","Warlock","Wizard"],"classesHb":["Bardo","Druido","Invocatore","Mago","Stregone"],"effects":"Se la creatura non ostile fallisce TS Sag, è affascinata da te.","desc":"","descEn":"You attempt to charm a humanoid you can see within range. It must make a wisdom saving throw, and does so with advantage if you or your companions are fighting it. If it fails the saving throw, it is charmed by you until the spell ends or until you or your companions do anything harmful to it. The charmed creature regards you as a friendly acquaintance. When the spell ends, the creature knows it was charmed by you.","higherEn":"When you cast this spell using a spell slot of 2nd level or higher, you can target one additional creature for each slot level above 1st. The creatures must be within 30 feet of each other when you target them.","userName":"Ammaliare Persona"},{"id":"chill-touch","srd":true,"name":"Tocco Gelido","nameEn":"Chill Touch","level":0,"school":"Necromanzia","castTime":"1 Azione","range":"36 m","duration":"1 round","components":"V, S","material":null,"concentration":false,"ritual":false,"attack":"ranged","damage":{"type":"Necrotic","scale":"char","table":{"1":"1d8","5":"2d8","11":"3d8","17":"4d8"}},"dc":null,"classes":["Sorcerer","Warlock","Wizard"],"classesHb":["Invocatore","Mago","Stregone"],"effects":"Mano spettrale che infligge 1d8 danni necrotici e impedisce di recuperare PF fino al tuo prossimo turno.","desc":"Crei una mano spettrale e scheletrica nello spazio di una creatura entro gittata. Effettua un attacco magico a distanza contro di essa per colpirla col gelo della tomba. A segno, il bersaglio subisce 1d8 danni necrotici e non può recuperare punti ferita fino all'inizio del tuo prossimo turno; nel frattempo la mano gli resta aggrappata. Se colpisci un non morto, esso ha anche svantaggio ai tiri per colpire contro di te fino alla fine del tuo prossimo turno. I danni aumentano di 1d8 al 5° livello (2d8), all'11° (3d8) e al 17° (4d8).","descEn":"You create a ghostly, skeletal hand in the space of a creature within range. Make a ranged spell attack against the creature to assail it with the chill of the grave. On a hit, the target takes 1d8 necrotic damage, and it can't regain hit points until the start of your next turn. Until then, the hand clings to the target. If you hit an undead target, it also has disadvantage on attack rolls against you until the end of your next turn. This spell's damage increases by 1d8 when you reach 5th level (2d8), 11th level (3d8), and 17th level (4d8).","higherEn":"","userName":"Tocco Gelido"},{"id":"circle-of-death","srd":true,"name":"Cerchio della Morte","nameEn":"Circle of Death","level":6,"school":"Necromanzia","castTime":"1 Azione","range":"45 m","duration":"Istantanea","components":"V, S, M","material":"The powder of a crushed black pearl worth at least 500 gp.","concentration":false,"ritual":false,"attack":null,"damage":{"type":"Necrotic","scale":"slot","table":{"6":"8d6","7":"10d6","8":"12d6","9":"14d6"}},"dc":{"ability":"Costituzione","success":"half"},"classes":["Sorcerer","Warlock","Wizard"],"classesHb":["Invocatore","Mago","Stregone"],"effects":"","desc":"","descEn":"A sphere of negative energy ripples out in a 60-foot radius sphere from a point within range. Each creature in that area must make a constitution saving throw. A target takes 8d6 necrotic damage on a failed save, or half as much damage on a successful one.","higherEn":"When you cast this spell using a spell slot of 7th level or higher, the damage increases by 2d6 for each slot level above 6th."},{"id":"clairvoyance","srd":true,"name":"Chiaroveggenza","nameEn":"Clairvoyance","level":3,"school":"Divinazione","castTime":"10 Minuti","range":"1.6 km","duration":"Concentrazione, fino a 10 minuti","components":"V, S, M","material":"A focus worth at least 100gp, either a jeweled horn for hearing or a glass eye for seeing.","concentration":true,"ritual":false,"attack":null,"damage":null,"dc":null,"classes":["Bard","Cleric","Sorcerer","Wizard"],"classesHb":["Bardo","Chierico","Mago","Stregone"],"effects":"Crea un sensore invisibile che permette di vedere o sentire a distanza.","desc":"","descEn":"You create an invisible sensor within range in a location familiar to you (a place you have visited or seen before) or in an obvious location that is unfamiliar to you (such as behind a door, around a corner, or in a grove of trees). The sensor remains in place for the duration, and it can't be attacked or otherwise interacted with. When you cast the spell, you choose seeing or hearing. You can use the chosen sense through the sensor as if you were in its space. As your action, you can switch between seeing and hearing. A creature that can see the sensor (such as a creature benefiting from see invisibility or truesight) sees a luminous, intangible orb about the size of your fist.","higherEn":"","userName":"Chiaroveggenza"},{"id":"clone","srd":true,"name":"Clone","nameEn":"Clone","level":8,"school":"Necromanzia","castTime":"1 Ora","range":"Contatto","duration":"Istantanea","components":"V, S, M","material":"A diamond worth at least 1,000 gp and at least 1 cubic inch of flesh of the creature that is to be cloned, which the spell consumes, and a vessel worth at least 2,000 gp that has a sealable lid and is large enough to hold a Medium creature, such as a huge urn, coffin, mud-filled cyst in the ground, or crystal container filled with salt water.","concentration":false,"ritual":false,"attack":null,"damage":null,"dc":null,"classes":["Wizard"],"classesHb":["Mago"],"effects":"","desc":"","descEn":"This spell grows an inert duplicate of a living creature as a safeguard against death. This clone forms inside a sealed vessel and grows to full size and maturity after 120 days; you can also choose to have the clone be a younger version of the same creature. It remains inert and endures indefinitely, as long as its vessel remains undisturbed. At any time after the clone matures, if the original creature dies, its soul transfers to the clone, provided that the soul is free and willing to return. The clone is physically identical to the original and has the same personality, memories, and abilities, but none of the original's equipment. The original creature's physical remains, if they still exist, become inert and can't thereafter be restored to life, since the creature's soul is elsewhere.","higherEn":""},{"id":"cloudkill","srd":true,"name":"Nube Mortale","nameEn":"Cloudkill","level":5,"school":"Evocazione","castTime":"1 Azione","range":"36 m","duration":"Concentrazione, fino a 10 minuti","components":"V, S","material":null,"concentration":true,"ritual":false,"attack":null,"damage":{"type":"Poison","scale":"slot","table":{"5":"5d8","6":"6d8","7":"7d8","8":"8d8","9":"9d8"}},"dc":{"ability":"Costituzione","success":"half"},"classes":["Sorcerer","Wizard"],"classesHb":["Mago","Stregone"],"effects":"","desc":"","descEn":"You create a 20-foot-radius sphere of poisonous, yellow-green fog centered on a point you choose within range. The fog spreads around corners. It lasts for the duration or until strong wind disperses the fog, ending the spell. Its area is heavily obscured. When a creature enters the spell's area for the first time on a turn or starts its turn there, that creature must make a constitution saving throw. The creature takes 5d8 poison damage on a failed save, or half as much damage on a successful one. Creatures are affected even if they hold their breath or don't need to breathe. The fog moves 10 feet away from you at the start of each of your turns, rolling along the surface of the ground. The vapors, being heavier than air, sink to the lowest level of the land, even pouring down openings.","higherEn":"When you cast this spell using a spell slot of 6th level or higher, the damage increases by 1d8 for each slot level above 5th."},{"id":"color-spray","srd":true,"name":"Spruzzo Colorato","nameEn":"Color Spray","level":1,"school":"Illusione","castTime":"1 Azione","range":"Personale","duration":"1 round","components":"V, S, M","material":"A pinch of powder or sand that is colored red, yellow, and blue.","concentration":false,"ritual":false,"attack":null,"damage":null,"dc":null,"classes":["Sorcerer","Wizard"],"classesHb":["Mago","Stregone"],"effects":"6d10 PF di creature abbagliate (cieche) a partire dai PF più bassi.","desc":"","descEn":"A dazzling array of flashing, colored light springs from your hand. Roll 6d10; the total is how many hit points of creatures this spell can effect. Creatures in a 15-foot cone originating from you are affected in ascending order of their current hit points (ignoring unconscious creatures and creatures that can't see). Starting with the creature that has the lowest current hit points, each creature affected by this spell is blinded until the spell ends. Subtract each creature's hit points from the total before moving on to the creature with the next lowest hit points. A creature's hit points must be equal to or less than the remaining total for that creature to be affected.","higherEn":"When you cast this spell using a spell slot of 2nd level or higher, roll an additional 2d10 for each slot level above 1st.","userName":"Spruzzo di Colori"},{"id":"command","srd":true,"name":"Comando","nameEn":"Command","level":1,"school":"Ammaliamento","castTime":"1 Azione","range":"18 m","duration":"1 round","components":"V","material":null,"concentration":false,"ritual":false,"attack":null,"damage":null,"dc":{"ability":"Saggezza","success":"none"},"classes":["Cleric","Paladin"],"classesHb":["Chierico","Paladino"],"effects":"Impartisci un singolo ordine (una parola). Se il bersaglio fallisce il TS su Saggezza, esegue il comando nel suo turno.","desc":"","descEn":"You speak a one-word command to a creature you can see within range. The target must succeed on a wisdom saving throw or follow the command on its next turn. The spell has no effect if the target is undead, if it doesn't understand your language, or if your command is directly harmful to it. Some typical commands and their effects follow. You might issue a command other than one described here. If you do so, the GM determines how the target behaves. If the target can't follow your command, the spell ends. ***Approach.*** The target moves toward you by the shortest and most direct route, ending its turn if it moves within 5 feet of you. ***Drop.*** The target drops whatever it is holding and then ends its turn. ***Flee.*** The target spends its turn moving away from you by the fastest available means. ***Grovel.*** The target falls prone and then ends its turn. ***Halt.*** The target doesn't move and takes no actions. A flying creature stays aloft, provided that it is able to do so. If it must move to stay aloft, it flies the minimum distance needed to remain in the air.","higherEn":"When you cast this spell using a spell slot of 2nd level or higher, you can affect one additional creature for each slot level above 1st. The creatures must be within 30 feet of each other when you target them.","userName":"Comando"},{"id":"commune","srd":true,"name":"Comunione","nameEn":"Commune","level":5,"school":"Divinazione","castTime":"1 Minuto (Rituale)","range":"Personale","duration":"1 minuto","components":"V, S, M","material":"Incense and a vial of holy or unholy water.","concentration":false,"ritual":true,"attack":null,"damage":null,"dc":null,"classes":["Cleric"],"classesHb":["Chierico"],"effects":"","desc":"","descEn":"You contact your deity or a divine proxy and ask up to three questions that can be answered with a yes or no. You must ask your questions before the spell ends. You receive a correct answer for each question. Divine beings aren't necessarily omniscient, so you might receive \"unclear\" as an answer if a question pertains to information that lies beyond the deity's knowledge. In a case where a one-word answer could be misleading or contrary to the deity's interests, the GM might offer a short phrase as an answer instead. If you cast the spell two or more times before finishing your next long rest, there is a cumulative 25 percent chance for each casting after the first that you get no answer. The GM makes this roll in secret.","higherEn":""},{"id":"commune-with-nature","srd":true,"name":"Comunione con la Natura","nameEn":"Commune With Nature","level":5,"school":"Divinazione","castTime":"1 Minuto (Rituale)","range":"Personale","duration":"Istantanea","components":"V, S","material":null,"concentration":false,"ritual":true,"attack":null,"damage":null,"dc":null,"classes":["Druid","Ranger"],"classesHb":["Druido","Ranger"],"effects":"","desc":"","descEn":"You briefly become one with nature and gain knowledge of the surrounding territory. In the outdoors, the spell gives you knowledge of the land within 3 miles of you. In caves and other natural underground settings, the radius is limited to 300 feet. The spell doesn't function where nature has been replaced by construction, such as in dungeons and towns. You instantly gain knowledge of up to three facts of your choice about any of the following subjects as they relate to the area: - terrain and bodies of water - prevalent plants, minerals, animals, or peoples - powerful celestials, fey, fiends, elementals, or undead - influence from other planes of existence - buildings For example, you could determine the location of powerful undead in the area, the location of major sources of safe drinking water, and the location of any nearby towns.","higherEn":""},{"id":"comprehend-languages","srd":true,"name":"Comprendere Linguaggi","nameEn":"Comprehend Languages","level":1,"school":"Divinazione","castTime":"1 Azione (Rituale)","range":"Personale","duration":"1 ora","components":"V, S, M","material":"A pinch of soot and salt.","concentration":false,"ritual":true,"attack":null,"damage":null,"dc":null,"classes":["Bard","Sorcerer","Warlock","Wizard"],"classesHb":["Bardo","Invocatore","Mago","Stregone"],"effects":"Comprendi il significato di qualsiasi lingua scritta o parlata.","desc":"","descEn":"For the duration, you understand the literal meaning of any spoken language that you hear. You also understand any written language that you see, but you must be touching the surface on which the words are written. It takes about 1 minute to read one page of text. This spell doesn't decode secret messages in a text or a glyph, such as an arcane sigil, that isn't part of a written language.","higherEn":"","userName":"Comprendere Linguaggi"},{"id":"compulsion","srd":true,"name":"Coercizione","nameEn":"Compulsion","level":4,"school":"Ammaliamento","castTime":"1 Azione","range":"9 m","duration":"Concentrazione, fino a 1 minuto","components":"V, S","material":null,"concentration":true,"ritual":false,"attack":null,"damage":null,"dc":{"ability":"Saggezza","success":"none"},"classes":["Bard"],"classesHb":["Bardo"],"effects":"","desc":"","descEn":"Creatures of your choice that you can see within range and that can hear you must make a wisdom saving throw. A target automatically succeeds on this saving throw if it can't be charmed. On a failed save, a target is affected by this spell. Until the spell ends, you can use a bonus action on each of your turns to designate a direction that is horizontal to you. Each affected target must use as much of its movement as possible to move in that direction on its next turn. It can take any action before it moves. After moving in this way, it can make another Wisdom save to try to end the effect. A target isn't compelled to move into an obviously deadly hazard, such as a fire or a pit, but it will provoke opportunity attacks to move in the designated direction.","higherEn":""},{"id":"cone-of-cold","srd":true,"name":"Cono di Freddo","nameEn":"Cone of Cold","level":5,"school":"Invocazione","castTime":"1 Azione","range":"Personale","duration":"Istantanea","components":"V, S, M","material":"A small crystal or glass cone.","concentration":false,"ritual":false,"attack":null,"damage":{"type":"Cold","scale":"slot","table":{"5":"8d8","6":"9d8","7":"10d8","8":"11d8","9":"12d8"}},"dc":{"ability":"Costituzione","success":"half"},"classes":["Sorcerer","Wizard"],"classesHb":["Mago","Stregone"],"effects":"","desc":"","descEn":"A blast of cold air erupts from your hands. Each creature in a 60-foot cone must make a constitution saving throw. A creature takes 8d8 cold damage on a failed save, or half as much damage on a successful one. A creature killed by this spell becomes a frozen statue until it thaws.","higherEn":"When you cast this spell using a spell slot of 6th level or higher, the damage increases by 1d8 for each slot level above 5th."},{"id":"confusion","srd":true,"name":"Confusione","nameEn":"Confusion","level":4,"school":"Ammaliamento","castTime":"1 Azione","range":"27 m","duration":"Concentrazione, fino a 1 minuto","components":"V, S, M","material":"Three walnut shells.","concentration":true,"ritual":false,"attack":null,"damage":null,"dc":{"ability":"Saggezza","success":"none"},"classes":["Bard","Druid","Sorcerer","Wizard"],"classesHb":["Bardo","Druido","Mago","Stregone"],"effects":"","desc":"","descEn":"This spell assaults and twists creatures' minds, spawning delusions and provoking uncontrolled action. Each creature in a 10-foot-radius sphere centered on a point you choose within range must succeed on a Wisdom saving throw when you cast this spell or be affected by it. An affected target can't take reactions and must roll a d10 at the start of each of its turns to determine its behavior for that turn. | d10 | Behavior | |---|---| | 1 | The creature uses all its movement to move in a random direction. To determine the direction, roll a d8 and assign a direction to each die face. The creature doesn't take an action this turn. | | 2-6 | The creature doesn't move or take actions this turn. | | 7-8 | The creature uses its action to make a melee attack against a randomly determined creature within its reach. If there is no creature within its reach, the creature does nothing this turn. | | 9-10 | The creature can act and move normally. | At the end of each of its turns, an affected target can make a Wisdom saving throw. If it succeeds, this effect ends for that target.","higherEn":"When you cast this spell using a spell slot of 5th level or higher, the radius of the sphere increases by 5 feet for each slot level above 4th."},{"id":"conjure-animals","srd":true,"name":"Evocare Animali","nameEn":"Conjure Animals","level":3,"school":"Evocazione","castTime":"1 Azione","range":"18 m","duration":"Concentrazione, fino a 1 ora","components":"V, S","material":null,"concentration":true,"ritual":false,"attack":null,"damage":null,"dc":null,"classes":["Druid","Ranger"],"classesHb":["Druido","Ranger"],"effects":"","desc":"","descEn":"You summon fey spirits that take the form of beasts and appear in unoccupied spaces that you can see within range. Choose one of the following options for what appears: - One beast of challenge rating 2 or lower - Two beasts of challenge rating 1 or lower - Four beasts of challenge rating 1/2 or lower - Eight beasts of challenge rating 1/4 or lower - Each beast is also considered fey, and it disappears when it drops to 0 hit points or when the spell ends. The summoned creatures are friendly to you and your companions. Roll initiative for the summoned creatures as a group, which has its own turns. They obey any verbal commands that you issue to them (no action required by you). If you don't issue any commands to them, they defend themselves from hostile creatures, but otherwise take no actions. The GM has the creatures' statistics.","higherEn":"When you cast this spell using certain higher-level spell slots, you choose one of the summoning options above, and more creatures appear: twice as many with a 5th-level slot, three times as many with a 7th-level."},{"id":"conjure-celestial","srd":true,"name":"Evocare Celestiale","nameEn":"Conjure Celestial","level":7,"school":"Evocazione","castTime":"1 Minuto","range":"27 m","duration":"Concentrazione, fino a 1 ora","components":"V, S","material":null,"concentration":true,"ritual":false,"attack":null,"damage":null,"dc":null,"classes":["Cleric"],"classesHb":["Chierico"],"effects":"","desc":"","descEn":"You summon a celestial of challenge rating 4 or lower, which appears in an unoccupied space that you can see within range. The celestial disappears when it drops to 0 hit points or when the spell ends. The celestial is friendly to you and your companions for the duration. Roll initiative for the celestial, which has its own turns. It obeys any verbal commands that you issue to it (no action required by you), as long as they don't violate its alignment. If you don't issue any commands to the celestial, it defends itself from hostile creatures but otherwise takes no actions. The GM has the celestial's statistics.","higherEn":"When you cast this spell using a 9th-level spell slot, you summon a celestial of challenge rating 5 or lower."},{"id":"conjure-elemental","srd":true,"name":"Evocare Elementale","nameEn":"Conjure Elemental","level":5,"school":"Evocazione","castTime":"1 Minuto","range":"27 m","duration":"Concentrazione, fino a 1 ora","components":"V, S, M","material":"Burning incense for air, soft clay for earth, sulfur and phosphorus for fire, or water and sand for water.","concentration":true,"ritual":false,"attack":null,"damage":null,"dc":null,"classes":["Druid","Wizard"],"classesHb":["Druido","Mago"],"effects":"","desc":"","descEn":"You call forth an elemental servant. Choose an area of air, earth, fire, or water that fills a 10-foot cube within range. An elemental of challenge rating 5 or lower appropriate to the area you chose appears in an unoccupied space within 10 feet of it. For example, a fire elemental emerges from a bonfire, and an earth elemental rises up from the ground. The elemental disappears when it drops to 0 hit points or when the spell ends. The elemental is friendly to you and your companions for the duration. Roll initiative for the elemental, which has its own turns. It obeys any verbal commands that you issue to it (no action required by you). If you don't issue any commands to the elemental, it defends itself from hostile creatures but otherwise takes no actions. If your concentration is broken, the elemental doesn't disappear. Instead, you lose control of the elemental, it becomes hostile toward you and your companions, and it might attack. An uncontrolled elemental can't be dismissed by you, and it disappears 1 hour after you summoned it. The GM has the elemental's statistics.","higherEn":"When you cast this spell using a spell slot of 6th level or higher, the challenge rating increases by 1 for each slot level above 5th."},{"id":"conjure-fey","srd":true,"name":"Evocare Folletto","nameEn":"Conjure Fey","level":6,"school":"Evocazione","castTime":"1 Minuto","range":"27 m","duration":"Concentrazione, fino a 1 ora","components":"V, S","material":null,"concentration":true,"ritual":false,"attack":null,"damage":null,"dc":null,"classes":["Druid","Warlock"],"classesHb":["Druido","Invocatore"],"effects":"","desc":"","descEn":"You summon a fey creature of challenge rating 6 or lower, or a fey spirit that takes the form of a beast of challenge rating 6 or lower. It appears in an unoccupied space that you can see within range. The fey creature disappears when it drops to 0 hit points or when the spell ends. The fey creature is friendly to you and your companions for the duration. Roll initiative for the creature, which has its own turns. It obeys any verbal commands that you issue to it (no action required by you), as long as they don't violate its alignment. If you don't issue any commands to the fey creature, it defends itself from hostile creatures but otherwise takes no actions. If your concentration is broken, the fey creature doesn't disappear. Instead, you lose control of the fey creature, it becomes hostile toward you and your companions, and it might attack. An uncontrolled fey creature can't be dismissed by you, and it disappears 1 hour after you summoned it. The GM has the fey creature's statistics.","higherEn":"When you cast this spell using a spell slot of 7th level or higher,
