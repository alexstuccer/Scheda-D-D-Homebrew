mmit a new sigil sequence to memory after studying it for 1 minute. You can create a permanent teleportation circle by casting this spell in the same location every day for one year. You need not use the circle to teleport when you cast the spell in this way.","higherEn":""},{"id":"thaumaturgy","srd":true,"name":"Taumaturgia","nameEn":"Thaumaturgy","level":0,"school":"Trasmutazione","castTime":"1 Azione","range":"9 m","duration":"1 minuto","components":"V","material":null,"concentration":false,"ritual":false,"attack":null,"damage":null,"dc":null,"classes":["Cleric"],"classesHb":["Chierico"],"effects":"Crea effetti minori magici come luci, rumori o lievi alterazioni dell'ambiente circostante.","desc":"Manifesti un piccolo prodigio, un segno di potere soprannaturale, entro gittata. Crei uno dei seguenti effetti: la tua voce rimbomba fino a tre volte più forte del normale per 1 minuto; fai tremolare, intensificare, attenuare o cambiare colore alle fiamme per 1 minuto; provochi innocui tremori nel terreno per 1 minuto; crei un suono istantaneo da un punto a tua scelta entro gittata (un tuono, il gracchiare di un corvo, sussurri sinistri); fai aprire o chiudere di scatto una porta o finestra non bloccata; alteri l'aspetto dei tuoi occhi per 1 minuto. Puoi avere attivi fino a tre di questi effetti da 1 minuto alla volta, e congedarli come azione.","descEn":"You manifest a minor wonder, a sign of supernatural power, within range. You create one of the following magical effects within range. - Your voice booms up to three times as loud as normal for 1 minute. - You cause flames to flicker, brighten, dim, or change color for 1 minute. - You cause harmless tremors in the ground for 1 minute. - You create an instantaneous sound that originates from a point of your choice within range, such as a rumble of thunder, the cry of a raven, or ominous whispers. - You instantaneously cause an unlocked door or window to fly open or slam shut. - You alter the appearance of your eyes for 1 minute. If you cast this spell multiple times, you can have up to three of its 1-minute effects active at a time, and you can dismiss such an effect as an action.","higherEn":"","userName":"Taumaturgia"},{"id":"thunderwave","srd":true,"name":"Ondata Tonante","nameEn":"Thunderwave","level":1,"school":"Invocazione","castTime":"1 Azione","range":"Personale","duration":"Istantanea","components":"V, S","material":null,"concentration":false,"ritual":false,"attack":null,"damage":{"type":"Thunder","scale":"slot","table":{"1":"2d8","2":"3d8","3":"4d8","4":"5d8","5":"6d8","6":"7d8","7":"8d8","8":"9d8","9":"10d8"}},"dc":{"ability":"Costituzione","success":"half"},"classes":["Bard","Druid","Sorcerer","Wizard"],"classesHb":["Bardo","Druido","Mago","Stregone"],"effects":"2d8 tuono, spinge 3 m; TS Cos metà e nessuna spinta.","desc":"","descEn":"A wave of thunderous force sweeps out from you. Each creature in a 15-foot cube originating from you must make a constitution saving throw. On a failed save, a creature takes 2d8 thunder damage and is pushed 10 feet away from you. On a successful save, the creature takes half as much damage and isn't pushed. In addition, unsecured objects that are completely within the area of effect are automatically pushed 10 feet away from you by the spell's effect, and the spell emits a thunderous boom audible out to 300 feet.","higherEn":"When you cast this spell using a spell slot of 2nd level or higher, the damage increases by 1d8 for each slot level above 1st.","userName":"Ondata Tonante"},{"id":"time-stop","srd":true,"name":"Arrestare il Tempo","nameEn":"Time Stop","level":9,"school":"Trasmutazione","castTime":"1 Azione","range":"Personale","duration":"Istantanea","components":"V","material":null,"concentration":false,"ritual":false,"attack":null,"damage":null,"dc":null,"classes":["Sorcerer","Wizard"],"classesHb":["Mago","Stregone"],"effects":"","desc":"","descEn":"You briefly stop the flow of time for everyone but yourself. No time passes for other creatures, while you take 1d4 + 1 turns in a row, during which you can use actions and move as normal. This spell ends if one of the actions you use during this period, or any effects that you create during this period, affects a creature other than you or an object being worn or carried by someone other than you. In addition, the spell ends if you move to a place more than 1,000 feet from the location where you cast it.","higherEn":""},{"id":"tiny-hut","srd":true,"name":"Piccolo Rifugio","nameEn":"Tiny Hut","level":3,"school":"Invocazione","castTime":"1 Minuto (Rituale)","range":"Personale","duration":"8 ore","components":"V, S, M","material":"A small crystal bead.","concentration":false,"ritual":true,"attack":null,"damage":null,"dc":null,"classes":["Bard","Wizard"],"classesHb":["Bardo","Mago"],"effects":"","desc":"","descEn":"A 10-foot-radius immobile dome of force springs into existence around and above you and remains stationary for the duration. The spell ends if you leave its area. Nine creatures of Medium size or smaller can fit inside the dome with you. The spell fails if its area includes a larger creature or more than nine creatures. Creatures and objects within the dome when you cast this spell can move through it freely. All other creatures and objects are barred from passing through it. Spells and other magical effects can't extend through the dome or be cast through it. The atmosphere inside the space is comfortable and dry, regardless of the weather outside. Until the spell ends, you can command the interior to become dimly lit or dark. The dome is opaque from the outside, of any color you choose, but it is transparent from the inside.","higherEn":""},{"id":"tongues","srd":true,"name":"Lingue","nameEn":"Tongues","level":3,"school":"Divinazione","castTime":"1 Azione","range":"Contatto","duration":"1 ora","components":"V, M","material":"A small clay model of a ziggurat.","concentration":false,"ritual":false,"attack":null,"damage":null,"dc":null,"classes":["Bard","Cleric","Sorcerer","Warlock","Wizard"],"classesHb":["Bardo","Chierico","Invocatore","Mago","Stregone"],"effects":"Bersaglio comprende e parla qualsiasi lingua.","desc":"","descEn":"This spell grants the creature you touch the ability to understand any spoken language it hears. Moreover, when the target speaks, any creature that knows at least one language and can hear the target understands what it says.","higherEn":"","userName":"Linguaggi"},{"id":"transport-via-plants","srd":true,"name":"Trasporto Vegetale","nameEn":"Transport via Plants","level":6,"school":"Evocazione","castTime":"1 Azione","range":"3 m","duration":"1 round","components":"V, S","material":null,"concentration":false,"ritual":false,"attack":null,"damage":null,"dc":null,"classes":["Druid"],"classesHb":["Druido"],"effects":"","desc":"","descEn":"This spell creates a magical link between a Large or larger inanimate plant within range and another plant, at any distance, on the same plane of existence. You must have seen or touched the destination plant at least once before. For the duration, any creature can step into the target plant and exit from the destination plant by using 5 feet of movement.","higherEn":""},{"id":"tree-stride","srd":true,"name":"Passo Arboreo","nameEn":"Tree Stride","level":5,"school":"Evocazione","castTime":"1 Azione","range":"Personale","duration":"Concentrazione, fino a 1 minuto","components":"V, S","material":null,"concentration":true,"ritual":false,"attack":null,"damage":null,"dc":null,"classes":["Druid","Ranger"],"classesHb":["Druido","Ranger"],"effects":"","desc":"","descEn":"You gain the ability to enter a tree and move from inside it to inside another tree of the same kind within 500 feet. Both trees must be living and at least the same size as you. You must use 5 feet of movement to enter a tree. You instantly know the location of all other trees of the same kind within 500 feet and, as part of the move used to enter the tree, can either pass into one of those trees or step out of the tree you're in. You appear in a spot of your choice within 5 feet of the destination tree, using another 5 feet of movement. If you have no movement left, you appear within 5 feet of the tree you entered. You can use this transportation ability once per round for the duration. You must end each turn outside a tree.","higherEn":""},{"id":"true-polymorph","srd":true,"name":"Metamorfosi Reale","nameEn":"True Polymorph","level":9,"school":"Trasmutazione","castTime":"1 Azione","range":"9 m","duration":"Concentrazione, fino a 1 ora","components":"V, S, M","material":"A drop of mercury, a dollop of gum arabic, and a wisp of smoke.","concentration":true,"ritual":false,"attack":null,"damage":null,"dc":null,"classes":["Bard","Warlock","Wizard"],"classesHb":["Bardo","Invocatore","Mago"],"effects":"","desc":"","descEn":"Choose one creature or nonmagical object that you can see within range. You transform the creature into a different creature, the creature into an object, or the object into a creature (the object must be neither worn nor carried by another creature). The transformation lasts for the duration, or until the target drops to 0 hit points or dies. If you concentrate on this spell for the full duration, the transformation becomes permanent. Shapechangers aren't affected by this spell. An unwilling creature can make a wisdom saving throw, and if it succeeds, it isn't affected by this spell. ***Creature into Creature.*** If you turn a creature into another kind of creature, the new form can be any kind you choose whose challenge rating is equal to or less than the target's (or its level, if the target doesn't have a challenge rating). The target's game statistics, including mental ability scores, are replaced by the statistics of the new form. It retains its alignment and personality. The target assumes the hit points of its new form, and when it reverts to its normal form, the creature returns to the number of hit points it had before it transformed. If it reverts as a result of dropping to 0 hit points, any excess damage carries over to its normal form. As long as the excess damage doesn't reduce the creature's normal form to 0 hit points, it isn't knocked unconscious. The creature is limited in the actions it can perform by the nature of its new form, and it can't speak, cast spells, or take any other action that requires hands or speech unless its new form is capable of such actions. The target's gear melds into the new form. The creature can't activate, use, wield, or otherwise benefit from any of its equipment. ***Object into Creature.*** You can turn an object into any kind of creature, as long as the creature's size is no larger than the object's size and the creature's challenge rating is 9 or lower. The creature is friendly to you and your companions. It acts on each of your turns. You decide what action it takes and how it moves. The GM has the creature's statistics and resolves all of its actions and movement. If the spell becomes permanent, you no longer control the creature. It might remain friendly to you, depending on how you have treated it. ***Creature into Object.*** If you turn a creature into an object, it transforms along with whatever it is wearing and carrying into that form. The creature's statistics become those of the object, and the creature has no memory of time spent in this form, after the spell ends and it returns to its normal form.","higherEn":""},{"id":"true-resurrection","srd":true,"name":"Resurrezione Pura","nameEn":"True Resurrection","level":9,"school":"Necromanzia","castTime":"1 Ora","range":"Contatto","duration":"Istantanea","components":"V, S, M","material":"A sprinkle of holy water and diamonds worth at least 25,000gp, which the spell consumes.","concentration":false,"ritual":false,"attack":null,"damage":null,"dc":null,"classes":["Cleric","Druid"],"classesHb":["Chierico","Druido"],"effects":"","desc":"","descEn":"You touch a creature that has been dead for no longer than 200 years and that died for any reason except old age. If the creature's soul is free and willing, the creature is restored to life with all its hit points. This spell closes all wounds, neutralizes any poison, cures all diseases, and lifts any curses affecting the creature when it died. The spell replaces damaged or missing organs and limbs. The spell can even provide a new body if the original no longer exists, in which case you must speak the creature's name. The creature then appears in an unoccupied space you choose within 10 feet of you.","higherEn":""},{"id":"true-seeing","srd":true,"name":"Vista Pura","nameEn":"True Seeing","level":6,"school":"Divinazione","castTime":"1 Azione","range":"Contatto","duration":"1 ora","components":"V, S, M","material":"An ointment for the eyes that costs 25gp; is made from mushroom powder, saffron, and fat; and is consumed by the spell.","concentration":false,"ritual":false,"attack":null,"damage":null,"dc":null,"classes":["Bard","Cleric","Sorcerer","Warlock","Wizard"],"classesHb":["Bardo","Chierico","Invocatore","Mago","Stregone"],"effects":"","desc":"","descEn":"This spell gives the willing creature you touch the ability to see things as they actually are. For the duration, the creature has truesight, notices secret doors hidden by magic, and can see into the Ethereal Plane, all out to a range of 120 feet.","higherEn":""},{"id":"true-strike","srd":true,"name":"Colpo Sicuro","nameEn":"True Strike","level":0,"school":"Divinazione","castTime":"1 Azione","range":"9 m","duration":"Concentrazione, fino a 1 round","components":"S","material":null,"concentration":true,"ritual":false,"attack":null,"damage":null,"dc":null,"classes":["Bard","Sorcerer","Warlock","Wizard"],"classesHb":["Bardo","Invocatore","Mago","Stregone"],"effects":"Ottieni vantaggio al primo tiro per colpire contro il bersaglio nel tuo prossimo turno (ma usi l’Azione per lanciarlo).","desc":"Tendi la mano e punti un dito verso un bersaglio entro gittata. La tua magia ti concede una breve intuizione sulle sue difese: nel tuo prossimo turno hai vantaggio al primo tiro per colpire contro quel bersaglio, purché l'incantesimo non sia terminato.","descEn":"You extend your hand and point a finger at a target in range. Your magic grants you a brief insight into the target's defenses. On your next turn, you gain advantage on your first attack roll against the target, provided that this spell hasn't ended.","higherEn":"","userName":"Colpo Sicuro"},{"id":"unseen-servant","srd":true,"name":"Servo Invisibile","nameEn":"Unseen Servant","level":1,"school":"Evocazione","castTime":"1 Azione (Rituale)","range":"18 m","duration":"1 ora","components":"V, S, M","material":"A piece of string and a bit of wood.","concentration":false,"ritual":true,"attack":null,"damage":null,"dc":null,"classes":["Bard","Warlock","Wizard"],"classesHb":["Bardo","Invocatore","Mago"],"effects":"Evoca servo incorporeo, CA 10, 1 PF, che esegue compiti semplici.","desc":"","descEn":"This spell creates an invisible, mindless, shapeless force that performs simple tasks at your command until the spell ends. The servant springs into existence in an unoccupied space on the ground within range. It has AC 10, 1 hit point, and a Strength of 2, and it can't attack. If it drops to 0 hit points, the spell ends. Once on each of your turns as a bonus action, you can mentally command the servant to move up to 15 feet and interact with an object. The servant can perform simple tasks that a human servant could do, such as fetching things, cleaning, mending, folding clothes, lighting fires, serving food, and pouring wine. Once you give the command, the servant performs the task to the best of its ability until it completes the task, then waits for your next command. If you command the servant to perform a task that would move it more than 60 feet away from you, the spell ends.","higherEn":"","userName":"Servo Invisibile"},{"id":"vampiric-touch","srd":true,"name":"Tocco Vampirico","nameEn":"Vampiric Touch","level":3,"school":"Necromanzia","castTime":"1 Azione","range":"Personale","duration":"Concentrazione, fino a 1 minuto","components":"V, S","material":null,"concentration":true,"ritual":false,"attack":"melee","damage":{"type":"Necrotic","scale":"slot","table":{"3":"3d6","4":"4d6","5":"5d6","6":"6d6","7":"7d6","8":"8d6","9":"9d6"}},"dc":null,"classes":["Warlock","Wizard"],"classesHb":["Invocatore","Mago"],"effects":"","desc":"","descEn":"The touch of your shadow-wreathed hand can siphon life force from others to heal your wounds. Make a melee spell attack against a creature within your reach. On a hit, the target takes 3d6 necrotic damage, and you regain hit points equal to half the amount of necrotic damage dealt. Until the spell ends, you can make the attack again on each of your turns as an action.","higherEn":"When you cast this spell using a spell slot of 4th level or higher, the damage increases by 1d6 for each slot level above 3rd."},{"id":"vicious-mockery","srd":true,"name":"Beffa Crudele","nameEn":"Vicious Mockery","level":0,"school":"Ammaliamento","castTime":"1 Azione","range":"18 m","duration":"Istantanea","components":"V","material":null,"concentration":false,"ritual":false,"attack":null,"damage":{"type":"Psychic","scale":"char","table":{"1":"1d4","5":"2d4","11":"3d4","17":"4d4"}},"dc":{"ability":"Saggezza","success":"none"},"classes":["Bard"],"classesHb":["Bardo"],"effects":"Con un insulto pungente infliggi 1d4 danni psichici (TS Sag; fallito) e il bersaglio ha svantaggio al prossimo attacco. Il danno sale a 2d4 (5° liv), 3d4 (11°), 4d4 (17°).","desc":"Scateni una sequela di insulti intrisi di sottili incantesimi contro una creatura visibile entro gittata. Se può sentirti (anche senza capirti), deve superare un tiro salvezza su Saggezza o subire 1d4 danni psichici e avere svantaggio al prossimo tiro per colpire che effettua prima della fine del suo prossimo turno. I danni aumentano di 1d4 al 5° livello (2d4), all'11° (3d4) e al 17° (4d4).","descEn":"You unleash a string of insults laced with subtle enchantments at a creature you can see within range. If the target can hear you (though it need not understand you), it must succeed on a wisdom saving throw or take 1d4 psychic damage and have disadvantage on the next attack roll it makes before the end of its next turn. This spell's damage increases by 1d4 when you reach 5th level (2d4), 11th level (3d4), and 17th level (4d4).","higherEn":"","userName":"Scherno Crudele"},{"id":"wall-of-fire","srd":true,"name":"Muro di Fuoco","nameEn":"Wall of Fire","level":4,"school":"Invocazione","castTime":"1 Azione","range":"36 m","duration":"Concentrazione, fino a 1 minuto","components":"V, S, M","material":"A small piece of phosphorus.","concentration":true,"ritual":false,"attack":null,"damage":{"type":"Fire","scale":"slot","table":{"4":"5d8"}},"dc":{"ability":"Destrezza","success":"half"},"classes":["Druid","Sorcerer","Wizard"],"classesHb":["Druido","Mago","Stregone"],"effects":"","desc":"","descEn":"You create a wall of fire on a solid surface within range. You can make the wall up to 60 feet long, 20 feet high, and 1 foot thick, or a ringed wall up to 20 feet in diameter, 20 feet high, and 1 foot thick. The wall is opaque and lasts for the duration. When the wall appears, each creature within its area must make a Dexterity saving throw. On a failed save, a creature takes 5d8 fire damage, or half as much damage on a successful save. One side of the wall, selected by you when you cast this spell, deals 5d8 fire damage to each creature that ends its turn within 10 feet o f that side or inside the wall. A creature takes the same damage when it enters the wall for the first time on a turn or ends its turn there. The other side of the wall deals no damage. The other side of the wall deals no damage.","higherEn":"When you cast this spell using a spell slot of 5th level or higher, the damage increases by 1d8 for each slot level above 4th."},{"id":"wall-of-force","srd":true,"name":"Muro di Forza","nameEn":"Wall of Force","level":5,"school":"Invocazione","castTime":"1 Azione","range":"36 m","duration":"Concentrazione, fino a 10 minuti","components":"V, S, M","material":"A pinch of powder made by crushing a clear gemstone.","concentration":true,"ritual":false,"attack":null,"damage":null,"dc":null,"classes":["Wizard"],"classesHb":["Mago"],"effects":"","desc":"","descEn":"An invisible wall of force springs into existence at a point you choose within range. The wall appears in any orientation you choose, as a horizontal or vertical barrier or at an angle. It can be free floating or resting on a solid surface. You can form it into a hemispherical dome or a sphere with a radius of up to 10 feet, or you can shape a flat surface made up of ten 10-foot-by-10-foot panels. Each panel must be contiguous with another panel. In any form, the wall is 1/4 inch thick. It lasts for the duration. If the wall cuts through a creature's space when it appears, the creature is pushed to one side of the wall (your choice which side). Nothing can physically pass through the wall. It is immune to all damage and can't be dispelled by dispel magic. A disintegrate spell destroys the wall instantly, however. The wall also extends into the Ethereal Plane, blocking ethereal travel through the wall.","higherEn":""},{"id":"wall-of-ice","srd":true,"name":"Muro di Ghiaccio","nameEn":"Wall of Ice","level":6,"school":"Invocazione","castTime":"1 Azione","range":"36 m","duration":"Concentrazione, fino a 10 minuti","components":"V, S, M","material":"A small piece of quartz.","concentration":true,"ritual":false,"attack":null,"damage":{"type":"Cold","scale":"slot","table":{"6":"10d6","7":"12d6","8":"14d6","9":"16d6"}},"dc":{"ability":"Destrezza","success":"half"},"classes":["Wizard"],"classesHb":["Mago"],"effects":"","desc":"","descEn":"You create a wall of ice on a solid surface within range. You can form it into a hemispherical dome or a sphere with a radius of up to 10 feet, or you can shape a flat surface made up of ten 10-foot-square panels. Each panel must be contiguous with another panel. In any form, the wall is 1 foot thick and lasts for the duration. If the wall cuts through a creature's space when it appears, the creature within its area is pushed to one side of the wall and must make a dexterity saving throw. On a failed save, the creature takes 10d6 cold damage, or half as much damage on a successful save. The wall is an object that can be damaged and thus breached. It has AC 12 and 30 hit points per 10-foot section, and it is vulnerable to fire damage. Reducing a 10-foot section of wall to 0 hit points destroys it and leaves behind a sheet of frigid air in the space the wall occupied. A creature moving through the sheet of frigid air for the first time on a turn must make a constitution saving throw. That creature takes 5d6 cold damage on a failed save, or half as much damage on a successful one.","higherEn":"When you cast this spell using a spell slot of 7th level or higher, the damage the wall deals when it appears increases by 2d6, and the damage from passing through the sheet of frigid air increases by 1d6, for each slot level above 6th."},{"id":"wall-of-stone","srd":true,"name":"Muro di Pietra","nameEn":"Wall of Stone","level":5,"school":"Invocazione","castTime":"1 Azione","range":"36 m","duration":"Concentrazione, fino a 10 minuti","components":"V, S, M","material":"A small block of granite.","concentration":true,"ritual":false,"attack":null,"damage":null,"dc":null,"classes":["Druid","Sorcerer","Wizard"],"classesHb":["Druido","Mago","Stregone"],"effects":"","desc":"","descEn":"A nonmagical wall of solid stone springs into existence at a point you choose within range. The wall is 6 inches thick and is composed of ten 10-foot-by-10-foot panels. Each panel must be contiguous with at least one other panel. Alternatively, you can create 10-foot-by-20-foot panels that are only 3 inches thick. If the wall cuts through a creature's space when it appears, the creature is pushed to one side of the wall (your choice). If a creature would be surrounded on all sides by the wall (or the wall and another solid surface), that creature can make a dexterity saving throw. On a success, it can use its reaction to move up to its speed so that it is no longer enclosed by the wall. The wall can have any shape you desire, though it can't occupy the same space as a creature or object. The wall doesn't need to be vertical or rest on any firm foundation. It must, however, merge with and be solidly supported by existing stone. Thus, you can use this spell to bridge a chasm or create a ramp. If you create a span greater than 20 feet in length, you must halve the size of each panel to create supports. You can crudely shape the wall to create crenellations, battlements, and so on. The wall is an object made of stone that can be damaged and thus breached. Each panel has AC 15 and 30 hit points per inch of thickness. Reducing a panel to 0 hit points destroys it and might cause connected panels to collapse at the GM's discretion. If you maintain your concentration on this spell for its whole duration, the wall becomes permanent and can't be dispelled. Otherwise, the wall disappears when the spell ends.","higherEn":""},{"id":"wall-of-thorns","srd":true,"name":"Muro di Spine","nameEn":"Wall of Thorns","level":6,"school":"Evocazione","castTime":"1 Azione","range":"36 m","duration":"Concentrazione, fino a 10 minuti","components":"V, S, M","material":"A handful of thorns.","concentration":true,"ritual":false,"attack":null,"damage":{"type":"Piercing","scale":"slot","table":{"6":"7d8","7":"8d8","8":"9d8","9":"10d8"}},"dc":{"ability":"Destrezza","success":"half"},"classes":["Druid"],"classesHb":["Druido"],"effects":"","desc":"","descEn":"You create a wall of tough, pliable, tangled brush bristling with needle-sharp thorns. The wall appears within range on a solid surface and lasts for the duration. You choose to make the wall up to 60 feet long, 10 feet high, and 5 feet thick or a circle that has a 20-foot diameter and is up to 20 feet high and 5 feet thick. The wall blocks line of sight. When the wall appears, each creature within its area must make a dexterity saving throw. On a failed save, a creature takes 7d8 piercing damage, or half as much damage on a successful save. A creature can move through the wall, albeit slowly and painfully. For every 1 foot a creature moves through the wall, it must spend 4 feet of movement. Furthermore, the first time a creature enters the wall on a turn or ends its turn there, the creature must make a dexterity saving throw. It takes 7d8 slashing damage on a failed save, or half as much damage on a successful one.","higherEn":"When you cast this spell using a spell slot of 7th level or higher, both types of damage increase by 1d8 for each slot level above 6th."},{"id":"warding-bond","srd":true,"name":"Legame Protettivo","nameEn":"Warding Bond","level":2,"school":"Abiurazione","castTime":"1 Azione","range":"Contatto","duration":"1 ora","components":"V, S, M","material":"A pair of platinum rings worth at least 50gp each, which you and the target must wear for the duration.","concentration":false,"ritual":false,"attack":null,"damage":null,"dc":null,"classes":["Cleric"],"classesHb":["Chierico"],"effects":"","desc":"","descEn":"This spell wards a willing creature you touch and creates a mystic connection between you and the target until the spell ends. While the target is within 60 feet of you, it gains a +1 bonus to AC and saving throws, and it has resistance to all damage. Also, each time it takes damage, you take the same amount of damage. The spell ends if you drop to 0 hit points or if you and the target become separated by more than 60 feet. It also ends if the spell is cast again on either of the connected creatures. You can also dismiss the spell as an action.","higherEn":""},{"id":"water-breathing","srd":true,"name":"Respirare sott'Acqua","nameEn":"Water Breathing","level":3,"school":"Trasmutazione","castTime":"1 Azione (Rituale)","range":"9 m","duration":"24 ore","components":"V, S, M","material":"A short piece of reed or straw.","concentration":false,"ritual":true,"attack":null,"damage":null,"dc":null,"classes":["Druid","Ranger","Sorcerer","Wizard"],"classesHb":["Druido","Mago","Ranger","Stregone"],"effects":"","desc":"","descEn":"This spell gives a maximum of ten willing creatures within range and you can see, the ability to breathe underwater until the end of its term. Affected creatures also retain their normal breathing pattern.","higherEn":""},{"id":"water-walk","srd":true,"name":"Camminare sull'Acqua","nameEn":"Water Walk","level":3,"school":"Trasmutazione","castTime":"1 Azione (Rituale)","range":"9 m","duration":"1 ora","components":"V, S, M","material":"A piece of cork.","concentration":false,"ritual":true,"attack":null,"damage":null,"dc":null,"classes":["Cleric","Druid","Ranger","Sorcerer"],"classesHb":["Chierico","Druido","Ranger","Stregone"],"effects":"Permette di camminare sull'acqua o superfici liquide.","desc":"","descEn":"This spell grants the ability to move across any liquid surface--such as water, acid, mud, snow, quicksand, or lava--as if it were harmless solid ground (creatures crossing molten lava can still take damage from the heat). Up to ten willing creatures you can see within range gain this ability for the duration. If you target a creature submerged in a liquid, the spell carries the target to the surface of the liquid at a rate of 60 feet per round.","higherEn":"","userName":"Camminare sull'Acqua"},{"id":"web","srd":true,"name":"Ragnatela","nameEn":"Web","level":2,"school":"Evocazione","castTime":"1 Azione","range":"18 m","duration":"Concentrazione, fino a 1 ora","components":"V, S, M","material":"A bit of spiderweb.","concentration":true,"ritual":false,"attack":null,"damage":null,"dc":null,"classes":["Sorcerer","Wizard"],"classesHb":["Mago","Stregone"],"effects":"Crea telai appiccicosi: intrappola (TS Des) e rende terreno difficile; nessun danno diretto.","desc":"","descEn":"You conjure a mass of thick, sticky webbing at a point of your choice within range. The webs fill a 20-foot cube from that point for the duration. The webs are difficult terrain and lightly obscure their area. If the webs aren't anchored between two solid masses (such as walls or trees) or layered across a floor, wall, or ceiling, the conjured web collapses on itself, and the spell ends at the start of your next turn. Webs layered over a flat surface have a depth of 5 feet. Each creature that starts its turn in the webs or that enters them during its turn must make a dexterity saving throw. On a failed save, the creature is restrained as long as it remains in the webs or until it breaks free. A creature restrained by the webs can use its action to make a Strength check against your spell save DC. If it succeeds, it is no longer restrained. The webs are flammable. Any 5-foot cube of webs exposed to fire burns away in 1 round, dealing 2d4 fire damage to any creature that starts its turn in the fire.","higherEn":"","userName":"Ragnatela"},{"id":"weird","srd":true,"name":"Spettro","nameEn":"Weird","level":9,"school":"Illusione","castTime":"1 Azione","range":"36 m","duration":"Concentrazione, fino a 1 minuto","components":"V, S","material":null,"concentration":true,"ritual":false,"attack":null,"damage":null,"dc":{"ability":"Saggezza","success":"none"},"classes":["Wizard"],"classesHb":["Mago"],"effects":"","desc":"","descEn":"Drawing on the deepest fears of a group of creatures, you create illusory creatures in their minds, visible only to them. Each creature in a 30-foot-radius sphere centered on a point of your choice within range must make a wisdom saving throw. On a failed save, a creature becomes frightened for the duration. The illusion calls on the creature's deepest fears, manifesting its worst nightmares as an implacable threat. At the start of each of the frightened creature's turns, it must succeed on a wisdom saving throw or take 4d10 psychic damage. On a successful save, the spell ends for that creature.","higherEn":""},{"id":"wind-walk","srd":true,"name":"Camminata del Vento","nameEn":"Wind Walk","level":6,"school":"Trasmutazione","castTime":"1 Minuto","range":"9 m","duration":"8 ore","components":"V, S, M","material":"Fire and holy water.","concentration":false,"ritual":false,"attack":null,"damage":null,"dc":null,"classes":["Druid"],"classesHb":["Druido"],"effects":"","desc":"","descEn":"You and up to ten willing creatures you can see within range assume a gaseous form for the duration, appearing as wisps of cloud. While in this cloud form, a creature has a flying speed of 300 feet and has resistance to damage from nonmagical weapons. The only actions a creature can take in this form are the Dash action or to revert to its normal form. Reverting takes 1 minute, during which time a creature is incapacitated and can't move. Until the spell ends, a creature can revert to cloud form, which also requires the 1-minute transformation. If a creature is in cloud form and flying when the effect ends, the creature descends 60 feet per round for 1 minute until it lands, which it does safely. If it can't land after 1 minute, the creature falls the remaining distance.","higherEn":""},{"id":"wind-wall","srd":true,"name":"Muro di Vento","nameEn":"Wind Wall","level":3,"school":"Invocazione","castTime":"1 Azione","range":"36 m","duration":"Concentrazione, fino a 1 minuto","components":"V, S, M","material":"A tiny fan and a feather of exotic origin.","concentration":true,"ritual":false,"attack":null,"damage":{"type":"Bludgeoning","scale":"slot","table":{"3":"3d8"}},"dc":{"ability":"Forza","success":"half"},"classes":["Druid","Ranger"],"classesHb":["Druido","Ranger"],"effects":"","desc":"","descEn":"A wall of strong wind rises from the ground at a point you choose within range. You can make the wall up to 50 feet long, 15 feet high, and 1 foot thick. You can shape the wall in any way you choose so long as it makes one continuous path along the ground. The wall lasts for the duration. When the wall appears, each creature within its area must make a strength saving throw. A creature takes 3d8 bludgeoning damage on a failed save, or half as much damage on a successful one. The strong wind keeps fog, smoke, and other gases at bay. Small or smaller flying creatures or objects can't pass through the wall. Loose, lightweight materials brought into the wall fly upward. Arrows, bolts, and other ordinary projectiles launched at targets behind the wall are deflected upward and automatically miss. (Boulders hurled by giants or siege engines, and similar projectiles, are unaffected.) Creatures in gaseous form can't pass through it.","higherEn":""},{"id":"wish","srd":true,"name":"Desiderio","nameEn":"Wish","level":9,"school":"Evocazione","castTime":"1 Azione","range":"Personale","duration":"Istantanea","components":"V","material":null,"concentration":false,"ritual":false,"attack":null,"damage":null,"dc":null,"classes":["Sorcerer","Wizard"],"classesHb":["Mago","Stregone"],"effects":"","desc":"","descEn":"Wish is the mightiest spell a mortal creature can cast. By simply speaking aloud, you can alter the very foundations of reality in accord with your desires. The basic use of this spell is to duplicate any other spell of 8th level or lower. You don't need to meet any requirements in that spell, including costly components. The spell simply takes effect. Alternatively, you can create one of the following effects of your choice: - You create one object of up to 25,000 gp in value that isn't a magic item. The object can be no more than 300 feet in any dimension, and it appears in an unoccupied space you can see on the ground. - You allow up to twenty creatures that you can see to regain all hit points, and you end all effects on them described in the greater restoration spell. - You grant up to ten creatures that you can see resistance to a damage type you choose. - You grant up to ten creatures you can see immunity to a single spell or other magical effect for 8 hours. For instance, you could make yourself and all your companions immune to a lich's life drain attack. - You undo a single recent event by forcing a reroll of any roll made within the last round (including your last turn). Reality reshapes itself to accommodate the new result. For example, a wish spell could undo an opponent's successful save, a foe's critical hit, or a friend's failed save. You can force the reroll to be made with advantage or disadvantage, and you can choose whether to use the reroll or the original roll. You might be able to achieve something beyond the scope of the above examples. State your wish to the GM as precisely as possible. The GM has great latitude in ruling what occurs in such an instance; the greater the wish, the greater the likelihood that something goes wrong. This spell might simply fail, the effect you desire might only be partly achieved, or you might suffer some unforeseen consequence as a result of how you worded the wish. For example, wishing that a villain were dead might propel you forward in time to a period when that villain is no longer alive, effectively removing you from the game. Similarly, wishing for a legendary magic item or artifact might instantly transport you to the presence of the item's current owner. The stress of casting this spell to produce any effect other than duplicating another spell weakens you. After enduring that stress, each time you cast a spell until you finish a long rest, you take 1d10 necrotic damage per level of that spell. This damage can't be reduced or prevented in any way. In addition, your Strength drops to 3, if it isn't 3 or lower already, for 2d4 days. For each of those days that you spend resting and doing nothing more than light activity, your remaining recovery time decreases by 2 days. Finally, there is a 33 percent chance that you are unable to cast wish ever again if you suffer this stress.","higherEn":""},{"id":"word-of-recall","srd":true,"name":"Parola del Richiamo","nameEn":"Word of Recall","level":6,"school":"Evocazione","castTime":"1 Azione","range":"1.5 m","duration":"Istantanea","components":"V","material":null,"concentration":false,"ritual":false,"attack":null,"damage":null,"dc":null,"classes":["Cleric"],"classesHb":["Chierico"],"effects":"","desc":"","descEn":"You and up to five willing creatures within 5 feet of you instantly teleport to a previously designated sanctuary. You and any creatures that teleport with you appear in the nearest unoccupied space to the spot you designated when you prepared your sanctuary (see below). If you cast this spell without first preparing a sanctuary, the spell has no effect. You must designate a sanctuary by casting this spell within a location, such as a temple, dedicated to or strongly linked to your deity. If you attempt to cast the spell in this manner in an area that isn't dedicated to your deity, the spell has no effect.","higherEn":""},{"id":"zone-of-truth","srd":true,"name":"Zona di Verità","nameEn":"Zone of Truth","level":2,"school":"Ammaliamento","castTime":"1 Azione","range":"18 m","duration":"10 minuti","components":"V, S","material":null,"concentration":false,"ritual":false,"attack":null,"damage":null,"dc":null,"classes":["Bard","Cleric","Paladin"],"classesHb":["Bardo","Chierico","Paladino"],"effects":"Creatura nella zona non può mentire se fallisce tiro salvezza Carisma.","desc":"","descEn":"You create a magical zone that guards against deception in a 15-foot-radius sphere centered on a point of your choice within range. Until the spell ends, a creature that enters the spell's area for the first time on a turn or starts its turn there must make a Charisma saving throw. On a failed save, a creature can't speak a deliberate lie while in the radius. You know whether each creature succeeds or fails on its saving throw. An affected creature is aware of the spell and can thus avoid answering questions to which it would normally respond with a lie. Such a creature can remain evasive in its answers as long as it remains within the boundaries of the truth.","higherEn":"","userName":"Zona di Verità"},{"id":"HB::cerimonia","srd":false,"name":"Cerimonia","nameEn":"Ceremony","level":1,"school":"Evocazione","castTime":"1 Azione (Rituale)","range":"Contatto","duration":"Istantanea","components":"V, S, M","concentration":false,"ritual":true,"effects":"Consente diversi riti sacri (es. benedizione di unione, consacrazione di un cadavere, ecc.), ognuno con effetti specifici.","desc":"","descEn":"","damage":null,"dc":null,"classes":[],"classesHb":["Chierico","Paladino"]},{"id":"HB::duello obbligato","srd":false,"name":"Duello Obbligato","nameEn":"","level":1,"school":"Ammaliamento","castTime":"1 Azione Bonus","range":"9 metri","duration":"Concentrazione, fino a 1 minuto","components":"V","concentration":true,"ritual":false,"effects":"Sfidi una creatura spingendola a combattere solo con te. Se fallisce il TS su Saggezza, ha penalità se attacca altri bersagli ed è costretta ad avvicinarsi a te.","desc":"","descEn":"","damage":null,"dc":null,"classes":[],"classesHb":["Paladino"]},{"id":"HB::colpo bruciante","srd":false,"name":"Colpo Bruciante","nameEn":"Searing Smite","level":1,"school":"Evocazione","castTime":"1 Azione Bonus","range":"Personale","duration":"Concentrazione, fino a 1 minuto","components":"V","concentration":true,"ritual":false,"effects":"Al tuo prossimo colpo in mischia infligge +1d6 danni da fuoco; il bersaglio prende fuoco (TS Cos all’inizio di ogni turno o subisce nuovi danni da fuoco).","desc":"","descEn":"","damage":null,"dc":null,"classes":[],"classesHb":["Paladino"]},{"id":"HB::colpo tonante","srd":false,"name":"Colpo Tonante","nameEn":"Thunderous Smite","level":1,"school":"Evocazione","castTime":"1 Azione Bonus","range":"Personale","duration":"Concentrazione, fino a 1 minuto","components":"V","concentration":true,"ritual":false,"effects":"Al prossimo attacco in mischia infliggi +2d6 danni da tuono. Se il bersaglio fallisce TS Forza, viene spinto di 3 m e cade prono.","desc":"","descEn":"","damage":null,"dc":null,"classes":[],"classesHb":["Paladino"]},{"id":"HB::colpo del rancore","srd":false,"name":"Colpo del Rancore","nameEn":"Wrathful Smite","level":1,"school":"Evocazione","castTime":"1 Azione Bonus","range":"Personale","duration":"Concentrazione, fino a 1 minuto","components":"V","concentration":true,"ritual":false,"effects":"Al primo colpo in mischia dopo il lancio infliggi +1d6 danni psichici; il bersaglio fa TS Saggezza o resta spaventato (può ritentare come azione).","desc":"","descEn":"","damage":null,"dc":null,"classes":[],"classesHb":["Paladino"]},{"id":"HB::lama difensiva","srd":false,"name":"Lama Difensiva","nameEn":"","level":0,"school":"Abiurazione","castTime":"1 azione","range":"Sé stesso","duration":"1 round","components":"V, S","concentration":false,"ritual":false,"effects":"Conferisce resistenza ai danni da armi fino al tuo prossimo turno.","desc":"","descEn":"","damage":null,"dc":null,"classes":[],"classesHb":["Mago"]},{"id":"HB::lama tonante","srd":false,"name":"Lama Tonante","nameEn":"","level":0,"school":"Evocazione","castTime":"1 azione","range":"Sé (raggio 1,5 m)","duration":"1 round","components":"S, M","concentration":false,"ritual":false,"effects":"Attacco in mischia che infligge 1d8 danni da tuono se il bersaglio si muove successivamente.","desc":"","descEn":"","damage":null,"dc":null,"classes":[],"classesHb":["Mago"]},{"id":"HB::controllare fiamme","srd":false,"name":"Controllare Fiamme","nameEn":"","level":0,"school":"Trasmutazione","castTime":"1 azione","range":"18 metri","duration":"Istantanea o 1 ora","components":"S","concentration":false,"ritual":false,"effects":"Controlla o modifica una fiamma non magica entro la portata.","desc":"","descEn":"","damage":null,"dc":null,"classes":[],"classesHb":[" const SPELLS_DB = (function(){ try { return JSON.parse(document.getElementById("spells-db").textContent); } catch(e){ if(typeof bugPush!=="undefined") bugPush({kind:"DB",msg:"SPELLS_DB parse fallito: "+e.message}); return []; } })();
// Indice per dbId: il repertorio del PG salva solo dbId, i dati di combattimento (danni/attacco/CD) stanno qui.
const SPELLS_BY_ID = (function(){ const m={}; SPELLS_DB.forEach(function(d){ if(d&&d.id) m[d.id]=d; }); return m; })();
// Indice per nome (it/en/userName): fallback quando il repertorio non ha dbId (schede vecchie o voci a mano).
const SPELLS_BY_NAME = (function(){
  const m={}; const put=function(k,d){ if(k){ const kk=String(k).toLowerCase().trim(); if(kk && !m[kk]) m[kk]=d; } };
  SPELLS_DB.forEach(function(d){ if(d){ put(d.name,d); put(d.nameEn,d); put(d.userName,d); } });
  return m;
})();
// Recupera i dati DB di un incantesimo del repertorio: prima per dbId, poi per nome.
function resolveSpellDb(sp){
  if(!sp) return null;
  if(sp.dbId && SPELLS_BY_ID[sp.dbId]) return SPELLS_BY_ID[sp.dbId];
  if(sp.name){ const d=SPELLS_BY_NAME[String(sp.name).toLowerCase().trim()]; if(d) return d; }
  return null;
}
// Trasforma un'espressione danno ("8d6", "10d6 + 40", "4d6 + 4d6", "20") nei gruppi per onRollDamage.
function parseDmgExpr(expr, type){
  const toks = String(expr==null?"":expr).split("+").map(function(s){ return s.trim(); });
  const groups = []; let flat = 0;
  toks.forEach(function(tok){
    if (/^\d+d\d+$/.test(tok)) groups.push({ dice:tok, type:type||"", flat:0 });
    else { const n = parseInt(tok,10); if (!isNaN(n)) flat += n; }
  });
  if (groups.length){ groups[0].flat += flat; return groups; }
  if (flat) return [{ dice:String(flat), type:type||"", flat:0 }];
  return [];
}
// Espressione danno di un incantesimo a un dato livello di lancio (slot) o livello PG (cantrip "char").
function spellDiceAt(dmg, castLevel, charLevel){
  if (!dmg || !dmg.table) return null;
  const t = dmg.table;
  const keys = Object.keys(t).map(Number).sort(function(a,b){ return a-b; });
  if (!keys.length) return null;
  const ref = dmg.scale === "char" ? charLevel : castLevel;
  let pick = keys[0];
  keys.forEach(function(k){ if (k <= ref) pick = k; });
  return t[String(pick)];
}

const resolveAttr = (sd, meleeA, magicA) => {

};

// PM e Soglia del personaggio: PM = somma per classe; Soglia = max tra le classi.
function pmSoglia(classes) {
  let pm = 0, soglia = 0; const per = [];
  (classes || []).forEach(function(c) {
    if (!c || !c.name || !c.level) return;
    const prog = CLASS_PROG[c.name];
    if (!prog || prog === "none") { per.push({name:c.name, level:c.level, pm:0, soglia:0, prog:"none"}); return; }
    const lvl = Math.min(20, Math.max(1, c.level));
    const row = PM_PROG[prog][lvl - 1]; // [pm, soglia]
    pm += row[0]; if (row[1] > soglia) soglia = row[1];
    per.push({name:c.name, level:c.level, pm:row[0], soglia:row[1], prog:prog, recovery: prog==="warlock" ? "breve" : "lungo"});
  });
  return { pm:pm, soglia:soglia, per:per };
}
// CD del sovra-lancio (rev14): base 10 + due termini situazionali che si sommano.
//   Base 10 — presente appena scatta un sovra-lancio (sopra soglia OPPURE a secco), una volta sola.
//   Sforamento (solo se L > soglia):        (L − soglia) × L
//   A secco di PM (solo se overPM):          2 × L
// La base 10 fa già da pavimento (niente sfori "gratis"); lo sforamento (L−soglia)×L da' la curva ripida.
// Se NON sopra soglia e NON a secco → CD 0: lancio normale entro soglia con PM, nessun tiro.
// Il tiro è 1d20 + mod. scuola (pulito) contro questa CD: il sovraccarico vive nella CD, non nel dado.
function overcastCD(level, soglia, overPM) {
  const over = level > soglia;
  if (!over && !overPM) return 0;                          // lancio normale: nessun tiro
  let cd = 10;                                             // base: scatta a ogni sovra-lancio
  if (over)   cd += (level - soglia) * level;              // sforamento
  if (overPM) cd += 2 * level;                             // a secco di PM
  return cd;
}
// Danni del pedaggio (rev15): x6 sia riuscito sia fallito / x12 su 1 naturale.
// Il tiro decide solo se l'incantesimo parte (cilecca su fallimento), non quanto paghi: lo sforzo c'è stato comunque.
function overcastDamage(level, outcome) { // outcome: 'ok' | 'fail' | 'nat1'
  const mult = outcome === "nat1" ? 12 : 6;
  return level * mult;
}

function computeAll(skills, statMods, meleeA, magicA) {
  const pass1 = skills.map((sk, i) => {
    const sd = SD[i];
    if (!sd) return { ...sk, idx:i, bl:0, parz:-3, rank:0, attr:"Forza", cat:"?", sub:"", aff:"sep", name:"?" };
    const rank = sk.rank || 0;
    const attr = sk.ao || resolveAttr(sd, meleeA, magicA);
    const bl2 = bonusLvl(rank);
    const zeroPen = (sd.z || sd.f === "self") ? 0 : (rank === 0 ? -3 : 0);
    const parz = bl2 + zeroPen;
    return { ...sk, idx:i, bl:bl2, parz, rank, attr, cat:sd.c, sub:sd.s||"", aff:sd.f, name:sk.cn||sd.n };
  });
  return pass1.map(sk => {
    let maxAff;
    if (sk.aff === "sep" || sk.aff === "self") {
      maxAff = sk.parz;
    } else {
      const grp = pass1.filter(s => s.cat === sk.cat && s.sub === sk.sub && s.idx !== sk.idx);
      const maxR = Math.max(0, ...grp.map(s => s.rank));
      maxAff = maxR > 0 ? Math.floor(Math.max(0, ...grp.map(s => s.parz)) / 2) - 1 : -3;
    }
    const sm2 = statMods[sk.attr] || 0;
    const tot = Math.max(sk.parz, maxAff) + sm2 + (sk.bs || 0) + (sk.ms || 0);
    return { ...sk, maxAff, sm2, tot };
  });
}

function calcCost(base, from, adds, isLv1) {
  let c = 0;
  const to = from + adds;
  c += base * Math.max(0, Math.min(8, to) - Math.max(from, 0));
  c += base * 2 * Math.max(0, Math.min(16, to) - Math.max(from, 8));
  c += base * 3 * Math.max(0, Math.min(23, to) - Math.max(from, 16));
  c += base * 4 * Math.max(0, Math.min(24, to) - Math.max(from, 23));
  if (adds > 0 && from === 0 && !isLv1) c += base;
  return c;
}

// Restituisce il costo base di una skill per una data classe.
// Se la skill ha un costOverride valido (intero >= 1) lo usa al posto del costo classe.
// Serve per: regola "regno ostile" (-1 min 1), Bardo Sapienza/Valore, Campione,
// Slippery Mind, Diamond Soul, sconto razziale armi, e in generale qualsiasi
// modifica permanente al costo decisa dal Master.
function getSkillCost(sk, sd, cls) {
  if (sk && Number.isInteger(sk.costOverride) && sk.costOverride >= 1) return sk.costOverride;
  return sd && sd.k ? (sd.k[cls] || 2) : 2;
}

function calcVel(base, height, modDes, modFor) {
  const f = base * 2/3;
  const hf = (height - 60) / 100;
  return Math.round((f + base*hf*((modDes+5)/5)*0.22 + base*hf*((modFor+5)/5)*0.12) * 2) / 2;
}

function pointBuyCost(statVal) {
  if (statVal <= 8) return 0;
  if (statVal <= 13) return statVal - 8;
  return (statVal - 13) * 2 + 5; // 14=7, 15=9
}

function calcDexCap(eq, skills) {
  const arm = (eq && eq.armor) || {};
  if (arm.heavy && arm.heavy.equipped) return bonusLvl(((skills[9]||{}).rank)||0) - 5;
  if (arm.medium && arm.medium.equipped) return bonusLvl(((skills[8]||{}).rank)||0) - 3;
  if (arm.light && arm.light.equipped) return bonusLvl(((skills[7]||{}).rank)||0) + 2;
  return 999;
}
function shieldDexPen(eq) {
  const sh = (eq && eq.shield) || {};
  return (sh.large && sh.large.equipped) ? -2 : 0;
}
function calcCA(eq, dexMod) {
  const arm = (eq && eq.armor) || {};
  const sh = (eq && eq.shield) || {};
  let ca = 10 + dexMod;
  ["light","medium","heavy"].forEach(k => { if (arm[k] && arm[k].equipped) ca += (arm[k].caBase||0) + (arm[k].bonusSpec||0); });
  ["small","medium","large"].forEach(k => { if (sh[k] && sh[k].equipped) ca += (sh[k].caBonus||0) + (sh[k].bonusSpec||0); });
  return ca;
}

function rarityFromScore(s){ if(s<=0)return "comune"; if(s===1)return "nonComune"; if(s===2)return "raro"; if(s<=4)return "moltoRaro"; return "leggendario"; }
function calcWeaponScore(sp){
  if(!sp)return 0;
  let s=(sp.enhancement||0);
  (sp.extraDamage||[]).forEach(function(ed){
    const n=parseInt((ed.dice||"1d6").split("d")[0],10)||1;
    let w=n>=2?2:1;
    if(ed.condition==="onCrit"||ed.condition==="onNat20"||ed.condition==="vsType")w=Math.max(1,w-1);
    s+=w;
  });
  (sp.onHit||[]).forEach(function(){s+=1;});
  if(sp.critRangeBonus)s+=1;
  if(sp.extraCritDice)s+=1;
  if(sp.grantsResistance)s+=1;
  if(sp.sentient&&sp.sentient.enabled)s+=1;
  if(sp.curse&&sp.curse.enabled)s-=1;
  return s;
}
// Danno effettivo dell'arma speciale (dado sovrascritto se presente)
function specialDmg(baseDef, sp){
  if(sp&&sp.dmgOverride)return sp.dmgOverride;
  return baseDef?baseDef.dmg:"—";
}
// Codice parlante: ARMA1§{json}
function encodeWeaponCode(we){
  const payload={base:we.id,sp:we.special||null,qty:we.qty||1};
  if(we.name)payload.name=we.name;
  try{ return ARMA_CODE_PREFIX+JSON.stringify(payload); }catch(e){ return ""; }
}
function decodeWeaponCode(txt){
  if(!txt)return null;
  let s=txt.trim();
  const i=s.indexOf(ARMA_CODE_PREFIX);
  if(i>=0)s=s.slice(i+ARMA_CODE_PREFIX.length);
  try{
    const p=JSON.parse(s);
    if(!p||!p.base)return null;
    if(!WEAPONS_DB.find(function(d){return d.id===p.base;}))return null;
    const out={id:p.base, qty:p.qty||1, equipped:false, special:p.sp||null};
    if(p.name)out.name=p.name;
    // retrocompat: vecchi codici col nome solo dentro special
    if(!out.name && p.sp && p.sp.name)out.name=p.sp.name;
    return out;
  }catch(e){ return null; }
}

function equipWeight(eq) {
  const items = (eq && eq.items) || [];
  const coins = (eq && eq.coins) || {};
  const weapons = (eq && eq.weapons) || [];
  let w = items.reduce((s,it) => s + (Number(it.weight)||0), 0);
  w += Object.values(coins).reduce((s,v) => s + (Number(v)||0), 0) * COIN_W;
  w += weapons.reduce(function(s,we){
    const def = WEAPONS_DB.find(function(d){ return d.id === we.id; });
    return s + (def ? (Number(def.weight)||0) * (Number(we.qty)||1) : 0);
  }, 0);
  return Math.round(w * 100) / 100;
}

function calcHP(classes, cosMod, hpBonus) {
  let hp = 0, totalLvl = 0;
  classes.forEach(function(cls, ci) {
    const hd = HD[cls.name] || 8;
    for (let l = 1; l <= (cls.level || 0); l++) {
      totalLvl++;
      const fixB = (totalLvl % 2 === 1) ? 1 : 2;
      if (ci === 0 && l === 1) {
        hp += hd + Math.floor(hd / 2) + fixB + cosMod * 2;
      } else {
        hp += Math.floor(hd / 2) + fixB + cosMod;
      }
    }
  });
  return hp + (hpBonus || 0);
}

const V = ({v}) => {
  const n = typeof v === "number" ? v : 0;
  return <span className={n>0?"vp":n<0?"vn":"vz"}>{n>0?"+"+n:n}</span>;
};

/* ═══ MAIN APP ═══ */
// ── Editor proprietà arma speciale (pannello modale dentro la scheda) ──
function WeaponPropsEditor({ baseDef, special, weaponName, onChange, onName, onClose }) {
  const sp = special || {};
  const set = function(patch){ onChange(Object.assign({}, sp, patch)); };
  const [advOpen, setAdvOpen] = useState(false);

  const extraDamage = sp.extraDamage || [];
  const addExtra = function(){ set({extraDamage: extraDamage.concat([{dice:"1d6",damageType:"Fuoco",condition:"always",creatureType:""}])}); };
  const setExtra = function(i,patch){ const a=extraDamage.slice(); a[i]=Object.assign({},a[i],patch); set({extraDamage:a}); };
  const delExtra = function(i){ set({extraDamage: extraDamage.filter(function(_,j){return j!==i;})}); };

  const onHit = sp.onHit || [];
  const addOnHit = function(){ set({onHit: onHit.concat([{dc:13,ability:"Costituzione",effect:""}])}); };
  const setOnHit = function(i,patch){ const a=onHit.slice(); a[i]=Object.assign({},a[i],patch); set({onHit:a}); };
  const delOnHit = function(i){ set({onHit: onHit.filter(function(_,j){return j!==i;})}); };

  const score = calcWeaponScore(sp);
  const suggested = rarityFromScore(score);
  const rarityObj = RARITIES.find(function(r){return r.id===(sp.rarity||suggested);})||RARITIES[0];
  const effDmg = specialDmg(baseDef, sp);

  return (
    <div className="wpe-overlay" onClick={function(e){ if(e.target.className==="wpe-overlay") onClose(); }}>
      <div className="wpe-modal">
        <div className="wpe-head">
          <span>⚙ Proprietà arma</span>
          <span className="wpe-close" onClick={onClose}>✕</span>
        </div>
        <div className="wpe-body">
          <div className="wpe-row">
            <label>Nome dell'arma</label>
            <input type="text" value={weaponName||""} placeholder={baseDef?baseDef.name:"nome"} onChange={function(e){ onName(e.target.value); }}/>
          </div>
          {baseDef ? (
            <div className="wpe-base">Base: <b>{baseDef.name}</b> · {baseDef.dmg} {baseDef.dmgType} · {baseDef.category}{baseDef.props?" · "+baseDef.props:""}</div>
          ) : null}

          <div className="wpe-grid2">
            <div className="wpe-row">
              <label>Dado danni (sovrascrive base)</label>
              <select value={sp.dmgOverride||""} onChange={function(e){ set({dmgOverride:e.target.value||null}); }}>
                <option value="">base ({baseDef?baseDef.dmg:"—"})</option>
                {DICE_OPTIONS.map(function(d){ return <option key={d} value={d}>{d}</option>; })}
              </select>
            </div>
            <div className="wpe-row">
              <label>Bonus magico</label>
              <select value={sp.enhancement||0} onChange={function(e){ set({enhancement:+e.target.value, isMagic:+e.target.value>0?true:sp.isMagic}); }}>
                <option value={0}>nessuno</option><option value={1}>+1</option><option value={2}>+2</option><option value={3}>+3</option>
              </select>
            </div>
          </div>

          <div className="wpe-grid2">
            <label className="wpe-toggle"><input type="checkbox" checked={!!sp.isMagic} onChange={function(e){ set({isMagic:e.target.checked}); }}/> <span>magica</span></label>
            <label className="wpe-toggle"><input type="checkbox" checked={!!sp.requiresAttunement} onChange={function(e){ set({requiresAttunement:e.target.checked}); }}/> <span>richiede sintonia</span></label>
          </div>

          {/* Danni extra */}
          <div className="wpe-sec">
            <div className="wpe-sec-head"><span>Danni extra</span><button className="wpe-add" onClick={addExtra}>+ aggiungi</button></div>
            {extraDamage.length===0?<div className="wpe-empty">Nessuno.</div>:null}
            {extraDamage.map(function(ed,i){
              return (
                <div className="wpe-extra" key={i}>
                  <select value={ed.dice} onChange={function(e){ setExtra(i,{dice:e.target.value}); }}>
                    {DICE_OPTIONS.map(function(d){ return <option key={d} value={d}>{d}</option>; })}
                  </select>
                  <select value={ed.damageType} onChange={function(e){ setExtra(i,{damageType:e.target.value}); }}>
                    <optgroup label="Fisici">{PHYS_DMG_TYPES.map(function(t){return <option key={t} value={t}>{t}</option>;})}</optgroup>
                    <optgroup label="Elementali">{ELEM_DMG_TYPES.map(function(t){return <option key={t} value={t}>{t}</option>;})}</optgroup>
                  </select>
                  <select value={ed.condition} onChange={function(e){ setExtra(i,{condition:e.target.value}); }}>
                    {DMG_CONDITIONS.map(function(c){return <option key={c.id} value={c.id}>{c.label}</option>;})}
                  </select>
                  {ed.condition==="vsType"?(
                    <select value={ed.creatureType||""} onChange={function(e){ setExtra(i,{creatureType:e.target.value}); }}>
                      <option value="">— tipo —</option>
                      {CREATURE_TYPES.map(function(t){return <option key={t} value={t}>{t}</option>;})}
                    </select>
                  ):null}
                  <button className="wpe-del" onClick={function(){ delExtra(i); }}>✕</button>
                </div>
              );
            })}
          </div>

          <div className="wpe-adv-t" onClick={function(){ setAdvOpen(!advOpen); }}>{advOpen?"▾":"▸"} Proprietà avanzate</div>
          {advOpen?(
            <div className="wpe-adv">
              <div className="wpe-sec">
                <div className="wpe-sec-head"><span>Effetti a segno (TS)</span><button className="wpe-add" onClick={addOnHit}>+ aggiungi</button></div>
                {onHit.length===0?<div className="wpe-empty">Nessuno.</div>:null}
                {onHit.map(function(oh,i){
                  return (
                    <div className="wpe-onhit" key={i}>
                      <span>CD</span>
                      <input type="number" min={1} value={oh.dc} style={{width:46}} onChange={function(e){ setOnHit(i,{dc:+e.target.value}); }}/>
                      <select value={oh.ability} onChange={function(e){ setOnHit(i,{ability:e.target.value}); }}>
                        {["Forza","Destrezza","Costituzione","Intelligenza","Saggezza","Carisma"].map(function(a){return <option key={a} value={a}>{a}</option>;})}
                      </select>
                      <input type="text" placeholder="effetto" value={oh.effect} onChange={function(e){ setOnHit(i,{effect:e.target.value}); }}/>
                      <button className="wpe-del" onClick={function(){ delOnHit(i); }}>✕</button>
                    </div>
                  );
                })}
              </div>
              <div className="wpe-grid2">
                <div className="wpe-row">
                  <label>Range critico</label>
                  <select value={sp.critRangeBonus||0} onChange={function(e){ set({critRangeBonus:+e.target.value}); }}>
                    <option value={0}>20</option><option value={1}>19-20</option><option value={2}>18-20</option>
                  </select>
                </div>
                <div className="wpe-row">
                  <label>Dadi extra su critico</label>
                  <input type="text" placeholder="es. 1d6 Fuoco" value={sp.extraCritDice||""} onChange={function(e){ set({extraCritDice:e.target.value}); }}/>
                </div>
              </div>
              <div className="wpe-grid2">
                <div className="wpe-row">
                  <label>Resistenza concessa</label>
                  <select value={sp.grantsResistance||""} onChange={function(e){ set({grantsResistance:e.target.value}); }}>
                    <option value="">— nessuna —</option>
                    {ALL_DMG_TYPES.map(function(t){return <option key={t} value={t}>{t}</option>;})}
                  </select>
                </div>
                <div className="wpe-row">
                  <label>Luce (m)</label>
                  <input type="number" min={0} value={sp.lightRadius||0} onChange={function(e){ set({lightRadius:+e.target.value}); }}/>
                </div>
              </div>
              <label className="wpe-toggle"><input type="checkbox" checked={!!(sp.sentient&&sp.sentient.enabled)} onChange={function(e){ set({sentient:Object.assign({},sp.sentient,{enabled:e.target.checked})}); }}/> <span>senziente</span></label>
              {sp.sentient&&sp.sentient.enabled?<input type="text" placeholder="personalità / scopo" value={(sp.sentient&&sp.sentient.notes)||""} onChange={function(e){ set({sentient:Object.assign({},sp.sentient,{notes:e.target.value})}); }} style={{width:"100%"}}/>:null}
              <label className="wpe-toggle"><input type="checkbox" checked={!!(sp.curse&&sp.curse.enabled)} onChange={function(e){ set({curse:Object.assign({},sp.curse,{enabled:e.target.checked})}); }}/> <span>maledetta</span></label>
              {sp.curse&&sp.curse.enabled?<input type="text" placeholder="natura della maledizione" value={(sp.curse&&sp.curse.notes)||""} onChange={function(e){ set({curse:Object.assign({},sp.curse,{notes:e.target.value})}); }} style={{width:"100%"}}/>:null}
            </div>
          ):null}

          <div className="wpe-row">
            <label>Note / descrizione</label>
            <textarea rows={2} value={sp.notes||""} placeholder="lore, effetti narrativi…" onChange={function(e){ set({notes:e.target.value}); }}/>
          </div>

          <div className="wpe-rarity">
            <div><span className="wpe-r-lbl">Rarità</span>
              <select value={sp.rarity||suggested} onChange={function(e){ set({rarity:e.target.value}); }}>
                {RARITIES.map(function(r){return <option key={r.id} value={r.id}>{r.label}</option>;})}
              </select>
            </div>
            <div className="wpe-r-info" style={{color:rarityObj.color}}>punteggio {score} · danno effettivo <b>{effDmg}</b></div>
          </div>
        </div>
        <div className="wpe-foot">
          <button className="wpe-btn primary" onClick={onClose}>Fatto</button>
        </div>
      </div>
    </div>
  );
}

/* ══════════════════════════════════════════════════════════════════════════
 * COMPONENTE: ItemBonusEditor — modale per i bonus di un oggetto d'inventario.
 * Imposta equip/sintonia e i bonus a CARATTERISTICHE e COMPETENZE dell'oggetto.
 * PROPS: item, skillList(string[]: nomi competenze per indice), onPatch(patch), onClose
 * CONNETTORE: scrive SOLO via onPatch (App applica la patch all'oggetto). Niente stato globale.
 * ══════════════════════════════════════════════════════════════════════════ */
function ItemBonusEditor({ item, skillList, onPatch, onClose }) {
  const it = item || {};
  const statMods = it.statMods || {};
  const skillMods = it.skillMods || {};
  const setStat = (st, v) => { const sm = Object.assign({}, statMods); if(v) sm[st]=v; else delete sm[st]; onPatch({statMods: sm}); };
  const setSkill = (idx, v) => { const sm = Object.assign({}, skillMods); if(v) sm[idx]=v; else delete sm[idx]; onPatch({skillMods: sm}); };
  return (
    <div className="wpe-overlay" onClick={e => { if(e.target.className==="wpe-overlay") onClose(); }}>
      <div className="desc-modal" onClick={e=>e.stopPropagation()}>
        <div className="desc-head">
          <b style={{color:"var(--tb)"}}>Bonus oggetto — {it.name||"(senza nome)"}</b>
          <button className="desc-x" onClick={onClose}>×</button>
        </div>
        <div className="ib-row">
          <label className="ib-chk"><input type="checkbox" checked={!!it.equipped} onChange={e=>onPatch({equipped:e.target.checked})}/> Equipaggiato</label>
          <label className="ib-chk"><input type="checkbox" checked={!!it.requiresAttunement} onChange={e=>onPatch({requiresAttunement:e.target.checked, attuned: e.target.checked ? it.attuned : false})}/> Richiede sintonia</label>
          <label className="ib-chk"><input type="checkbox" checked={!!it.attuned} disabled={!it.requiresAttunement} onChange={e=>onPatch({attuned:e.target.checked})}/> In sintonia</label>
        </div>
        <div className="ib-note">I bonus si applicano se l'oggetto è equipaggiato (e in sintonia, quando richiesta).</div>

        <div className="ib-sec">Caratteristiche</div>
        <div className="ib-stats">
          {STATS.map(st => (
            <label key={st} className="ib-stat">{SS[st]}
              <input type="number" value={statMods[st]||0} onChange={e=>setStat(st, +e.target.value||0)} style={{width:46}}/>
            </label>
          ))}
        </div>

        <div className="ib-sec">Competenze</div>
        {Object.keys(skillMods).map(idx => (
          <div key={idx} className="ib-skrow">
            <span style={{flex:1,color:"var(--tx)"}}>{skillList[idx]||("#"+idx)}</span>
            <input type="number" value={skillMods[idx]||0} onChange={e=>setSkill(idx, +e.target.value||0)} style={{width:46}}/>
            <button className="btn bs" style={{borderColor:"var(--rd)",color:"var(--rd)",padding:"1px 6px"}} onClick={()=>setSkill(idx, 0)}>✕</button>
          </div>
        ))}
        <div className="ib-skadd">
          <select value="" onChange={e=>{ if(e.target.value!==""){ setSkill(e.target.value, skillMods[e.target.value]||1); } }}>
            <option value="">+ aggiungi competenza…</option>
            {skillList.map((n,i) => skillMods[i]==null ? <option key={i} value={i}>{n}</option> : null)}
          </select>
        </div>
      </div>
    </div>
  );
}

/* ══════════════════════════════════════════════════════════════════════════
 * COMPONENTE: NumStepper — input numerico con pulsanti −/+ (riutilizzabile).
 * Serve perché su MOBILE gli input number non hanno frecce (si può solo digitare);
 * i pulsanti −/+ danno l'incremento al tocco su mobile e al clic su desktop.
 * PROPS: value(num), onChange(nuovoValore:num), min?, max?, step?(=1), disabled?, width?
 * Non legge/scrive nulla di condiviso: tutto via props. Connettore = solo onChange.
 * ══════════════════════════════════════════════════════════════════════════ */
function NumStepper({ value, onChange, min, max, step, disabled, width }) {
  const v = (value == null ? 0 : value);
  const st = step || 1;
  const clamp = (x) => { if (min != null && x < min) x = min; if (max != null && x > max) x = max; return x; };
  return (
    <span className="nstep">
      <button type="button" className="nstep-b" disabled={disabled} onClick={() => onChange(clamp(v - st))}>−</button>
      <input type="number" value={v} disabled={disabled} style={{width: width || 44}}
        onChange={(e) => onChange(clamp(+e.target.value || 0))}/>
      <button type="button" className="nstep-b" disabled={disabled} onClick={() => onChange(clamp(v + st))}>+</button>
    </span>
  );
}

/* ══════════════════════════════════════════════════════════════════════════
 * COMPONENTE: CombatTab — Tab "⚔ Combat" (sotto-tab Armi / Manovre / Incantesimi)
 * Componente foglia autonomo: riceve tutto via props, non legge variabili di App
 * per chiusura. Vedi la "GUIDA AI CONNETTORI" in fondo al componente.
 * ══════════════════════════════════════════════════════════════════════════ */
function CombatTab({ ch, setCh, comp, statMods, pmInfo, tl, onRoll, onRollDamage }) {
  const [combatSub, setCombatSub] = useState("armi");      // sottotab: armi|manovre|incantesimi
  const [castLv, setCastLv] = useState({});                // livello di lancio per riga incantesimo
  const [spellDry, setSpellDry] = useState(false);         // "a secco di PM"
  const [manExpanded, setManExpanded] = useState(null);    // manovra espansa
  const [manShowAll, setManShowAll] = useState(false);     // mostra manovre senza rank
            const eq = ch.equipment || {};
            const weapons = (eq.weapons || []).map(function(we, idx){ return {we: we, idx: idx}; });
            const equipped = weapons.filter(function(x){ return x.we.equipped; });
            const setWeapons = (arr) => setCh({...ch, equipment: {...eq, weapons: arr}});
            const dualWield = !!eq.dualWield;
            const setDualWield = function(on){
              // spegnendo il dual-wield, azzera le off-hand
              const arr = (eq.weapons||[]).map(function(w){ return on ? w : {...w, offHand:false}; });
              setCh({...ch, equipment: {...eq, weapons: arr, dualWield: on}});
            };

            // competenza "Combattimento a 2 armi": punteggio = cap per entrambe le armi
            const dualSkillIdx = SD.findIndex(function(s){ return s.n === "Combattimento a 2 armi"; });
            const dualSkill = dualSkillIdx >= 0 ? comp[dualSkillIdx] : null;
            const hasDualSkill = !!(dualSkill && (dualSkill.rank || 0) > 0);
            // punteggio competenza (totale = mod Destrezza + bonus competenza)
            const dualCap = skScore(dualSkill, statMods);

            // imposta arma principale "in uso"
            const setInUse = function(idx){
              const arr = (eq.weapons||[]).map(function(w, j){
                if (j === idx) return {...w, inUse: !w.inUse, offHand:false};
                return {...w, inUse:false};
              });
              setWeapons(arr);
            };
            // imposta off-hand (solo in dual-wield, non può essere la principale)
            const setOffHand = function(idx){
              const arr = (eq.weapons||[]).map(function(w, j){
                if (j === idx) return {...w, offHand: !w.offHand, inUse:false};
                return {...w, offHand:false};
              });
              setWeapons(arr);
            };

            // dato un'arma, calcola la sintesi di combattimento.
            // role: "normale" | "main" | "off" — applica cap/malus del dual-wield
            const weaponCombat = function(we, role){
              const def = WEAPONS_DB.find(function(d){ return d.id === we.id; });
              if (!def) return null;
              const sp = we.special;
              const skIdx = SD.findIndex(function(s){ return s.n === def.category; });
              const skc = skIdx >= 0 ? comp[skIdx] : null;
              const attrName = skc ? skc.attr : "Forza";
              const attrMod = statMods[attrName] || 0;
              const profBonus = skc ? (skc.parz || 0) : -3;
              const enh = (sp && sp.enhancement) || 0;
              let toHit = attrMod + profBonus + enh;
              // aggiustamento dual-wield
              let dwNote = "";
              if (role === "main" || role === "off") {
                if (hasDualSkill && dualCap != null) {
                  // il punteggio della competenza fa da CAP a entrambe le armi
                  if (toHit > dualCap) { toHit = dualCap; dwNote = "cap 2 armi " + fmtMod(dualCap); }
                  else dwNote = "sotto il cap (" + fmtMod(dualCap) + ")";
                } else {
                  // senza competenza: principale -3, off-hand -3
                  toHit = toHit - 3;
                  dwNote = (role === "main" ? "−3 principale" : "−3 secondaria") + " (no competenza)";
                }
                // feat / modifica manuale (es. Ambidestria)
                const fm = role === "main" ? (eq.dwMainMod||0) : (eq.dwOffMod||0);
                if (fm) { toHit += fm; dwNote += " · feat " + fmtMod(fm); }
              }
              const baseDmg = specialDmg(def, sp);
              const dmgGroups = [];
              if (baseDmg && baseDmg !== "0" && baseDmg !== "—") {
                dmgGroups.push({ dice: baseDmg, type: def.dmgType, flat: attrMod + enh, label: "base" });
              }
              (sp && sp.extraDamage || []).forEach(function(ed){
                dmgGroups.push({ dice: ed.dice, type: ed.damageType, flat: 0, label: ed.condition, creatureType: ed.creatureType });
              });
              const critRange = 20 - ((sp && sp.critRangeBonus) || 0);
              return { def, sp, attrName, attrMod, profBonus, enh, toHit, dmgGroups, critRange, dwNote, skName: skc ? skc.name : def.category };
            };

            const subTabs = [{id:"armi",l:"Armi"},{id:"manovre",l:"Manovre"},{id:"incantesimi",l:"Incantesimi"}];

            return (
              <div>
                <div className="cmb-subtabs">
                  {subTabs.map(function(st){
                    return <div key={st.id} className={"cmb-subtab" + (combatSub===st.id?" active":"")} onClick={function(){ setCombatSub(st.id); }}>{st.l}</div>;
                  })}
                </div>

                {combatSub === "armi" && (
                  <div>
                    {equipped.length > 0 && (
                      <div className="cmb-dw-bar">
                        <label className="cmb-dw-toggle" title="Attiva per impugnare un'arma in ogni mano">
                          <input type="checkbox" checked={dualWield} onChange={function(e){ setDualWield(e.target.checked); }}/>
                          <span>Un'arma in ogni mano</span>
                        </label>
                        {dualWield ? (
                          <span className="cmb-dw-info">
                            {hasDualSkill
                              ? <span>Competenza <b>Combattimento a 2 armi</b>: cap {fmtMod(dualCap)} su entrambe</span>
                              : <span>Senza competenza: principale −3, secondaria −3</span>}
                          </span>
                        ) : null}
                        {dualWield ? (
                          <span className="cmb-dw-feat" title="Modifica da feat (es. Ambidestria): si somma al tiro">
                            feat: princ.<input type="number" value={eq.dwMainMod||0} onChange={function(e){ setCh({...ch, equipment:{...eq, dwMainMod:+e.target.value||0}}); }} style={{width:38}}/>
                            sec.<input type="number" value={eq.dwOffMod||0} onChange={function(e){ setCh({...ch, equipment:{...eq, dwOffMod:+e.target.value||0}}); }} style={{width:38}}/>
                          </span>
                        ) : null}
                      </div>
                    )}
                    {equipped.length === 0 ? (
                      <div className="cmb-empty">Nessun'arma equipaggiata. Vai in <b>Equipaggiamento</b> e spunta "Equip." sulle armi che vuoi usare in combattimento.</div>
                    ) : equipped.map(function(x){
                      const we = x.we;
                      const role = we.inUse ? "main" : we.offHand ? "off" : (dualWield ? "normale" : "normale");
                      const wc = weaponCombat(we, (we.inUse && dualWield) ? "main" : (we.offHand && dualWield) ? "off" : "normale");
                      if (!wc) return null;
                      const sp = we.special;
                      const dispName = we.name || (sp && sp.name) || wc.def.name;
                      const rarityObj = sp ? (RARITIES.find(function(r){return r.id===(sp.rarity||rarityFromScore(calcWeaponScore(sp)));})||null) : null;
                      const hitStr = fmtMod(wc.toHit);
                      const dmgDisplay = wc.dmgGroups.map(function(g){
                        const flatStr = g.flat ? (g.flat>=0?"+"+g.flat:""+g.flat) : "";
                        const condStr = g.label==="vsType" ? " vs "+(g.creatureType||"?") : g.label==="onCrit" ? " (crit)" : g.label==="onNat20" ? " (20)" : "";
                        return g.dice + flatStr + " " + g.type + condStr;
                      });
                      const roleBadge = (we.inUse && dualWield) ? "principale" : (we.offHand && dualWield) ? "secondaria" : null;
                      return (
                        <div key={x.idx} className={"cmb-weapon" + (we.inUse||we.offHand?" inuse":"")}>
                          <div className="cmb-w-head">
                            <div className="cmb-w-sel">
                              {dualWield ? (
                                <span className="cmb-hand-btns">
                                  <button className={"cmb-hand" + (we.inUse?" act":"")} onClick={function(){ setInUse(x.idx); }} title="Arma principale (mano dominante)">P</button>
                                  <button className={"cmb-hand off" + (we.offHand?" act":"")} onClick={function(){ setOffHand(x.idx); }} title="Arma secondaria (off-hand)">S</button>
                                </span>
                              ) : (
                                <input type="radio" name="inUseWeapon" checked={!!we.inUse} onChange={function(){ setInUse(x.idx); }} title="Arma in uso (per le Manovre)"/>
                              )}
                              <span style={{color: sp ? (rarityObj?rarityObj.color:"var(--gb)") : "var(--tb)", fontWeight:700}}>{dispName}{wc.enh?" +"+wc.enh:""}</span>
                              {roleBadge ? <span className={"cmb-role-badge" + (roleBadge==="secondaria"?" off":"")}>{roleBadge}</span> : null}
                            </div>
                            <span className="cmb-w-cat">{wc.def.category}{wc.def.family==="marziale"?" (M)":""}</span>
                          </div>

                          <div className="cmb-w-body">
                            {/* Tiro per colpire */}
                            <div className="cmb-block">
                              <div className="cmb-b-lbl">Per colpire</div>
                              <div className="cmb-tohit">
