a ranged spell attack. On a hit, the target takes 1d8 fire damage. This spell's damage increases by 1d8 when you reach 5th level (2d8), 11th level (3d8), and 17th level (4d8).","higherEn":""},{"id":"programmed-illusion","srd":true,"name":"Illusione Programmata","nameEn":"Programmed Illusion","level":6,"school":"Illusione","castTime":"1 Azione","range":"36 m","duration":"Finché non dissolto","components":"V, S, M","material":"A bit of fleece and jade dust worth at least 25 gp.","concentration":false,"ritual":false,"attack":null,"damage":null,"dc":null,"classes":["Bard","Wizard"],"classesHb":["Bardo","Mago"],"effects":"","desc":"","descEn":"You create an illusion of an object, a creature, or some other visible phenomenon within range that activates when a specific condition occurs. The illusion is imperceptible until then. It must be no larger than a 30-foot cube, and you decide when you cast the spell how the illusion behaves and what sounds it makes. This scripted performance can last up to 5 minutes. When the condition you specify occurs, the illusion springs into existence and performs in the manner you described. Once the illusion finishes performing, it disappears and remains dormant for 10 minutes. After this time, the illusion can be activated again. The triggering condition can be as general or as detailed as you like, though it must be based on visual or audible conditions that occur within 30 feet of the area. For example, you could create an illusion of yourself to appear and warn off others who attempt to open a trapped door, or you could set the illusion to trigger only when a creature says the correct word or phrase. Physical interaction with the image reveals it to be an illusion, because things can pass through it. A creature that uses its action to examine the image can determine that it is an illusion with a successful Intelligence (Investigation) check against your spell save DC. If a creature discerns the illusion for what it is, the creature can see through the image, and any noise it makes sounds hollow to the creature.","higherEn":""},{"id":"project-image","srd":true,"name":"Proiettare Immagine","nameEn":"Project Image","level":7,"school":"Illusione","castTime":"1 Azione","range":"800 km","duration":"Concentrazione, fino a 24 ore","components":"V, S, M","material":"A small replica of you made from materials worth at least 5 gp.","concentration":true,"ritual":false,"attack":null,"damage":null,"dc":null,"classes":["Bard","Wizard"],"classesHb":["Bardo","Mago"],"effects":"","desc":"","descEn":"You create an illusory copy of yourself that lasts for the duration. The copy can appear at any location within range that you have seen before, regardless of intervening obstacles. The illusion looks and sounds like you but is intangible. If the illusion takes any damage, it disappears, and the spell ends. You can use your action to move this illusion up to twice your speed, and make it gesture, speak, and behave in whatever way you choose. It mimics your mannerisms perfectly. You can see through its eyes and hear through its ears as if you were in its space. On your turn as a bonus action, you can switch from using its senses to using your own, or back again. While you are using its senses, you are blinded and deafened in regard to your own surroundings. Physical interaction with the image reveals it to be an illusion, because things can pass through it. A creature that uses its action to examine the image can determine that it is an illusion with a successful Intelligence (Investigation) check against your spell save DC. If a creature discerns the illusion for what it is, the creature can see through the image, and any noise it makes sounds hollow to the creature.","higherEn":""},{"id":"protection-from-energy","srd":true,"name":"Protezione dall'Energia","nameEn":"Protection From Energy","level":3,"school":"Abiurazione","castTime":"1 Azione","range":"Contatto","duration":"Concentrazione, fino a 1 ora","components":"V, S","material":null,"concentration":true,"ritual":false,"attack":null,"damage":null,"dc":null,"classes":["Cleric","Druid","Ranger","Sorcerer","Wizard"],"classesHb":["Chierico","Druido","Mago","Ranger","Stregone"],"effects":"Concede resistenza a un tipo di danno energetico scelto (fuoco, freddo, ecc.).","desc":"","descEn":"For the duration, the willing creature you touch has resistance to one damage type of your choice: acid, cold, fire, lightning, or thunder.","higherEn":"","userName":"Protezione dall'Energia"},{"id":"protection-from-evil-and-good","srd":true,"name":"Protezione dal Bene e dal Male","nameEn":"Protection from Evil and Good","level":1,"school":"Abiurazione","castTime":"1 Azione","range":"Contatto","duration":"Concentrazione, fino a 10 minuti","components":"V, S, M","material":"Holy water or powdered silver and iron, which the spell consumes.","concentration":true,"ritual":false,"attack":null,"damage":null,"dc":null,"classes":["Cleric","Paladin","Warlock","Wizard"],"classesHb":["Chierico","Invocatore","Mago","Paladino"],"effects":"La creatura protetta subisce meno influenza da specifici tipi di creature (celestiali, immondi, fatati, elementali, non morti). Attacchi di tali creature hanno svantaggio.","desc":"","descEn":"Until the spell ends, one willing creature you touch is protected against certain types of creatures: aberrations, celestials, elementals, fey, fiends, and undead. The protection grants several benefits. Creatures of those types have disadvantage on attack rolls against the target. The target also can't be charmed, frightened, or possessed by them. If the target is already charmed, frightened, or possessed by such a creature, the target has advantage on any new saving throw against the relevant effect.","higherEn":"","userName":"Protezione dal Bene e dal Male"},{"id":"protection-from-poison","srd":true,"name":"Protezione dai Veleni","nameEn":"Protection from Poison","level":2,"school":"Abiurazione","castTime":"1 Azione","range":"Contatto","duration":"1 ora","components":"V, S","material":null,"concentration":false,"ritual":false,"attack":null,"damage":null,"dc":null,"classes":["Cleric","Druid","Paladin","Ranger"],"classesHb":["Chierico","Druido","Paladino","Ranger"],"effects":"Neutralizza un veleno e garantisce vantaggio ai tiri salvezza contro veleno.","desc":"","descEn":"You touch a creature. If it is poisoned, you neutralize the poison. If more than one poison afflicts the target, you neutralize one poison that you know is present, or you neutralize one at random. For the duration, the target has advantage on saving throws against being poisoned, and it has resistance to poison damage.","higherEn":"","userName":"Protezione dal Veleno"},{"id":"purify-food-and-drink","srd":true,"name":"Purificare Cibo e Bevande","nameEn":"Purify Food and Drink","level":1,"school":"Trasmutazione","castTime":"1 Azione (Rituale)","range":"3 m","duration":"Istantanea","components":"V, S","material":null,"concentration":false,"ritual":true,"attack":null,"damage":null,"dc":null,"classes":["Cleric","Druid","Paladin"],"classesHb":["Chierico","Druido","Paladino"],"effects":"Purifica e rende innocui (da veleni/impurità) tutti i cibi e le bevande in un raggio di 3 m.","desc":"","descEn":"All nonmagical food and drink within a 5-foot radius sphere centered on a point of your choice within range is purified and rendered free of poison and disease.","higherEn":"","userName":"Purificare Cibo e Bevande"},{"id":"raise-dead","srd":true,"name":"Resuscitare Morti","nameEn":"Raise Dead","level":5,"school":"Necromanzia","castTime":"1 Ora","range":"Contatto","duration":"Istantanea","components":"V, S, M","material":"A diamond worth at least 500gp, which the spell consumes.","concentration":false,"ritual":false,"attack":null,"damage":null,"dc":null,"classes":["Bard","Cleric","Paladin"],"classesHb":["Bardo","Chierico","Paladino"],"effects":"","desc":"","descEn":"You return a dead creature you touch to life, provided that it has been dead no longer than 10 days. If the creature's soul is both willing and at liberty to rejoin the body, the creature returns to life with 1 hit point. This spell also neutralizes any poisons and cures nonmagical diseases that affected the creature at the time it died. This spell doesn't, however, remove magical diseases, curses, or similar effects; if these aren't first removed prior to casting the spell, they take effect when the creature returns to life. The spell can't return an undead creature to life. This spell closes all mortal wounds, but it doesn't restore missing body parts. If the creature is lacking body parts or organs integral for its survival--its head, for instance--the spell automatically fails. Coming back from the dead is an ordeal. The target takes a -4 penalty to all attack rolls, saving throws, and ability checks. Every time the target finishes a long rest, the penalty is reduced by 1 until it disappears.","higherEn":""},{"id":"ray-of-enfeeblement","srd":true,"name":"Raggio di Infermità","nameEn":"Ray of Enfeeblement","level":2,"school":"Necromanzia","castTime":"1 Azione","range":"18 m","duration":"Concentrazione, fino a 1 minuto","components":"V, S","material":null,"concentration":true,"ritual":false,"attack":"ranged","damage":null,"dc":{"ability":"Costituzione","success":"none"},"classes":["Warlock","Wizard"],"classesHb":["Invocatore","Mago"],"effects":"","desc":"","descEn":"A black beam of enervating energy springs from your finger toward a creature within range. Make a ranged spell attack against the target. On a hit, the target deals only half damage with weapon attacks that use Strength until the spell ends. At the end of each of the target's turns, it can make a constitution saving throw against the spell. On a success, the spell ends.","higherEn":""},{"id":"ray-of-frost","srd":true,"name":"Raggio di Gelo","nameEn":"Ray of Frost","level":0,"school":"Invocazione","castTime":"1 Azione","range":"18 m","duration":"Istantanea","components":"V, S","material":null,"concentration":false,"ritual":false,"attack":"ranged","damage":{"type":"Cold","scale":"char","table":{"1":"1d8","5":"2d8","11":"3d8","17":"4d8"}},"dc":null,"classes":["Sorcerer","Wizard"],"classesHb":["Mago","Stregone"],"effects":"Infligge 1d8 danni da freddo e riduce la velocità del bersaglio di 3 metri.","desc":"Un gelido raggio di luce bianco-azzurra sfreccia verso una creatura entro gittata. Effettua un attacco magico a distanza: a segno, subisce 1d8 danni da freddo e la sua velocità è ridotta di 3 m fino all'inizio del tuo prossimo turno. I danni aumentano di 1d8 al 5° livello (2d8), all'11° (3d8) e al 17° (4d8).","descEn":"A frigid beam of blue-white light streaks toward a creature within range. Make a ranged spell attack against the target. On a hit, it takes 1d8 cold damage, and its speed is reduced by 10 feet until the start of your next turn. The spell's damage increases by 1d8 when you reach 5th level (2d8), 11th level (3d8), and 17th level (4d8).","higherEn":"","userName":"Raggio di Gelo"},{"id":"regenerate","srd":true,"name":"Rigenerazione","nameEn":"Regenerate","level":7,"school":"Trasmutazione","castTime":"1 Minuto","range":"Contatto","duration":"1 ora","components":"V, S, M","material":"A prayer wheel and holy water.","concentration":false,"ritual":false,"attack":null,"damage":null,"dc":null,"classes":["Bard","Cleric","Druid"],"classesHb":["Bardo","Chierico","Druido"],"effects":"","desc":"","descEn":"You touch a creature and stimulate its natural healing ability. The target regains 4d8 + 15 hit points. For the duration of the spell, the target regains 1 hit point at the start of each of its turns (10 hit points each minute). The target's severed body members (fingers, legs, tails, and so on), if any, are restored after 2 minutes. If you have the severed part and hold it to the stump, the spell instantaneously causes the limb to knit to the stump.","higherEn":""},{"id":"reincarnate","srd":true,"name":"Reincarnare","nameEn":"Reincarnate","level":5,"school":"Trasmutazione","castTime":"1 Ora","range":"Contatto","duration":"Istantanea","components":"V, S, M","material":"Rare oils and unguents worth at least 1,000 gp, which the spell consumes.","concentration":false,"ritual":false,"attack":null,"damage":null,"dc":null,"classes":["Druid"],"classesHb":["Druido"],"effects":"","desc":"","descEn":"You touch a dead humanoid or a piece of a dead humanoid. Provided that the creature has been dead no longer than 10 days, the spell forms a new adult body for it and then calls the soul to enter that body. If the target's soul isn't free or willing to do so, the spell fails. The magic fashions a new body for the creature to inhabit, which likely causes the creature's race to change. The GM rolls a d 100 and consults the following table to determine what form the creature takes when restored to life, or the GM chooses a form. | d100 | Race | |---|---| | 01-04 | Dragonborn | | 05-13 | Dwarf, hill | | 14-21 | Dwarf, mountain | | 22-25 | Elf, dark | | 26-34 | Elf, high | | 35-42 | Elf, wood | | 43-46 | Gnome, forest | | 47-52 | Gnome, rock | | 53-56 | Half-elf | | 57-60 | Half-orc | | 61-68 | Halfling, lightfoot | | 69-76 | Halfling, stout | | 77-96 | Human | | 97-00 | Tiefling | The reincarnated creature recalls its former life and experiences. It retains the capabilities it had in its original form, except it exchanges its original race for the new one and changes its racial traits accordingly.","higherEn":""},{"id":"remove-curse","srd":true,"name":"Rimuovere Maledizione","nameEn":"Remove Curse","level":3,"school":"Abiurazione","castTime":"1 Azione","range":"Contatto","duration":"Istantanea","components":"V, S","material":null,"concentration":false,"ritual":false,"attack":null,"damage":null,"dc":null,"classes":["Cleric","Paladin","Warlock","Wizard"],"classesHb":["Chierico","Invocatore","Mago","Paladino"],"effects":"Rimuove una maledizione che affligge creatura o oggetto.","desc":"","descEn":"At your touch, all curses affecting one creature or object end. If the object is a cursed magic item, its curse remains, but the spell breaks its owner's attunement to the object so it can be removed or discarded.","higherEn":"","userName":"Rimuovi Maledizione"},{"id":"resilient-sphere","srd":true,"name":"Sfera Resiliente","nameEn":"Resilient Sphere","level":4,"school":"Invocazione","castTime":"1 Azione","range":"9 m","duration":"Concentrazione, fino a 1 minuto","components":"V, S, M","material":"A hemispherical piece of clear crystal and a matching hemispherical piece of gum arabic.","concentration":true,"ritual":false,"attack":null,"damage":null,"dc":{"ability":"Destrezza","success":"none"},"classes":["Wizard"],"classesHb":["Mago"],"effects":"","desc":"","descEn":"A sphere of shimmering force encloses a creature or object of Large size or smaller within range. An unwilling creature must make a dexterity saving throw. On a failed save, the creature is enclosed for the duration. Nothing--not physical objects, energy, or other spell effects--can pass through the barrier, in or out, though a creature in the sphere can breathe there. The sphere is immune to all damage, and a creature or object inside can't be damaged by attacks or effects originating from outside, nor can a creature inside the sphere damage anything outside it. The sphere is weightless and just large enough to contain the creature or object inside. An enclosed creature can use its action to push against the sphere's walls and thus roll the sphere at up to half the creature's speed. Similarly, the globe can be picked up and moved by other creatures. A disintegrate spell targeting the globe destroys it without harming anything inside it.","higherEn":""},{"id":"resistance","srd":true,"name":"Resistenza","nameEn":"Resistance","level":0,"school":"Abiurazione","castTime":"1 Azione","range":"Contatto","duration":"Concentrazione, fino a 1 minuto","components":"V, S, M","material":"A miniature cloak.","concentration":true,"ritual":false,"attack":null,"damage":null,"dc":null,"classes":["Cleric","Druid"],"classesHb":["Chierico","Druido"],"effects":"Bersaglio ottiene un bonus di 1d4 su un tiro salvezza a scelta entro la durata.","desc":"Tocchi una creatura consenziente. Una volta prima che l'incantesimo termini, il bersaglio può tirare 1d4 e aggiungere il risultato a un tiro salvezza a sua scelta. Può tirare il dado prima o dopo il tiro salvezza. Poi l'incantesimo termina.","descEn":"You touch one willing creature. Once before the spell ends, the target can roll a d4 and add the number rolled to one saving throw of its choice. It can roll the die before or after making the saving throw. The spell then ends.","higherEn":"","userName":"Resistenza"},{"id":"resurrection","srd":true,"name":"Resurrezione","nameEn":"Resurrection","level":7,"school":"Necromanzia","castTime":"1 Ora","range":"Contatto","duration":"Istantanea","components":"V, S, M","material":"A diamond worth at least 1,000gp, which the spell consumes.","concentration":false,"ritual":false,"attack":null,"damage":null,"dc":null,"classes":["Bard","Cleric"],"classesHb":["Bardo","Chierico"],"effects":"","desc":"","descEn":"You touch a dead creature that has been dead for no more than a century, that didn't die of old age, and that isn't undead. If its soul is free and willing, the target returns to life with all its hit points. This spell neutralizes any poisons and cures normal diseases afflicting the creature when it died. It doesn't, however, remove magical diseases, curses, and the like; if such effects aren't removed prior to casting the spell, they afflict the target on its return to life. This spell closes all mortal wounds and restores any missing body parts. Coming back from the dead is an ordeal. The target takes a -4 penalty to all attack rolls, saving throws, and ability checks. Every time the target finishes a long rest, the penalty is reduced by 1 until it disappears. Casting this spell to restore life to a creature that has been dead for one year or longer taxes you greatly. Until you finish a long rest, you can't cast spells again, and you have disadvantage on all attack rolls, ability checks, and saving throws.","higherEn":""},{"id":"reverse-gravity","srd":true,"name":"Invertire la Gravità","nameEn":"Reverse Gravity","level":7,"school":"Trasmutazione","castTime":"1 Azione","range":"30 m","duration":"Concentrazione, fino a 1 minuto","components":"V, S, M","material":"A lodestone and iron filings.","concentration":true,"ritual":false,"attack":null,"damage":null,"dc":{"ability":"Destrezza","success":"other"},"classes":["Druid","Sorcerer","Wizard"],"classesHb":["Druido","Mago","Stregone"],"effects":"","desc":"","descEn":"This spell reverses gravity in a 50-foot-radius, 100-foot high cylinder centered on a point within range. All creatures and objects that aren't somehow anchored to the ground in the area fall upward and reach the top of the area when you cast this spell. A creature can make a dexterity saving throw to grab onto a fixed object it can reach, thus avoiding the fall. If some solid object (such as a ceiling) is encountered in this fall, falling objects and creatures strike it just as they would during a normal downward fall. If an object or creature reaches the top of the area without striking anything, it remains there, oscillating slightly, for the duration. At the end of the duration, affected objects and creatures fall back down.","higherEn":""},{"id":"revivify","srd":true,"name":"Rivivificare","nameEn":"Revivify","level":3,"school":"Evocazione","castTime":"1 Azione","range":"Contatto","duration":"Istantanea","components":"V, S, M","material":"Diamonds worth 300gp, which the spell consumes.","concentration":false,"ritual":false,"attack":null,"damage":null,"dc":null,"classes":["Cleric","Paladin"],"classesHb":["Chierico","Paladino"],"effects":"Resuscita una creatura morta da non più di 1 minuto con 1 PF.","desc":"","descEn":"You touch a creature that has died within the last minute. That creature returns to life with 1 hit point. This spell can't return to life a creature that has died of old age, nor can it restore any missing body parts.","higherEn":"","userName":"Rivivificare"},{"id":"rope-trick","srd":true,"name":"Trucco della Corda","nameEn":"Rope Trick","level":2,"school":"Trasmutazione","castTime":"1 Azione","range":"Contatto","duration":"1 ora","components":"V, S, M","material":"Powdered corn extract and a twisted loop of parchment.","concentration":false,"ritual":false,"attack":null,"damage":null,"dc":null,"classes":["Wizard"],"classesHb":["Mago"],"effects":"","desc":"","descEn":"You touch a length of rope that is up to 60 feet long. One end of the rope then rises into the air until the whole rope hangs perpendicular to the ground. At the upper end of the rope, an invisible entrance opens to an extradimensional space that lasts until the spell ends. The extradimensional space can be reached by climbing to the top of the rope. The space can hold as many as eight Medium or smaller creatures. The rope can be pulled into the space, making the rope disappear from view outside the space. Attacks and spells can't cross through the entrance into or out of the extradimensional space, but those inside can see out of it as if through a 3-foot-by-5-foot window centered on the rope. Anything inside the extradimensional space drops out when the spell ends.","higherEn":""},{"id":"sacred-flame","srd":true,"name":"Fiamma Sacra","nameEn":"Sacred Flame","level":0,"school":"Invocazione","castTime":"1 Azione","range":"18 m","duration":"Istantanea","components":"V, S","material":null,"concentration":false,"ritual":false,"attack":null,"damage":{"type":"Radiant","scale":"char","table":{"1":"1d8","5":"2d8","11":"3d8","17":"4d8"}},"dc":{"ability":"Destrezza","success":"none"},"classes":["Cleric"],"classesHb":["Chierico"],"effects":"Infligge 1d8 danni radianti (1d8 aggiuntivo al 5°, 11°, 17° livello) se il bersaglio fallisce un tiro salvezza Destrezza.","desc":"Una radianza simile a fiamma scende su una creatura visibile entro gittata. Il bersaglio deve superare un tiro salvezza su Destrezza o subire 1d8 danni radianti. Il bersaglio non trae alcun beneficio dalla copertura per questo tiro salvezza. I danni aumentano di 1d8 al 5° livello (2d8), all'11° (3d8) e al 17° (4d8).","descEn":"Flame-like radiance descends on a creature that you can see within range. The target must succeed on a dexterity saving throw or take 1d8 radiant damage. The target gains no benefit from cover for this saving throw. The spell's damage increases by 1d8 when you reach 5th level (2d8), 11th level (3d8), and 17th level (4d8).","higherEn":"","userName":"Fiamma Sacra"},{"id":"sanctuary","srd":true,"name":"Santuario","nameEn":"Sanctuary","level":1,"school":"Abiurazione","castTime":"1 Azione Bonus","range":"9 m","duration":"1 minuto","components":"V, S, M","material":"A small silver mirror.","concentration":false,"ritual":false,"attack":null,"damage":null,"dc":null,"classes":["Cleric"],"classesHb":["Chierico"],"effects":"Nemici devono superare tiro salvezza Sag per attaccare il bersaglio; altrimenti devono scegliere un altro bersaglio.","desc":"","descEn":"You ward a creature within range against attack. Until the spell ends, any creature who targets the warded creature with an attack or a harmful spell must first make a wisdom saving throw. On a failed save, the creature must choose a new target or lose the attack or spell. This spell doesn't protect the warded creature from area effects, such as the explosion of a fireball. If the warded creature makes an attack or casts a spell that affects an enemy creature, this spell ends.","higherEn":"","userName":"Santuario"},{"id":"scorching-ray","srd":true,"name":"Raggio Rovente","nameEn":"Scorching Ray","level":2,"school":"Invocazione","castTime":"1 Azione","range":"36 m","duration":"Istantanea","components":"V, S","material":null,"concentration":false,"ritual":false,"attack":null,"damage":{"type":"Fire","scale":"slot","table":{"2":"2d6"}},"dc":null,"classes":["Sorcerer","Wizard"],"classesHb":["Mago","Stregone"],"effects":"Tre raggi: ciascuno 2d6 da fuoco; tiri separati.","desc":"","descEn":"You create three rays of fire and hurl them at targets within range. You can hurl them at one target or several. Make a ranged spell attack for each ray. On a hit, the target takes 2d6 fire damage.","higherEn":"When you cast this spell using a spell slot of 3rd level or higher, you create one additional ray for each slot level above 2nd.","userName":"Raggio Rovente"},{"id":"scrying","srd":true,"name":"Preveggenza","nameEn":"Scrying","level":5,"school":"Divinazione","castTime":"10 Minuti","range":"Personale","duration":"Concentrazione, fino a 10 minuti","components":"V, S, M","material":"A focus worth at least 1,000 gp, such as a crystal ball, a silver mirror, or a font filled with holy water.","concentration":true,"ritual":false,"attack":null,"damage":null,"dc":{"ability":"Saggezza","success":"none"},"classes":["Bard","Cleric","Druid","Warlock","Wizard"],"classesHb":["Bardo","Chierico","Druido","Invocatore","Mago"],"effects":"","desc":"","descEn":"You can see and hear a particular creature you choose that is on the same plane of existence as you. The target must make a wisdom saving throw, which is modified by how well you know the target and the sort of physical connection you have to it. If a target knows you're casting this spell, it can fail the saving throw voluntarily if it wants to be observed. | Knowledge | Save Modifier | |---|---| | Secondhand (you have heard of the target) | +5 | | Firsthand (you have met the target) | +0 | | Familiar (you know the target well) | -5 |  | Connection | Save Modifier | |---|---| | Likeness or picture | -2 | | Possession or garment | -4 | | Body part, lock of hair, bit of nail, or the like | -10 | On a successful save, the target isn't affected, and you can't use this spell against it again for 24 hours. On a failed save, the spell creates an invisible sensor within 10 feet of the target. You can see and hear through the sensor as if you were there. The sensor moves with the target, remaining within 10 feet of it for the duration. A creature that can see invisible objects sees the sensor as a luminous orb about the size of your fist. Instead of targeting a creature, you can choose a location you have seen before as the target of this spell. When you do, the sensor appears at that location and doesn't move.","higherEn":""},{"id":"secret-chest","srd":true,"name":"Scrigno Segreto","nameEn":"Secret Chest","level":4,"school":"Evocazione","castTime":"1 Azione","range":"Contatto","duration":"Istantanea","components":"V, S, M","material":"An exquisite chest, 3 feet by 2 feet by 2 feet, constructed from rare materials worth at least 5,000 gp, and a Tiny replica made from the same materials worth at least 50 gp.","concentration":false,"ritual":false,"attack":null,"damage":null,"dc":null,"classes":["Wizard"],"classesHb":["Mago"],"effects":"","desc":"","descEn":"You hide a chest, and all its contents, on the Ethereal Plane. You must touch the chest and the miniature replica that serves as a material component for the spell. The chest can contain up to 12 cubic feet of nonliving material (3 feet by 2 feet by 2 feet). While the chest remains on the Ethereal Plane, you can use an action and touch the replica to recall the chest. It appears in an unoccupied space on the ground within 5 feet of you. You can send the chest back to the Ethereal Plane by using an action and touching both the chest and the replica. After 60 days, there is a cumulative 5 percent chance per day that the spell's effect ends. This effect ends if you cast this spell again, if the smaller replica chest is destroyed, or if you choose to end the spell as an action. If the spell ends and the larger chest is on the Ethereal Plane, it is irretrievably lost.","higherEn":""},{"id":"see-invisibility","srd":true,"name":"Vedere Invisibilità","nameEn":"See Invisibility","level":2,"school":"Divinazione","castTime":"1 Azione","range":"Personale","duration":"1 ora","components":"V, S, M","material":"A dash of talc and a small amount of silver powder.","concentration":false,"ritual":false,"attack":null,"damage":null,"dc":null,"classes":["Bard","Sorcerer","Wizard"],"classesHb":["Bardo","Mago","Stregone"],"effects":"Vedi creature/oggetti invisibili e Piano Etereo vicino; nessun danno.","desc":"","descEn":"For the duration of the spell, you see invisible creatures and objects as if they were visible, and you can see through Ethereal. The ethereal objects and creatures appear ghostly translucent.","higherEn":"","userName":"Vedere l’Invisibile"},{"id":"seeming","srd":true,"name":"Sembianza","nameEn":"Seeming","level":5,"school":"Illusione","castTime":"1 Azione","range":"9 m","duration":"8 ore","components":"V, S","material":null,"concentration":false,"ritual":false,"attack":null,"damage":null,"dc":null,"classes":["Bard","Sorcerer","Wizard"],"classesHb":["Bardo","Mago","Stregone"],"effects":"","desc":"","descEn":"This spell allows you to change the appearance of any number of creatures that you can see within range. You give each target you choose a new, illusory appearance. An unwilling target can make a charisma saving throw, and if it succeeds, it is unaffected by this spell. The spell disguises physical appearance as well as clothing, armor, weapons, and equipment. You can make each creature seem 1 foot shorter or taller and appear thin, fat, or in between. You can't change a target's body type, so you must choose a form that has the same basic arrangement of limbs. Otherwise, the extent of the illusion is up to you. The spell lasts for the duration, unless you use your action to dismiss it sooner. The changes wrought by this spell fail to hold up to physical inspection. For example, if you use this spell to add a hat to a creature's outfit, objects pass through the hat, and anyone who touches it would feel nothing or would feel the creature's head and hair. If you use this spell to appear thinner than you are, the hand of someone who reaches out to touch you would bump into you while it was seemingly still in midair. A creature can use its action to inspect a target and make an Intelligence (Investigation) check against your spell save DC. If it succeeds, it becomes aware that the target is disguised.","higherEn":""},{"id":"sending","srd":true,"name":"Messaggio a Distanza","nameEn":"Sending","level":3,"school":"Invocazione","castTime":"1 Azione","range":"Illimitata","duration":"1 round","components":"V, S, M","material":"A short piece of fine copper wire.","concentration":false,"ritual":false,"attack":null,"damage":null,"dc":null,"classes":["Bard","Cleric","Wizard"],"classesHb":["Bardo","Chierico","Mago"],"effects":"","desc":"","descEn":"You send a short message of twenty-five words or less to a creature with which you are familiar. The creature hears the message in its mind, recognizes you as the sender if it knows you, and can answer in a like manner immediately. The spell enables creatures with Intelligence scores of at least 1 to understand the meaning of your message. You can send the message across any distance and even to other planes of existence, but if the target is on a different plane than you, there is a 5 percent chance that the message doesn't arrive.","higherEn":""},{"id":"sequester","srd":true,"name":"Sequestrare","nameEn":"Sequester","level":7,"school":"Trasmutazione","castTime":"1 Azione","range":"Contatto","duration":"Finché non dissolto","components":"V, S, M","material":"A powder composed of diamond, emerald, ruby, and sapphire dust worth at least 5,000 gp, which the spell consumes.","concentration":false,"ritual":false,"attack":null,"damage":null,"dc":null,"classes":["Wizard"],"classesHb":["Mago"],"effects":"","desc":"","descEn":"By means of this spell, a willing creature or an object can be hidden away, safe from detection for the duration. When you cast the spell and touch the target, it becomes invisible and can't be targeted by divination spells or perceived through scrying sensors created by divination spells. If the target is a creature, it falls into a state of suspended animation. Time ceases to flow for it, and it doesn't grow older. You can set a condition for the spell to end early. The condition can be anything you choose, but it must occur or be visible within 1 mile of the target. Examples include \"after 1,000 years\" or \"when the tarrasque awakens.\" This spell also ends if the target takes any damage.","higherEn":""},{"id":"shapechange","srd":true,"name":"Mutare Forma","nameEn":"Shapechange","level":9,"school":"Trasmutazione","castTime":"1 Azione","range":"Personale","duration":"Concentrazione, fino a 1 ora","components":"V, S, M","material":"A jade circlet worth at least 1,500 gp, which you must place on your head before you cast the spell.","concentration":true,"ritual":false,"attack":null,"damage":null,"dc":null,"classes":["Druid","Wizard"],"classesHb":["Druido","Mago"],"effects":"","desc":"","descEn":"You assume the form of a different creature for the duration. The new form can be of any creature with a challenge rating equal to your level or lower. The creature can't be a construct or an undead, and you must have seen the sort of creature at least once. You transform into an average example of that creature, one without any class levels or the Spellcasting trait. Your game statistics are replaced by the statistics of the chosen creature, though you retain your alignment and Intelligence, Wisdom, and Charisma scores. You also retain all of your skill and saving throw proficiencies, in addition to gaining those of the creature. If the creature has the same proficiency as you and the bonus listed in its statistics is higher than yours, use the creature's bonus in place of yours. You can't use any legendary actions or lair actions of the new form. You assume the hit points and Hit Dice of the new form. When you revert to your normal form, you return to the number of hit points you had before you transformed. If you revert as a result of dropping to 0 hit points, any excess damage carries over to your normal form. As long as the excess damage doesn't reduce your normal form to 0 hit points, you aren't knocked unconscious. You retain the benefit of any features from your class, race, or other source and can use them, provided that your new form is physically capable of doing so. You can't use any special senses you have (for example, darkvision) unless your new form also has that sense. You can only speak if the creature can normally speak. When you transform, you choose whether your equipment falls to the ground, merges into the new form, or is worn by it. Worn equipment functions as normal. The GM determines whether it is practical for the new form to wear a piece of equipment, based on the creature's shape and size. Your equipment doesn't change shape or size to match the new form, and any equipment that the new form can't wear must either fall to the ground or merge into your new form. Equipment that merges has no effect in that state. During this spell's duration, you can use your action to assume a different form following the same restrictions and rules for the original form, with one exception: if your new form has more hit points than your current one, your hit points remain at their current value.","higherEn":""},{"id":"shatter","srd":true,"name":"Frantumare","nameEn":"Shatter","level":2,"school":"Invocazione","castTime":"1 Azione","range":"18 m","duration":"Istantanea","components":"V, S, M","material":"A burst of mica.","concentration":false,"ritual":false,"attack":null,"damage":{"type":"Thunder","scale":"slot","table":{"2":"3d8","3":"4d8","4":"5d8","5":"6d8","6":"7d8","7":"8d8","8":"9d8","9":"10d8"}},"dc":{"ability":"Costituzione","success":"half"},"classes":["Bard","Sorcerer","Warlock","Wizard"],"classesHb":["Bardo","Invocatore","Mago","Stregone"],"effects":"Esplosione sonora: 3d8 tuono (TS Cos dimezza); oggetti fragili svantaggio.","desc":"","descEn":"A sudden loud ringing noise, painfully intense, erupts from a point of your choice within range. Each creature in a 10-foot-radius sphere centered on that point must make a Constitution saving throw. A creature takes 3d8 thunder damage on a failed save, or half as much damage on a successful one. A creature made of inorganic material such as stone, crystal, or metal has disadvantage on this saving throw. A non-magical item that is not worn or carried also suffers damage if it is in the area of the spell.","higherEn":"When you cast this spell using a 3 or higher level spell slot, the damage of the spell increases by 1d8 for each level of higher spell slot 2.","userName":"Frantumare"},{"id":"shield","srd":true,"name":"Scudo","nameEn":"Shield","level":1,"school":"Abiurazione","castTime":"1 Reazione","range":"Personale","duration":"1 round","components":"V, S","material":null,"concentration":false,"ritual":false,"attack":null,"damage":null,"dc":null,"classes":["Sorcerer","Wizard"],"classesHb":["Mago","Stregone"],"effects":"Aumenta la CA di +5 fino al tuo prossimo turno e annulla dardi magici.","desc":"","descEn":"An invisible barrier of magical force appears and protects you. Until the start of your next turn, you have a +5 bonus to AC, including against the triggering attack, and you take no damage from magic missile.","higherEn":"","userName":"Scudo"},{"id":"shield-of-faith","srd":true,"name":"Scudo della Fede","nameEn":"Shield of Faith","level":1,"school":"Abiurazione","castTime":"1 Azione Bonus","range":"18 m","duration":"Concentrazione, fino a 10 minuti","components":"V, S, M","material":"A small parchment with a bit of holy text written on it.","concentration":true,"ritual":false,"attack":null,"damage":null,"dc":null,"classes":["Cleric","Paladin"],"classesHb":["Chierico","Paladino"],"effects":"Una creatura a scelta ottiene +2 CA entro 18 m, finché mantieni la concentrazione.","desc":"","descEn":"A shimmering field appears and surrounds a creature of your choice within range, granting it a +2 bonus to AC for the duration.","higherEn":"","userName":"Scudo della Fede"},{"id":"shillelagh","srd":true,"name":"Bastone Incantato","nameEn":"Shillelagh","level":0,"school":"Trasmutazione","castTime":"1 Azione Bonus","range":"Contatto","duration":"1 minuto","components":"V, S, M","material":"Mistletoe, a shamrock leaf, and a club or quarterstaff.","concentration":false,"ritual":false,"attack":null,"damage":null,"dc":null,"classes":["Druid"],"classesHb":["Druido"],"effects":"Imbevi un randello o un bastone ferrato del potere della natura: per la durata usi la caratteristica da incantatore al posto della Forza per attacco e danni, e il dado danni diventa d8. L'arma diventa magica.","desc":"Il legno di un randello o di un bastone ferrato che impugni viene imbevuto del potere della natura. Per la durata, puoi usare la tua caratteristica da incantatore al posto della Forza per i tiri per colpire e di danno degli attacchi in mischia con quell'arma, e il dado danni dell'arma diventa un d8. L'arma diventa inoltre magica, se non lo è già. L'incantesimo termina se lo lanci di nuovo o se lasci andare l'arma.","descEn":"The wood of a club or a quarterstaff you are holding is imbued with nature's power. For the duration, you can use your spellcasting ability instead of Strength for the attack and damage rolls of melee attacks using that weapon, and the weapon's damage die becomes a d8. The weapon also becomes magical, if it isn't already. The spell ends if you cast it again or if you let go of the weapon.","higherEn":""},{"id":"shocking-grasp","srd":true,"name":"Stretta Folgorante","nameEn":"Shocking Grasp","level":0,"school":"Invocazione","castTime":"1 Azione","range":"Contatto","duration":"Istantanea","components":"V, S","material":null,"concentration":false,"ritual":false,"attack":"melee","damage":{"type":"Lightning","scale":"char","table":{"1":"1d8","5":"2d8","11":"3d8","17":"4d8"}},"dc":null,"classes":["Sorcerer","Wizard"],"classesHb":["Mago","Stregone"],"effects":"Attacco in mischia che infligge 1d8 danni da fulmine e impedisce reazioni al bersaglio.","desc":"Un fulmine scaturisce dalla tua mano per scaricarsi su una creatura che cerchi di toccare. Effettua un attacco magico in mischia: hai vantaggio al tiro per colpire se il bersaglio indossa un'armatura di metallo. A segno, il bersaglio subisce 1d8 danni da fulmine e non può effettuare reazioni fino all'inizio del suo prossimo turno. I danni aumentano di 1d8 al 5° livello (2d8), all'11° (3d8) e al 17° (4d8).","descEn":"Lightning springs from your hand to deliver a shock to a creature you try to touch. Make a melee spell attack against the target. You have advantage on the attack roll if the target is wearing armor made of metal. On a hit, the target takes 1d8 lightning damage, and it can't take reactions until the start of its next turn. The spell's damage increases by 1d8 when you reach 5th level (2d8), 11th level (3d8), and 17th level (4d8).","higherEn":"","userName":"Stretta Folgorante"},{"id":"silence","srd":true,"name":"Silenzio","nameEn":"Silence","level":2,"school":"Illusione","castTime":"1 Azione (Rituale)","range":"36 m","duration":"Concentrazione, fino a 10 minuti","components":"V, S","material":null,"concentration":true,"ritual":true,"attack":null,"damage":null,"dc":null,"classes":["Bard","Cleric","Ranger"],"classesHb":["Bardo","Chierico","Ranger"],"effects":"Crea una zona di assoluto silenzio, impedendo la comunicazione verbale e lanciare incantesimi con componenti verbali.","desc":"","descEn":"For the duration, no sound can be created within or pass through a 20-foot-radius sphere centered on a point you choose within range. Any creature or object entirely inside the sphere is immune to thunder damage, and creatures are deafened while entirely inside it. Casting a spell that includes a verbal component is impossible there.","higherEn":"","userName":"Zona di Silenzio"},{"id":"silent-image","srd":true,"name":"Immagine Silente","nameEn":"Silent Image","level":1,"school":"Illusione","castTime":"1 Azione","range":"18 m","duration":"Concentrazione, fino a 10 minuti","components":"V, S, M","material":"A bit of fleece.","concentration":true,"ritual":false,"attack":null,"damage":null,"dc":null,"classes":["Bard","Sorcerer","Wizard"],"classesHb":["Bardo","Mago","Stregone"],"effects":"Crea un’immagine illusoria statica di 4,5 m di lato.","desc":"","descEn":"You create the image of an object, a creature, or some other visible phenomenon that is no larger than a 15-foot cube. The image appears at a spot within range and lasts for the duration. The image is purely visual; it isn't accompanied by sound, smell, or other sensory effects. You can use your action to cause the image to move to any spot within range. As the image changes location, you can alter its appearance so that its movements appear natural for the image. For example, if you create an image of a creature and move it, you can alter the image so that it appears to be walking. Physical interaction with the image reveals it to be an illusion, because things can pass through it. A creature that uses its action to examine the image can determine that it is an illusion with a successful Intelligence (Investigation) check against your spell save DC. If a creature discerns the illusion for what it is, the creature can see through the image.","higherEn":"","userName":"Immagine Silenziosa"},{"id":"simulacrum","srd":true,"name":"Simulacro","nameEn":"Simulacrum","level":7,"school":"Illusione","castTime":"12 Ore","range":"Contatto","duration":"Finché non dissolto","components":"V, S, M","material":"Snow or ice in quantities sufficient to made a life-size copy of the duplicated creature; some hair, fingernail clippings, or other piece of that creature's body placed inside the snow or ice; and powdered ruby worth 1,500 gp, sprinkled over the duplicate and consumed by the spell.","concentration":false,"ritual":false,"attack":null,"damage":null,"dc":null,"classes":["Wizard"],"classesHb":["Mago"],"effects":"","desc":"","descEn":"You shape an illusory duplicate of one beast or humanoid that is within range for the entire casting time of the spell. The duplicate is a creature, partially real and formed from ice or snow, and it can take actions and otherwise be affected as a normal creature. It appears to be the same as the original, but it has half the creature's hit point maximum and is formed without any equipment. Otherwise, the illusion uses all the statistics of the creature it duplicates. The simulacrum is friendly to you and creatures you designate. It obeys your spoken commands, moving and acting in accordance with your wishes and acting on your turn in combat. The simulacrum lacks the ability to learn or become more powerful, so it never increases its level or other abilities, nor can it regain expended spell slots. If the simulacrum is damaged, you can repair it in an alchemical laboratory, using rare herbs and minerals worth 100 gp per hit point it regains. The simulacrum lasts until it drops to 0 hit points, at which point it reverts to snow and melts instantly. If you cast this spell again, any currently active duplicates you created with this spell are instantly destroyed.","higherEn":""},{"id":"sleep","srd":true,"name":"Sonno","nameEn":"Sleep","level":1,"school":"Ammaliamento","castTime":"1 Azione","range":"27 m","duration":"1 minuto","components":"V, S, M","material":"A pinch of fine sand, rose petals, or a cricket.","concentration":false,"ritual":false,"attack":null,"damage":{"type":null,"scale":"slot","table":{"1":"5d8"}},"dc":null,"classes":["Bard","Sorcerer","Wizard"],"classesHb":["Bardo","Mago","Stregone"],"effects":"Addormenta 5d8 PF di creature a partire dai PF più bassi.","desc":"","descEn":"This spell sends creatures into a magical slumber. Roll 5d8; the total is how many hit points of creatures this spell can affect. Creatures within 20 feet of a point you choose within range are affected in ascending order of their current hit points (ignoring unconscious creatures). Starting with the creature that has the lowest current hit points, each creature affected by this spell falls unconscious until the spell ends, the sleeper takes damage, or someone uses an action to shake or slap the sleeper awake. Subtract each creature's hit points from the total before moving on to the creature with the next lowest hit points. A creature's hit points must be equal to or less than the remaining total for that creature to be affected. Undead and creatures immune to being charmed aren't affected by this spell.","higherEn":"When you cast this spell using a spell slot of 2nd level or higher, roll an additional 2d8 for each slot level above 1st.","userName":"Sonno"},{"id":"sleet-storm","srd":true,"name":"Tempesta di Nevischio","nameEn":"Sleet Storm","level":3,"school":"Evocazione","castTime":"1 Azione","range":"45 m","duration":"Concentrazione, fino a 1 minuto","components":"V, S, M","material":"A pinch of dust and a few drops of water.","concentration":true,"ritual":false,"attack":null,"damage":null,"dc":null,"classes":["Druid","Sorcerer","Wizard"],"classesHb":["Druido","Mago","Stregone"],"effects":"","desc":"","descEn":"Until the spell ends, freezing rain and sleet fall in a 20-foot-tall cylinder with a 40-foot radius centered on a point you choose within range. The area is heavily obscured, and exposed flames in the area are doused. The ground in the area is covered with slick ice, making it difficult terrain. When a creature enters the spell's area for the first time on a turn or starts its turn there, it must make a dexterity saving throw. On a failed save, it falls prone. If a creature is concentrating in the spell's area, the creature must make a successful constitution saving throw against your spell save DC or lose concentration.","higherEn":""},{"id":"slow","srd":true,"name":"Lentezza","nameEn":"Slow","level":3,"school":"Trasmutazione","castTime":"1 Azione","range":"36 m","duration":"Concentrazione, fino a 1 minuto","components":"V, S, M","material":"A drop of molasses.","concentration":true,"ritual":false,"attack":null,"damage":null,"dc":{"ability":"Saggezza","success":"none"},"classes":["Sorcerer","Wizard"],"classesHb":["Mago","Stregone"],"effects":"","desc":"","descEn":"You alter time around up to six creatures of your choice in a 40-foot cube within range. Each target must succeed on a wisdom saving throw or be affected by this spell for the duration. An affected target's speed is halved, it takes a -2 penalty to AC and dexterity saving throws, and it can't use reactions. On its turn, it can use either an action or a bonus action, not both. Regardless of the creature's abilities or magic items, it can't make more than one melee or ranged attack during its turn. If the creature attempts to cast a spell with a casting time of 1 action, roll a d20. On an 11 or higher, the spell doesn't take effect until the creature's next turn, and the creature must use its action on that turn to complete the spell. If it can't, the spell is wasted. A creature affected by this spell makes another wisdom saving throw at the end of its turn. On a successful save, the effect ends for it.","higherEn":""},{"id":"spare-the-dying","srd":true,"name":"Stabilizzare un Morente","nameEn":"Spare the Dying","level":0,"school":"Necromanzia","castTime":"1 Azione","range":"Contatto","duration":"Istantanea","components":"V, S","material":null,"concentration":false,"ritual":false,"attack":null,"damage":null,"dc":null,"classes":["Cleric"],"classesHb":["Chierico"],"effects":"Stabilizza immediatamente una creatura morente (0 PF).","desc":"Tocchi una creatura vivente con 0 punti ferita: la creatura si stabilizza. L'incantesimo non ha effetto su non morti o costrutti.","descEn":"You touch a living creature that has 0 hit points. The creature becomes stable. This spell has no effect on undead or constructs.","higherEn":"","userName":"Risparmiare i Morenti"},{"id":"speak-with-animals","srd":true,"name":"Parlare con gli Animali","nameEn":"Speak with Animals","level":1,"school":"Divinazione","castTime":"1 Azione (Rituale)","range":"Personale","duration":"10 minuti","components":"V, S","material":null,"concentration":false,"ritual":true,"attack":null,"damage":null,"dc":null,"classes":["Bard","Druid","Ranger"],"classesHb":["Bardo","Druido","Ranger"],"effects":"Puoi comunicare verbalmente con le bestie.","desc":"","descEn":"You gain the ability to comprehend and verbally communicate with beasts for the duration. The knowledge and awareness of many beasts is limited by their intelligence, but at a minimum, beasts can give you information about nearby locations and monsters, including whatever they can perceive or have perceived within the past day. You might be able to persuade a beast to perform a small favor for you, at the GM's discretion.","higherEn":"","userName":"Parlare con gli Animali"},{"id":"speak-with-dead","srd":true,"name":"Parlare con i Morti","nameEn":"Speak with Dead","level":3,"school":"Necromanzia","castTime":"1 Azione","range":"3 m","duration":"10 minuti","components":"V, S, M","material":"Burning incense.","concentration":false,"ritual":false,"attack":null,"damage":null,"dc":null,"classes":["Bard","Cleric"],"classesHb":["Bardo","Chierico"],"effects":"Consente di fare fino a 5 domande a un cadavere.","desc":"","descEn":"You grant the semblance of life and intelligence to a corpse of your choice within range, allowing it to answer the questions you pose. The corpse must still have a mouth and can't be undead. The spell fails if the corpse was the target of this spell within the last 10 days. Until the spell ends, you can ask the corpse up to five questions. The corpse knows only what it knew in life, including the languages it knew. Answers are usually brief, cryptic, or repetitive, and the corpse is under no compulsion to offer a truthful answer if you are hostile to it or it recognizes you as an enemy. This spell doesn't return the creature's soul to its body, only its animating spirit. Thus, the corpse can't learn new information, doesn't comprehend anything that has happened since it died, and can't speculate about future events.","higherEn":"","userName":"Parlare con i Morti"},{"id":"speak-with-plants","srd":true,"name":"Parlare con le Piante","nameEn":"Speak with Plants","level":3,"school":"Trasmutazione","castTime":"1 Azione","range":"Personale","duration":"10 minuti","components":"V, S","material":null,"concentration":false,"ritual":false,"attack":null,"damage":null,"dc":null,"classes":["Bard","Druid","Ranger"],"classesHb":["Bardo","Druido","Ranger"],"effects":"","desc":"","descEn":"You imbue plants within 30 feet of you with limited sentience and animation, giving them the ability to communicate with you and follow your simple commands. You can question plants about events in the spell's area within the past day, gaining information about creatures that have passed, weather, and other circumstances. You can also turn difficult terrain caused by plant growth (such as thickets and undergrowth) into ordinary terrain that lasts for the duration. Or you can turn ordinary terrain where plants are present into difficult terrain that lasts for the duration, causing vines and branches to hinder pursuers, for example. Plants might be able to perform other tasks on your behalf, at the GM's discretion. The spell doesn't enable plants to uproot themselves and move about, but they can freely move branches, tendrils, and stalks. If a plant creature is in the area, you can communicate with it as if you shared a common language, but you gain no magical ability to influence it. This spell can cause the plants created by the entangle spell to release a restrained creature.","higherEn":""},{"id":"spider-climb","srd":true,"name":"Scalata del Ragno","nameEn":"Spider Climb","level":2,"school":"Trasmutazione","castTime":"1 Azione","range":"Contatto","duration":"Concentrazione, fino a 1 ora","components":"V, S, M","material":"A drop of bitumen and a spider.","concentration":true,"ritual":false,"attack":null,"damage":null,"dc":null,"classes":["Sorcerer","Warlock","Wizard"],"classesHb":["Invocatore","Mago","Stregone"],"effects":"","desc":"","descEn":"Until the spell ends, one willing creature you touch gains the ability to move up, down, and across vertical surfaces and upside down along ceilings, while leaving its hands free. The target also gains a climbing speed equal to its walking speed.","higherEn":""},{"id":"spike-growth","srd":true,"name":"Crescita di Spine","nameEn":"Spike Growth","level":2,"school":"Trasmutazione","castTime":"1 Azione","range":"45 m","duration":"Concentrazione, fino a 10 minuti","components":"V, S, M","material":"Seven sharp thorns or seven small twigs, each sharpened to a point.","concentration":true,"ritual":false,"attack":null,"damage":null,"dc":null,"classes":["Druid","Ranger"],"classesHb":["Druido","Ranger"],"effects":"","desc":"","descEn":"The ground in a 20-foot radius centered on a point within range twists and sprouts hard spikes and thorns. The area becomes difficult terrain for the duration. When a creature moves into or within the area, it takes 2d4 piercing damage for every 5 feet it travels. The transformation of the ground is camouflaged to look natural. Any creature that can't see the area at the time the spell is cast can make a Wisdom (Perception) check against your spell save DC to recognize the terrain as hazardous before entering it.","higherEn":""},{"id":"spirit-guardians","srd":true,"name":"Spiriti Guardiani","nameEn":"Spirit Guardians","level":3,"school":"Evocazione","castTime":"1 Azione","range":"Personale","duration":"Concentrazione, fino a 10 minuti","components":"V, S, M","material":"A holy symbol.","concentration":true,"ritual":false,"attack":null,"damage":null,"dc":null,"classes":["Cleric"],"classesHb":["Chierico"],"effects":"Spiriti protettivi causano 3d8 danni radianti o necrotici alle creature ostili.","desc":"","descEn":"You call forth spirits to protect you. They flit around you to a distance of 15 feet for the duration. If you are good or neutral, their spectral form appears angelic or fey (your choice). If you are evil, they appear fiendish. When you cast this spell, you can designate any number of creatures you can see to be unaffected by it. An affected creature's speed is halved in the area, and when the creature enters the area for the first time on a turn or starts its turn there, it must make a wisdom saving throw. On a failed save, the creature takes 3d8 radiant damage (if you are good or neutral) or 3d8 necrotic damage (if you are evil). On a successful save, the creature takes half as much damage.","higherEn":"When you cast this spell using a spell slot of 4th level or higher, the damage increases by 1d8 for each slot level above 3rd.","userName":"Guardiani Spirituali"},{"id":"spiritual-weapon","srd":true,"name":"Arma Spirituale","nameEn":"Spiritual Weapon","level":2,"school":"Invocazione","castTime":"1 Azione Bonus","range":"18 m","duration":"1 minuto","components":"V, S","material":null,"concentration":false,"ritual":false,"attack":"melee","damage":{"type":"Force","scale":"slot","table":{"2":"1d8 + MOD","3":"1d8 + MOD","4":"2d8 + MOD","5":"2d8 + MOD","6":"3d8 + MOD","7":"3d8 + MOD","8":"4d8 + MOD","9":"4d8 + MOD"}},"dc":null,"classes":["Cleric"],"classesHb":["Chierico"],"effects":"Evoca un'arma che attacca autonomamente infliggendo 1d8 + mod. Saggezza danni da forza.","desc":"","descEn":"You create a floating, spectral weapon within range that lasts for the duration or until you cast this spell again. When you cast the spell, you can make a melee spell attack against a creature within 5 feet of the weapon. On a hit, the target takes force damage equal to 1d8 + your spellcasting ability modifier. As a bonus action on your turn, you can move the weapon up to 20 feet and repeat the attack against a creature within 5 feet of it. The weapon can take whatever form you choose. Clerics of deities who are associated with a particular weapon (as St. Cuthbert is known for his mace and Thor for his hammer) make this spell's effect resemble that weapon.","higherEn":"When you cast this spell using a spell slot of 3rd level or higher, the damage increases by 1d8 for every two slot levels above the 2nd.","userName":"Arma Spirituale"},{"id":"stinking-cloud","srd":true,"name":"Nube Mefitica","nameEn":"Stinking Cloud","level":3,"school":"Evocazione","castTime":"1 Azione","range":"27 m","duration":"Concentrazione, fino a 1 minuto","components":"V, S, M","material":"A rotten egg or several skunk cabbage leaves.","concentration":true,"ritual":false,"attack":null,"damage":null,"dc":{"ability":"Costituzione","success":"none"},"classes":["Bard","Sorcerer","Wizard"],"classesHb":["Bardo","Mago","Stregone"],"effects":"","desc":"","descEn":"You create a 20-foot-radius sphere of yellow, nauseating gas centered on a point within range. The cloud spreads around corners, and its area is heavily obscured. The cloud lingers in the air for the duration. Each creature that is completely within the cloud at the start of its turn must make a constitution saving throw against poison. On a failed save, the creature spends its action that turn retching and reeling. Creatures that don't need to breathe or are immune to poison automatically succeed on this saving throw. A moderate wind (at least 10 miles per hour) disperses the cloud after 4 rounds. A strong wind (at least 20 miles per hour) disperses it after 1 round.","higherEn":""},{"id":"stone-shape","srd":true,"name":"Plasmare la Pietra","nameEn":"Stone Shape","level":4,"school":"Trasmutazione","castTime":"1 Azione","range":"Contatto","duration":"Istantanea","components":"V, S, M","material":"Soft clay, to be crudely worked into the desired shape for the stone object.","concentration":false,"ritual":false,"attack":null,"damage":null,"dc":null,"classes":["Cleric","Druid","Wizard"],"classesHb":["Chierico","Druido","Mago"],"effects":"","desc":"","descEn":"You touch a stone object of Medium size or smaller or a section of stone no more than 5 feet in any dimension and form it into any shape that suits your purpose. So, for example, you could shape a large rock into a weapon, idol, or coffer, or make a small passage through a wall, as long as the wall is less than 5 feet thick. You could also shape a stone door or its frame to seal the door shut. The object you create can have up to two hinges and a latch, but finer mechanical detail isn't possible.","higherEn":""},{"id":"stoneskin","srd":true,"name":"Pelle di Pietra","nameEn":"Stoneskin","level":4,"school":"Abiurazione","castTime":"1 Azione","range":"Contatto","duration":"Concentrazione, fino a 1 ora","components":"V, S, M","material":"Diamond dust worth 100 gp, which the spell consumes.","concentration":true,"ritual":false,"attack":null,"damage":null,"dc":null,"classes":["Druid","Ranger","Sorcerer","Wizard"],"classesHb":["Druido","Mago","Ranger","Stregone"],"effects":"","desc":"","descEn":"This spell turns the flesh of a willing creature you touch as hard as stone. Until the spell ends, the target has resistance to nonmagical bludgeoning, piercing, and slashing damage.","higherEn":""},{"id":"storm-of-vengeance","srd":true,"name":"Tempesta della Vendetta","nameEn":"Storm of Vengeance","level":9,"school":"Evocazione","castTime":"1 Azione","range":"Vista","duration":"Concentrazione, fino a 1 minuto","components":"V, S","material":null,"concentration":true,"ritual":false,"attack":null,"damage":{"type":"Thunder","scale":"slot","table":{"9":"2d6"}},"dc":{"ability":"Costituzione","success":"none"},"classes":["Druid"],"classesHb":["Druido"],"effects":"","desc":"","descEn":"A churning storm cloud forms, centered on a point you can see and spreading to a radius of 360 feet. Lightning flashes in the area, thunder booms, and strong winds roar. Each creature under the cloud (no more than 5,000 feet beneath the cloud) when it appears must make a constitution saving throw. On a failed save, a creature takes 2d6 thunder damage and becomes deafened for 5 minutes. Each round you maintain concentration on this spell, the storm produces additional effects on your turn. ***Round 2.*** Acidic rain falls from the cloud. Each creature and object under the cloud takes 1d6 acid damage. ***Round 3.*** You call six bolts of lightning from the cloud to strike six creatures or objects of your choice beneath the cloud. A given creature or object can't be struck by more than one bolt. A struck creature must make a dexterity saving throw. The creature takes 10d6 lightning damage on a failed save, or half as much damage on a successful one. ***Round 4.*** Hailstones rain down from the cloud. Each creature under the cloud takes 2d6 bludgeoning damage. ***Round 5-10.*** Gusts and freezing rain assail the area under the cloud. The area becomes difficult terrain and is heavily obscured. Each creature there takes 1d6 cold damage. Ranged weapon attacks in the area are impossible. The wind and rain count as a severe distraction for the purposes of maintaining concentration on spells. Finally, gusts of strong wind (ranging from 20 to 50 miles per hour) automatically disperse fog, mists, and similar phenomena in the area, whether mundane or magical.","higherEn":""},{"id":"suggestion","srd":true,"name":"Suggestione","nameEn":"Suggestion","level":2,"school":"Ammaliamento","castTime":"1 Azione","range":"9 m","duration":"Concentrazione, fino a 8 ore","components":"V, M","material":"A snake's tongue and either a bit of honeycomb or a drop of sweet oil.","concentration":true,"ritual":false,"attack":null,"damage":null,"dc":{"ability":"Saggezza","success":"none"},"classes":["Bard","Sorcerer","Warlock","Wizard"],"classesHb":["Bardo","Invocatore","Mago","Stregone"],"effects":"Induce un’azione/ragionamento (TS Sag nega); nessun danno.","desc":"","descEn":"You suggest a course of activity (limited to a sentence or two) and magically influence a creature you can see within range that can hear and understand you. Creatures that can't be charmed are immune to this effect. The suggestion must be worded in such a manner as to make the course of action sound reasonable. Asking the creature to stab itself, throw itself onto a spear, immolate itself, or do some other obviously harmful act ends the spell. The target must make a wisdom saving throw. On a failed save, it pursues the course of action you described to the best of its ability. The suggested course of action can continue for the entire duration. If the suggested activity can be completed in a shorter time, the spell ends when the subject finishes what it was asked to do. You can also specify conditions that will trigger a special activity during the duration. For example, you might suggest that a knight give her warhorse to the first beggar she meets. If the condition isn't met before the spell expires, the activity isn't performed. If you or any of your companions damage the target, the spell ends.","higherEn":"","userName":"Suggestione"},{"id":"sunbeam","srd":true,"name":"Raggio Solare","nameEn":"Sunbeam","level":6,"school":"Invocazione","castTime":"1 Azione","range":"Personale","duration":"Concentrazione, fino a 1 minuto","components":"V, S, M","material":"A magnifying glass.","concentration":true,"ritual":false,"attack":null,"damage":{"type":"Radiant","scale":"slot","table":{"6":"6d8"}},"dc":{"ability":"Costituzione","success":"half"},"classes":["Druid","Sorcerer","Wizard"],"classesHb":["Druido","Mago","Stregone"],"effects":"","desc":"","descEn":"A beam of brilliant light flashes out from your hand in a 5-foot-wide, 60-foot-long line. Each creature in the line must make a constitution saving throw. On a failed save, a creature takes 6d8 radiant damage and is blinded until your next turn. On a successful save, it takes half as much damage and isn't blinded by this spell. Undead and oozes have disadvantage on this saving throw. You can create a new line of radiance as your action on any turn until the spell ends. For the duration, a mote of brilliant radiance shines in your hand. It sheds bright light in a 30-foot radius and dim light for an additional 30 feet. This light is sunlight.","higherEn":""},{"id":"sunburst","srd":true,"name":"Esplosione Solare","nameEn":"Sunburst","level":8,"school":"Invocazione","castTime":"1 Azione","range":"45 m","duration":"Istantanea","components":"V, S, M","material":"Fire and a piece of sunstone.","concentration":false,"ritual":false,"attack":null,"damage":{"type":"Radiant","scale":"slot","table":{"8":"12d6"}},"dc":{"ability":"Costituzione","success":"half"},"classes":["Druid","Sorcerer","Wizard"],"classesHb":["Druido","Mago","Stregone"],"effects":"","desc":"","descEn":"Brilliant sunlight flashes in a 60-foot radius centered on a point you choose within range. Each creature in that light must make a constitution saving throw. On a failed save, a creature takes 12d6 radiant damage and is blinded for 1 minute. On a successful save, it takes half as much damage and isn't blinded by this spell. Undead and oozes have disadvantage on this saving throw. A creature blinded by this spell makes another constitution saving throw at the end of each of its turns. On a successful save, it is no longer blinded. This spell dispels any darkness in its area that was created by a spell.","higherEn":""},{"id":"symbol","srd":true,"name":"Simbolo","nameEn":"Symbol","level":7,"school":"Abiurazione","castTime":"1 Minuto","range":"Contatto","duration":"Finché non dissolto","components":"V, S, M","material":"Mercury, phosphorus, and powdered diamond and opal with a total value of at least 1,000 gp, which the spell consumes.","concentration":false,"ritual":false,"attack":null,"damage":null,"dc":null,"classes":["Bard","Cleric","Wizard"],"classesHb":["Bardo","Chierico","Mago"],"effects":"","desc":"","descEn":"When you cast this spell, you inscribe a harmful glyph either on a surface (such as a section of floor, a wall, or a table) or within an object that can be closed to conceal the glyph (such as a book, a scroll, or a treasure chest). If you choose a surface, the glyph can cover an area of the surface no larger than 10 feet in diameter. If you choose an object, that object must remain in its place; if the object is moved more than 10 feet from where you cast this spell, the glyph is broken, and the spell ends without being triggered. The glyph is nearly invisible, requiring an Intelligence (Investigation) check against your spell save DC to find it. You decide what triggers the glyph when you cast the spell. For glyphs inscribed on a surface, the most typical triggers include touching or stepping on the glyph, removing another object covering it, approaching within a certain distance of it, or manipulating the object that holds it. For glyphs inscribed within an object, the most common triggers are opening the object, approaching within a certain distance of it, or seeing or reading the glyph. You can further refine the trigger so the spell is activated only under certain circumstances or according to a creature's physical characteristics (such as height or weight), or physical kind (for example, the ward could be set to affect hags or shapechangers). You can also specify creatures that don't trigger the glyph, such as those who say a certain password. When you inscribe the glyph, choose one of the options below for its effect. Once triggered, the glyph glows, filling a 60-foot-radius sphere with dim light for 10 minutes, after which time the spell ends. Each creature in the sphere when the glyph activates is targeted by its effect, as is a creature that enters the sphere for the first time on a turn or ends its turn there. ***Death.*** Each target must make a constitution saving throw, taking 10d 10 necrotic damage on a failed save, or half as much damage on a successful save. ***Discord.*** Each target must make a constitution saving throw. On a failed save, a target bickers and argues with other creatures for 1 minute. During this time, it is incapable of meaningful communication and has disadvantage on attack rolls and ability checks. ***Fear.*** Each target must make a wisdom saving throw and becomes frightened for 1 minute on a failed save. While frightened, the target drops whatever it is holding and must move at least 30 feet away from the glyph on each of its turns, if able. ***Hopelessness.*** Each target must make a charisma saving throw. On a failed save, the target is overwhelmed with despair for 1 minute. During this time, it can't attack or target any creature with harmful abilities, spells, or other magical effects. ***Insanity.*** Each target must make an intelligence saving throw. On a failed save, the target is driven insane for 1 minute. An insane creature can't take actions, can't understand what other creatures say, can't read, and speaks only in gibberish. The GM controls its movement, which is erratic. ***Pain.*** Each target must make a constitution saving throw and becomes incapacitated with excruciating pain for 1 minute on a failed save. ***Sleep.*** Each target must make a wisdom saving throw and falls unconscious for 10 minutes on a failed save. A creature awakens if it takes damage or if someone uses an action to shake or slap it awake. ***Stunning.*** Each target must make a wisdom saving throw and becomes stunned for 1 minute on a failed save.","higherEn":""},{"id":"telekinesis","srd":true,"name":"Telecinesi","nameEn":"Telekinesis","level":5,"school":"Trasmutazione","castTime":"1 Azione","range":"18 m","duration":"Concentrazione, fino a 10 minuti","components":"V, S","material":null,"concentration":true,"ritual":false,"attack":null,"damage":null,"dc":null,"classes":["Sorcerer","Wizard"],"classesHb":["Mago","Stregone"],"effects":"","desc":"","descEn":"You gain the ability to move or manipulate creatures or objects by thought. When you cast the spell, and as your action each round for the duration, you can exert your will on one creature or object that you can see within range, causing the appropriate effect below. You can affect the same target round after round, or choose a new one at any time. If you switch targets, the prior target is no longer affected by the spell. ***Creature.*** You can try to move a Huge or smaller creature. Make an ability check with your spellcasting ability contested by the creature's Strength check. If you win the contest, you move the creature up to 30 feet in any direction, including upward but not beyond the range of this spell. Until the end of your next turn, the creature is restrained in your telekinetic grip. A creature lifted upward is suspended in mid-air. On subsequent rounds, you can use your action to attempt to maintain your telekinetic grip on the creature by repeating the contest. ***Object.*** You can try to move an object that weighs up to 1,000 pounds. If the object isn't being worn or carried, you automatically move it up to 30 feet in any direction, but not beyond the range of this spell. If the object is worn or carried by a creature, you must make an ability check with your spellcasting ability contested by that creature's Strength check. If you succeed, you pull the object away from that creature and can move it up to 30 feet in any direction but not beyond the range of this spell. You can exert fine control on objects with your telekinetic grip, such as manipulating a simple tool, opening a door or a container, stowing or retrieving an item from an open container, or pouring the contents from a vial.","higherEn":""},{"id":"telepathic-bond","srd":true,"name":"Legame Telepatico","nameEn":"Telepathic Bond","level":5,"school":"Divinazione","castTime":"1 Azione (Rituale)","range":"9 m","duration":"1 ora","components":"V, S, M","material":"Pieces of eggshell from two different kinds of creatures","concentration":false,"ritual":true,"attack":null,"damage":null,"dc":null,"classes":["Wizard"],"classesHb":["Mago"],"effects":"","desc":"","descEn":"You forge a telepathic link among up to eight willing creatures of your choice within range, psychically linking each creature to all the others for the duration. Creatures with Intelligence scores of 2 or less aren't affected by this spell. Until the spell ends, the targets can communicate telepathically through the bond whether or not they have a common language. The communication is possible over any distance, though it can't extend to other planes of existence.","higherEn":""},{"id":"teleport","srd":true,"name":"Teletrasporto","nameEn":"Teleport","level":7,"school":"Evocazione","castTime":"1 Azione","range":"3 m","duration":"Istantanea","components":"V","material":null,"concentration":false,"ritual":false,"attack":null,"damage":null,"dc":null,"classes":["Bard","Sorcerer","Wizard"],"classesHb":["Bardo","Mago","Stregone"],"effects":"","desc":"","descEn":"This spell instantly transports you and up to eight willing creatures of your choice that you can see within range, or a single object that you can see within range, to a destination you select. If you target an object, it must be able to fit entirely inside a 10-foot cube, and it can't be held or carried by an unwilling creature. The destination you choose must be known to you, and it must be on the same plane of existence as you. Your familiarity with the destination determines whether you arrive there successfully. The GM rolls d100 and consults the table. | Familiarity | Mishap | Similar Area | Off Target | On Target | |---|---|---|---|---| | Permanent circle | -- | -- | -- | 01-100 | | Associated object | -- | -- | -- | 01-100 | | Very familiar | 01-05 | 06-13 | 14-24 | 25-100 | | Seen casually | 01-33 | 34-43 | 44-53 | 54-100 | | Viewed once | 01-43 | 44-53 | 54-73 | 74-100 | | Description | 01-43 | 44-53 | 54-73 | 74-100 | | False destination | 01-50 | 51-100 | -- | -- | ***Familiarity.*** \"Permanent circle\" means a permanent teleportation circle whose sigil sequence you know. \"Associated object\" means that you possess an object taken from the desired destination within the last six months, such as a book from a wizard's library, bed linen from a royal suite, or a chunk of marble from a lich's secret tomb. \"Very familiar\" is a place you have been very often, a place you have carefully studied, or a place you can see when you cast the spell. \"Seen casually\" is someplace you have seen more than once but with which you aren't very familiar. \"Viewed once\" is a place you have seen once, possibly using magic. \"Description\" is a place whose location and appearance you know through someone else's description, perhaps from a map. \"False destination\" is a place that doesn't exist. Perhaps you tried to scry an enemy's sanctum but instead viewed an illusion, or you are attempting to teleport to a familiar location that no longer exists. ***On Target.*** You and your group (or the target object) appear where you want to. ***Off Target.*** You and your group (or the target object) appear a random distance away from the destination in a random direction. Distance off target is 1d10 x 1d10 percent of the distance that was to be traveled. For example, if you tried to travel 120 miles, landed off target, and rolled a 5 and 3 on the two d10s, then you would be off target by 15 percent, or 18 miles. The GM determines the direction off target randomly by rolling a d8 and designating 1 as north, 2 as northeast, 3 as east, and so on around the points of the compass.  If you were teleporting to a coastal city and wound up 18 miles out at sea, you could be in trouble. ***Similar Area.*** You and your group (or the target object) wind up in a different area that's visually or thematically similar to the target area. If you are heading for your home laboratory, for example, you might wind up in another wizard's laboratory or in an alchemical supply shop that has many of the same tools and implements as your laboratory. Generally, you appear in the closest similar place, but since the spell has no range limit, you could conceivably wind up anywhere on the plane. ***Mishap.*** The spell's unpredictable magic results in a difficult journey. Each teleporting creature (or the target object) takes 3d10 force damage, and the GM rerolls on the table to see where you wind up (multiple mishaps can occur, dealing damage each time).","higherEn":""},{"id":"teleportation-circle","srd":true,"name":"Cerchio di Teletrasporto","nameEn":"Teleportation Circle","level":5,"school":"Evocazione","castTime":"1 Minuto","range":"3 m","duration":"1 round","components":"V, M","material":"Rare chalks and inks infused with precious gems with 50 gp, which the spell consumes.","concentration":false,"ritual":false,"attack":null,"damage":null,"dc":null,"classes":["Bard","Sorcerer","Wizard"],"classesHb":["Bardo","Mago","Stregone"],"effects":"","desc":"","descEn":"As you cast the spell, you draw a 10-foot-diameter circle on the ground inscribed with sigils that link your location to a permanent teleportation circle of your choice whose sigil sequence you know and that is on the same plane of existence as you. A shimmering portal opens within the circle you drew and remains open until the end of your next turn. Any creature that enters the portal instantly appears within 5 feet of the destination circle or in the nearest unoccupied space if that space is occupied. Many major temples, guilds, and other important places have permanent teleportation circles inscribed somewhere within their confines. Each such circle includes a unique sigil sequence--a string of magical runes arranged in a particular pattern. When you first gain the ability to cast this spell, you learn the sigil sequences for two destinations on the Material Plane, determined by the GM. You can learn additional sigil sequences during your adventures. You can co
