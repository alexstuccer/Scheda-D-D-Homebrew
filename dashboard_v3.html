 the challenge rating increases by 1 for each slot level above 6th."},{"id":"conjure-minor-elementals","srd":true,"name":"Evocare Elementali Minori","nameEn":"Conjure Minor Elementals","level":4,"school":"Evocazione","castTime":"1 Minuto","range":"27 m","duration":"Concentrazione, fino a 1 ora","components":"V, S","material":null,"concentration":true,"ritual":false,"attack":null,"damage":null,"dc":null,"classes":["Druid","Wizard"],"classesHb":["Druido","Mago"],"effects":"","desc":"","descEn":"You summon elementals that appear in unoccupied spaces that you can see within range. You choose one the following options for what appears: - One elemental of challenge rating 2 or lower - Two elementals of challenge rating 1 or lower - Four elementals of challenge rating 1/2 or lower - Eight elementals of challenge rating 1/4 or lower. An elemental summoned by this spell disappears when it drops to 0 hit points or when the spell ends. The summoned creatures are friendly to you and your companions. Roll initiative for the summoned creatures as a group, which has its own turns. They obey any verbal commands that you issue to them (no action required by you). If you don't issue any commands to them, they defend themselves from hostile creatures, but otherwise take no actions. The GM has the creatures' statistics.","higherEn":"When you cast this spell using certain higher-level spell slots, you choose one of the summoning options above, and more creatures appear: twice as many with a 6th-level slot and three times as many with an 8th-level slot."},{"id":"conjure-woodland-beings","srd":true,"name":"Evocare Esseri Silvani","nameEn":"Conjure Woodland Beings","level":4,"school":"Evocazione","castTime":"1 Azione","range":"18 m","duration":"Concentrazione, fino a 1 ora","components":"V, S, M","material":"One holly berry per creature summoned.","concentration":true,"ritual":false,"attack":null,"damage":null,"dc":null,"classes":["Druid","Ranger"],"classesHb":["Druido","Ranger"],"effects":"","desc":"","descEn":"You summon fey creatures that appear in unoccupied spaces that you can see within range. Choose one of the following options for what appears: - One fey creature of challenge rating 2 or lower - Two fey creatures of challenge rating 1 or lower - Four fey creatures of challenge rating 1/2 or lower - Eight fey creatures of challenge rating 1/4 or lower A summoned creature disappears when it drops to 0 hit points or when the spell ends. The summoned creatures are friendly to you and your companions. Roll initiative for the summoned creatures as a group, which have their own turns. They obey any verbal commands that you issue to them (no action required by you). If you don't issue any commands to them, they defend themselves from hostile creatures, but otherwise take no actions. The GM has the creatures' statistics.","higherEn":"When you cast this spell using certain higher-level spell slots, you choose one of the summoning options above, and more creatures appear: twice as many with a 6th-level slot and three times as many with an 8th-level slot."},{"id":"contact-other-plane","srd":true,"name":"Contattare Altri Piani","nameEn":"Contact Other Plane","level":5,"school":"Divinazione","castTime":"1 Minuto (Rituale)","range":"Personale","duration":"1 minuto","components":"V","material":null,"concentration":false,"ritual":true,"attack":null,"damage":null,"dc":{"ability":"Intelligenza","success":"other"},"classes":["Warlock","Wizard"],"classesHb":["Invocatore","Mago"],"effects":"","desc":"","descEn":"You mentally contact a demigod, the spirit of a long-dead sage, or some other mysterious entity from another plane. Contacting this extraplanar intelligence can strain or even break your mind. When you cast this spell, make a DC 15 intelligence saving throw. On a failure, you take 6d6 psychic damage and are insane until you finish a long rest. While insane, you can't take actions, can't understand what other creatures say, can't read, and speak only in gibberish. A greater restoration spell cast on you ends this effect. On a successful save, you can ask the entity up to five questions. You must ask your questions before the spell ends. The GM answers each question with one word, such as \"yes,\" \"no,\" \"maybe,\" \"never,\" \"irrelevant,\" or \"unclear\" (if the entity doesn't know the answer to the question). If a one-word answer would be misleading, the GM might instead offer a short phrase as an answer.","higherEn":""},{"id":"contagion","srd":true,"name":"Contagio","nameEn":"Contagion","level":5,"school":"Necromanzia","castTime":"1 Azione","range":"Contatto","duration":"7 giorni","components":"V, S","material":null,"concentration":false,"ritual":false,"attack":"melee","damage":null,"dc":{"ability":"Costituzione","success":"other"},"classes":["Cleric","Druid"],"classesHb":["Chierico","Druido"],"effects":"","desc":"","descEn":"Your touch inflicts disease. Make a melee spell attack against a creature within your reach. On a hit, you afflict the creature with a disease of your choice from any of the ones described below. At the end of each of the target's turns, it must make a constitution saving throw. After failing three of these saving throws, the disease's effects last for the duration, and the creature stops making these saves. After succeeding on three of these saving throws, the creature recovers from the disease, and the spell ends. Since this spell induces a natural disease in its target, any effect that removes a disease or otherwise ameliorates a disease's effects apply to it. ***Blinding Sickness.*** Pain grips the creature's mind, and its eyes turn milky white. The creature has disadvantage on wisdom checks and wisdom saving throws and is blinded. ***Filth Fever.*** A raging fever sweeps through the creature's body. The creature has disadvantage on strength checks, strength saving throws, and attack rolls that use Strength. ***Flesh Rot.*** The creature's flesh decays. The creature has disadvantage on Charisma checks and vulnerability to all damage. ***Mindfire.*** The creature's mind becomes feverish. The creature has disadvantage on intelligence checks and intelligence saving throws, and the creature behaves as if under the effects of the confusion spell during combat. ***Seizure.*** The creature is overcome with shaking. The creature has disadvantage on dexterity checks, dexterity saving throws, and attack rolls that use Dexterity. ***Slimy Doom.*** The creature begins to bleed uncontrollably. The creature has disadvantage on constitution checks and constitution saving throws. In addition, whenever the creature takes damage, it is stunned until the end of its next turn.","higherEn":""},{"id":"contingency","srd":true,"name":"Contingenza","nameEn":"Contingency","level":6,"school":"Invocazione","castTime":"10 Minuti","range":"Personale","duration":"10 giorni","components":"V, S, M","material":"A statuette of yourself carved from ivory and decorated with gems worth at least 1,500 gp.","concentration":false,"ritual":false,"attack":null,"damage":null,"dc":null,"classes":["Wizard"],"classesHb":["Mago"],"effects":"","desc":"","descEn":"Choose a spell of 5th level or lower that you can cast, that has a casting time of 1 action, and that can target you. You cast that spell--called the contingent spell--as part of casting contingency, expending spell slots for both, but the contingent spell doesn't come into effect. Instead, it takes effect when a certain circumstance occurs. You describe that circumstance when you cast the two spells. For example, a contingency cast with water breathing might stipulate that water breathing comes into effect when you are engulfed in water or a similar liquid. The contingent spell takes effect immediately after the circumstance is met for the first time, whether or not you want it to. and then contingency ends. The contingent spell takes effect only on you, even if it can normally target others. You can use only one contingency spell at a time. If you cast this spell again, the effect of another contingency spell on you ends. Also, contingency ends on you if its material component is ever not on your person.","higherEn":""},{"id":"continual-flame","srd":true,"name":"Fiamma Perpetua","nameEn":"Continual Flame","level":2,"school":"Invocazione","castTime":"1 Azione","range":"Contatto","duration":"Finché non dissolto","components":"V, S, M","material":"Ruby dust worth 50 gp, which the spell consumes.","concentration":false,"ritual":false,"attack":null,"damage":null,"dc":null,"classes":["Cleric","Wizard"],"classesHb":["Chierico","Mago"],"effects":"Crea una fiamma che emette luce senza calore né consumo di combustibile.","desc":"","descEn":"A flame, equivalent in brightness to a torch, springs forth from an object that you touch. The effect looks like a regular flame, but it creates no heat and doesn't use oxygen. A continual flame can be covered or hidden but not smothered or quenched.","higherEn":"","userName":"Fiamma Perpetua"},{"id":"control-water","srd":true,"name":"Controllare l'Acqua","nameEn":"Control Water","level":4,"school":"Trasmutazione","castTime":"1 Azione","range":"90 m","duration":"Concentrazione, fino a 10 minuti","components":"V, S, M","material":"A drop of water and a pinch of dust.","concentration":true,"ritual":false,"attack":null,"damage":{"type":"Bludgeoning","scale":"slot","table":{"4":"2d8"}},"dc":{"ability":"Forza","success":"half"},"classes":["Cleric","Druid","Wizard"],"classesHb":["Chierico","Druido","Mago"],"effects":"","desc":"","descEn":"Until the spell ends, you control any freestanding water inside an area you choose that is a cube up to 100 feet on a side. You can choose from any of the following effects when you cast this spell. As an action on your turn, you can repeat the same effect or choose a different one. ***Flood.*** You cause the water level of all standing water in the area to rise by as much as 20 feet. If the area includes a shore, the flooding water spills over onto dry land. If you choose an area in a large body of water, you instead create a 20-foot tall wave that travels from one side of the area to the other and then crashes down. Any Huge or smaller vehicles in the wave's path are carried with it to the other side. Any Huge or smaller vehicles struck by the wave have a 25 percent chance of capsizing. The water level remains elevated until the spell ends or you choose a different effect. If this effect produced a wave, the wave repeats on the start of your next turn while the flood effect lasts. ***Part Water.*** You cause water in the area to move apart and create a trench. The trench extends across the spell's area, and the separated water forms a wall to either side. The trench remains until the spell ends or you choose a different effect. The water then slowly fills in the trench over the course of the next round until the normal water level is restored. ***Redirect Flow.*** You cause flowing water in the area to move in a direction you choose, even if the water has to flow over obstacles, up walls, or in other unlikely directions. The water in the area moves as you direct it, but once it moves beyond the spell's area, it resumes its flow based on the terrain conditions. The water continues to move in the direction you chose until the spell ends or you choose a different effect. ***Whirlpool.*** This effect requires a body of water at least 50 feet square and 25 feet deep. You cause a whirlpool to form in the center of the area. The whirlpool forms a vortex that is 5 feet wide at the base, up to 50 feet wide at the top, and 25 feet tall. Any creature or object in the water and within 25 feet of the vortex is pulled 10 feet toward it. A creature can swim away from the vortex by making a Strength (Athletics) check against your spell save DC. When a creature enters the vortex for the first time on a turn or starts its turn there, it must make a strength saving throw. On a failed save, the creature takes 2d8 bludgeoning damage and is caught in the vortex until the spell ends. On a successful save, the creature takes half damage, and isn't caught in the vortex. A creature caught in the vortex can use its action to try to swim away from the vortex as described above, but has disadvantage on the Strength (Athletics) check to do so. The first time each turn that an object enters the vortex, the object takes 2d8 bludgeoning damage; this damage occurs each round it remains in the vortex.","higherEn":""},{"id":"control-weather","srd":true,"name":"Controllare il Clima","nameEn":"Control Weather","level":8,"school":"Trasmutazione","castTime":"10 Minuti","range":"Personale","duration":"Concentrazione, fino a 8 ore","components":"V, S, M","material":"Burning incense and bits of earth and wood mixed in water.","concentration":true,"ritual":false,"attack":null,"damage":null,"dc":null,"classes":["Cleric","Druid","Wizard"],"classesHb":["Chierico","Druido","Mago"],"effects":"","desc":"","descEn":"You take control of the weather within 5 miles of you for the duration. You must be outdoors to cast this spell. Moving to a place where you don't have a clear path to the sky ends the spell early. When you cast the spell, you change the current weather conditions, which are determined by the GM based on the climate and season. You can change precipitation, temperature, and wind. It takes 1d4 x 10 minutes for the new conditions to take effect. Once they do so, you can change the conditions again. When the spell ends, the weather gradually returns to normal. When you change the weather conditions, find a current condition on the following tables and change its stage by one, up or down. When changing the wind, you can change its direction. ##### Precipitation | Stage | Condition | |---|---| | 1 | Clear | | 2 | Light clouds | | 3 | Overcast or ground fog | | 4 | Rain, hail, or snow | | 5 | Torrential rain, driving hail, or blizzard | ##### Temperature | Stage | Condition | |---|---| | 1 | Unbearable heat | | 2 | Hot | | 3 | Warm | | 4 | Cool | | 5 | Cold | | 6 | Arctic cold | ##### Wind | Stage | Condition | |---|---| | 1 | Calm | | 2 | Moderate wind | | 3 | Strong wind | | 4 | Gale | | 5 | Storm |","higherEn":""},{"id":"counterspell","srd":true,"name":"Controincantesimo","nameEn":"Counterspell","level":3,"school":"Abiurazione","castTime":"1 Reazione","range":"18 m","duration":"Istantanea","components":"S","material":null,"concentration":false,"ritual":false,"attack":null,"damage":null,"dc":null,"classes":["Sorcerer","Warlock","Wizard"],"classesHb":["Invocatore","Mago","Stregone"],"effects":"","desc":"","descEn":"You attempt to interrupt a creature in the process of casting a spell. If the creature is casting a spell of 3rd level or lower, its spell fails and has no effect. If it is casting a spell of 4th level or higher, make an ability check using your spellcasting ability. The DC equals 10 + the spell's level. On a success, the creature's spell fails and has no effect.","higherEn":"When you cast this spell using a spell slot of 4th level or higher, the interrupted spell has no effect if its level is less than or equal to the level of the spell slot you used."},{"id":"create-food-and-water","srd":true,"name":"Creare Cibo e Acqua","nameEn":"Create Food and Water","level":3,"school":"Evocazione","castTime":"1 Azione","range":"9 m","duration":"Istantanea","components":"V, S","material":null,"concentration":false,"ritual":false,"attack":null,"damage":null,"dc":null,"classes":["Cleric","Druid","Paladin"],"classesHb":["Chierico","Druido","Paladino"],"effects":"Crea cibo e acqua sufficienti per nutrire e dissetare fino a 15 persone.","desc":"","descEn":"You create 45 pounds of food and 30 gallons of water on the ground or in containers within range, enough to sustain up to fifteen humanoids or five steeds for 24 hours. The food is bland but nourishing, and spoils if uneaten after 24 hours. The water is clean and doesn't go bad.","higherEn":"","userName":"Creare Cibo e Acqua"},{"id":"create-undead","srd":true,"name":"Creare Non Morti","nameEn":"Create Undead","level":6,"school":"Necromanzia","castTime":"1 Minuto","range":"3 m","duration":"Istantanea","components":"V, S, M","material":"One clay pot filled with grave dirt, one clay pot filled with brackish water, and one 150 gp black onyx stone for each corpse.","concentration":false,"ritual":false,"attack":null,"damage":null,"dc":null,"classes":["Cleric","Warlock","Wizard"],"classesHb":["Chierico","Invocatore","Mago"],"effects":"","desc":"","descEn":"You can cast this spell only at night. Choose up to three corpses of Medium or Small humanoids within range. Each corpse becomes a ghoul under your control. (The GM has game statistics for these creatures.) As a bonus action on each of your turns, you can mentally command any creature you animated with this spell if the creature is within 120 feet of you (if you control multiple creatures, you can command any or all of them at the same time, issuing the same command to each one). You decide what action the creature will take and where it will move during its next turn, or you can issue a general command, such as to guard a particular chamber or corridor. If you issue no commands, the creature only defends itself against hostile creatures. Once given an order, the creature continues to follow it until its task is complete. The creature is under your control for 24 hours, after which it stops obeying any command you have given it. To maintain control of the creature for another 24 hours, you must cast this spell on the creature before the current 24-hour period ends. This use of the spell reasserts your control over up to three creatures you have animated with this spell, rather than animating new ones.","higherEn":"When you cast this spell using a 7th-level spell slot, you can animate or reassert control over four ghouls. When you cast this spell using an 8th-level spell slot, you can animate or reassert control over five ghouls or two ghasts or wights. When you cast this spell using a 9th-level spell slot, you can animate or reassert control over six ghouls, three ghasts or wights, or two mummies."},{"id":"create-or-destroy-water","srd":true,"name":"Creare o Distruggere Acqua","nameEn":"Create or Destroy Water","level":1,"school":"Trasmutazione","castTime":"1 Azione","range":"9 m","duration":"Istantanea","components":"V, S, M","material":"A drop of water if creating water, or a few grains of sand if destroying it.","concentration":false,"ritual":false,"attack":null,"damage":null,"dc":null,"classes":["Cleric","Druid"],"classesHb":["Chierico","Druido"],"effects":"Crea o distrugge fino a 10 galloni (circa 38 litri) d'acqua.","desc":"","descEn":"You either create or destroy water. ***Create Water.*** You create up to 10 gallons of clean water within range in an open container. Alternatively, the water falls as rain in a 30-foot cube within range. ***Destroy Water.*** You destroy up to 10 gallons of water in an open container within range. Alternatively, you destroy fog in a 30-foot cube within range.","higherEn":"When you cast this spell using a spell slot of 2nd level or higher, you create or destroy 10 additional gallons of water, or the size of the cube increases by 5 feet, for each slot level above 1st.","userName":"Creare o Distruggere Acqua"},{"id":"creation","srd":true,"name":"Creazione","nameEn":"Creation","level":5,"school":"Illusione","castTime":"1 Minuto","range":"9 m","duration":"Speciale","components":"V, S, M","material":"A tiny piece of matter of the same type of the item you plan to create.","concentration":false,"ritual":false,"attack":null,"damage":null,"dc":null,"classes":["Sorcerer","Wizard"],"classesHb":["Mago","Stregone"],"effects":"","desc":"","descEn":"You pull wisps of shadow material from the Shadowfell to create a nonliving object of vegetable matter within range: soft goods, rope, wood, or something similar. You can also use this spell to create mineral objects such as stone, crystal, or metal. The object created must be no larger than a 5-foot cube, and the object must be of a form and material that you have seen before. The duration depends on the object's material. If the object is composed of multiple materials, use the shortest duration. | Material | Duration | |---|---| | Vegetable matter | 1 day | | Stone or crystal | 12 hours | | Precious metals | 1 hour | | Gems | 10 minutes | | Adamantine or mithral | 1 minute | Using any material created by this spell as another spell's material component causes that spell to fail.","higherEn":"When you cast this spell using a spell slot of 6th level or higher, the cube increases by 5 feet for each slot level above 5th."},{"id":"cure-wounds","srd":true,"name":"Cura Ferite","nameEn":"Cure Wounds","level":1,"school":"Invocazione","castTime":"1 Azione","range":"Contatto","duration":"Istantanea","components":"V, S","material":null,"concentration":false,"ritual":false,"attack":null,"damage":null,"dc":null,"classes":["Bard","Cleric","Druid","Paladin","Ranger"],"classesHb":["Bardo","Chierico","Druido","Paladino","Ranger"],"effects":"Cura 1d8 + mod. da incantatore PF alla creatura toccata. A slot superiori, +1d8 di guarigione per ogni livello di slot oltre il 1°.","desc":"","descEn":"A creature you touch regains a number of hit points equal to 1d8 + your spellcasting ability modifier. This spell has no effect on undead or constructs.","higherEn":"When you cast this spell using a spell slot of 2nd level or higher, the healing increases by 1d8 for each slot level above 1st.","userName":"Cura Ferite"},{"id":"dancing-lights","srd":true,"name":"Luci Danzanti","nameEn":"Dancing Lights","level":0,"school":"Invocazione","castTime":"1 Azione","range":"36 m","duration":"Concentrazione, fino a 1 minuto","components":"V, S, M","material":"A bit of phosphorus or wychwood, or a glowworm.","concentration":true,"ritual":false,"attack":null,"damage":null,"dc":null,"classes":["Bard","Sorcerer","Wizard"],"classesHb":["Bardo","Mago","Stregone"],"effects":"Evochi fino a quattro luci fioche (o una forma vaga umanoide) che puoi muovere fino a 18 m a turno e che illuminano in un raggio di 3 m.","desc":"Crei fino a quattro luci grandi come torce entro gittata, dall'aspetto di torce, lanterne o sfere luminose che fluttuano in aria per la durata. Puoi anche fonderle in un'unica forma vagamente umanoide di taglia Media. In ogni caso, ciascuna luce emette luce fioca in un raggio di 3 m. Come azione bonus puoi spostare le luci fino a 18 m verso un nuovo punto entro gittata. Una luce deve restare entro 6 m da un'altra luce dell'incantesimo, e si spegne se supera la gittata.","descEn":"You create up to four torch-sized lights within range, making them appear as torches, lanterns, or glowing orbs that hover in the air for the duration. You can also combine the four lights into one glowing vaguely humanoid form of Medium size. Whichever form you choose, each light sheds dim light in a 10-foot radius. As a bonus action on your turn, you can move the lights up to 60 feet to a new spot within range. A light must be within 20 feet of another light created by this spell, and a light winks out if it exceeds the spell's range.","higherEn":"","userName":"Luci Danzanti"},{"id":"darkness","srd":true,"name":"Oscurità","nameEn":"Darkness","level":2,"school":"Invocazione","castTime":"1 Azione","range":"18 m","duration":"Concentrazione, fino a 10 minuti","components":"V, M","material":"Bat fur and a drop of pitch or piece of coal.","concentration":true,"ritual":false,"attack":null,"damage":null,"dc":null,"classes":["Sorcerer","Warlock","Wizard"],"classesHb":["Invocatore","Mago","Stregone"],"effects":"Sfera di oscurità magica (raggio 4,5 m); nessun danno.","desc":"","descEn":"Magical darkness spreads from a point you choose within range to fill a 15-foot-radius sphere for the duration. The darkness spreads around corners. A creature with darkvision can't see through this darkness, and nonmagical light can't illuminate it. If the point you choose is on an object you are holding or one that isn't being worn or carried, the darkness emanates from the object and moves with it. Completely covering the source of the darkness with an opaque object, such as a bowl or a helm, blocks the darkness. If any of this spell's area overlaps with an area of light created by a spell of 2nd level or lower, the spell that created the light is dispelled.","higherEn":"","userName":"Oscurità"},{"id":"darkvision","srd":true,"name":"Scurovisione","nameEn":"Darkvision","level":2,"school":"Trasmutazione","castTime":"1 Azione","range":"Contatto","duration":"8 ore","components":"V, S, M","material":"Either a pinch of dried carrot or an agate.","concentration":false,"ritual":false,"attack":null,"damage":null,"dc":null,"classes":["Druid","Ranger","Sorcerer","Wizard"],"classesHb":["Druido","Mago","Ranger","Stregone"],"effects":"Conferisce visione al buio 18 m; nessun danno.","desc":"","descEn":"You touch a willing creature to grant it the ability to see in the dark. For the duration, that creature has darkvision out to a range of 60 feet.","higherEn":"","userName":"Scurovisione"},{"id":"daylight","srd":true,"name":"Luce del Giorno","nameEn":"Daylight","level":3,"school":"Invocazione","castTime":"1 Azione","range":"18 m","duration":"1 ora","components":"V, S","material":null,"concentration":false,"ritual":false,"attack":null,"damage":null,"dc":null,"classes":["Cleric","Druid","Paladin","Ranger","Sorcerer"],"classesHb":["Chierico","Druido","Paladino","Ranger","Stregone"],"effects":"Crea luce brillante in un raggio di 60 piedi, luce fioca per altri 60 piedi.","desc":"","descEn":"A 60-foot-radius sphere of light spreads out from a point you choose within range. The sphere is bright light and sheds dim light for an additional 60 feet. If you chose a point on an object you are holding or one that isn't being worn or carried, the light shines from the object and moves with it. Completely covering the affected object with an opaque object, such as a bowl or a helm, blocks the light. If any of this spell's area overlaps with an area of darkness created by a spell of 3rd level or lower, the spell that created the darkness is dispelled.","higherEn":"","userName":"Luce Diurna"},{"id":"death-ward","srd":true,"name":"Protezione dalla Morte","nameEn":"Death Ward","level":4,"school":"Abiurazione","castTime":"1 Azione","range":"Contatto","duration":"8 ore","components":"V, S","material":null,"concentration":false,"ritual":false,"attack":null,"damage":null,"dc":null,"classes":["Cleric","Paladin"],"classesHb":["Chierico","Paladino"],"effects":"","desc":"","descEn":"You touch a creature and grant it a measure of protection from death. The first time the target would drop to 0 hit points as a result of taking damage, the target instead drops to 1 hit point, and the spell ends. If the spell is still in effect when the target is subjected to an effect that would kill it instantaneously without dealing damage, that effect is instead negated against the target, and the spell ends.","higherEn":""},{"id":"delayed-blast-fireball","srd":true,"name":"Palla di Fuoco a Scoppio Ritardato","nameEn":"Delayed Blast Fireball","level":7,"school":"Invocazione","castTime":"1 Azione","range":"45 m","duration":"Concentrazione, fino a 1 minuto","components":"V, S, M","material":"A tiny ball of bat guano and sulfur.","concentration":true,"ritual":false,"attack":null,"damage":{"type":"Fire","scale":"slot","table":{"7":"12d6","8":"13d6","9":"14d6"}},"dc":{"ability":"Destrezza","success":"half"},"classes":["Sorcerer","Wizard"],"classesHb":["Mago","Stregone"],"effects":"","desc":"","descEn":"A beam of yellow light flashes from your pointing finger, then condenses to linger at a chosen point within range as a glowing bead for the duration. When the spell ends, either because your concentration is broken or because you decide to end it, the bead blossoms with a low roar into an explosion of flame that spreads around corners. Each creature in a 20-foot-radius sphere centered on that point must make a dexterity saving throw. A creature takes fire damage equal to the total accumulated damage on a failed save, or half as much damage on a successful one. The spell's base damage is 12d6. If at the end of your turn the bead has not yet detonated, the damage increases by 1d6. If the glowing bead is touched before the interval has expired, the creature touching it must make a dexterity saving throw. On a failed save, the spell ends immediately, causing the bead to erupt in flame. On a successful save, the creature can throw the bead up to 40 feet. When it strikes a creature or a solid object, the spell ends, and the bead explodes. The fire damages objects in the area and ignites flammable objects that aren't being worn or carried.","higherEn":"When you cast this spell using a spell slot of 8th level or higher, the base damage increases by 1d6 for each slot level above 7th."},{"id":"demiplane","srd":true,"name":"Semipiano","nameEn":"Demiplane","level":8,"school":"Evocazione","castTime":"1 Azione","range":"18 m","duration":"1 ora","components":"S","material":null,"concentration":false,"ritual":false,"attack":null,"damage":null,"dc":null,"classes":["Warlock","Wizard"],"classesHb":["Invocatore","Mago"],"effects":"","desc":"","descEn":"You create a shadowy door on a flat solid surface that you can see within range. The door is large enough to allow Medium creatures to pass through unhindered. When opened, the door leads to a demiplane that appears to be an empty room 30 feet in each dimension, made of wood or stone. When the spell ends, the door disappears, and any creatures or objects inside the demiplane remain trapped there, as the door also disappears from the other side. Each time you cast this spell, you can create a new demiplane, or have the shadowy door connect to a demiplane you created with a previous casting of this spell. Additionally, if you know the nature and contents of a demiplane created by a casting of this spell by another creature, you can have the shadowy door connect to its demiplane instead.","higherEn":""},{"id":"detect-evil-and-good","srd":true,"name":"Individuazione del Bene e del Male","nameEn":"Detect Evil and Good","level":1,"school":"Divinazione","castTime":"1 Azione","range":"Personale","duration":"Concentrazione, fino a 10 minuti","components":"V, S","material":null,"concentration":true,"ritual":false,"attack":null,"damage":null,"dc":null,"classes":["Cleric","Paladin"],"classesHb":["Chierico","Paladino"],"effects":"Percepisce creature celestiali, elementali, fatate, immonde o non morte entro 30 piedi.","desc":"","descEn":"For the duration, you know if there is an aberration, celestial, elemental, fey, fiend, or undead within 30 feet of you, as well as where the creature is located. Similarly, you know if there is a place or object within 30 feet of you that has been magically consecrated or desecrated. The spell can penetrate most barriers, but it is blocked by 1 foot of stone, 1 inch of common metal, a thin sheet of lead, or 3 feet of wood or dirt.","higherEn":"","userName":"Individuare Bene e Male"},{"id":"detect-magic","srd":true,"name":"Individuazione del Magico","nameEn":"Detect Magic","level":1,"school":"Divinazione","castTime":"1 Azione (Rituale)","range":"Personale","duration":"Concentrazione, fino a 10 minuti","components":"V, S","material":null,"concentration":true,"ritual":true,"attack":null,"damage":null,"dc":null,"classes":["Bard","Cleric","Druid","Paladin","Ranger","Sorcerer","Wizard"],"classesHb":["Bardo","Chierico","Druido","Mago","Paladino","Ranger","Stregone"],"effects":"Percepisci la presenza della magia entro 9 metri.","desc":"","descEn":"For the duration, you sense the presence of magic within 30 feet of you. If you sense magic in this way, you can use your action to see a faint aura around any visible creature or object in the area that bears magic, and you learn its school of magic, if any. The spell can penetrate most barriers, but it is blocked by 1 foot of stone, 1 inch of common metal, a thin sheet of lead, or 3 feet of wood or dirt.","higherEn":"","userName":"Individuare Magia"},{"id":"detect-poison-and-disease","srd":true,"name":"Individuazione di Veleni e Malattie","nameEn":"Detect Poison and Disease","level":1,"school":"Divinazione","castTime":"1 Azione (Rituale)","range":"Personale","duration":"Concentrazione, fino a 10 minuti","components":"V, S, M","material":"A yew leaf.","concentration":true,"ritual":true,"attack":null,"damage":null,"dc":null,"classes":["Cleric","Druid","Paladin","Ranger"],"classesHb":["Chierico","Druido","Paladino","Ranger"],"effects":"Rivela la presenza di veleni o malattie entro 30 piedi.","desc":"","descEn":"For the duration, you can sense the presence and location of poisons, poisonous creatures, and diseases within 30 feet of you. You also identify the kind of poison, poisonous creature, or disease in each case. The spell can penetrate most barriers, but it is blocked by 1 foot of stone, 1 inch of common metal, a thin sheet of lead, or 3 feet of wood or dirt.","higherEn":"","userName":"Individuare Veleni e Malattie"},{"id":"detect-thoughts","srd":true,"name":"Individuazione dei Pensieri","nameEn":"Detect Thoughts","level":2,"school":"Divinazione","castTime":"1 Azione","range":"Personale","duration":"Concentrazione, fino a 1 minuto","components":"V, S, M","material":"A copper coin.","concentration":true,"ritual":false,"attack":null,"damage":null,"dc":null,"classes":["Bard","Sorcerer","Wizard"],"classesHb":["Bardo","Mago","Stregone"],"effects":"Legge pensieri superficiali/profundi (TS Sag). Nessun danno.","desc":"","descEn":"For the duration, you can read the thoughts of certain creatures. When you cast the spell and as your action on each turn until the spell ends, you can focus your mind on any one creature that you can see within 30 feet of you. If the creature you choose has an Intelligence of 3 or lower or doesn't speak any language, the creature is unaffected. You initially learn the surface thoughts of the creature - what is most on its mind in that moment. As an action, you can either shift your attention to another creature's thoughts or attempt to probe deeper into the same creature's mind. If you probe deeper, the target must make a Wisdom saving throw. If it fails, you gain insight into its reasoning (if any), its emotional state, and something that looms large in its mind (such as something it worries over, loves, or hates). If it succeeds, the spell ends. Either way, the target knows that you are probing into its mind, and unless you shift your attention to another creature's thoughts, the creature can use its action on its turn to make an Intelligence check contested by your Intelligence check; if it succeeds, the spell ends. Questions verbally directed at the target creature naturally shape the course of its thoughts, so this spell is particularly effective as part of an interrogation. You can also use this spell to detect the presence of thinking creatures you can't see. When you cast the spell or as your action during the duration, you can search for thoughts within 30 feet of you. The spell can penetrate barriers, but 2 feet of rock, 2 inches of any metal other than lead, or a thin sheet of lead blocks you. You can't detect a creature with an Intelligence of 3 or lower or one that doesn't speak any language. Once you detect the presence of a creature in this way, you can read its thoughts for the rest of the duration as described above, even if you can't see it, but it must still be within range.","higherEn":"","userName":"Individuare Pensieri"},{"id":"dimension-door","srd":true,"name":"Porta Dimensionale","nameEn":"Dimension Door","level":4,"school":"Evocazione","castTime":"1 Azione","range":"150 m","duration":"Istantanea","components":"V","material":null,"concentration":false,"ritual":false,"attack":null,"damage":{"type":"Force","scale":"slot","table":{"4":"4d6"}},"dc":null,"classes":["Bard","Sorcerer","Warlock","Wizard"],"classesHb":["Bardo","Invocatore","Mago","Stregone"],"effects":"","desc":"","descEn":"You teleport yourself from your current location to any other spot within range. You arrive at exactly the spot desired. It can be a place you can see, one you can visualize, or one you can describe by stating distance and direction, such as \"200 feet straight downward\" or \"upward to the northwest at a 45-degree angle, 300 feet.\" You can bring along objects as long as their weight doesn't exceed what you can carry. You can also bring one willing creature of your size or smaller who is carrying gear up to its carrying capacity. The creature must be within 5 feet of you when you cast this spell. If you would arrive in a place already occupied by an object or a creature, you and any creature traveling with you each take 4d6 force damage, and the spell fails to teleport you.","higherEn":""},{"id":"disguise-self","srd":true,"name":"Travestimento","nameEn":"Disguise Self","level":1,"school":"Illusione","castTime":"1 Azione","range":"Personale","duration":"1 ora","components":"V, S","material":null,"concentration":false,"ritual":false,"attack":null,"damage":null,"dc":null,"classes":["Bard","Sorcerer","Wizard"],"classesHb":["Bardo","Mago","Stregone"],"effects":"Illusione che altera il tuo aspetto (30 cm tolleranza).","desc":"","descEn":"You make yourself--including your clothing, armor, weapons, and other belongings on your person--look different until the spell ends or until you use your action to dismiss it. You can seem 1 foot shorter or taller and can appear thin, fat, or in between. You can't change your body type, so you must adopt a form that has the same basic arrangement of limbs. Otherwise, the extent of the illusion is up to you. The changes wrought by this spell fail to hold up to physical inspection. For example, if you use this spell to add a hat to your outfit, objects pass through the hat, and anyone who touches it would feel nothing or would feel your head and hair. If you use this spell to appear thinner than you are, the hand of someone who reaches out to touch you would bump into you while it was seemingly still in midair. To discern that you are disguised, a creature can use its action to inspect your appearance and must succeed on an Intelligence (Investigation) check against your spell save DC.","higherEn":"","userName":"Autodisciplina d’Aspetto"},{"id":"disintegrate","srd":true,"name":"Disintegrazione","nameEn":"Disintegrate","level":6,"school":"Trasmutazione","castTime":"1 Azione","range":"18 m","duration":"Istantanea","components":"V, S, M","material":"A lodestone and a pinch of dust.","concentration":false,"ritual":false,"attack":null,"damage":{"type":"Force","scale":"slot","table":{"6":"10d6 + 40"}},"dc":{"ability":"Destrezza","success":"none"},"classes":["Sorcerer","Wizard"],"classesHb":["Mago","Stregone"],"effects":"","desc":"","descEn":"A thin green ray springs from your pointing finger to a target that you can see within range. The target can be a creature, an object, or a creation of magical force, such as the wall created by wall of force. A creature targeted by this spell must make a dexterity saving throw. On a failed save, the target takes 10d6 + 40 force damage. If this damage reduces the target to 0 hit points, it is disintegrated. A disintegrated creature and everything it is wearing and carrying, except magic items, are reduced to a pile of fine gray dust. The creature can be restored to life only by means of a true resurrection or a wish spell. This spell automatically disintegrates a Large or smaller nonmagical object or a creation of magical force. If the target is a Huge or larger object or creation of force, this spell disintegrates a 10-foot-cube portion of it. A magic item is unaffected by this spell.","higherEn":"When you cast this spell using a spell slot of 7th level or higher, the damage increases by 3d6 for each slot level above 6th."},{"id":"dispel-evil-and-good","srd":true,"name":"Dissolvere il Bene e il Male","nameEn":"Dispel Evil and Good","level":5,"school":"Abiurazione","castTime":"1 Azione","range":"Personale","duration":"Concentrazione, fino a 1 minuto","components":"V, S, M","material":"Holy water or powdered silver and iron.","concentration":true,"ritual":false,"attack":null,"damage":null,"dc":{"ability":"Carisma","success":"other"},"classes":["Cleric","Paladin"],"classesHb":["Chierico","Paladino"],"effects":"","desc":"","descEn":"Shimmering energy surrounds and protects you from fey, undead, and creatures originating from beyond the Material Plane. For the duration, celestials, elementals, fey, fiends, and undead have disadvantage on attack rolls against you. You can end the spell early by using either of the following special functions. ***Break Enchantment.*** As your action, you touch a creature you can reach that is charmed, frightened, or possessed by a celestial, an elemental, a fey, a fiend, or an undead. The creature you touch is no longer charmed, frightened, or possessed by such creatures. ***Dismissal.*** As your action, make a melee spell attack against a celestial, an elemental, a fey, a fiend, or an undead you can reach. On a hit, you attempt to drive the creature back to its home plane. The creature must succeed on a charisma saving throw or be sent back to its home plane (if it isn't there already). If they aren't on their home plane, undead are sent to the Shadowfell, and fey are sent to the Feywild.","higherEn":""},{"id":"dispel-magic","srd":true,"name":"Dissolvi Magie","nameEn":"Dispel Magic","level":3,"school":"Abiurazione","castTime":"1 Azione","range":"36 m","duration":"Istantanea","components":"V, S","material":null,"concentration":false,"ritual":false,"attack":null,"damage":null,"dc":null,"classes":["Bard","Cleric","Druid","Paladin","Sorcerer","Warlock","Wizard"],"classesHb":["Bardo","Chierico","Druido","Invocatore","Mago","Paladino","Stregone"],"effects":"Rimuove un effetto magico su un oggetto, creatura o area entro portata.","desc":"","descEn":"Choose one creature, object, or magical effect within range. Any spell of 3rd level or lower on the target ends. For each spell of 4th level or higher on the target, make an ability check using your spellcasting ability. The DC equals 10 + the spell's level. On a successful check, the spell ends.","higherEn":"When you cast this spell using a spell slot of 4th level or higher, you automatically end the effects of a spell on the target if the spell's level is equal to or less than the level of the spell slot you used.","userName":"Dissolvi Magie"},{"id":"divination","srd":true,"name":"Divinazione","nameEn":"Divination","level":4,"school":"Divinazione","castTime":"1 Azione (Rituale)","range":"Personale","duration":"Istantanea","components":"V, S, M","material":"Incense and a sacrificial offering appropriate to your religion, together worth at least 25gp, which the spell consumes.","concentration":false,"ritual":true,"attack":null,"damage":null,"dc":null,"classes":["Druid"],"classesHb":["Druido"],"effects":"","desc":"","descEn":"Your magic and an offering put you in contact with a god or a god's servants. You ask a single question concerning a specific goal, event, or activity to occur within 7 days. The GM offers a truthful reply. The reply might be a short phrase, a cryptic rhyme, or an omen. The spell doesn't take into account any possible circumstances that might change the outcome, such as the casting of additional spells or the loss or gain of a companion. If you cast the spell two or more times before finishing your next long rest, there is a cumulative 25 percent chance for each casting after the first that you get a random reading. The GM makes this roll in secret.","higherEn":""},{"id":"divine-favor","srd":true,"name":"Favore Divino","nameEn":"Divine Favor","level":1,"school":"Invocazione","castTime":"1 Azione Bonus","range":"Personale","duration":"Concentrazione, fino a 1 minuto","components":"V, S","material":null,"concentration":true,"ritual":false,"attack":null,"damage":{"type":"Radiant","scale":"slot","table":{"1":"1d4"}},"dc":null,"classes":["Paladin"],"classesHb":["Paladino"],"effects":"I tuoi attacchi (mischia o distanza) infliggono +1d4 danni Radianti finché mantieni la concentrazione.","desc":"","descEn":"Your prayer empowers you with divine radiance. Until the spell ends, your weapon attacks deal an extra 1d4 radiant damage on a hit.","higherEn":"","userName":"Favore Divino"},{"id":"divine-word","srd":true,"name":"Parola Divina","nameEn":"Divine Word","level":7,"school":"Invocazione","castTime":"1 Azione Bonus","range":"9 m","duration":"Istantanea","components":"V","material":null,"concentration":false,"ritual":false,"attack":null,"damage":null,"dc":{"ability":"Carisma","success":"none"},"classes":["Cleric"],"classesHb":["Chierico"],"effects":"","desc":"","descEn":"You utter a divine word, imbued with the power that shaped the world at the dawn of creation. Choose any number of creatures you can see within range. Each creature that can hear you must make a Charisma saving throw. On a failed save, a creature suffers an effect based on its current hit points: - 50 hit points or fewer: deafened for 1 minute - 40 hit points or fewer: deafened and blinded for 10 minutes - 30 hit points or fewer: blinded, deafened, and stunned for 1 hour - 20 hit points or fewer: killed instantly Regardless of its current hit points, a celestial, an elemental, a fey, or a fiend that fails its save is forced back to its plane of origin (if it isn't there already) and can't return to your current plane for 24 hours by any means short of a wish spell.","higherEn":""},{"id":"dominate-beast","srd":true,"name":"Dominare Bestie","nameEn":"Dominate Beast","level":4,"school":"Ammaliamento","castTime":"1 Azione","range":"18 m","duration":"Concentrazione, fino a 1 minuto","components":"V, S","material":null,"concentration":true,"ritual":false,"attack":null,"damage":null,"dc":{"ability":"Saggezza","success":"none"},"classes":["Druid","Sorcerer"],"classesHb":["Druido","Stregone"],"effects":"","desc":"","descEn":"You attempt to beguile a creature that you can see within range. It must succeed on a wisdom saving throw or be charmed by you for the duration. If you or creatures that are friendly to you are fighting it, it has advantage on the saving throw. While the creature is charmed, you have a telepathic link with it as long as the two of you are on the same plane of existence. You can use this telepathic link to issue commands to the creature while you are conscious (no action required), which it does its best to obey. You can specify a simple and general course of action, such as \"Attack that creature,\" \"Run over there,\" or \"Fetch that object.\" If the creature completes the order and doesn't receive further direction from you, it defends and preserves itself to the best of its ability. You can use your action to take total and precise control of the target. Until the end of your next turn, the creature takes only the actions you choose, and doesn't do anything that you don't allow it to do. During this time, you can also cause the creature to use a reaction, but this requires you to use your own reaction as well. Each time the target takes damage, it makes a new wisdom saving throw against the spell. If the saving throw succeeds, the spell ends.","higherEn":"When you cast this spell with a 9th level spell slot, the duration is concentration, up to 8 hours."},{"id":"dominate-monster","srd":true,"name":"Dominare Mostri","nameEn":"Dominate Monster","level":8,"school":"Ammaliamento","castTime":"1 Azione","range":"18 m","duration":"Concentrazione, fino a 1 ora","components":"V, S","material":null,"concentration":true,"ritual":false,"attack":null,"damage":null,"dc":{"ability":"Saggezza","success":"none"},"classes":["Bard","Sorcerer","Warlock","Wizard"],"classesHb":["Bardo","Invocatore","Mago","Stregone"],"effects":"","desc":"","descEn":"You attempt to beguile a creature that you can see within range. It must succeed on a wisdom saving throw or be charmed by you for the duration. If you or creatures that are friendly to you are fighting it, it has advantage on the saving throw. While the creature is charmed, you have a telepathic link with it as long as the two of you are on the same plane of existence. You can use this telepathic link to issue commands to the creature while you are conscious (no action required), which it does its best to obey. You can specify a simple and general course of action, such as \"Attack that creature,\" \"Run over there,\" or \"Fetch that object.\" If the creature completes the order and doesn't receive further direction from you, it defends and preserves itself to the best of its ability. You can use your action to take total and precise control of the target. Until the end of your next turn, the creature takes only the actions you choose, and doesn't do anything that you don't allow it to do. During this time, you can also cause the creature to use a reaction, but this requires you to use your own reaction as well. Each time the target takes damage, it makes a new wisdom saving throw against the spell. If the saving throw succeeds, the spell ends.","higherEn":"When you cast this spell with a 9th-level spell slot, the duration is concentration, up to 8 hours."},{"id":"dominate-person","srd":true,"name":"Dominare Persone","nameEn":"Dominate Person","level":5,"school":"Ammaliamento","castTime":"1 Azione","range":"18 m","duration":"Concentrazione, fino a 1 minuto","components":"V, S","material":null,"concentration":true,"ritual":false,"attack":null,"damage":null,"dc":{"ability":"Saggezza","success":"other"},"classes":["Bard","Sorcerer","Wizard"],"classesHb":["Bardo","Mago","Stregone"],"effects":"","desc":"","descEn":"You attempt to beguile a humanoid that you can see within range. It must succeed on a wisdom saving throw or be charmed by you for the duration. If you or creatures that are friendly to you are fighting it, it has advantage on the saving throw. While the target is charmed, you have a telepathic link with it as long as the two of you are on the same plane of existence. You can use this telepathic link to issue commands to the creature while you are conscious (no action required), which it does its best to obey. You can specify a simple and general course of action, such as \"Attack that creature,\" \"Run over there,\" or \"Fetch that object.\" If the creature completes the order and doesn't receive further direction from you, it defends and preserves itself to the best of its ability. You can use your action to take total and precise control of the target. Until the end of your next turn, the creature takes only the actions you choose, and doesn't do anything that you don't allow it to do. During this time you can also cause the creature to use a reaction, but this requires you to use your own reaction as well. Each time the target takes damage, it makes a new wisdom saving throw against the spell. If the saving throw succeeds, the spell ends.","higherEn":"When you cast this spell using a 6th-level spell slot, the duration is concentration, up to 10 minutes. When you use a 7th-level spell slot, the duration is concentration, up to 1 hour. When you use a spell slot of 8th level or higher, the duration is concentration, up to 8 hours."},{"id":"dream","srd":true,"name":"Sogno","nameEn":"Dream","level":5,"school":"Illusione","castTime":"1 Minuto","range":"Speciale","duration":"8 ore","components":"V, S, M","material":"A handful of sand, a dab of ink, and a writing quill plucked from a sleeping bird.","concentration":false,"ritual":false,"attack":null,"damage":{"type":"Psychic","scale":"slot","table":{"5":"3d6"}},"dc":{"ability":"Saggezza","success":"none"},"classes":["Bard","Warlock","Wizard"],"classesHb":["Bardo","Invocatore","Mago"],"effects":"","desc":"","descEn":"This spell shapes a creature's dreams. Choose a creature known to you as the target of this spell. The target must be on the same plane of existence as you. Creatures that don't sleep, such as elves, can't be contacted by this spell. You, or a willing creature you touch, enters a trance state, acting as a messenger. While in the trance, the messenger is aware of his or her surroundings, but can't take actions or move. If the target is asleep, the messenger appears in the target's dreams and can converse with the target as long as it remains asleep, through the duration of the spell. The messenger can also shape the environment of the dream, creating landscapes, objects, and other images. The messenger can emerge from the trance at any time, ending the effect of the spell early. The target recalls the dream perfectly upon waking. If the target is awake when you cast the spell, the messenger knows it, and can either end the trance (and the spell) or wait for the target to fall asleep, at which point the messenger appears in the target's dreams. You can make the messenger appear monstrous and terrifying to the target. If you do, the messenger can deliver a message of no more than ten words and then the target must make a wisdom saving throw. On a failed save, echoes of the phantasmal monstrosity spawn a nightmare that lasts the duration of the target's sleep and prevents the target from gaining any benefit from that rest. In addition, when the target wakes up, it takes 3d6 psychic damage. If you have a body part, lock of hair, clipping from a nail, or similar portion of the target's body, the target makes its saving throw with disadvantage.","higherEn":""},{"id":"druidcraft","srd":true,"name":"Artificio Druidico","nameEn":"Druidcraft","level":0,"school":"Trasmutazione","castTime":"1 Azione","range":"9 m","duration":"Istantanea","components":"V, S","material":null,"concentration":false,"ritual":false,"attack":null,"damage":null,"dc":null,"classes":["Druid"],"classesHb":["Druido"],"effects":"Sussurrando agli spiriti della natura, crei un piccolo effetto naturale: previsioni meteo per 24 ore, far sbocciare un fiore, un innocuo effetto sensoriale, o accendere/spegnere un piccolo fuoco.","desc":"Sussurrando agli spiriti della natura, crei uno dei seguenti effetti entro gittata: prevedi il tempo che farà nel tuo luogo per le prossime 24 ore (un piccolo effetto sensoriale innocuo, per 1 round); fai sbocciare istantaneamente un fiore, aprire un baccello o schiudere una gemma; crei un effetto sensoriale istantaneo e innocuo (foglie che cadono, una folata di vento, il verso di un animaletto, un lieve odore); oppure accendi o spegni una candela, una torcia o un piccolo falò.","descEn":"Whispering to the spirits of nature, you create one of the following effects within 'range': - You create a tiny, harmless sensory effect that predicts what the weather will be at your location for the next 24 hours. The effect might manifest as a golden orb for clear skies, a cloud for rain, falling snowflakes for snow, and so on. This effect persists for 1 round. - You instantly make a flower bloom, a seed pod open, or a leaf bud bloom. - You create an instantaneous, harmless sensory effect, such as falling leaves, a puff of wind, the sound of a small animal, or the faint order of skunk. The effect must fit in a 5-foot cube. - You instantly light or snuff out a candle, a torch, or a small campfire.","higherEn":""},{"id":"earthquake","srd":true,"name":"Terremoto","nameEn":"Earthquake","level":8,"school":"Invocazione","castTime":"1 Azione","range":"150 m","duration":"Concentrazione, fino a 1 minuto","components":"V, S, M","material":"A pinch of dirt, a piece of rock, and a lump of clay.","concentration":true,"ritual":false,"attack":null,"damage":null,"dc":null,"classes":["Cleric","Druid","Sorcerer"],"classesHb":["Chierico","Druido","Stregone"],"effects":"","desc":"","descEn":"You create a seismic disturbance at a point on the ground that you can see within range. For the duration, an intense tremor rips through the ground in a 100-foot-radius circle centered on that point and shakes creatures and structures in contact with the ground in that area. The ground in the area becomes difficult terrain. Each creature on the ground that is concentrating must make a constitution saving throw. On a failed save, the creature's concentration is broken. When you cast this spell and at the end of each turn you spend concentrating on it, each creature on the ground in the area must make a dexterity saving throw. On a failed save, the creature is knocked prone. This spell can have additional effects depending on the terrain in the area, as determined by the GM. Fissures. Fissures open throughout the spell's area at the start of your next turn after you cast the spell. A total of 1d6 such fissures open in locations chosen by the GM. Each is 1d10 x 10 feet deep, 10 feet wide, and extends from one edge of the spell's area to the opposite side. A creature standing on a spot where a fissure opens must succeed on a dexterity saving throw or fall in. A creature that successfully saves moves with the fissure's edge as it opens. A fissure that opens beneath a structure causes it to automatically collapse (see below). Structures. The tremor deals 50 bludgeoning damage to any structure in contact with the ground in the area when you cast the spell and at the start of each of your turns until the spell ends. If a structure drops to 0 hit points, it collapses and potentially damages nearby creatures. A creature within half the distance of a structure's height must make a dexterity saving throw. On a failed save, the creature takes 5d6 bludgeoning damage, is knocked prone, and is buried in the rubble, requiring a DC 20 Strength (Athletics) check as an action to escape. The GM can adjust the DC higher or lower, depending on the nature of the rubble. On a successful save, the creature takes half as much damage and doesn't fall prone or become buried.","higherEn":""},{"id":"eldritch-blast","srd":true,"name":"Raggio Eldritch","nameEn":"Eldritch Blast","level":0,"school":"Invocazione","castTime":"1 Azione","range":"36 m","duration":"Istantanea","components":"V, S","material":null,"concentration":false,"ritual":false,"attack":"ranged","damage":{"type":"Force","scale":"char","table":{"1":"1d10","5":"1d10","11":"1d10","17":"1d10"}},"dc":null,"classes":["Warlock"],"classesHb":["Invocatore"],"effects":"Un raggio di energia crepitante: attacco magico a distanza, 1d10 danni da forza. Raggi aggiuntivi a livelli più alti (2 al 5°, 3 all'11°, 4 al 17°), diretti allo stesso bersaglio o a bersagli diversi.","desc":"Un raggio di energia crepitante sfreccia verso una creatura entro gittata. Effettua un attacco magico a distanza: a segno, il bersaglio subisce 1d10 danni da forza. L'incantesimo crea più raggi ai livelli superiori: due al 5° livello, tre all'11° e quattro al 17°. Puoi dirigere i raggi sullo stesso bersaglio o su bersagli diversi; effettua un tiro per colpire separato per ciascun raggio.","descEn":"A beam of crackling energy streaks toward a creature within range. Make a ranged spell attack against the target. On a hit, the target takes 1d10 force damage. The spell creates more than one beam when you reach higher levels: two beams at 5th level, three beams at 11th level, and four beams at 17th level. You can direct the beams at the same target or at different ones. Make a separate attack roll for each beam.","higherEn":""},{"id":"enhance-ability","srd":true,"name":"Potenziare Abilità","nameEn":"Enhance Ability","level":2,"school":"Trasmutazione","castTime":"1 Azione","range":"Contatto","duration":"Concentrazione, fino a 1 ora","components":"V, S, M","material":"Fur or a feather from a beast.","concentration":true,"ritual":false,"attack":null,"damage":null,"dc":null,"classes":["Bard","Cleric","Druid","Sorcerer"],"classesHb":["Bardo","Chierico","Druido","Stregone"],"effects":"Bersaglio ottiene vantaggio su prove relative a una caratteristica specifica (es. Forza, Destrezza).","desc":"","descEn":"You touch a creature and bestow upon it a magical enhancement. Choose one of the following effects; the target gains that effect until the spell ends. ***Bear's Endurance.*** The target has advantage on constitution checks. It also gains 2d6 temporary hit points, which are lost when the spell ends. ***Bull's Strength.*** The target has advantage on strength checks, and his or her carrying capacity doubles. ***Cat's Grace.*** The target has advantage on dexterity checks. It also doesn't take damage from falling 20 feet or less if it isn't incapacitated. ***Eagle's Splendor.*** The target has advantage on Charisma checks. ***Fox's Cunning.*** The target has advantage on intelligence checks. ***Owl's Wisdom.*** The target has advantage on wisdom checks.","higherEn":"When you cast this spell using a spell slot of 3rd level or higher, you can target one additional creature for each slot level above 2nd.","userName":"Potenziare Abilità"},{"id":"enlarge-reduce","srd":true,"name":"Ingrandire/Ridurre","nameEn":"Enlarge/Reduce","level":2,"school":"Trasmutazione","castTime":"1 Azione","range":"9 m","duration":"Concentrazione, fino a 1 minuto","components":"V, S, M","material":"A pinch iron powder.","concentration":true,"ritual":false,"attack":null,"damage":null,"dc":{"ability":"Costituzione","success":"none"},"classes":["Sorcerer","Wizard"],"classesHb":["Mago","Stregone"],"effects":"Taglia ±1, danni delle armi ±; nessun danno immediato.","desc":"","descEn":"You cause a creature or an object you can see within range to grow larger or smaller for the duration. Choose either a creature or an object that is neither worn nor carried. If the target is unwilling, it can make a Constitution saving throw. On a success, the spell has no effect. If the target is a creature, everything it is wearing and carrying changes size with it. Any item dropped by an affected creature returns to normal size at once. ***Enlarge.*** The target's size doubles in all dimensions, and its weight is multiplied by eight. This growth increases its size by one category-from Medium to Large, for example. If there isn't enough room for the target to double its size, the creature or object attains the maximum possible size in the space available. Until the spell ends, the target also has advantage on Strength checks and Strength saving throws. The target's weapons also grow to match its new size. While these weapons are enlarged, the target's attacks with them deal 1d4 extra damage. ***Reduce.*** The target's size is halved in all dimensions, and its weight is reduced to one-eighth of normal. This reduction decreases its size by one category-from Medium to Small, for example. Until the spell ends, the target also has disadvantage on Strength checks and Strength saving throws. The target's weapons also shrink to match its new size. While these weapons are reduced, the target's attacks with them deal 1d4 less damage (this can't reduce the damage below 1).","higherEn":"","userName":"Ingrandire/Ridurre"},{"id":"entangle","srd":true,"name":"Intrappolare","nameEn":"Entangle","level":1,"school":"Evocazione","castTime":"1 Azione","range":"27 m","duration":"Concentrazione, fino a 1 minuto","components":"V, S","material":null,"concentration":true,"ritual":false,"attack":null,"damage":null,"dc":{"ability":"Forza","success":"none"},"classes":["Druid"],"classesHb":["Druido"],"effects":"Rovi magici rendono un’area di 6 m terreno difficile e possono trattenere le creature (TS Forza).","desc":"","descEn":"Grasping weeds and vines sprout from the ground in a 20-foot square starting form a point within range. For the duration, these plants turn the ground in the area into difficult terrain. A creature in the area when you cast the spell must succeed on a strength saving throw or be restrained by the entangling plants until the spell ends. A creature restrained by the plants can use its action to make a Strength check against your spell save DC. On a success, it frees itself. When the spell ends, the conjured plants wilt away.","higherEn":"","userName":"Intrappolare"},{"id":"enthrall","srd":true,"name":"Soggiogare","nameEn":"Enthrall","level":2,"school":"Ammaliamento","castTime":"1 Azione","range":"18 m","duration":"1 minuto","components":"V, S","material":null,"concentration":false,"ritual":false,"attack":null,"damage":null,"dc":{"ability":"Saggezza","success":"none"},"classes":["Bard","Warlock"],"classesHb":["Bardo","Invocatore"],"effects":"","desc":"","descEn":"You weave a distracting string of words, causing creatures of your choice that you can see within range and that can hear you to make a wisdom saving throw. Any creature that can't be charmed succeeds on this saving throw automatically, and if you or your companions are fighting a creature, it has advantage on the save. On a failed save, the target has disadvantage on Wisdom (Perception) checks made to perceive any creature other than you until the spell ends or until the target can no longer hear you. The spell ends if you are incapacitated or can no longer speak.","higherEn":""},{"id":"etherealness","srd":true,"name":"Etereità","nameEn":"Etherealness","level":7,"school":"Trasmutazione","castTime":"1 Azione","range":"Personale","duration":"8 ore","components":"V, S","material":null,"concentration":false,"ritual":false,"attack":null,"damage":null,"dc":null,"classes":["Bard","Cleric","Sorcerer","Warlock","Wizard"],"classesHb":["Bardo","Chierico","Invocatore","Mago","Stregone"],"effects":"","desc":"","descEn":"You step into the border regions of the Ethereal Plane, in the area where it overlaps with your current plane. You remain in the Border Ethereal for the duration or until you use your action to dismiss the spell. During this time, you can move in any direction. If you move up or down, every foot of movement costs an extra foot. You can see and hear the plane you originated from, but everything there looks gray, and you can't see anything more than 60 feet away. While on the Ethereal Plane, you can only affect and be affected by other creatures on that plane. Creatures that aren't on the Ethereal Plane can't perceive you and can't interact with you, unless a special ability or magic has given them the ability to do so. You ignore all objects and effects that aren't on the Ethereal Plane, allowing you to move through objects you perceive on the plane you originated from. When the spell ends, you immediately return to the plane you originated from in the spot you currently occupy. If you occupy the same spot as a solid object or creature when this happens, you are immediately shunted to the nearest unoccupied space that you can occupy and take force damage equal to twice the number of feet you are moved. This spell has no effect if you cast it while you are on the Ethereal Plane or a plane that doesn't border it, such as one of the Outer Planes.","higherEn":"When you cast this spell using a spell slot of 8th level or higher, you can target up to three willing creatures (including you) for each slot level above 7th. The creatures must be within 10 feet of you when you cast the spell."},{"id":"expeditious-retreat","srd":true,"name":"Ritirata Rapida","nameEn":"Expeditious Retreat","level":1,"school":"Trasmutazione","castTime":"1 Azione Bonus","range":"Personale","duration":"Concentrazione, fino a 10 minuti","components":"V, S","material":null,"concentration":true,"ritual":false,"attack":null,"damage":null,"dc":null,"classes":["Sorcerer","Warlock","Wizard"],"classesHb":["Invocatore","Mago","Stregone"],"effects":"Permette di usare l’azione Scatto come bonus ogni turno.","desc":"","descEn":"This spell allows you to move at an incredible pace. When you cast this spell, and then as a bonus action on each of your turns until the spell ends, you can take the Dash action.","higherEn":"","userName":"Ritirata Rapida"},{"id":"eyebite","srd":true,"name":"Sguardo Maligno","nameEn":"Eyebite","level":6,"school":"Necromanzia","castTime":"1 Azione","range":"Personale","duration":"Concentrazione, fino a 1 minuto","components":"V, S","material":null,"concentration":true,"ritual":false,"attack":null,"damage":null,"dc":{"ability":"Saggezza","success":"none"},"classes":["Bard","Sorcerer","Warlock","Wizard"],"classesHb":["Bardo","Invocatore","Mago","Stregone"],"effects":"","desc":"","descEn":"For the spell's duration, your eyes become an inky void imbued with dread power. One creature of your choice within 60 feet of you that you can see must succeed on a wisdom saving throw or be affected by one of the following effects of your choice for the duration. On each of your turns until the spell ends, you can use your action to target another creature but can't target a creature again if it has succeeded on a saving throw against this casting of eyebite. ***Asleep.*** The target falls unconscious. It wakes up if it takes any damage or if another creature uses its action to shake the sleeper awake. ***Panicked.*** The target is frightened of you. On each of its turns, the frightened creature must take the Dash action and move away from you by the safest and shortest available route, unless there is nowhere to move. If the target moves to a place at least 60 feet away from you where it can no longer see you, this effect ends. ***Sickened.*** The target has disadvantage on attack rolls and ability checks. At the end of each of its turns, it can make another wisdom saving throw. If it succeeds, the effect ends.","higherEn":""},{"id":"fabricate","srd":true,"name":"Fabbricare","nameEn":"Fabricate","level":4,"school":"Trasmutazione","castTime":"10 Minuti","range":"36 m","duration":"Istantanea","components":"V, S","material":null,"concentration":false,"ritual":false,"attack":null,"damage":null,"dc":null,"classes":["Wizard"],"classesHb":["Mago"],"effects":"","desc":"","descEn":"You convert raw materials into products of the same material. For example, you can fabricate a wooden bridge from a clump of trees, a rope from a patch of hemp, and clothes from flax or wool. Choose raw materials that you can see within range. You can fabricate a Large or smaller object (contained within a 10-foot cube, or eight connected 5-foot cubes), given a sufficient quantity of raw material. If you are working with metal, stone, or another mineral substance, however, the fabricated object can be no larger than Medium (contained within a single 5-foot cube). The quality of objects made by the spell is commensurate with the quality of the raw materials. Creatures or magic items can't be created or transmuted by this spell. You also can't use it to create items that ordinarily require a high degree of craftsmanship, such as jewelry, weapons, glass, or armor, unless you have proficiency with the type of artisan's tools used to craft such objects.","higherEn":""},{"id":"faerie-fire","srd":true,"name":"Fuoco Fatato","nameEn":"Faerie Fire","level":1,"school":"Invocazione","castTime":"1 Azione","range":"18 m","duration":"Concentrazione, fino a 1 minuto","components":"V","material":null,"concentration":true,"ritual":false,"attack":null,"damage":null,"dc":{"ability":"Destrezza","success":"none"},"classes":["Druid"],"classesHb":["Druido"],"effects":"Area 6 m: sagome luminose; vantaggio per colpirle, niente invisibilità.","desc":"","descEn":"Each object in a 20-foot cube within range is outlined in blue, green, or violet light (your choice). Any creature in the area when the spell is cast is also outlined in light if it fails a dexterity saving throw. For the duration, objects and affected creatures shed dim light in a 10-foot radius. Any attack roll against an affected creature or object has advantage if the attacker can see it, and the affected creature or object can't benefit from being invisible.","higherEn":"","userName":"Fuoco Fatuo"},{"id":"faithful-hound","srd":true,"name":"Segugio Fedele","nameEn":"Faithful Hound","level":4,"school":"Evocazione","castTime":"1 Azione","range":"9 m","duration":"8 ore","components":"V, S, M","material":"A tiny silver whistle, a piece of bone, and a thread","concentration":false,"ritual":false,"attack":"melee","damage":{"type":"Piercing","scale":"slot","table":{"4":"4d8"}},"dc":null,"classes":["Wizard"],"classesHb":["Mago"],"effects":"","desc":"","descEn":"You conjure a phantom watchdog in an unoccupied space that you can see within range, where it remains for the duration, until you dismiss it as an action, or until you move more than 100 feet away from it. The hound is invisible to all creatures except you and can't be harmed. When a Small or larger creature comes within 30 feet of it without first speaking the password that you specify when you cast this spell, the hound starts barking loudly. The hound sees invisible creatures and can see into the Ethereal Plane. It ignores illusions. At the start of each of your turns, the hound attempts to bite one creature within 5 feet of it that is hostile to you. The hound's attack bonus is equal to your spellcasting ability modifier + your proficiency bonus. On a hit, it deals 4d8 piercing damage.","higherEn":""},{"id":"false-life","srd":true,"name":"Falsa Vita","nameEn":"False Life","level":1,"school":"Necromanzia","castTime":"1 Azione","range":"Personale","duration":"1 ora","components":"V, S, M","material":"A small amount of alcohol or distilled spirits.","concentration":false,"ritual":false,"attack":null,"damage":null,"dc":null,"classes":["Sorcerer","Wizard"],"classesHb":["Mago","Stregone"],"effects":"Conferisce 1d4 + 4 PF temporanei.","desc":"","descEn":"Bolstering yourself with a necromantic facsimile of life, you gain 1d4 + 4 temporary hit points for the duration.","higherEn":"When you cast this spell using a spell slot of 2nd level or higher, you gain 5 additional temporary hit points for each slot level above 1st.","userName":"Falsa Vita"},{"id":"fear","srd":true,"name":"Paura","nameEn":"Fear","level":3,"school":"Illusione","castTime":"1 Azione","range":"Personale","duration":"Concentrazione, fino a 1 minuto","components":"V, S, M","material":"A white feather or the heart of a hen.","concentration":true,"ritual":false,"attack":null,"damage":null,"dc":{"ability":"Saggezza","success":"none"},"classes":["Bard","Sorcerer","Warlock","Wizard"],"classesHb":["Bardo","Invocatore","Mago","Stregone"],"effects":"","desc":"","descEn":"You project a phantasmal image of a creature's worst fears. Each creature in a 30-foot cone must succeed on a wisdom saving throw or drop whatever it is holding and become frightened for the duration. While frightened by this spell, a creature must take the Dash action and move away from you by the safest available route on each of its turns, unless there is nowhere to move. If the creature ends its turn in a location where it doesn't have line of sight to you, the creature can make a wisdom saving throw. On a successful save, the spell ends for that creature.","higherEn":""},{"id":"feather-fall","srd":true,"name":"Caduta Morbida","nameEn":"Feather Fall","level":1,"school":"Trasmutazione","castTime":"1 Reazione","range":"18 m","duration":"1 minuto","components":"V, M","material":"A small feather or a piece of down.","concentration":false,"ritual":false,"attack":null,"damage":null,"dc":null,"classes":["Bard","Sorcerer","Wizard"],"classesHb":["Bardo","Mago","Stregone"],"effects":"Rallenta la caduta di fino a 5 creature entro 18 m, evitando danni da caduta.","desc":"","descEn":"Choose up to five falling creatures within range. A falling creature's rate of descent slows to 60 feet per round until the spell ends. If the creature lands before the spell ends, it takes no falling damage and can land on its feet, and the spell ends for that creature.","higherEn":"","userName":"Caduta Morbida"},{"id":"feeblemind","srd":true,"name":"Indebolire Mente","nameEn":"Feeblemind","level":8,"school":"Ammaliamento","castTime":"1 Azione","range":"45 m","duration":"Istantanea","components":"V, S, M","material":"A handful of clay, crystal, glass, or mineral spheres.","concentration":false,"ritual":false,"attack":null,"damage":{"type":"Psychic","scale":"slot","table":{"8":"4d6"}},"dc":{"ability":"Intelligenza","success":"other"},"classes":["Bard","Druid","Warlock","Wizard"],"classesHb":["Bardo","Druido","Invocatore","Mago"],"effects":"","desc":"","descEn":"You blast the mind of a creature that you can see within range, attempting to shatter its intellect and personality. The target takes 4d6 psychic damage and must make an intelligence saving throw. On a failed save, the creature's Intelligence and Charisma scores become 1. The creature can't cast spells, activate magic items, understand language, or communicate in any intelligible way. The creature can, however, identify its friends, follow them, and even protect them. At the end of every 30 days, the creature can repeat its saving throw against this spell. If it succeeds on its saving throw, the spell ends. The spell can also be ended by greater restoration, heal, or wish.","higherEn":""},{"id":"find-familiar","srd":true,"name":"Trova Famiglio","nameEn":"Find Familiar","level":1,"school":"Evocazione","castTime":"1 Ora (Rituale)","range":"3 m","duration":"Istantanea","components":"V, S, M","material":"10gp worth of charcoal, incense, and herbs that must be consumed by fire in a brass brazier.","concentration":false,"ritual":true,"attack":null,"damage":null,"dc":null,"classes":["Wizard"],"classesHb":["Mago"],"effects":"Evoca un famiglio animale che obbedisce ai comandi e può agire come tramite magico.","desc":"","descEn":"You gain the service of a familiar, a spirit that takes an animal form you choose: bat, cat, crab, frog (toad), hawk, lizard, octopus, owl, poisonous snake, fish (quipper), rat, raven, sea horse, spider, or weasel. Appearing in an unoccupied space within range, the familiar has the statistics of the chosen form, though it is a celestial, fey, or fiend (your choice) instead of a beast. Your familiar acts independently of you, but it always obeys your commands. In combat, it rolls its own initiative and acts on its own turn. A familiar can't attack, but it can take other actions as normal. When the familiar drops to 0 hit points, it disappears, leaving behind no physical form. It reappears after you cast this spell again. While your familiar is within 100 feet of you, you can communicate with it telepathically. Additionally, as an action, you can see through your familiar's eyes and hear what it hears until the start of your next turn, gaining the benefits of any special senses that the familiar has. During this time, you are deaf and blind with regard to your own senses. As an action, you can temporarily dismiss your familiar. It disappears into a pocket dimension where it awaits your summons. Alternatively, you can dismiss it forever. As an action while it is temporarily dismissed, you can cause it to reappear in any unoccupied space within 30 feet of you. You can't have more than one familiar at a time. If you cast this spell while you already have a familiar, you instead cause it to adopt a new form. Choose one of the forms from the above list. Your familiar transforms into the chosen creature. Finally, when you cast a spell with a range of touch, your familiar can deliver the spell as if it had cast the spell. Your familiar must be within 100 feet of you, and it must use its reaction to deliver the spell when you cast it. If the spell requires an attack roll, you use your action modifier for the roll.","higherEn":"","userName":"Trova Famiglio"},{"id":"find-steed","srd":true,"name":"Trovare Destriero","nameEn":"Find Steed","level":2,"school":"Evocazione","castTime":"10 Minuti","range":"9 m","duration":"Istantanea","components":"V, S","material":null,"concentration":false,"ritual":false,"attack":null,"damage":null,"dc":null,"classes":["Paladin"],"classesHb":["Paladino"],"effects":"","desc":"","descEn":"You summon a spirit that assumes the form of an unusually intelligent, strong, and lo
